<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&amp;family=Inter:wght@400;500&amp;display=swap');
    .label-text { font-family: 'Barlow', sans-serif; font-weight: 600; font-size: 11px; fill: #FFFF77; }
    .label-sub { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 9px; fill: #D1DCFF; }
    .title-text { font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 14px; fill: #FBFFF6; }
  </style>

  <!-- background -->
  <rect id="background" width="800" height="600" fill="#1C1E35"/>

  <!-- cold-zone-left: layered shapes suggesting cold navy/periwinkle -->
  <rect id="cold-zone-base" x="0" y="0" width="450" height="600" fill="#2D3E6B" opacity="0.35"/>
  <rect id="cold-zone-mid" x="0" y="0" width="320" height="600" fill="#5B6FA8" opacity="0.15"/>
  <rect id="cold-zone-accent" x="0" y="0" width="180" height="600" fill="#D1DCFF" opacity="0.06"/>

  <!-- warm-zone-right: layered shapes suggesting warmer tones -->
  <rect id="warm-zone-base" x="450" y="0" width="350" height="600" fill="#A0785A" opacity="0.12"/>
  <rect id="warm-zone-mid" x="550" y="0" width="250" height="600" fill="#D4A574" opacity="0.08"/>

  <!-- transition-blend: overlapping mid-zone to soften boundary -->
  <rect id="transition-zone" x="340" y="0" width="200" height="600" fill="#2D3E6B" opacity="0.15"/>

  <!-- ice-crystal-textures on cold side rocks -->
  <g id="ice-crystals" opacity="0.3">
    <polygon points="60,520 70,490 82,520" fill="#D1DCFF" opacity="0.5"/>
    <polygon points="120,510 126,485 135,512" fill="#D1DCFF" opacity="0.4"/>
    <polygon points="180,505 190,478 200,508" fill="#D1DCFF" opacity="0.35"/>
    <polygon points="30,530 38,510 48,532" fill="#D1DCFF" opacity="0.45"/>
    <polygon points="230,515 238,492 248,518" fill="#D1DCFF" opacity="0.3"/>
    <polygon points="90,540 96,525 104,542" fill="#FBFFF6" opacity="0.15"/>
    <polygon points="155,535 162,518 170,537" fill="#D1DCFF" opacity="0.25"/>
  </g>

  <!-- seafloor-rocks -->
  <g id="seafloor">
    <!-- cold side rocks - darker, bluer -->
    <ellipse id="rock-cold-1" cx="80" cy="560" rx="90" ry="35" fill="#2D3E6B" opacity="0.7"/>
    <ellipse id="rock-cold-2" cx="220" cy="570" rx="110" ry="40" fill="#1C1E35" opacity="0.8"/>
    <ellipse id="rock-cold-3" cx="200" cy="555" rx="75" ry="28" fill="#5B6FA8" opacity="0.4"/>
    <ellipse id="rock-cold-4" cx="50" cy="575" rx="65" ry="30" fill="#0D0D16" opacity="0.6"/>
    <ellipse id="rock-cold-5" cx="340" cy="565" rx="80" ry="32" fill="#2D3E6B" opacity="0.5"/>

    <!-- warm side rocks - clay/slate tones -->
    <ellipse id="rock-warm-1" cx="550" cy="565" rx="100" ry="38" fill="#A0785A" opacity="0.4"/>
    <ellipse id="rock-warm-2" cx="680" cy="570" rx="85" ry="33" fill="#D4A574" opacity="0.3"/>
    <ellipse id="rock-warm-3" cx="750" cy="560" rx="70" ry="35" fill="#A0785A" opacity="0.5"/>
    <ellipse id="rock-warm-4" cx="620" cy="575" rx="60" ry="28" fill="#0D0D16" opacity="0.5"/>

    <!-- mid-zone rocks -->
    <ellipse id="rock-mid-1" cx="420" cy="568" rx="95" ry="36" fill="#2D3E6B" opacity="0.45"/>
    <ellipse id="rock-mid-2" cx="480" cy="580" rx="70" ry="30" fill="#A0785A" opacity="0.3"/>
  </g>

  <!-- seafloor-base -->
  <rect id="seafloor-base" x="0" y="570" width="800" height="30" fill="#0D0D16" opacity="0.7"/>

  <!-- kelp-fronds -->
  <g id="kelp-left" opacity="0.5">
    <path d="M55,580 Q50,500 60,420 Q65,380 55,340 Q48,300 58,260 Q63,230 55,200"
          stroke="#1A5C1E" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>
    <ellipse cx="55" cy="210" rx="12" ry="25" fill="#1A5C1E" opacity="0.5"/>
    <ellipse cx="60" cy="270" rx="14" ry="20" fill="#248A28" opacity="0.35"/>
    <ellipse cx="52" cy="340" rx="13" ry="22" fill="#1A5C1E" opacity="0.4"/>
    <ellipse cx="58" cy="420" rx="11" ry="18" fill="#248A28" opacity="0.3"/>
  </g>
  <g id="kelp-right" opacity="0.4">
    <path d="M755,580 Q760,510 750,450 Q744,410 752,370 Q758,340 750,300"
          stroke="#248A28" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <ellipse cx="750" cy="310" rx="10" ry="20" fill="#248A28" opacity="0.4"/>
    <ellipse cx="752" cy="380" rx="12" ry="18" fill="#1A5C1E" opacity="0.35"/>
    <ellipse cx="748" cy="450" rx="11" ry="16" fill="#248A28" opacity="0.3"/>
  </g>
  <g id="kelp-mid" opacity="0.25">
    <path d="M680,580 Q685,530 678,480 Q672,440 680,400"
          stroke="#1A5C1E" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>
    <ellipse cx="680" cy="410" rx="9" ry="16" fill="#1A5C1E" opacity="0.4"/>
  </g>

  <!-- marine-particles -->
  <g id="marine-particles">
    <circle cx="120" cy="100" r="1.5" fill="#D1DCFF" opacity="0.4"/>
    <circle cx="300" cy="150" r="1" fill="#FBFFF6" opacity="0.3"/>
    <circle cx="500" cy="80" r="1.5" fill="#D1DCFF" opacity="0.35"/>
    <circle cx="650" cy="130" r="1" fill="#D4A574" opacity="0.3"/>
    <circle cx="180" cy="250" r="1.2" fill="#FBFFF6" opacity="0.25"/>
    <circle cx="700" cy="200" r="1.5" fill="#D1DCFF" opacity="0.3"/>
    <circle cx="400" cy="50" r="1" fill="#FBFFF6" opacity="0.35"/>
    <circle cx="90" cy="350" r="1.2" fill="#D1DCFF" opacity="0.3"/>
    <circle cx="560" cy="180" r="1" fill="#FBFFF6" opacity="0.25"/>
    <circle cx="250" cy="60" r="1.5" fill="#D1DCFF" opacity="0.3"/>
    <circle cx="730" cy="320" r="1" fill="#D4A574" opacity="0.25"/>
    <circle cx="350" cy="110" r="1.3" fill="#FBFFF6" opacity="0.3"/>
    <circle cx="620" cy="90" r="1.2" fill="#D1DCFF" opacity="0.3"/>
    <circle cx="150" cy="420" r="1" fill="#FBFFF6" opacity="0.2"/>
    <circle cx="470" cy="160" r="1.5" fill="#D1DCFF" opacity="0.25"/>
  </g>

  <!-- octopus -->
  <g id="octopus">
    <!-- arms: 8 arms sprawled wide -->
    <!-- arm-1: far left, cold side -->
    <path id="arm-far-left" d="M370,340 Q300,370 220,400 Q150,430 80,440 Q40,445 15,430"
          stroke="#5B6FA8" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M370,340 Q300,370 220,400 Q150,430 80,440 Q40,445 15,430"
          stroke="#2D3E6B" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- suckers -->
    <circle cx="280" cy="380" r="3.5" fill="#D1DCFF" opacity="0.35"/>
    <circle cx="220" cy="402" r="3" fill="#D1DCFF" opacity="0.3"/>
    <circle cx="160" cy="425" r="2.8" fill="#D1DCFF" opacity="0.3"/>
    <circle cx="100" cy="438" r="2.5" fill="#D1DCFF" opacity="0.25"/>
    <circle cx="55" cy="438" r="2.2" fill="#D1DCFF" opacity="0.25"/>

    <!-- arm-2: left-down, cold side -->
    <path id="arm-left-down" d="M380,360 Q330,410 280,470 Q240,510 200,530 Q170,540 140,535"
          stroke="#5B6FA8" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.75"/>
    <path d="M380,360 Q330,410 280,470 Q240,510 200,530 Q170,540 140,535"
          stroke="#2D3E6B" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.45"/>
    <circle cx="310" cy="440" r="3" fill="#D1DCFF" opacity="0.3"/>
    <circle cx="260" cy="490" r="2.8" fill="#D1DCFF" opacity="0.25"/>
    <circle cx="215" cy="522" r="2.5" fill="#D1DCFF" opacity="0.25"/>

    <!-- arm-3: left-up, cold side -->
    <path id="arm-left-up" d="M370,300 Q310,270 240,250 Q180,235 120,245 Q80,252 50,270"
          stroke="#5B6FA8" stroke-width="15" fill="none" stroke-linecap="round" opacity="0.75"/>
    <path d="M370,300 Q310,270 240,250 Q180,235 120,245 Q80,252 50,270"
          stroke="#2D3E6B" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.4"/>
    <circle cx="290" cy="265" r="3" fill="#D1DCFF" opacity="0.3"/>
    <circle cx="220" cy="248" r="2.8" fill="#D1DCFF" opacity="0.25"/>
    <circle cx="150" cy="242" r="2.5" fill="#D1DCFF" opacity="0.25"/>
    <circle cx="90" cy="253" r="2.2" fill="#D1DCFF" opacity="0.2"/>

    <!-- arm-4: upper-left reaching -->
    <path id="arm-upper-left" d="M380,290 Q340,240 300,190 Q270,155 240,140 Q210,130 185,140"
          stroke="#5B6FA8" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M380,290 Q340,240 300,190 Q270,155 240,140 Q210,130 185,140"
          stroke="#2D3E6B" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/>
    <circle cx="325" cy="220" r="2.8" fill="#D1DCFF" opacity="0.25"/>
    <circle cx="275" cy="170" r="2.5" fill="#D1DCFF" opacity="0.25"/>
    <circle cx="225" cy="140" r="2.2" fill="#D1DCFF" opacity="0.2"/>

    <!-- arm-5: far right, warm side -->
    <path id="arm-far-right" d="M440,340 Q510,370 590,395 Q660,415 720,420 Q760,422 785,410"
          stroke="#A0785A" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.75"/>
    <path d="M440,340 Q510,370 590,395 Q660,415 720,420 Q760,422 785,410"
          stroke="#D4A574" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.4"/>
    <circle cx="530" cy="378" r="3.5" fill="#D4A574" opacity="0.35"/>
    <circle cx="600" cy="400" r="3" fill="#D4A574" opacity="0.3"/>
    <circle cx="670" cy="415" r="2.8" fill="#D4A574" opacity="0.25"/>
    <circle cx="735" cy="420" r="2.5" fill="#D4A574" opacity="0.25"/>

    <!-- arm-6: right-down, warm side -->
    <path id="arm-right-down" d="M430,360 Q480,410 530,465 Q570,505 610,525 Q640,535 670,530"
          stroke="#A0785A" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M430,360 Q480,410 530,465 Q570,505 610,525 Q640,535 670,530"
          stroke="#D4A574" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.4"/>
    <circle cx="500" cy="440" r="3" fill="#D4A574" opacity="0.3"/>
    <circle cx="548" cy="485" r="2.8" fill="#D4A574" opacity="0.25"/>
    <circle cx="600" cy="518" r="2.5" fill="#D4A574" opacity="0.25"/>

    <!-- arm-7: right-up, warm side -->
    <path id="arm-right-up" d="M440,300 Q500,270 570,255 Q630,242 690,250 Q720,256 745,270"
          stroke="#A0785A" stroke-width="15" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M440,300 Q500,270 570,255 Q630,242 690,250 Q720,256 745,270"
          stroke="#D4A574" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.35"/>
    <circle cx="520" cy="265" r="3" fill="#D4A574" opacity="0.3"/>
    <circle cx="590" cy="250" r="2.8" fill="#D4A574" opacity="0.25"/>
    <circle cx="660" cy="248" r="2.5" fill="#D4A574" opacity="0.2"/>

    <!-- arm-8: upper-right reaching -->
    <path id="arm-upper-right" d="M430,290 Q470,240 510,195 Q540,162 575,148 Q600,140 625,148"
          stroke="#A0785A" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M430,290 Q470,240 510,195 Q540,162 575,148 Q600,140 625,148"
          stroke="#D4A574" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.35"/>
    <circle cx="485" cy="222" r="2.8" fill="#D4A574" opacity="0.25"/>
    <circle cx="535" cy="172" r="2.5" fill="#D4A574" opacity="0.2"/>
    <circle cx="590" cy="148" r="2.2" fill="#D4A574" opacity="0.2"/>

    <!-- mantle (head) -->
    <ellipse id="mantle-shadow" cx="408" cy="295" rx="68" ry="80" fill="#0D0D16" opacity="0.4"/>
    <!-- cold side of mantle -->
    <ellipse id="mantle-cold" cx="395" cy="290" rx="55" ry="72" fill="#5B6FA8" opacity="0.7"/>
    <!-- warm side overlay -->
    <ellipse id="mantle-warm" cx="420" cy="290" rx="50" ry="68" fill="#A0785A" opacity="0.35"/>
    <!-- mantle highlight -->
    <ellipse id="mantle-base" cx="405" cy="288" rx="52" ry="70" fill="#2D3E6B" opacity="0.5"/>
    <!-- mantle texture spots -->
    <circle cx="385" cy="260" r="6" fill="#5B6FA8" opacity="0.4"/>
    <circle cx="420" cy="270" r="5" fill="#A0785A" opacity="0.3"/>
    <circle cx="395" cy="300" r="7" fill="#2D3E6B" opacity="0.35"/>
    <circle cx="415" cy="310" r="4" fill="#D4A574" opacity="0.2"/>
    <circle cx="380" cy="285" r="4.5" fill="#D1DCFF" opacity="0.15"/>

    <!-- web between arms at base -->
    <path id="arm-web-left" d="M370,340 Q350,370 380,360 Z" fill="#5B6FA8" opacity="0.3"/>
    <path id="arm-web-right" d="M440,340 Q460,370 430,360 Z" fill="#A0785A" opacity="0.25"/>
    <path id="arm-web-bottom" d="M380,360 Q405,380 430,360 Q405,370 380,360 Z" fill="#2D3E6B" opacity="0.3"/>

    <!-- eyes -->
    <g id="eye-left">
      <ellipse cx="388" cy="298" rx="14" ry="16" fill="#0D0D16" opacity="0.8"/>
      <ellipse cx="388" cy="298" rx="11" ry="13" fill="#E6B800" opacity="0.5"/>
      <ellipse cx="388" cy="299" rx="5" ry="10" fill="#1C1E35"/>
      <ellipse cx="384" cy="293" rx="3" ry="3.5" fill="#FBFFF6" opacity="0.85"/>
    </g>
    <g id="eye-right">
      <ellipse cx="422" cy="298" rx="14" ry="16" fill="#0D0D16" opacity="0.8"/>
      <ellipse cx="422" cy="298" rx="11" ry="13" fill="#E6B800" opacity="0.5"/>
      <ellipse cx="422" cy="299" rx="5" ry="10" fill="#1C1E35"/>
      <ellipse cx="418" cy="293" rx="3" ry="3.5" fill="#FBFFF6" opacity="0.85"/>
    </g>
  </g>

  <!-- annotation: 13,000+ RNA edits — on the mantle -->
  <g id="annotation-rna-edits">
    <line x1="405" y1="240" x2="405" y2="195" stroke="#5B6FA8" stroke-width="1.2"
          stroke-dasharray="8,5" stroke-linecap="round" opacity="0.6"/>
    <rect x="345" y="172" width="120" height="22" rx="3" fill="#0D0D16" opacity="0.7"/>
    <text x="405" y="187" text-anchor="middle" class="label-text">13,000+ RNA edits</text>
  </g>

  <!-- annotation: kinesin-1 tuned — on left arm -->
  <g id="annotation-kinesin">
    <line x1="160" y1="425" x2="160" y2="385" stroke="#5B6FA8" stroke-width="1.2"
          stroke-dasharray="8,5" stroke-linecap="round" opacity="0.6"/>
    <rect x="108" y="365" width="105" height="20" rx="3" fill="#0D0D16" opacity="0.7"/>
    <text x="160" y="379" text-anchor="middle" class="label-text">kinesin-1 tuned</text>
  </g>

  <!-- annotation: synaptotagmin adjusted — on right arm -->
  <g id="annotation-synaptotagmin">
    <line x1="650" y1="410" x2="650" y2="368" stroke="#5B6FA8" stroke-width="1.2"
          stroke-dasharray="8,5" stroke-linecap="round" opacity="0.6"/>
    <rect x="580" y="348" width="140" height="20" rx="3" fill="#0D0D16" opacity="0.7"/>
    <text x="650" y="362" text-anchor="middle" class="label-text">synaptotagmin adjusted</text>
  </g>

  <!-- annotation: ADAR enzyme — on upper-left arm -->
  <g id="annotation-adar">
    <line x1="280" y1="190" x2="280" y2="156" stroke="#5B6FA8" stroke-width="1.2"
          stroke-dasharray="8,5" stroke-linecap="round" opacity="0.6"/>
    <rect x="234" y="138" width="92" height="18" rx="3" fill="#0D0D16" opacity="0.7"/>
    <text x="280" y="151" text-anchor="middle" class="label-sub">ADAR: A → I (reads G)</text>
  </g>

  <!-- temperature labels -->
  <g id="temp-labels">
    <text x="70" y="40" class="label-sub" opacity="0.5" font-size="10">COLD</text>
    <text x="720" y="40" class="label-sub" opacity="0.4" font-size="10">WARM</text>
  </g>

  <!-- subtle temperature indicators -->
  <g id="cold-indicator" opacity="0.35">
    <!-- snowflake-like mark -->
    <line x1="85" y1="52" x2="85" y2="72" stroke="#D1DCFF" stroke-width="1" stroke-linecap="round"/>
    <line x1="75" y1="62" x2="95" y2="62" stroke="#D1DCFF" stroke-width="1" stroke-linecap="round"/>
    <line x1="78" y1="55" x2="92" y2="69" stroke="#D1DCFF" stroke-width="1" stroke-linecap="round"/>
    <line x1="92" y1="55" x2="78" y2="69" stroke="#D1DCFF" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- title bar -->
  <g id="title-bar">
    <rect x="280" y="560" width="240" height="28" rx="4" fill="#0D0D16" opacity="0.65"/>
    <text x="400" y="579" text-anchor="middle" class="title-text" font-size="12">Octopus RNA Editing — B. bimaculoides</text>
  </g>

  <!-- additional depth particles in water column -->
  <g id="depth-particles" opacity="0.2">
    <circle cx="310" cy="480" r="2" fill="#D1DCFF"/>
    <circle cx="490" cy="500" r="1.8" fill="#D4A574"/>
    <circle cx="370" cy="510" r="1.5" fill="#5B6FA8"/>
    <circle cx="450" cy="490" r="1.2" fill="#D1DCFF"/>
    <circle cx="200" cy="500" r="1.8" fill="#D1DCFF"/>
    <circle cx="600" cy="510" r="1.5" fill="#D4A574"/>
  </g>
</svg>