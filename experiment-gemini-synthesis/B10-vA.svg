<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background: deep dark navy -->
  <rect id="background" width="800" height="600" fill="#0D0D16"/>

  <!-- Deep water ambient layers -->
  <ellipse id="water-glow-deep" cx="200" cy="300" rx="450" ry="350" fill="#1C1E35" opacity="0.3"/>
  <ellipse id="water-glow-mid" cx="180" cy="320" rx="300" ry="250" fill="#2D3E6B" opacity="0.15"/>

  <!-- Distant water particulate / plankton hints -->
  <circle id="particle-1" cx="620" cy="80" r="1.5" fill="#D1DCFF" opacity="0.3"/>
  <circle id="particle-2" cx="710" cy="150" r="1" fill="#D1DCFF" opacity="0.25"/>
  <circle id="particle-3" cx="580" cy="420" r="1.2" fill="#D1DCFF" opacity="0.2"/>
  <circle id="particle-4" cx="750" cy="380" r="0.8" fill="#D1DCFF" opacity="0.3"/>
  <circle id="particle-5" cx="660" cy="520" r="1.4" fill="#D1DCFF" opacity="0.15"/>
  <circle id="particle-6" cx="490" cy="60" r="1" fill="#D1DCFF" opacity="0.2"/>
  <circle id="particle-7" cx="130" cy="540" r="1.3" fill="#D1DCFF" opacity="0.18"/>
  <circle id="particle-8" cx="350" cy="30" r="0.9" fill="#5B6FA8" opacity="0.25"/>

  <!-- === OCTOPUS MANTLE (head, upper left) === -->
  <g id="octopus-mantle">
    <!-- Mantle body - large rounded shape emerging from left edge -->
    <ellipse id="mantle-shadow" cx="60" cy="210" rx="180" ry="150" fill="#1C1E35" opacity="0.6"/>
    <ellipse id="mantle-body" cx="55" cy="205" rx="170" ry="140" fill="#2D3E6B" opacity="0.8"/>
    <ellipse id="mantle-highlight" cx="80" cy="185" rx="130" ry="105" fill="#5B6FA8" opacity="0.35"/>
    <!-- Texture spots on mantle (chromatophores) -->
    <circle id="chromatophore-m1" cx="100" cy="160" r="8" fill="#A0785A" opacity="0.3"/>
    <circle id="chromatophore-m2" cx="130" cy="200" r="6" fill="#D4A574" opacity="0.25"/>
    <circle id="chromatophore-m3" cx="85" cy="230" r="10" fill="#A0785A" opacity="0.2"/>
    <circle id="chromatophore-m4" cx="150" cy="170" r="5" fill="#E6B800" opacity="0.15"/>
    <circle id="chromatophore-m5" cx="60" cy="180" r="7" fill="#2D3E6B" opacity="0.5"/>
    <circle id="chromatophore-m6" cx="120" cy="140" r="4" fill="#D4A574" opacity="0.2"/>
    <circle id="chromatophore-m7" cx="140" cy="240" r="9" fill="#5B6FA8" opacity="0.25"/>

    <!-- Eye socket -->
    <ellipse id="eye-socket" cx="155" cy="195" rx="38" ry="32" fill="#1C1E35" opacity="0.8"/>
    <!-- Eye globe -->
    <ellipse id="eye-globe" cx="155" cy="195" rx="30" ry="25" fill="#2D3E6B" opacity="0.9"/>
    <!-- Iris ring -->
    <ellipse id="eye-iris-outer" cx="155" cy="195" rx="22" ry="19" fill="#5B6FA8" opacity="0.6"/>
    <ellipse id="eye-iris-inner" cx="155" cy="195" rx="16" ry="14" fill="#E6B800" opacity="0.35"/>
    <!-- Pupil - horizontal bar (cephalopod style) -->
    <ellipse id="eye-pupil" cx="155" cy="195" rx="14" ry="6" fill="#1C1E35"/>
    <!-- Eye highlight -->
    <ellipse id="eye-highlight" cx="147" cy="188" rx="5" ry="4" fill="#FBFFF6" opacity="0.85"/>
    <!-- Secondary highlight -->
    <circle id="eye-highlight-2" cx="163" cy="200" r="2" fill="#FBFFF6" opacity="0.3"/>
    <!-- Eye lid / brow ridge -->
    <path id="eye-brow" d="M120,182 Q155,165 190,180" stroke="#2D3E6B" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path id="eye-lower" d="M125,210 Q155,222 188,208" stroke="#2D3E6B" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- === MAIN TENTACLE — snakes from mantle across canvas === -->
  <g id="main-tentacle">
    <!-- Tentacle shadow / depth layer -->
    <path id="tentacle-shadow"
      d="M100,310 C180,340 250,380 330,370 C410,360 440,320 500,340 C560,360 600,400 660,410 C720,420 770,440 810,430"
      stroke="#1C1E35" stroke-width="72" fill="none" stroke-linecap="round" opacity="0.5"/>

    <!-- Tentacle base layer -->
    <path id="tentacle-base"
      d="M95,305 C175,335 245,375 325,365 C405,355 435,315 495,335 C555,355 595,395 655,405 C715,415 765,435 810,425"
      stroke="#2D3E6B" stroke-width="58" fill="none" stroke-linecap="round" opacity="0.8"/>

    <!-- Tentacle mid layer (slightly lighter) -->
    <path id="tentacle-mid"
      d="M95,303 C175,332 245,372 325,362 C405,352 435,312 495,332 C555,352 595,392 655,402 C715,412 765,432 810,422"
      stroke="#5B6FA8" stroke-width="40" fill="none" stroke-linecap="round" opacity="0.4"/>

    <!-- Chromatophore variation along tentacle — color-shifting patches -->
    <ellipse id="chromo-t1" cx="180" cy="335" rx="18" ry="12" fill="#A0785A" opacity="0.25" transform="rotate(-5,180,335)"/>
    <ellipse id="chromo-t2" cx="260" cy="372" rx="22" ry="10" fill="#D4A574" opacity="0.2" transform="rotate(8,260,372)"/>
    <ellipse id="chromo-t3" cx="350" cy="362" rx="15" ry="9" fill="#E6B800" opacity="0.15" transform="rotate(-3,350,362)"/>
    <ellipse id="chromo-t4" cx="430" cy="330" rx="20" ry="11" fill="#A0785A" opacity="0.2" transform="rotate(12,430,330)"/>
    <ellipse id="chromo-t5" cx="520" cy="342" rx="16" ry="10" fill="#D4A574" opacity="0.18" transform="rotate(-8,520,342)"/>
    <ellipse id="chromo-t6" cx="600" cy="395" rx="18" ry="8" fill="#E85542" opacity="0.1" transform="rotate(5,600,395)"/>
    <ellipse id="chromo-t7" cx="680" cy="410" rx="14" ry="9" fill="#A0785A" opacity="0.22" transform="rotate(-6,680,410)"/>
    <ellipse id="chromo-t8" cx="150" cy="318" rx="12" ry="8" fill="#E6B800" opacity="0.12" transform="rotate(3,150,318)"/>
    <!-- Cold-adaptation chromatophores — bluer patches suggesting cold response -->
    <ellipse id="chromo-cold-1" cx="300" cy="368" rx="25" ry="8" fill="#D1DCFF" opacity="0.12" transform="rotate(6,300,368)"/>
    <ellipse id="chromo-cold-2" cx="470" cy="332" rx="20" ry="7" fill="#D1DCFF" opacity="0.1" transform="rotate(-4,470,332)"/>
    <ellipse id="chromo-cold-3" cx="640" cy="402" rx="22" ry="9" fill="#D1DCFF" opacity="0.08" transform="rotate(2,640,402)"/>

    <!-- Tentacle highlight / top edge -->
    <path id="tentacle-highlight"
      d="M100,295 C178,322 248,360 326,350 C404,340 434,300 494,320 C554,340 594,380 654,390 C714,400 764,420 810,412"
      stroke="#D1DCFF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- === SUCKERS along the tentacle underside === -->
  <g id="suckers">
    <!-- Row of suckers — each is a double ellipse: outer rim + inner cup -->
    <!-- Sucker 1 -->
    <ellipse id="sucker-1-rim" cx="140" cy="328" rx="12" ry="10" fill="#5B6FA8" opacity="0.5" transform="rotate(-8,140,328)"/>
    <ellipse id="sucker-1-cup" cx="140" cy="328" rx="7" ry="6" fill="#1C1E35" opacity="0.7" transform="rotate(-8,140,328)"/>
    <ellipse id="sucker-1-highlight" cx="138" cy="325" rx="3" ry="2" fill="#D1DCFF" opacity="0.25" transform="rotate(-8,138,325)"/>

    <!-- Sucker 2 -->
    <ellipse id="sucker-2-rim" cx="185" cy="348" rx="14" ry="11" fill="#5B6FA8" opacity="0.5" transform="rotate(5,185,348)"/>
    <ellipse id="sucker-2-cup" cx="185" cy="348" rx="8" ry="6" fill="#1C1E35" opacity="0.7" transform="rotate(5,185,348)"/>
    <ellipse id="sucker-2-highlight" cx="182" cy="345" rx="3" ry="2.5" fill="#D1DCFF" opacity="0.25"/>

    <!-- Sucker 3 -->
    <ellipse id="sucker-3-rim" cx="230" cy="368" rx="15" ry="12" fill="#5B6FA8" opacity="0.5" transform="rotate(10,230,368)"/>
    <ellipse id="sucker-3-cup" cx="230" cy="368" rx="9" ry="7" fill="#1C1E35" opacity="0.7" transform="rotate(10,230,368)"/>
    <ellipse id="sucker-3-highlight" cx="227" cy="364" rx="4" ry="2.5" fill="#D1DCFF" opacity="0.25"/>

    <!-- Sucker 4 (large, prominent) -->
    <ellipse id="sucker-4-rim" cx="280" cy="378" rx="16" ry="13" fill="#5B6FA8" opacity="0.55" transform="rotate(6,280,378)"/>
    <ellipse id="sucker-4-cup" cx="280" cy="378" rx="10" ry="8" fill="#1C1E35" opacity="0.7" transform="rotate(6,280,378)"/>
    <ellipse id="sucker-4-highlight" cx="277" cy="374" rx="4" ry="3" fill="#D1DCFF" opacity="0.3"/>

    <!-- Sucker 5 -->
    <ellipse id="sucker-5-rim" cx="330" cy="376" rx="14" ry="12" fill="#5B6FA8" opacity="0.5" transform="rotate(2,330,376)"/>
    <ellipse id="sucker-5-cup" cx="330" cy="376" rx="8" ry="7" fill="#1C1E35" opacity="0.7" transform="rotate(2,330,376)"/>
    <ellipse id="sucker-5-highlight" cx="327" cy="372" rx="3" ry="2.5" fill="#D1DCFF" opacity="0.25"/>

    <!-- Sucker 6 -->
    <ellipse id="sucker-6-rim" cx="380" cy="362" rx="13" ry="11" fill="#5B6FA8" opacity="0.45" transform="rotate(-5,380,362)"/>
    <ellipse id="sucker-6-cup" cx="380" cy="362" rx="8" ry="6" fill="#1C1E35" opacity="0.65" transform="rotate(-5,380,362)"/>
    <ellipse id="sucker-6-highlight" cx="377" cy="359" rx="3" ry="2" fill="#D1DCFF" opacity="0.2"/>

    <!-- Sucker 7 -->
    <ellipse id="sucker-7-rim" cx="425" cy="340" rx="12" ry="10" fill="#5B6FA8" opacity="0.45" transform="rotate(-10,425,340)"/>
    <ellipse id="sucker-7-cup" cx="425" cy="340" rx="7" ry="6" fill="#1C1E35" opacity="0.65" transform="rotate(-10,425,340)"/>
    <ellipse id="sucker-7-highlight" cx="422" cy="337" rx="3" ry="2" fill="#D1DCFF" opacity="0.2"/>

    <!-- Sucker 8 -->
    <ellipse id="sucker-8-rim" cx="470" cy="340" rx="13" ry="11" fill="#5B6FA8" opacity="0.45" transform="rotate(3,470,340)"/>
    <ellipse id="sucker-8-cup" cx="470" cy="340" rx="8" ry="6" fill="#1C1E35" opacity="0.65" transform="rotate(3,470,340)"/>
    <ellipse id="sucker-8-highlight" cx="467" cy="337" rx="3" ry="2.5" fill="#D1DCFF" opacity="0.2"/>

    <!-- Sucker 9 -->
    <ellipse id="sucker-9-rim" cx="520" cy="348" rx="14" ry="11" fill="#5B6FA8" opacity="0.4" transform="rotate(7,520,348)"/>
    <ellipse id="sucker-9-cup" cx="520" cy="348" rx="8" ry="6" fill="#1C1E35" opacity="0.6" transform="rotate(7,520,348)"/>
    <ellipse id="sucker-9-highlight" cx="517" cy="345" rx="3" ry="2" fill="#D1DCFF" opacity="0.2"/>

    <!-- Sucker 10 -->
    <ellipse id="sucker-10-rim" cx="565" cy="370" rx="13" ry="10" fill="#5B6FA8" opacity="0.4" transform="rotate(10,565,370)"/>
    <ellipse id="sucker-10-cup" cx="565" cy="370" rx="7" ry="6" fill="#1C1E35" opacity="0.6" transform="rotate(10,565,370)"/>
    <ellipse id="sucker-10-highlight" cx="562" cy="367" rx="3" ry="2" fill="#D1DCFF" opacity="0.18"/>

    <!-- Sucker 11 -->
    <ellipse id="sucker-11-rim" cx="610" cy="395" rx="12" ry="10" fill="#5B6FA8" opacity="0.38" transform="rotate(5,610,395)"/>
    <ellipse id="sucker-11-cup" cx="610" cy="395" rx="7" ry="5" fill="#1C1E35" opacity="0.55" transform="rotate(5,610,395)"/>

    <!-- Sucker 12 -->
    <ellipse id="sucker-12-rim" cx="655" cy="410" rx="11" ry="9" fill="#5B6FA8" opacity="0.35" transform="rotate(2,655,410)"/>
    <ellipse id="sucker-12-cup" cx="655" cy="410" rx="6" ry="5" fill="#1C1E35" opacity="0.5" transform="rotate(2,655,410)"/>

    <!-- Sucker 13 (small, distant) -->
    <ellipse id="sucker-13-rim" cx="700" cy="418" rx="9" ry="7" fill="#5B6FA8" opacity="0.3" transform="rotate(-3,700,418)"/>
    <ellipse id="sucker-13-cup" cx="700" cy="418" rx="5" ry="4" fill="#1C1E35" opacity="0.45" transform="rotate(-3,700,418)"/>

    <!-- Sucker 14 (smallest, trailing off) -->
    <ellipse id="sucker-14-rim" cx="740" cy="428" rx="7" ry="6" fill="#5B6FA8" opacity="0.25"/>
    <ellipse id="sucker-14-cup" cx="740" cy="428" rx="4" ry="3" fill="#1C1E35" opacity="0.4"/>

    <!-- Secondary row — smaller suckers offset above the main row -->
    <ellipse id="sucker-s1-rim" cx="205" cy="355" rx="8" ry="7" fill="#5B6FA8" opacity="0.3" transform="rotate(4,205,355)"/>
    <ellipse id="sucker-s1-cup" cx="205" cy="355" rx="5" ry="4" fill="#1C1E35" opacity="0.5"/>

    <ellipse id="sucker-s2-rim" cx="305" cy="370" rx="9" ry="7" fill="#5B6FA8" opacity="0.3" transform="rotate(-2,305,370)"/>
    <ellipse id="sucker-s2-cup" cx="305" cy="370" rx="5" ry="4" fill="#1C1E35" opacity="0.5"/>

    <ellipse id="sucker-s3-rim" cx="450" cy="330" rx="8" ry="6" fill="#5B6FA8" opacity="0.28"/>
    <ellipse id="sucker-s3-cup" cx="450" cy="330" rx="4" ry="3" fill="#1C1E35" opacity="0.45"/>

    <ellipse id="sucker-s4-rim" cx="545" cy="358" rx="8" ry="7" fill="#5B6FA8" opacity="0.25"/>
    <ellipse id="sucker-s4-cup" cx="545" cy="358" rx="4" ry="3.5" fill="#1C1E35" opacity="0.4"/>

    <ellipse id="sucker-s5-rim" cx="635" cy="400" rx="7" ry="6" fill="#5B6FA8" opacity="0.22"/>
    <ellipse id="sucker-s5-cup" cx="635" cy="400" rx="4" ry="3" fill="#1C1E35" opacity="0.35"/>
  </g>

  <!-- === SECONDARY TENTACLE — partial, behind main one === -->
  <g id="secondary-tentacle">
    <path id="tentacle-2-base"
      d="M70,360 C130,400 200,450 280,460 C360,470 420,450 480,470 C540,490 580,510 640,520 C700,530 750,540 800,535"
      stroke="#1C1E35" stroke-width="32" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path id="tentacle-2-mid"
      d="M70,358 C130,398 200,448 280,458 C360,468 420,448 480,468 C540,488 580,508 640,518 C700,528 750,538 800,533"
      stroke="#2D3E6B" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.4"/>
    <!-- A few suckers on secondary tentacle -->
    <ellipse id="sucker-2t-1" cx="200" cy="452" rx="8" ry="6" fill="#5B6FA8" opacity="0.25"/>
    <ellipse id="sucker-2t-1c" cx="200" cy="452" rx="4" ry="3" fill="#1C1E35" opacity="0.4"/>
    <ellipse id="sucker-2t-2" cx="300" cy="464" rx="7" ry="6" fill="#5B6FA8" opacity="0.22"/>
    <ellipse id="sucker-2t-2c" cx="300" cy="464" rx="4" ry="3" fill="#1C1E35" opacity="0.35"/>
    <ellipse id="sucker-2t-3" cx="400" cy="458" rx="6" ry="5" fill="#5B6FA8" opacity="0.2"/>
    <ellipse id="sucker-2t-3c" cx="400" cy="458" rx="3" ry="2.5" fill="#1C1E35" opacity="0.3"/>
  </g>

  <!-- === THIRD TENTACLE TIP — curling up from bottom left === -->
  <g id="tentacle-tip-curl">
    <path id="tentacle-3-base"
      d="M0,520 C40,510 80,490 120,500 C160,510 180,530 170,505 C160,480 140,465 150,450"
      stroke="#2D3E6B" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path id="tentacle-3-highlight"
      d="M0,518 C40,508 80,488 118,498 C156,508 176,525 166,502"
      stroke="#5B6FA8" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- === WEBBING between mantle and tentacle === -->
  <path id="arm-webbing"
    d="M80,290 C100,310 110,330 100,350 C95,365 75,375 70,360"
    fill="#2D3E6B" opacity="0.4"/>

  <!-- === COLD WATER VISUAL CUES — ice crystal hints === -->
  <g id="cold-indicators">
    <!-- Subtle geometric shapes suggesting cold / crystalline water -->
    <polygon id="ice-hint-1" points="580,120 590,105 600,120" fill="#D1DCFF" opacity="0.1"/>
    <polygon id="ice-hint-2" points="520,180 526,168 532,180" fill="#D1DCFF" opacity="0.08"/>
    <line id="ice-line-1" x1="540" y1="100" x2="555" y2="88" stroke="#D1DCFF" stroke-width="1" opacity="0.12" stroke-linecap="round"/>
    <line id="ice-line-2" x1="630" y1="170" x2="642" y2="158" stroke="#D1DCFF" stroke-width="1" opacity="0.1" stroke-linecap="round"/>
  </g>

  <!-- === INSET DIAGRAM: RNA EDITING A → I === -->
  <g id="rna-editing-diagram" transform="translate(580, 30)">
    <!-- Diagram background panel -->
    <rect id="diagram-panel" x="0" y="0" width="195" height="145" rx="6" ry="6" fill="#0D0D16" opacity="0.9" stroke="#5B6FA8" stroke-width="1.5" stroke-opacity="0.5"/>

    <!-- Title -->
    <text id="diagram-title" x="97" y="22" text-anchor="middle" font-family="Barlow, sans-serif" font-size="11" font-weight="600" fill="#D1DCFF" opacity="0.8">RNA EDITING</text>

    <!-- mRNA strand — simple backbone line -->
    <line id="mrna-strand" x1="20" y1="65" x2="175" y2="65" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

    <!-- Nucleotide bases along strand -->
    <!-- ...G - -->
    <rect id="base-g1" x="25" y="52" width="14" height="20" rx="2" fill="#2D3E6B" opacity="0.6"/>
    <text x="32" y="66" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#D1DCFF" opacity="0.7">G</text>

    <!-- C -->
    <rect id="base-c1" x="45" y="52" width="14" height="20" rx="2" fill="#2D3E6B" opacity="0.6"/>
    <text x="52" y="66" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#D1DCFF" opacity="0.7">C</text>

    <!-- A (the target — highlighted) -->
    <rect id="base-a-target" x="68" y="48" width="18" height="26" rx="3" fill="#E85542" opacity="0.7"/>
    <text id="base-a-label" x="77" y="66" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FFFF77">A</text>

    <!-- Arrow from A to I -->
    <line id="edit-arrow-line" x1="92" y1="61" x2="112" y2="61" stroke="#FFFF77" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <polygon id="edit-arrow-head" points="112,56 122,61 112,66" fill="#FFFF77" opacity="0.8"/>

    <!-- I (result — highlighted green) -->
    <rect id="base-i-result" x="124" y="48" width="18" height="26" rx="3" fill="#2FBF39" opacity="0.7"/>
    <text id="base-i-label" x="133" y="66" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FBFFF6">I</text>

    <!-- U -->
    <rect id="base-u1" x="148" y="52" width="14" height="20" rx="2" fill="#2D3E6B" opacity="0.6"/>
    <text x="155" y="66" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#D1DCFF" opacity="0.7">U</text>

    <!-- ADAR enzyme icon — simple rounded shape above the edit site -->
    <ellipse id="adar-enzyme-body" cx="97" cy="38" rx="22" ry="10" fill="#E6B800" opacity="0.5"/>
    <text id="adar-enzyme-label" x="97" y="42" text-anchor="middle" font-family="Barlow, sans-serif" font-size="9" font-weight="600" fill="#0D0D16" opacity="0.9">ADAR</text>

    <!-- Inosine reads as G note -->
    <text id="reads-as-g" x="133" y="87" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#6FD877" opacity="0.7">reads as G</text>

    <!-- Annotation: protein change -->
    <line id="protein-line" x1="20" y1="102" x2="175" y2="102" stroke="#5B6FA8" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
    <text id="protein-label" x="97" y="118" text-anchor="middle" font-family="Barlow, sans-serif" font-size="9" fill="#D1DCFF" opacity="0.6">13,000+ edits in neural tissue</text>
    <text id="cold-label" x="97" y="132" text-anchor="middle" font-family="Barlow, sans-serif" font-size="9" fill="#D1DCFF" opacity="0.5">cold-adaptive protein tuning</text>
  </g>

  <!-- === CALLOUT LINE from diagram to tentacle === -->
  <line id="callout-diagram-to-tentacle"
    x1="580" y1="140"
    x2="470" y2="330"
    stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="8,5" stroke-linecap="round" opacity="0.6"/>
  <!-- Small circle at callout endpoint -->
  <circle id="callout-endpoint" cx="470" cy="330" r="4" fill="#5B6FA8" opacity="0.4"/>

  <!-- === TEMPERATURE INDICATOR — subtle bottom corner === -->
  <g id="temp-indicator" transform="translate(25, 560)">
    <text id="temp-value" x="0" y="0" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#D1DCFF" opacity="0.35">4°C</text>
    <text id="temp-context" x="42" y="0" font-family="Barlow, sans-serif" font-size="10" fill="#5B6FA8" opacity="0.3">cold exposure</text>
  </g>

  <!-- === TITLE / LABEL === -->
  <text id="species-label" x="30" y="585" font-family="Barlow, sans-serif" font-style="italic" font-size="11" fill="#5B6FA8" opacity="0.4">Octopus bimaculoides</text>

</svg>