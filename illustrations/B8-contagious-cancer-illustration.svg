<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">

  <!-- Background: dramatic dark setting -->
  <g id="bg" data-label="Dark dramatic background, deep midnight tones for dangerous biology subject">
    <rect width="800" height="600" fill="#1C1E35"/>
    <!-- Ground plane hint for Tasmanian context -->
    <rect x="0" y="480" width="800" height="120" fill="#1A5C1E" opacity="0.4"/>
    <rect x="0" y="520" width="800" height="80" fill="#0D0D16" opacity="0.5"/>
    <!-- Background forest silhouette -->
    <path d="M 0 480 Q 80 440 120 480 Q 160 440 200 480 Q 250 430 300 480 Q 350 435 400 480 Q 450 435 500 480 Q 550 440 600 480 Q 650 435 700 480 Q 740 445 800 480" fill="#1A5C1E" opacity="0.5"/>
  </g>

  <!-- Context: Tasmanian devil aggressive feeding/biting behavior -->
  <g id="context" data-label="Tasmanian devil context — biting behavior and feeding competition scene background">
    <!-- Ground bone/food reference -->
    <ellipse cx="400" cy="500" rx="40" ry="12" fill="#D4A574" opacity="0.3"/>
    <ellipse cx="380" cy="500" rx="12" ry="6" fill="#A0785A" opacity="0.35"/>
    <ellipse cx="420" cy="500" rx="12" ry="6" fill="#A0785A" opacity="0.35"/>
  </g>

  <!-- Subject: Tasmanian devil face with visible facial tumor -->
  <g id="subject" data-label="Tasmanian devil Sarcophilus harrisii head and upper body, prominent DFT1 facial tumor masses visible">
    <!-- Body/chest -->
    <ellipse cx="400" cy="440" rx="110" ry="80" fill="#3D3D52" stroke="#1C1E35" stroke-width="2"/>
    <!-- White chest stripe -->
    <ellipse cx="400" cy="430" rx="40" ry="35" fill="#D4D4DC" opacity="0.6"/>
    <!-- Head -->
    <ellipse cx="400" cy="310" rx="90" ry="80" fill="#3D3D52" stroke="#1C1E35" stroke-width="2"/>
    <!-- Ears -->
    <path d="M 330 262 Q 315 230 325 215 Q 340 222 345 240 Q 340 252 330 262" fill="#3D3D52" stroke="#1C1E35" stroke-width="1.5"/>
    <path d="M 470 262 Q 485 230 475 215 Q 460 222 455 240 Q 460 252 470 262" fill="#3D3D52" stroke="#1C1E35" stroke-width="1.5"/>
    <!-- Inner ear pink -->
    <path d="M 332 258 Q 320 235 328 222 Q 338 228 342 244 Z" fill="#F19B8F" opacity="0.6"/>
    <path d="M 468 258 Q 480 235 472 222 Q 462 228 458 244 Z" fill="#F19B8F" opacity="0.6"/>
    <!-- Eyes — standard construction -->
    <ellipse cx="365" cy="295" rx="14" ry="12" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="365" cy="295" r="7" fill="#0D0D16"/>
    <circle cx="361.5" cy="291.5" r="3" fill="#FBFFF6" opacity="0.85"/>
    <ellipse cx="435" cy="295" rx="14" ry="12" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="435" cy="295" r="7" fill="#0D0D16"/>
    <circle cx="431.5" cy="291.5" r="3" fill="#FBFFF6" opacity="0.85"/>
    <!-- Snout/muzzle -->
    <path d="M 360 340 Q 400 358 440 340 Q 445 360 400 372 Q 355 360 360 340 Z" fill="#6B6B7C"/>
    <!-- Nose -->
    <ellipse cx="400" cy="340" rx="16" ry="10" fill="#6B6B7C"/>
    <!-- Nostrils -->
    <ellipse cx="394" cy="340" rx="4" ry="3" fill="#0D0D16"/>
    <ellipse cx="406" cy="340" rx="4" ry="3" fill="#0D0D16"/>
    <!-- Jaw/biting mouth open -->
    <path d="M 330 355 Q 360 378 400 385 Q 440 378 470 355" stroke="#1C1E35" stroke-width="2.5" fill="none"/>
    <!-- Teeth -->
    <path d="M 345 360 L 348 372" stroke="#FBFFF6" stroke-width="2" stroke-linecap="round"/>
    <path d="M 358 367 L 360 380" stroke="#FBFFF6" stroke-width="2" stroke-linecap="round"/>
    <path d="M 372 372 L 374 385" stroke="#FBFFF6" stroke-width="2" stroke-linecap="round"/>
    <path d="M 428 372 L 426 385" stroke="#FBFFF6" stroke-width="2" stroke-linecap="round"/>
    <path d="M 442 367 L 440 380" stroke="#FBFFF6" stroke-width="2" stroke-linecap="round"/>
    <path d="M 455 360 L 452 372" stroke="#FBFFF6" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Detail: cancer cell transfer via bite wound and tumor growing -->
  <g id="detail-cancer-transfer" data-label="Cancer cell transferring between two devils via bite wound; DFT1 tumor cell visible with Schwann cell origin; growing tumor mass on face">
    <!-- DFT1 tumor mass on jaw/lower face (left side) -->
    <path d="M 316 355 Q 296 368 288 385 Q 282 400 290 415 Q 300 428 318 432 Q 340 436 360 428 Q 378 420 382 400 Q 384 380 370 368 Q 350 358 330 355 Z" fill="#CA1E08" stroke="#8B1506" stroke-width="2" opacity="0.9"/>
    <!-- Tumor surface texture -->
    <circle cx="315" cy="385" r="7" fill="#8B1506" opacity="0.6"/>
    <circle cx="335" cy="398" r="6" fill="#8B1506" opacity="0.55"/>
    <circle cx="352" cy="380" r="5" fill="#8B1506" opacity="0.5"/>
    <circle cx="328" cy="416" r="5" fill="#8B1506" opacity="0.5"/>
    <circle cx="362" cy="406" r="4" fill="#8B1506" opacity="0.45"/>
    <!-- Second tumor on right side (metastatic) -->
    <ellipse cx="472" cy="375" rx="24" ry="18" fill="#CA1E08" stroke="#8B1506" stroke-width="1.5" opacity="0.8"/>
    <circle cx="468" cy="370" r="5" fill="#8B1506" opacity="0.5"/>
    <circle cx="480" cy="380" r="4" fill="#8B1506" opacity="0.45"/>

    <!-- Cancer cell traveling via bite arrow -->
    <path d="M 320 380 Q 230 300 160 230" stroke="#CA1E08" stroke-width="2" stroke-dasharray="6 4" fill="none" opacity="0.6"/>
    <!-- Cancer cell dot -->
    <circle cx="218" cy="275" r="8" fill="#CA1E08" opacity="0.8"/>
    <circle cx="218" cy="275" r="4" fill="#E85542" opacity="0.9"/>
  </g>

  <!-- Detail: MHC class I molecules present vs absent; immune T cell attacking vs missing tumor -->
  <g id="detail-mhc-immune-evasion" data-label="MHC class I comparison: normal cell flagged with MHC markers and attacked by T cell; DFT1 tumor cell with MHC downregulated and T cell unable to detect it">
    <!-- Panel box -->
    <rect x="520" y="40" width="255" height="200" rx="6" fill="#0D0D16" stroke="#5B6FA8" stroke-width="1.5"/>
    <!-- Normal cell (left half of panel) -->
    <circle cx="572" cy="120" r="35" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1.5"/>
    <!-- MHC I flags on normal cell -->
    <line x1="575" y1="86" x2="578" y2="75" stroke="#6FD877" stroke-width="2"/>
    <circle cx="578" cy="73" r="4" fill="#6FD877"/>
    <line x1="590" y1="90" x2="597" y2="80" stroke="#6FD877" stroke-width="2"/>
    <circle cx="597" cy="78" r="4" fill="#6FD877"/>
    <line x1="560" y1="90" x2="554" y2="79" stroke="#6FD877" stroke-width="2"/>
    <circle cx="554" cy="77" r="4" fill="#6FD877"/>
    <!-- T cell attacking normal cell -->
    <ellipse cx="548" cy="145" rx="20" ry="12" fill="#2FBF39" stroke="#1A5C1E" stroke-width="1.5"/>
    <path d="M 560" y1="140" x2="568" y2="135" stroke="#2FBF39" stroke-width="2" fill="none"/>
    <path d="M 566 148 Q 572 140 572 130" stroke="#CA1E08" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- DFT1 tumor cell (right half of panel) -->
    <circle cx="700" cy="120" r="35" fill="#CA1E08" stroke="#8B1506" stroke-width="1.5" opacity="0.85"/>
    <!-- No MHC flags (absent — dashed circles where they would be) -->
    <circle cx="703" cy="86" r="4" fill="none" stroke="#CA1E08" stroke-width="1.5" stroke-dasharray="2 2" opacity="0.6"/>
    <circle cx="718" cy="90" r="4" fill="none" stroke="#CA1E08" stroke-width="1.5" stroke-dasharray="2 2" opacity="0.6"/>
    <circle cx="688" cy="88" r="4" fill="none" stroke="#CA1E08" stroke-width="1.5" stroke-dasharray="2 2" opacity="0.6"/>
    <!-- T cell missing / going past tumor (confused) -->
    <ellipse cx="672" cy="148" rx="20" ry="12" fill="#2FBF39" stroke="#1A5C1E" stroke-width="1.5"/>
    <path d="M 692 146 Q 710 148 720 148" stroke="#6FD877" stroke-width="2" stroke-dasharray="4 3" fill="none" opacity="0.7"/>
    <!-- X over detection attempt -->
    <line x1="695" y1="125" x2="710" y2="140" stroke="#FBFFF6" stroke-width="2" opacity="0.7"/>
    <line x1="710" y1="125" x2="695" y2="140" stroke="#FBFFF6" stroke-width="2" opacity="0.7"/>
    <!-- Panel divider -->
    <line x1="636" y1="50" x2="636" y2="230" stroke="#5B6FA8" stroke-width="1" opacity="0.4"/>
    <!-- Labels in panel -->
    <text x="572" y="190" font-family="Barlow, sans-serif" font-size="12" fill="#6FD877" text-anchor="middle">MHC I: on</text>
    <text x="700" y="190" font-family="Barlow, sans-serif" font-size="12" fill="#CA1E08" text-anchor="middle">MHC I: off</text>
  </g>

  <!-- Detail: Tasmania map population decline visualization and DFT1/DFT2 labels -->
  <g id="detail-population-decline" data-label="Tasmania island map silhouette with 80% population decline bar; DFT1 and DFT2 labeled as two distinct tumor lineages">
    <!-- Tasmania rough outline -->
    <path d="M 85 280 Q 100 260 130 255 Q 165 250 185 265 Q 205 278 210 300 Q 212 325 198 345 Q 182 365 158 370 Q 130 374 108 360 Q 86 344 82 318 Q 78 295 85 280 Z" fill="#248A28" stroke="#1A5C1E" stroke-width="1.5" opacity="0.75"/>
    <!-- Population bar (before/after) -->
    <rect x="88" y="285" width="22" height="60" rx="2" fill="#2FBF39" opacity="0.8"/>
    <rect x="112" y="321" width="22" height="24" rx="2" fill="#CA1E08" opacity="0.8"/>
    <!-- 80% label -->
    <text x="145" y="355" font-family="Barlow, sans-serif" font-size="14" fill="#CA1E08" font-weight="700">−80%</text>
    <!-- DFT1 / DFT2 labels -->
    <text x="85" y="395" font-family="Barlow, sans-serif" font-size="13" fill="#E85542" font-weight="600">DFT1</text>
    <text x="125" y="395" font-family="Barlow, sans-serif" font-size="13" fill="#Salmon" fill="#F19B8F" font-weight="600">DFT2</text>
  </g>

  <!-- Detail: CTVT timeline — ancient canine cancer lineage -->
  <g id="detail-ctvt-timeline" data-label="CTVT canine transmissible tumor timeline: 4,000-11,000 year old cell lineage; original dog faded, cancer persisting">
    <!-- Timeline bar -->
    <rect x="520" y="270" width="255" height="14" rx="4" fill="#2D3E6B" opacity="0.7"/>
    <!-- Timeline arrow -->
    <path d="M 520 277 L 775 277" stroke="#8BA0D6" stroke-width="2" fill="none"/>
    <polygon points="775,277 768,272 768,282" fill="#8BA0D6"/>
    <!-- Past dog silhouette (faded) -->
    <ellipse cx="545" cy="305" rx="24" ry="14" fill="#3D3D52" opacity="0.35"/>
    <circle cx="565" cy="298" r="10" fill="#3D3D52" opacity="0.3"/>
    <text x="555" y="330" font-family="Barlow, sans-serif" font-size="11" fill="#6B6B7C" text-anchor="middle">~11,000 years ago</text>
    <!-- CTVT cell today (persistent) -->
    <circle cx="730" cy="302" r="12" fill="#CA1E08" stroke="#8B1506" stroke-width="1.5" opacity="0.9"/>
    <circle cx="730" cy="302" r="6" fill="#E85542" opacity="0.9"/>
    <text x="730" y="330" font-family="Barlow, sans-serif" font-size="11" fill="#CA1E08" text-anchor="middle" font-weight="600">still spreading</text>
  </g>

  <!-- Label: species label -->
  <g id="label" data-label="Species label: S. harrisii in italic Barlow">
    <text x="530" y="490" font-family="Barlow, sans-serif" font-size="20" font-style="italic" fill="#8BA0D6" font-weight="500">S. harrisii</text>
  </g>

  <!-- Overlay: connection arrows, emphasis marks -->
  <g id="overlay" data-label="Connection line from cancer transfer group to MHC panel; emphasis ring around tumor mass">
    <!-- Emphasis ring on main tumor -->
    <circle cx="332" cy="394" r="50" fill="none" stroke="#CA1E08" stroke-width="2" stroke-dasharray="8 5" opacity="0.5"/>
    <!-- Connection from tumor to MHC panel -->
    <path d="M 384 390 Q 450 300 520 180" stroke="#CA1E08" stroke-width="1.5" stroke-dasharray="6 4" fill="none" opacity="0.5"/>
  </g>
</svg>
