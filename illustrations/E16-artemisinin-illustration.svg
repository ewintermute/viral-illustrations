<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 600" width="800" height="600">

  <!-- bg -->
  <g id="bg" data-label="Dark midnight background">
    <rect width="800" height="600" fill="#1C1E35"/>
  </g>

  <!-- context: Artemisia annua botanical plant left panel -->
  <g id="context" data-label="Artemisia annua plant silhouette">
    <line x1="140" y1="580" x2="142" y2="200" stroke="#248A28" stroke-width="3.5" stroke-linecap="round"/>
    <!-- branches -->
    <path d="M 141,460 C 118,440 95,428 72,424" fill="none" stroke="#248A28" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 141,440 C 163,420 186,408 208,404" fill="none" stroke="#248A28" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 141,370 C 115,350 92,338 68,335" fill="none" stroke="#1A5C1E" stroke-width="2" stroke-linecap="round"/>
    <path d="M 141,355 C 164,335 186,323 208,320" fill="none" stroke="#1A5C1E" stroke-width="2" stroke-linecap="round"/>
    <path d="M 142,280 C 118,260 98,248 78,244" fill="none" stroke="#1A5C1E" stroke-width="2" stroke-linecap="round"/>
    <path d="M 142,265 C 162,245 182,234 202,230" fill="none" stroke="#1A5C1E" stroke-width="2" stroke-linecap="round"/>
    <!-- pinnate leaves on branches (small ovals) -->
    <!-- lower left -->
    <ellipse cx="72" cy="424" rx="10" ry="5" fill="#2FBF39" transform="rotate(-20 72 424)"/>
    <ellipse cx="90" cy="427" rx="9" ry="4.5" fill="#2FBF39" transform="rotate(-15 90 427)"/>
    <ellipse cx="108" cy="428" rx="8" ry="4" fill="#248A28" transform="rotate(-10 108 428)"/>
    <!-- lower right -->
    <ellipse cx="208" cy="404" rx="10" ry="5" fill="#2FBF39" transform="rotate(20 208 404)"/>
    <ellipse cx="192" cy="406" rx="9" ry="4.5" fill="#2FBF39" transform="rotate(15 192 406)"/>
    <!-- mid left -->
    <ellipse cx="68" cy="335" rx="10" ry="5" fill="#248A28" transform="rotate(-20 68 335)"/>
    <ellipse cx="86" cy="338" rx="8" ry="4" fill="#1A5C1E" transform="rotate(-15 86 338)"/>
    <!-- mid right -->
    <ellipse cx="208" cy="320" rx="10" ry="5" fill="#248A28" transform="rotate(20 208 320)"/>
    <!-- upper left -->
    <ellipse cx="78" cy="244" rx="9" ry="4.5" fill="#1A5C1E" transform="rotate(-20 78 244)"/>
    <ellipse cx="95" cy="246" rx="8" ry="4" fill="#1A5C1E" transform="rotate(-15 95 246)"/>
    <!-- upper right -->
    <ellipse cx="202" cy="230" rx="9" ry="4.5" fill="#1A5C1E" transform="rotate(20 202 230)"/>
    <!-- apical cluster -->
    <ellipse cx="130" cy="208" rx="12" ry="6" fill="#2FBF39" transform="rotate(-30 130 208)"/>
    <ellipse cx="152" cy="206" rx="12" ry="6" fill="#2FBF39" transform="rotate(30 152 206)"/>
    <circle cx="141" cy="195" r="6" fill="#E6B800"/>
    <circle cx="130" cy="200" r="4" fill="#B8860B"/>
    <circle cx="152" cy="200" r="4" fill="#B8860B"/>
  </g>

  <!-- subject: RDKit-generated artemisinin structure (accurate) -->
  <g id="subject" data-label="Artemisinin molecular structure — RDKit generated, endoperoxide bridge in red">
    <!-- RDKit SVG embedded as image -->
    <image x="360" y="130" width="400" height="300"
           href="data:image/svg+xml;base64,"/>
    <!-- Endoperoxide label callout -->
    <text x="595" y="125" text-anchor="middle"
          font-family="Barlow, system-ui, sans-serif" font-size="16"
          font-weight="700" fill="#CA1E08">O–O endoperoxide</text>
    <line x1="595" y1="128" x2="565" y2="155"
          stroke="#CA1E08" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- detail-heme: Fe²⁺ heme target -->
  <g id="detail-heme" data-label="Heme iron Fe2+ target in Plasmodium — artemisinin activates here">
    <circle cx="690" cy="480" r="34" fill="#2D3E6B" stroke="#E6B800" stroke-width="2.5"/>
    <circle cx="690" cy="480" r="22" fill="none" stroke="#B8860B" stroke-width="2" stroke-dasharray="6 3"/>
    <text x="690" y="476" text-anchor="middle"
          font-family="Barlow, system-ui, sans-serif" font-size="16" font-weight="700" fill="#E6B800">Fe</text>
    <text x="690" y="494" text-anchor="middle"
          font-family="Barlow, system-ui, sans-serif" font-size="13" fill="#B8860B">²⁺</text>
    <!-- Reaction arrow from structure to Fe -->
    <path d="M 655,400 C 668,428 675,450 680,462"
          fill="none" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="680,462 673,450 687,450" fill="#CA1E08"/>
    <!-- Free radical burst -->
    <line x1="706" y1="462" x2="720" y2="448" stroke="#E85542" stroke-width="2" stroke-linecap="round"/>
    <line x1="710" y1="468" x2="726" y2="466" stroke="#E85542" stroke-width="2" stroke-linecap="round"/>
    <line x1="706" y1="474" x2="718" y2="464" stroke="#E85542" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- label -->
  <g id="label" data-label="Species and molecule labels">
    <text x="142" y="556"
          text-anchor="middle"
          font-family="Barlow, system-ui, sans-serif"
          font-size="20" font-weight="600" font-style="italic"
          fill="#8BA0D6">Artemisia annua</text>
    <text x="560" y="556"
          text-anchor="middle"
          font-family="Barlow, system-ui, sans-serif"
          font-size="22" font-weight="700"
          fill="#FBFFF6">artemisinin</text>
  </g>

  <!-- overlay: ancient scroll -->
  <g id="overlay" data-label="340 AD scroll reference">
    <rect x="30" y="460" width="82" height="95" rx="4"
          fill="#1C1E35" stroke="#B8860B" stroke-width="1.5" opacity="0.85"/>
    <line x1="44" y1="476" x2="98" y2="476" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
    <line x1="44" y1="490" x2="98" y2="490" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
    <line x1="44" y1="504" x2="98" y2="504" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
    <line x1="44" y1="518" x2="98" y2="518" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
    <line x1="44" y1="532" x2="82" y2="532" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
    <text x="71" y="550"
          text-anchor="middle"
          font-family="Barlow, system-ui, sans-serif"
          font-size="12" font-weight="700"
          fill="#B8860B">340 AD</text>
  </g>

</svg>