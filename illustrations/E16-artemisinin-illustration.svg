<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bgGradE16" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#2D3E6B"/>
      <stop offset="100%" stop-color="#1C1E35"/>
    </radialGradient>
    <radialGradient id="endoperoxideGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CA1E08" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#CA1E08" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- bg: dark midnight background -->
  <g id="bg" data-label="Dark midnight background for scientific focus">
    <rect width="800" height="600" fill="url(#bgGradE16)"/>
  </g>

  <!-- context: Artemisia annua plant silhouette on left -->
  <g id="context" data-label="Artemisia annua sweet wormwood plant silhouette — botanical context">
    <!-- Main stem -->
    <path d="M 140,580 C 138,540 136,500 140,460 C 143,420 148,390 145,350 C 142,310 138,280 142,245"
          fill="none" stroke="#248A28" stroke-width="3" stroke-linecap="round"/>
    <!-- Branch left lower -->
    <path d="M 140,460 C 120,440 100,425 80,418 C 70,414 60,415 55,420"
          fill="none" stroke="#248A28" stroke-width="2" stroke-linecap="round"/>
    <!-- Branch right lower -->
    <path d="M 140,440 C 162,418 182,405 202,400 C 215,397 225,398 230,404"
          fill="none" stroke="#248A28" stroke-width="2" stroke-linecap="round"/>
    <!-- Branch left mid -->
    <path d="M 142,380 C 118,358 98,345 75,340 C 62,337 50,340 46,346"
          fill="none" stroke="#1A5C1E" stroke-width="2" stroke-linecap="round"/>
    <!-- Branch right mid -->
    <path d="M 142,365 C 165,343 185,330 208,325 C 220,322 232,324 238,330"
          fill="none" stroke="#1A5C1E" stroke-width="2" stroke-linecap="round"/>
    <!-- Branch left upper -->
    <path d="M 143,300 C 122,278 105,265 85,260 C 72,256 60,258 55,264"
          fill="none" stroke="#1A5C1E" stroke-width="2" stroke-linecap="round"/>
    <!-- Branch right upper -->
    <path d="M 143,285 C 163,263 182,250 203,247 C 215,244 226,246 230,252"
          fill="none" stroke="#1A5C1E" stroke-width="2" stroke-linecap="round"/>
    <!-- Tiny leaves on branches — feathery pinnate -->
    <!-- Left lower branch leaves -->
    <path d="M 80,418 C 75,410 72,402 76,397 C 80,402 82,410 80,418 Z" fill="#2FBF39"/>
    <path d="M 95,422 C 90,414 88,406 92,401 C 96,406 97,414 95,422 Z" fill="#2FBF39"/>
    <path d="M 110,424 C 105,416 103,408 107,403 C 111,408 112,416 110,424 Z" fill="#2FBF39"/>
    <!-- Right lower branch leaves -->
    <path d="M 200,402 C 205,394 208,386 204,381 C 200,386 199,394 200,402 Z" fill="#2FBF39"/>
    <path d="M 215,400 C 220,392 223,384 219,379 C 215,384 214,392 215,400 Z" fill="#2FBF39"/>
    <!-- Left mid branch leaves -->
    <path d="M 75,342 C 70,334 68,326 72,321 C 76,326 77,334 75,342 Z" fill="#248A28"/>
    <path d="M 90,344 C 85,336 84,328 88,323 C 92,328 92,336 90,344 Z" fill="#248A28"/>
    <path d="M 105,344 C 100,336 99,328 103,323 C 107,328 107,336 105,344 Z" fill="#248A28"/>
    <!-- Right mid branch leaves -->
    <path d="M 205,326 C 210,318 213,310 209,305 C 205,310 204,318 205,326 Z" fill="#248A28"/>
    <path d="M 220,323 C 225,315 228,307 224,302 C 220,307 219,315 220,323 Z" fill="#248A28"/>
    <!-- Left upper leaves -->
    <path d="M 82,263 C 77,255 75,247 79,242 C 83,247 84,255 82,263 Z" fill="#1A5C1E"/>
    <path d="M 97,264 C 92,256 91,248 95,243 C 99,248 99,256 97,264 Z" fill="#1A5C1E"/>
    <!-- Right upper leaves -->
    <path d="M 200,250 C 205,242 208,234 204,229 C 200,234 199,242 200,250 Z" fill="#1A5C1E"/>
    <path d="M 215,248 C 220,240 222,232 218,227 C 215,232 214,240 215,248 Z" fill="#1A5C1E"/>
    <!-- Apical leaves at tip of main stem -->
    <path d="M 142,245 C 132,228 128,210 133,198 C 140,208 144,226 142,245 Z" fill="#2FBF39"/>
    <path d="M 142,245 C 152,228 155,210 150,198 C 143,208 140,226 142,245 Z" fill="#2FBF39"/>
    <path d="M 142,245 C 138,224 136,206 140,195 C 144,206 144,224 142,245 Z" fill="#6FD877"/>
    <!-- Small flower heads — tiny yellow-green button florets -->
    <circle cx="142" cy="190" r="5" fill="#E6B800"/>
    <circle cx="132" cy="194" r="4" fill="#E6B800"/>
    <circle cx="152" cy="194" r="4" fill="#E6B800"/>
    <circle cx="126" cy="200" r="3.5" fill="#B8860B"/>
    <circle cx="158" cy="200" r="3.5" fill="#B8860B"/>
  </g>

  <!-- subject: artemisinin molecule — peroxide bridge as central focus -->
  <g id="subject" data-label="Artemisinin molecular structure with endoperoxide bridge highlighted">
    <!-- Molecule centered right of plant, large enough to read -->
    <!-- Artemisinin is a sesquiterpene lactone with an endoperoxide bridge -->
    <!-- Simplified skeletal structure, highlighting the 1,2,4-trioxane ring -->

    <!-- Background glow on peroxide bridge region -->
    <ellipse cx="520" cy="295" rx="55" ry="45" fill="url(#endoperoxideGlow)"/>

    <!-- Ring system: outer 6-membered carbocyclic ring (ring D) -->
    <!-- Center at ~510, 310 -->
    <polygon points="465,285 500,265 540,270 558,305 540,340 500,345"
             fill="none" stroke="#8BA0D6" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Ring A: lactone/cyclohexanone ring, fused at left of ring D -->
    <polygon points="388,290 420,272 465,285 465,320 430,338 388,325"
             fill="none" stroke="#8BA0D6" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Carbonyl (lactone) double bond on ring A -->
    <line x1="388" y1="290" x2="388" y2="325" stroke="#8BA0D6" stroke-width="2.5"/>
    <text x="370" y="312" fill="#8BA0D6" font-family="Barlow, sans-serif" font-size="14" font-weight="600">O</text>
    <!-- Oxygen at lactone -->
    <line x1="375" y1="308" x2="388" y2="308" stroke="#8BA0D6" stroke-width="1.5"/>

    <!-- The trioxane ring — 6-membered ring with 3 oxygens — CRITICAL feature -->
    <!-- Positioned fused to ring D at top-right -->
    <polygon points="540,270 578,252 618,265 622,300 588,318 558,305"
             fill="none" stroke="#CA1E08" stroke-width="3" stroke-linejoin="round"/>

    <!-- Oxygen atoms on the trioxane ring — the peroxide bridge oxygens -->
    <!-- O1 -->
    <circle cx="560" cy="262" r="8" fill="#CA1E08" stroke="#8B1506" stroke-width="1.5"/>
    <text x="560" y="267" text-anchor="middle" fill="#FBFFF6" font-family="Barlow, sans-serif" font-size="11" font-weight="700">O</text>
    <!-- O2 -->
    <circle cx="598" cy="257" r="8" fill="#CA1E08" stroke="#8B1506" stroke-width="1.5"/>
    <text x="598" y="262" text-anchor="middle" fill="#FBFFF6" font-family="Barlow, sans-serif" font-size="11" font-weight="700">O</text>
    <!-- O3 (peroxide bridge label) -->
    <circle cx="622" cy="300" r="8" fill="#CA1E08" stroke="#8B1506" stroke-width="1.5"/>
    <text x="622" y="305" text-anchor="middle" fill="#FBFFF6" font-family="Barlow, sans-serif" font-size="11" font-weight="700">O</text>

    <!-- Peroxide bond: O–O highlighted with emphasis line -->
    <line x1="568" y1="258" x2="590" y2="257" stroke="#CA1E08" stroke-width="4" stroke-linecap="round"/>

    <!-- Methyl and isopropyl groups — simplified -->
    <!-- CH₃ at ring junction top -->
    <line x1="540" y1="270" x2="535" y2="248" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
    <text x="530" y="244" fill="#5B6FA8" font-family="Barlow, sans-serif" font-size="12">CH₃</text>
    <!-- Isopropyl group bottom right -->
    <line x1="558" y1="305" x2="575" y2="330" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
    <line x1="575" y1="330" x2="595" y2="345" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
    <line x1="575" y1="330" x2="570" y2="350" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>

    <!-- Heme iron target -->
    <circle cx="680" cy="400" r="28" fill="#3D3D52" stroke="#E6B800" stroke-width="2.5"/>
    <circle cx="680" cy="400" r="18" fill="none" stroke="#B8860B" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="680" y="396" text-anchor="middle" fill="#E6B800" font-family="Barlow, sans-serif" font-size="13" font-weight="700">Fe</text>
    <text x="680" y="412" text-anchor="middle" fill="#B8860B" font-family="Barlow, sans-serif" font-size="10">²⁺</text>

    <!-- Reaction arrow from peroxide bridge to iron -->
    <path d="M 635,310 C 660,340 668,365 670,380" fill="none" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="670,380 663,368 677,368" fill="#CA1E08"/>

    <!-- Free radical burst indicator -->
    <path d="M 695,380 L 708,368" stroke="#E85542" stroke-width="2" stroke-linecap="round"/>
    <path d="M 700,375 L 715,375" stroke="#E85542" stroke-width="2" stroke-linecap="round"/>
    <path d="M 695,370 L 705,360" stroke="#E85542" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- label: 2 text elements max -->
  <g id="label" data-label="Species and molecule name labels">
    <text x="142" y="560"
          text-anchor="middle"
          font-family="Barlow, sans-serif"
          font-size="20"
          font-weight="600"
          font-style="italic"
          fill="#8BA0D6">Artemisia annua</text>
    <text x="520" y="560"
          text-anchor="middle"
          font-family="Barlow, sans-serif"
          font-size="22"
          font-weight="700"
          fill="#FBFFF6">artemisinin</text>
  </g>

  <!-- overlay: bracket and emphasis on peroxide bridge -->
  <g id="overlay" data-label="Bracket highlighting endoperoxide bridge — the reactive site">
    <!-- Bracket around trioxane ring -->
    <path d="M 548,242 L 538,242 L 538,320 L 548,320" fill="none" stroke="#CA1E08" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 635,242 L 645,242 L 645,320 L 635,320" fill="none" stroke="#CA1E08" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Label for the peroxide bridge -->
    <text x="592" y="235" text-anchor="middle" fill="#CA1E08" font-family="Barlow, sans-serif" font-size="14" font-weight="700">O–O</text>
    <!-- Old Chinese text scroll hint on left side -->
    <rect x="30" y="455" width="78" height="100" rx="4" fill="#1C1E35" stroke="#B8860B" stroke-width="1.5" opacity="0.8"/>
    <line x1="44" y1="470" x2="94" y2="470" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
    <line x1="44" y1="484" x2="94" y2="484" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
    <line x1="44" y1="498" x2="94" y2="498" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
    <line x1="44" y1="512" x2="94" y2="512" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
    <line x1="44" y1="526" x2="80" y2="526" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
    <text x="69" y="548" text-anchor="middle" fill="#B8860B" font-family="Barlow, sans-serif" font-size="11">340 AD</text>
  </g>
</svg>
