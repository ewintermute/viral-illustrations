<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="spore-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2FBF39" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1C1E35" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: dark forest floor -->
  <g id="bg" data-label="Dark forest floor environment, deep green and midnight tones">
    <rect width="800" height="600" fill="#1C1E35"/>
    <rect x="0" y="420" width="800" height="180" fill="#1A5C1E" opacity="0.6"/>
    <rect x="0" y="480" width="800" height="120" fill="#0D0D16" opacity="0.7"/>
    <!-- Ambient forest light shafts -->
    <polygon points="120,0 180,0 220,420 80,420" fill="#248A28" opacity="0.06"/>
    <polygon points="380,0 440,0 480,420 340,420" fill="#248A28" opacity="0.05"/>
    <polygon points="600,0 660,0 700,420 560,420" fill="#248A28" opacity="0.04"/>
  </g>

  <!-- Context: leaf silhouettes and ant trail -->
  <g id="context" data-label="Leaf silhouettes, diffuse background ant colony trail on forest floor">
    <!-- Background leaves -->
    <ellipse cx="100" cy="200" rx="70" ry="28" fill="#248A28" opacity="0.4" transform="rotate(-25,100,200)"/>
    <ellipse cx="680" cy="160" rx="80" ry="30" fill="#1A5C1E" opacity="0.5" transform="rotate(20,680,160)"/>
    <ellipse cx="750" cy="350" rx="60" ry="22" fill="#248A28" opacity="0.3" transform="rotate(-10,750,350)"/>
    <!-- Forest floor leaf litter -->
    <ellipse cx="80" cy="510" rx="45" ry="16" fill="#1A5C1E" opacity="0.5" transform="rotate(15,80,510)"/>
    <ellipse cx="250" cy="540" rx="55" ry="18" fill="#248A28" opacity="0.4" transform="rotate(-8,250,540)"/>
    <ellipse cx="500" cy="525" rx="50" ry="17" fill="#1A5C1E" opacity="0.45" transform="rotate(12,500,525)"/>
    <ellipse cx="700" cy="545" rx="48" ry="15" fill="#248A28" opacity="0.4" transform="rotate(-20,700,545)"/>
    <!-- Ant trail (dashed line) -->
    <path d="M 50 490 Q 200 470 350 480 Q 500 490 700 475" stroke="#6FD877" stroke-width="1.5" stroke-dasharray="4 6" fill="none" opacity="0.4"/>
    <!-- Trail ants (tiny silhouettes) -->
    <ellipse cx="130" cy="482" rx="5" ry="2.5" fill="#2D3E6B" opacity="0.7"/>
    <ellipse cx="200" cy="477" rx="5" ry="2.5" fill="#2D3E6B" opacity="0.7"/>
    <ellipse cx="310" cy="479" rx="5" ry="2.5" fill="#2D3E6B" opacity="0.7"/>
    <ellipse cx="420" cy="483" rx="5" ry="2.5" fill="#2D3E6B" opacity="0.7"/>
    <ellipse cx="560" cy="478" rx="5" ry="2.5" fill="#2D3E6B" opacity="0.7"/>
  </g>

  <!-- Subject: main ant on leaf at 25cm elevation, mandibles locked, viewed from side -->
  <g id="subject" data-label="Single carpenter ant biting into leaf at 25cm elevation, side view, solar noon implied by bright tone">
    <!-- Leaf the ant is biting (primary leaf) -->
    <ellipse cx="400" cy="280" rx="160" ry="55" fill="#248A28" transform="rotate(-8,400,280)"/>
    <path d="M 248 272 Q 400 245 560 272" stroke="#1A5C1E" stroke-width="1.5" fill="none"/>
    <!-- Leaf vein midrib -->
    <path d="M 248 280 Q 400 268 556 280" stroke="#1A5C1E" stroke-width="1" fill="none" opacity="0.8"/>

    <!-- Ant body — abdomen -->
    <ellipse cx="340" cy="290" rx="32" ry="18" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1.5"/>
    <!-- Ant thorax -->
    <ellipse cx="385" cy="287" rx="20" ry="14" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1.5"/>
    <!-- Ant head -->
    <ellipse cx="414" cy="284" rx="15" ry="13" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1.5"/>
    <!-- Ant eye (standard construction) -->
    <ellipse cx="420" cy="280" rx="5.5" ry="4.4" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="420" cy="280" r="2.2" fill="#0D0D16"/>
    <circle cx="418.5" cy="278.5" r="1.1" fill="#FBFFF6" opacity="0.85"/>
    <!-- Mandibles locked into leaf -->
    <path d="M 424 290 Q 432 298 436 305 Q 440 310 438 315" stroke="#8BA0D6" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 426 289 Q 435 296 440 304 Q 444 309 441 316" stroke="#8BA0D6" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Ant legs -->
    <path d="M 375 296 Q 368 308 358 318" stroke="#5B6FA8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 380 297 Q 372 311 365 322" stroke="#5B6FA8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 390 298 Q 390 313 388 325" stroke="#5B6FA8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 375 286 Q 368 274 360 266" stroke="#5B6FA8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 380 285 Q 375 272 368 264" stroke="#5B6FA8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 390 285 Q 388 271 384 262" stroke="#5B6FA8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Antenna -->
    <path d="M 415 274 Q 418 264 426 258" stroke="#5B6FA8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="426" cy="258" r="2" fill="#5B6FA8"/>
  </g>

  <!-- Detail: fungal hyphae threading through ant muscle tissue -->
  <g id="detail-hyphae" data-label="Fungal hyphae network spreading through ant body muscle tissue — visible as pale branching threads">
    <!-- Hyphae in abdomen region -->
    <path d="M 318 288 Q 325 284 330 290 Q 336 296 342 290 Q 348 284 355 288" stroke="#6FD877" stroke-width="1" fill="none" opacity="0.75"/>
    <path d="M 322 295 Q 329 291 335 296 Q 340 300 347 295" stroke="#6FD877" stroke-width="1" fill="none" opacity="0.7"/>
    <path d="M 326 282 Q 334 278 339 283 Q 344 288 350 282" stroke="#6FD877" stroke-width="1" fill="none" opacity="0.65"/>
    <!-- Hyphae branching through thorax -->
    <path d="M 372 283 Q 377 279 382 283 Q 386 287 390 283" stroke="#6FD877" stroke-width="1" fill="none" opacity="0.7"/>
    <path d="M 375 290 Q 380 286 385 290 Q 389 294 393 290" stroke="#6FD877" stroke-width="1" fill="none" opacity="0.65"/>
    <!-- Hyphae tendrils in head -->
    <path d="M 404 283 Q 408 279 412 283 Q 415 287 410 290" stroke="#6FD877" stroke-width="1" fill="none" opacity="0.6"/>
    <!-- Brain outline (intact, not invaded) -->
    <ellipse cx="409" cy="282" rx="6" ry="5" fill="none" stroke="#8BA0D6" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
  </g>

  <!-- Detail: fruiting stalk erupting from back of ant's head -->
  <g id="detail-stalk" data-label="Ophiocordyceps fruiting body stalk erupting from base of ant head, orange-red with spore-releasing tip">
    <!-- Stalk -->
    <path d="M 400 278 Q 397 260 396 240 Q 395 220 397 200 Q 398 185 400 175" stroke="#CA1E08" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Stalk tip / ascoma -->
    <ellipse cx="400" cy="170" rx="8" ry="5" fill="#E85542"/>
    <ellipse cx="400" cy="167" rx="6" ry="3" fill="#CA1E08"/>
    <!-- Bioluminescent glow around stalk tip -->
    <circle cx="400" cy="170" r="22" fill="url(#spore-glow)"/>
  </g>

  <!-- Detail: spores falling from stalk onto ant trail below -->
  <g id="detail-spores" data-label="Ascospores raining from fruiting body stalk onto ant foraging trail below">
    <circle cx="392" cy="195" r="2.5" fill="#E6B800" opacity="0.9"/>
    <circle cx="406" cy="210" r="2" fill="#E6B800" opacity="0.85"/>
    <circle cx="385" cy="225" r="2.5" fill="#E6B800" opacity="0.8"/>
    <circle cx="412" cy="235" r="2" fill="#E6B800" opacity="0.75"/>
    <circle cx="395" cy="248" r="2" fill="#E6B800" opacity="0.7"/>
    <circle cx="380" cy="260" r="2.5" fill="#E6B800" opacity="0.65"/>
    <circle cx="418" cy="255" r="2" fill="#E6B800" opacity="0.6"/>
    <circle cx="370" cy="280" r="2" fill="#E6B800" opacity="0.55"/>
    <circle cx="430" cy="275" r="2" fill="#E6B800" opacity="0.5"/>
    <!-- Spores reaching trail level -->
    <circle cx="362" cy="430" r="2" fill="#E6B800" opacity="0.45"/>
    <circle cx="405" cy="440" r="2" fill="#E6B800" opacity="0.4"/>
    <circle cx="448" cy="435" r="2" fill="#E6B800" opacity="0.35"/>
  </g>

  <!-- Detail: second hyperparasitic fungus attacking the Ophiocordyceps stalk -->
  <g id="detail-hyperparasite" data-label="Second hyperparasitic fungus attacking Ophiocordyceps stalk — the counter-countermeasure, shown as small pale blobs on the stalk">
    <ellipse cx="397" cy="220" rx="5" ry="3.5" fill="#B8EDB9" opacity="0.8" transform="rotate(-15,397,220)"/>
    <ellipse cx="401" cy="232" rx="4" ry="3" fill="#B8EDB9" opacity="0.75" transform="rotate(10,401,232)"/>
    <ellipse cx="394" cy="243" rx="4.5" ry="3" fill="#B8EDB9" opacity="0.7" transform="rotate(-20,394,243)"/>
    <!-- Hyperparasite hyphae on stalk -->
    <path d="M 393 218 Q 390 223 392 228" stroke="#6FD877" stroke-width="1" fill="none" opacity="0.65"/>
    <path d="M 403 228 Q 406 233 404 238" stroke="#6FD877" stroke-width="1" fill="none" opacity="0.6"/>
  </g>

  <!-- Label: species name -->
  <g id="label" data-label="Species label: O. unilateralis in italic Barlow">
    <text x="580" y="200" font-family="Barlow, sans-serif" font-size="20" font-style="italic" fill="#8BA0D6" font-weight="500">O. unilateralis</text>
  </g>

  <!-- Overlay: height indicator and solar noon indicator -->
  <g id="overlay" data-label="25cm elevation marker arrow and solar noon indicator line">
    <!-- 25cm height indicator line -->
    <line x1="560" y1="280" x2="560" y2="490" stroke="#FBFFF6" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
    <line x1="552" y1="280" x2="568" y2="280" stroke="#FBFFF6" stroke-width="1.5" opacity="0.5"/>
    <line x1="552" y1="490" x2="568" y2="490" stroke="#FBFFF6" stroke-width="1.5" opacity="0.5"/>
    <text x="572" y="388" font-family="Barlow, sans-serif" font-size="18" fill="#FBFFF6" font-weight="500">25 cm</text>
    <!-- Solar noon indicator (sun glyph top of frame) -->
    <circle cx="680" cy="55" r="14" fill="none" stroke="#E6B800" stroke-width="2"/>
    <line x1="680" y1="32" x2="680" y2="24" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="703" y1="55" x2="711" y2="55" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="680" y1="78" x2="680" y2="86" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="657" y1="55" x2="649" y2="55" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="696" y1="39" x2="702" y2="33" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="696" y1="71" x2="702" y2="77" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="664" y1="39" x2="658" y2="33" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="664" y1="71" x2="658" y2="77" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
