<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- spore glow filter -->
    <filter id="spore-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- bg: dark forest floor -->
  <g id="bg" data-label="dark forest floor background">
    <rect x="0" y="0" width="800" height="600" fill="#1C1E35"/>
    <!-- ground plane -->
    <rect x="0" y="480" width="800" height="120" fill="#1A5C1E"/>
    <!-- mid-ground forest depth -->
    <rect x="0" y="350" width="800" height="130" fill="#151B2E"/>
  </g>

  <!-- context: leaf silhouettes and ant trail -->
  <g id="context" data-label="leaf silhouettes and ant colony trail below">
    <!-- large background leaf left -->
    <path d="M 20 500 Q 80 350 160 340 Q 120 430 80 500 Z" fill="#248A28" opacity="0.5"/>
    <!-- large background leaf right -->
    <path d="M 640 510 Q 720 360 780 350 Q 760 440 720 510 Z" fill="#1A5C1E" opacity="0.5"/>
    <!-- twig extending from right -->
    <line x1="0" y1="220" x2="800" y2="250" stroke="#6B4423" stroke-width="6" stroke-linecap="round"/>
    <!-- leaf vein detail on twig -->
    <path d="M 0 220 Q 400 240 800 250" fill="none" stroke="#A0785A" stroke-width="2" opacity="0.4"/>
    <!-- ant trail dots on ground -->
    <g opacity="0.4">
      <ellipse cx="100" cy="520" rx="3" ry="2" fill="#8BA0D6"/>
      <ellipse cx="160" cy="530" rx="3" ry="2" fill="#8BA0D6"/>
      <ellipse cx="230" cy="525" rx="3" ry="2" fill="#8BA0D6"/>
      <ellipse cx="300" cy="518" rx="3" ry="2" fill="#8BA0D6"/>
      <ellipse cx="380" cy="528" rx="3" ry="2" fill="#8BA0D6"/>
      <ellipse cx="450" cy="522" rx="3" ry="2" fill="#8BA0D6"/>
      <ellipse cx="520" cy="530" rx="3" ry="2" fill="#8BA0D6"/>
      <ellipse cx="600" cy="520" rx="3" ry="2" fill="#8BA0D6"/>
      <ellipse cx="680" cy="527" rx="3" ry="2" fill="#8BA0D6"/>
    </g>
    <!-- mummified ant remains near trail -->
    <ellipse cx="200" cy="526" rx="5" ry="3" fill="#3D3D52" opacity="0.6"/>
    <ellipse cx="480" cy="534" rx="5" ry="3" fill="#3D3D52" opacity="0.6"/>
  </g>

  <!-- subject: zombie ant clamped onto twig -->
  <g id="subject" data-label="zombie carpenter ant mandibles locked onto leaf vein, side view">
    <!-- ant body - thorax -->
    <ellipse cx="380" cy="245" rx="28" ry="16" fill="#3D3D52" stroke="#5B6FA8" stroke-width="2"/>
    <!-- ant abdomen (petiole + gaster) -->
    <circle cx="340" cy="248" r="8" fill="#3D3D52" stroke="#5B6FA8" stroke-width="1.5"/>
    <ellipse cx="310" cy="252" rx="22" ry="17" fill="#3D3D52" stroke="#5B6FA8" stroke-width="2"/>
    <!-- ant head -->
    <ellipse cx="415" cy="243" rx="22" ry="18" fill="#3D3D52" stroke="#5B6FA8" stroke-width="2"/>
    <!-- mandibles locked into twig -->
    <path d="M 430 248 Q 445 238 452 228" fill="none" stroke="#3D3D52" stroke-width="5" stroke-linecap="round"/>
    <path d="M 430 250 Q 447 260 452 228" fill="none" stroke="#3D3D52" stroke-width="5" stroke-linecap="round"/>
    <!-- mandible tips gripping twig -->
    <circle cx="452" cy="228" r="4" fill="#2D3E6B"/>
    <!-- ant legs -->
    <g stroke="#5B6FA8" stroke-width="1.5" stroke-linecap="round" fill="none">
      <!-- front legs -->
      <path d="M 400 255 L 390 275 L 370 290"/>
      <path d="M 400 237 L 392 218 L 375 208"/>
      <!-- mid legs -->
      <path d="M 375 258 L 358 278 L 342 295"/>
      <path d="M 376 238 L 360 220 L 348 208"/>
      <!-- rear legs -->
      <path d="M 352 255 L 338 272 L 318 280"/>
      <path d="M 353 240 L 338 224 L 322 215"/>
    </g>
    <!-- ant antennae (drooped/infected) -->
    <path d="M 432 230 Q 445 212 430 198" fill="none" stroke="#5B6FA8" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 428 228 Q 438 208 450 200" fill="none" stroke="#5B6FA8" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- detail-hyphae: fungal network in body -->
  <g id="detail-hyphae" data-label="fungal hyphae network spread through ant muscle tissue">
    <!-- hyphae threads through thorax -->
    <path d="M 370 240 Q 380 248 390 240" fill="none" stroke="#2FBF39" stroke-width="1" opacity="0.7"/>
    <path d="M 365 250 Q 378 244 392 252" fill="none" stroke="#6FD877" stroke-width="1" opacity="0.6"/>
    <path d="M 368 257 Q 380 252 393 258" fill="none" stroke="#2FBF39" stroke-width="1" opacity="0.5"/>
    <!-- hyphae in head -->
    <path d="M 408 238 Q 418 242 426 238" fill="none" stroke="#6FD877" stroke-width="1" opacity="0.6"/>
    <path d="M 410 248 Q 420 244 428 250" fill="none" stroke="#2FBF39" stroke-width="1" opacity="0.5"/>
    <!-- hyphae in abdomen -->
    <path d="M 298 248 Q 310 252 322 248" fill="none" stroke="#2FBF39" stroke-width="1" opacity="0.6"/>
    <path d="M 294 255 Q 310 258 325 254" fill="none" stroke="#6FD877" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- detail-stalk: fruiting body erupting from head -->
  <g id="detail-stalk" data-label="Ophiocordyceps fruiting stalk erupting from dorsal head">
    <!-- main stalk -->
    <path d="M 420 228 Q 418 190 415 155 Q 412 120 418 85" fill="none" stroke="#CA1E08" stroke-width="3.5" stroke-linecap="round"/>
    <!-- stalk bulge at base -->
    <ellipse cx="420" cy="226" rx="5" ry="4" fill="#CA1E08"/>
    <!-- ascoma at tip -->
    <ellipse cx="418" cy="82" rx="9" ry="14" fill="#E85542"/>
    <ellipse cx="418" cy="76" rx="7" ry="6" fill="#CA1E08"/>
  </g>

  <!-- detail-spores: spore cloud raining down -->
  <g id="detail-spores" data-label="ascospores dispersing downward toward ant trail" filter="url(#spore-glow)">
    <!-- spore particles falling -->
    <circle cx="408" cy="110" r="2.5" fill="#6FD877" opacity="0.9"/>
    <circle cx="425" cy="125" r="2" fill="#6FD877" opacity="0.8"/>
    <circle cx="435" cy="140" r="2.5" fill="#2FBF39" opacity="0.9"/>
    <circle cx="400" cy="145" r="2" fill="#6FD877" opacity="0.7"/>
    <circle cx="445" cy="160" r="2" fill="#6FD877" opacity="0.8"/>
    <circle cx="415" cy="170" r="2.5" fill="#2FBF39" opacity="0.9"/>
    <circle cx="430" cy="185" r="2" fill="#6FD877" opacity="0.6"/>
    <circle cx="390" cy="165" r="2" fill="#6FD877" opacity="0.7"/>
    <circle cx="460" cy="175" r="2" fill="#2FBF39" opacity="0.6"/>
    <!-- spores reaching ground level -->
    <circle cx="420" cy="480" r="2" fill="#6FD877" opacity="0.5"/>
    <circle cx="435" cy="495" r="1.5" fill="#2FBF39" opacity="0.4"/>
    <circle cx="448" cy="510" r="2" fill="#6FD877" opacity="0.3"/>
    <!-- dashed fall path -->
    <line x1="418" y1="96" x2="420" y2="475" stroke="#248A28" stroke-width="1" stroke-dasharray="5 8" opacity="0.3"/>
  </g>

  <!-- label: species name only -->
  <g id="label" data-label="species name label">
    <text x="80" y="130" font-family="Barlow, sans-serif" font-size="22" font-weight="700"
          font-style="italic" fill="#FBFFF6">O. unilateralis</text>
  </g>

  <!-- overlay: height indicator -->
  <g id="overlay" data-label="25cm height indicator arrow from twig to ground">
    <!-- vertical dashed line -->
    <line x1="560" y1="232" x2="560" y2="480" stroke="#8BA0D6" stroke-width="1.5" stroke-dasharray="6 4"/>
    <!-- top tick -->
    <line x1="554" y1="232" x2="566" y2="232" stroke="#8BA0D6" stroke-width="2"/>
    <!-- bottom tick -->
    <line x1="554" y1="480" x2="566" y2="480" stroke="#8BA0D6" stroke-width="2"/>
    <!-- distance label -->
    <text x="572" y="362" font-family="Barlow, sans-serif" font-size="18" font-weight="600"
          fill="#8BA0D6">~25 cm</text>
  </g>
</svg>
