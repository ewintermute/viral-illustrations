<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">

  <!-- Background: split scientific/biological diagram scene -->
  <g id="bg" data-label="Dark scientific background with subtle brain anatomy feel, midnight tones">
    <rect width="800" height="600" fill="#1C1E35"/>
    <!-- Subtle dividing line (left = fear, right = arousal) -->
    <line x1="400" y1="0" x2="400" y2="600" stroke="#5B6FA8" stroke-width="0.5" opacity="0.2"/>
    <!-- Floor ground plane -->
    <rect x="0" y="500" width="800" height="100" fill="#0D0D16" opacity="0.5"/>
  </g>

  <!-- Context: globe with 1/3 humans highlighted; Toxoplasma cyst in brain tissue -->
  <g id="context" data-label="Globe silhouette with 1/3 of human population highlighted as infected; small Toxoplasma tissue cyst visible in brain context inset">
    <!-- Globe -->
    <circle cx="680" cy="80" r="55" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2"/>
    <!-- Globe grid lines -->
    <ellipse cx="680" cy="80" rx="55" ry="20" fill="none" stroke="#5B6FA8" stroke-width="1" opacity="0.4"/>
    <ellipse cx="680" cy="80" rx="30" ry="55" fill="none" stroke="#5B6FA8" stroke-width="1" opacity="0.4"/>
    <line x1="625" y1="80" x2="735" y2="80" stroke="#5B6FA8" stroke-width="1" opacity="0.4"/>
    <!-- 1/3 infected region highlight -->
    <path d="M 680 80 L 680 25 A 55 55 0 0 1 727 108 Z" fill="#CA1E08" opacity="0.5"/>
    <!-- Toxoplasma cyst small brain inset -->
    <circle cx="620" cy="48" r="16" fill="#2D3E6B" stroke="#8BA0D6" stroke-width="1.5"/>
    <!-- Cyst (bradyzoites cluster) -->
    <circle cx="620" cy="48" r="10" fill="#1C1E35" stroke="#6FD877" stroke-width="1.5"/>
    <circle cx="616" cy="45" r="2.5" fill="#6FD877" opacity="0.8"/>
    <circle cx="622" cy="43" r="2" fill="#6FD877" opacity="0.75"/>
    <circle cx="625" cy="50" r="2.5" fill="#6FD877" opacity="0.8"/>
    <circle cx="617" cy="53" r="2" fill="#6FD877" opacity="0.75"/>
    <circle cx="623" cy="57" r="2" fill="#6FD877" opacity="0.7"/>
  </g>

  <!-- Subject: main rat (center-left composition) -->
  <g id="subject" data-label="Mouse/rat as primary host subject — shown in fear-neutral pose, Toxoplasma infection context">
    <!-- Rat body -->
    <ellipse cx="280" cy="400" rx="80" ry="45" fill="#A0785A" stroke="#6B4423" stroke-width="2"/>
    <!-- Rat head -->
    <ellipse cx="350" cy="385" rx="45" ry="38" fill="#A0785A" stroke="#6B4423" stroke-width="2"/>
    <!-- Rat snout/nose area -->
    <ellipse cx="390" cy="390" rx="18" ry="14" fill="#8B5A8A" opacity="0.6"/>
    <ellipse cx="393" cy="390" rx="5" ry="4" fill="#0D0D16"/>
    <!-- Rat eye (standard construction) -->
    <ellipse cx="370" cy="372" rx="8" ry="6.5" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="370" cy="372" r="3.5" fill="#0D0D16"/>
    <circle cx="368" cy="370" r="1.6" fill="#FBFFF6" opacity="0.85"/>
    <!-- Ear -->
    <ellipse cx="332" cy="360" rx="16" ry="20" fill="#A0785A" stroke="#6B4423" stroke-width="1.5"/>
    <ellipse cx="332" cy="360" rx="10" ry="14" fill="#F19B8F" opacity="0.5"/>
    <!-- Whiskers -->
    <path d="M 392 386 Q 415 382 430 380" stroke="#D4D4DC" stroke-width="1" fill="none"/>
    <path d="M 392 390 Q 415 390 432 392" stroke="#D4D4DC" stroke-width="1" fill="none"/>
    <path d="M 392 394 Q 415 398 430 402" stroke="#D4D4DC" stroke-width="1" fill="none"/>
    <!-- Front legs -->
    <path d="M 320 438 Q 316 460 310 470 Q 318 465 325 452 Q 328 445 330 438" fill="#8B5A8A" stroke="#6B4423" stroke-width="1.5"/>
    <path d="M 345 440 Q 345 462 340 474 Q 348 468 353 454 Q 356 445 352 440" fill="#8B5A8A" stroke="#6B4423" stroke-width="1.5"/>
    <!-- Back leg -->
    <path d="M 232 438 Q 218 456 210 470 Q 220 464 232 450 Q 238 444 242 438" fill="#8B5A8A" stroke="#6B4423" stroke-width="1.5"/>
    <!-- Tail -->
    <path d="M 202 408 Q 160 415 120 425 Q 90 432 70 438" stroke="#A0785A" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Toxoplasma infection indicator (green glow in head region) -->
    <circle cx="360" cy="380" r="20" fill="#2FBF39" opacity="0.12"/>
  </g>

  <!-- Detail: normal rat fleeing cat urine vs infected rat approaching it -->
  <g id="detail-rat-behavior-comparison" data-label="Behavior comparison: normal rat fleeing cat urine smell (left); infected rat approaching it (right)">
    <!-- Cat paw/urine marker (center bottom) -->
    <ellipse cx="400" cy="510" rx="22" ry="16" fill="#6B4423" stroke="#A0785A" stroke-width="1.5" opacity="0.7"/>
    <!-- Cat scent waves -->
    <path d="M 400 494 Q 405 480 400 470" stroke="#E6B800" stroke-width="1.5" fill="none" stroke-dasharray="3 3" opacity="0.6"/>
    <path d="M 390 492 Q 380 476 375 465" stroke="#E6B800" stroke-width="1.5" fill="none" stroke-dasharray="3 3" opacity="0.55"/>
    <path d="M 410 492 Q 420 476 425 465" stroke="#E6B800" stroke-width="1.5" fill="none" stroke-dasharray="3 3" opacity="0.55"/>

    <!-- Normal rat (fleeing — small silhouette left of center moving away) -->
    <ellipse cx="200" cy="490" rx="28" ry="16" fill="#6B4423" stroke="#A0785A" stroke-width="1.5" opacity="0.8"/>
    <circle cx="225" cy="480" r="14" fill="#6B4423" stroke="#A0785A" stroke-width="1.5" opacity="0.8"/>
    <!-- Fear arrow (moving left/away) -->
    <path d="M 185 488 Q 140 485 100 488" stroke="#FBFFF6" stroke-width="2" fill="none" opacity="0.7"/>
    <polygon points="100,488 112,482 112,494" fill="#FBFFF6" opacity="0.7"/>

    <!-- Infected rat (approaching — right of center moving toward scent) -->
    <ellipse cx="600" cy="490" rx="28" ry="16" fill="#CA1E08" stroke="#8B1506" stroke-width="1.5" opacity="0.8"/>
    <circle cx="575" cy="480" r="14" fill="#CA1E08" stroke="#8B1506" stroke-width="1.5" opacity="0.8"/>
    <!-- Approach arrow (moving right toward scent) -->
    <path d="M 616 488 Q 655 485 695 488" stroke="#CA1E08" stroke-width="2" fill="none" opacity="0.7"/>
    <polygon points="695,488 683,482 683,494" fill="#CA1E08" opacity="0.7"/>
    <!-- X mark on fear center for infected rat -->
    <line x1="580" y1="473" x2="592" y2="485" stroke="#FBFFF6" stroke-width="2" opacity="0.7"/>
    <line x1="592" y1="473" x2="580" y2="485" stroke="#FBFFF6" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Detail: brain diagram showing fear circuit vs arousal circuit activation in infected rat -->
  <g id="detail-brain-circuit-fear-vs-arousal" data-label="Rat brain cross-section: fear circuit in hypothalamus (VMH) vs sexual arousal circuit in posterodorsal medial amygdala activated in Toxoplasma-infected rat">
    <!-- Brain outline -->
    <path d="M 90 200 C 60 180 50 150 70 130 C 90 110 120 108 145 115 C 165 120 185 132 200 148 C 220 168 225 190 215 212 C 205 234 180 248 155 250 C 125 252 95 238 90 220 Z" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2"/>
    <!-- Brain fold lines -->
    <path d="M 90 170 Q 120 158 150 170 Q 170 178 180 168" stroke="#5B6FA8" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 80 195 Q 110 183 140 192 Q 162 198 175 190" stroke="#5B6FA8" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Hypothalamus (VMH) — fear circuit region (normal) -->
    <ellipse cx="130" cy="215" rx="22" ry="14" fill="#2FBF39" stroke="#1A5C1E" stroke-width="1.5"/>
    <!-- Amygdala (posterodorsal medial) — arousal circuit (activated in infected) -->
    <ellipse cx="168" cy="195" rx="18" ry="12" fill="#CA1E08" stroke="#8B1506" stroke-width="1.5" opacity="0.9"/>
    <!-- Activity indicator on amygdala -->
    <path d="M 178 188 Q 185 182 192 185" stroke="#CA1E08" stroke-width="2" fill="none" opacity="0.8"/>
    <path d="M 180 194 Q 188 192 194 196" stroke="#CA1E08" stroke-width="2" fill="none" opacity="0.75"/>
    <!-- Dopamine neurotransmitter dots -->
    <circle cx="155" cy="204" r="3" fill="#E6B800" opacity="0.8"/>
    <circle cx="162" cy="200" r="2.5" fill="#E6B800" opacity="0.75"/>
    <circle cx="148" cy="200" r="2.5" fill="#E6B800" opacity="0.7"/>
    <!-- X on hypothalamus (fear suppressed) -->
    <line x1="120" y1="208" x2="130" y2="222" stroke="#FBFFF6" stroke-width="1.5" opacity="0.6"/>
    <line x1="130" y1="208" x2="120" y2="222" stroke="#FBFFF6" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Detail: human associations — risk-taking behavior, traffic accidents, personality change -->
  <g id="detail-human-associations" data-label="Human behavioral associations with Toxoplasma seropositivity: traffic accident rate, impulsivity, risk-taking icons">
    <!-- Car/accident icon -->
    <rect x="525" y="310" width="45" height="25" rx="4" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1.5"/>
    <circle cx="533" cy="337" r="5" fill="#3D3D52" stroke="#6B6B7C" stroke-width="1"/>
    <circle cx="562" cy="337" r="5" fill="#3D3D52" stroke="#6B6B7C" stroke-width="1"/>
    <!-- Collision impact mark -->
    <path d="M 572 318 Q 582 312 592 316 Q 598 320 594 326" stroke="#CA1E08" stroke-width="2" fill="none"/>
    <path d="M 586 310 L 598 306 L 596 318" stroke="#CA1E08" stroke-width="1.5" fill="none"/>

    <!-- Risk/impulsivity icon (upward trend) -->
    <path d="M 525 380 L 545 370 L 565 358 L 585 342 L 605 330" stroke="#E6B800" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <polygon points="605,330 596,332 600,342" fill="#E6B800"/>
    <!-- Baseline (normal) -->
    <path d="M 525 390 L 605 390" stroke="#5B6FA8" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.5"/>

    <!-- Schizophrenia antibody comparison -->
    <rect x="525" y="415" width="255" height="62" rx="5" fill="#0D0D16" stroke="#5B6FA8" stroke-width="1.5"/>
    <!-- Control bar -->
    <rect x="540" y="425" width="24" height="36" rx="2" fill="#2D3E6B" opacity="0.9"/>
    <text x="552" y="470" font-family="Barlow, sans-serif" font-size="11" fill="#8BA0D6" text-anchor="middle">control</text>
    <!-- Schizophrenia bar (1.9x higher) -->
    <rect x="600" y="416" width="24" height="45" rx="2" fill="#CA1E08" opacity="0.9"/>
    <text x="612" y="470" font-family="Barlow, sans-serif" font-size="11" fill="#CA1E08" text-anchor="middle">SCZ</text>
    <!-- 1.9x label -->
    <text x="665" y="448" font-family="Barlow, sans-serif" font-size="18" fill="#FBFFF6" font-weight="700">1.9×</text>
  </g>

  <!-- Label: correlation not causation note -->
  <g id="label" data-label="Correlation not causation caveat label in Barlow">
    <text x="520" y="500" font-family="Barlow, sans-serif" font-size="18" fill="#8BA0D6" font-weight="500">corr. ≠ causation</text>
  </g>

  <!-- Overlay: Toxoplasma parasite cell on brain; dopamine pathway arrow -->
  <g id="overlay" data-label="Toxoplasma gondii parasite cell illustration annotation on brain; dopamine elevation pathway arrow from amygdala to behavior panel">
    <!-- Toxoplasma cell (crescent/banana shape characteristic) -->
    <path d="M 60 270 Q 72 255 84 265 Q 90 275 82 285 Q 70 290 60 280 Z" fill="#6FD877" stroke="#1A5C1E" stroke-width="1.5"/>
    <!-- Nucleus within -->
    <ellipse cx="73" cy="274" rx="6" ry="4" fill="#1A5C1E"/>
    <!-- Dopamine pathway arrow -->
    <path d="M 185 195 Q 260 250 340 345" stroke="#E6B800" stroke-width="1.5" stroke-dasharray="6 4" fill="none" opacity="0.5"/>
    <!-- Toxoplasma label italic -->
    <text x="20" y="308" font-family="Barlow, sans-serif" font-size="18" font-style="italic" fill="#8BA0D6" font-weight="500">T. gondii</text>
  </g>
</svg>
