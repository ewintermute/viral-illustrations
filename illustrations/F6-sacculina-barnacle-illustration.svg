<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">

  <!-- bg: dark teal underwater scene -->
  <g id="bg" data-label="dark underwater environment background">
    <rect x="0" y="0" width="800" height="600" fill="#1C1E35"/>
    <!-- water depth gradient bands -->
    <rect x="0" y="420" width="800" height="180" fill="#2D3E6B"/>
    <!-- caustic light hints from above -->
    <path d="M 0 0 Q 200 80 0 160" fill="none" stroke="#D1DCFF" stroke-width="1" opacity="0.07"/>
    <path d="M 400 0 Q 500 90 350 180" fill="none" stroke="#D1DCFF" stroke-width="1" opacity="0.06"/>
    <path d="M 800 0 Q 640 100 800 200" fill="none" stroke="#D1DCFF" stroke-width="1" opacity="0.07"/>
  </g>

  <!-- context: sea floor substrate and bubbles -->
  <g id="context" data-label="sea floor and small water bubbles for depth">
    <!-- pebbles -->
    <ellipse cx="80" cy="468" rx="18" ry="9" fill="#3D3E5B"/>
    <ellipse cx="160" cy="475" rx="12" ry="6" fill="#2D3E6B"/>
    <ellipse cx="650" cy="462" rx="20" ry="10" fill="#3D3E5B"/>
    <ellipse cx="740" cy="470" rx="14" ry="7" fill="#2D3E6B"/>
    <!-- small bubbles -->
    <circle cx="140" cy="360" r="4" fill="none" stroke="#D1DCFF" stroke-width="1" opacity="0.3"/>
    <circle cx="148" cy="340" r="3" fill="none" stroke="#D1DCFF" stroke-width="1" opacity="0.25"/>
    <circle cx="660" cy="370" r="4" fill="none" stroke="#D1DCFF" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- subject: green crab host from side -->
  <g id="subject" data-label="Carcinus maenas green crab with feminized broad abdomen, side view">
    <!-- carapace / shell body -->
    <path d="M 260 260 Q 240 220 270 195 Q 320 175 400 172 Q 480 172 530 190 Q 560 210 555 255 Q 548 300 520 320 Q 480 335 400 338 Q 320 335 280 318 Q 255 300 260 260 Z"
          fill="#248A28" stroke="#1A5C1E" stroke-width="3"/>
    <!-- carapace texture lines -->
    <path d="M 300 192 Q 305 258 308 330" fill="none" stroke="#1A5C1E" stroke-width="1.5" opacity="0.5"/>
    <path d="M 500 192 Q 495 258 492 330" fill="none" stroke="#1A5C1E" stroke-width="1.5" opacity="0.5"/>
    <!-- lateral spines on carapace -->
    <path d="M 262 242 L 235 235" stroke="#1A5C1E" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 260 268 L 232 268" stroke="#1A5C1E" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 556 242 L 583 233" stroke="#1A5C1E" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 556 268 L 584 268" stroke="#1A5C1E" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- eyes: standard eye construction -->
    <ellipse cx="320" cy="198" rx="12" ry="8" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="320" cy="198" r="5" fill="#0D0D16"/>
    <circle cx="317" cy="195" r="2" fill="#FBFFF6" opacity="0.85"/>
    <ellipse cx="480" cy="198" rx="12" ry="8" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="480" cy="198" r="5" fill="#0D0D16"/>
    <circle cx="477" cy="195" r="2" fill="#FBFFF6" opacity="0.85"/>
    <!-- chelipeds (claws) — reduced size due to feminization -->
    <path d="M 262 255 Q 225 245 200 230 Q 188 222 185 215" fill="none" stroke="#248A28" stroke-width="8" stroke-linecap="round"/>
    <path d="M 185 215 Q 174 208 176 200 Q 178 194 188 196" fill="#1A5C1E" stroke="#1A5C1E" stroke-width="2"/>
    <path d="M 186 196 Q 194 188 202 192 Q 210 196 210 206" fill="none" stroke="#1A5C1E" stroke-width="2"/>
    <path d="M 556 255 Q 593 248 616 234 Q 628 224 630 217" fill="none" stroke="#248A28" stroke-width="8" stroke-linecap="round"/>
    <path d="M 630 217 Q 641 210 638 202 Q 636 196 626 198" fill="#1A5C1E" stroke="#1A5C1E" stroke-width="2"/>
    <path d="M 626 198 Q 618 190 610 194 Q 604 200 605 210" fill="none" stroke="#1A5C1E" stroke-width="2"/>
    <!-- walking legs -->
    <g stroke="#1A5C1E" stroke-width="4" stroke-linecap="round" fill="none">
      <path d="M 290 328 L 268 358 L 250 382"/>
      <path d="M 320 334 L 302 366 L 286 392"/>
      <path d="M 480 334 L 498 366 L 514 392"/>
      <path d="M 510 328 L 532 358 L 550 382"/>
    </g>
    <!-- feminized broad abdomen (flap unfolded wider) -->
    <path d="M 310 338 Q 295 358 290 390 Q 294 420 330 432 Q 365 440 400 440 Q 435 440 470 432 Q 506 420 510 390 Q 506 358 490 338 Z"
          fill="#2FBF39" stroke="#1A5C1E" stroke-width="2.5"/>
    <!-- abdomen segment lines -->
    <path d="M 295 365 Q 400 360 505 365" fill="none" stroke="#1A5C1E" stroke-width="1.5" opacity="0.5"/>
    <path d="M 292 385 Q 400 380 508 385" fill="none" stroke="#1A5C1E" stroke-width="1.5" opacity="0.5"/>
    <path d="M 294 405 Q 400 400 506 405" fill="none" stroke="#1A5C1E" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- detail-externa: Sacculina externa bulging from abdomen -->
  <g id="detail-externa" data-label="Sacculina externa reproductive sac protruding from crab abdomen">
    <!-- externa body -->
    <ellipse cx="400" cy="405" rx="52" ry="38" fill="#E85542" stroke="#CA1E08" stroke-width="2.5"/>
    <!-- externa surface texture -->
    <ellipse cx="400" cy="400" rx="42" ry="28" fill="none" stroke="#CA1E08" stroke-width="1" opacity="0.4"/>
    <!-- externa larvae cells -->
    <circle cx="385" cy="400" r="5" fill="#CA1E08" opacity="0.5"/>
    <circle cx="400" cy="395" r="5" fill="#CA1E08" opacity="0.5"/>
    <circle cx="415" cy="402" r="5" fill="#CA1E08" opacity="0.5"/>
    <circle cx="393" cy="412" r="4" fill="#CA1E08" opacity="0.4"/>
    <circle cx="408" cy="415" r="4" fill="#CA1E08" opacity="0.4"/>
    <!-- crab fanning legs caring for externa -->
    <path d="M 348 408 Q 330 430 320 450" stroke="#2FBF39" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M 452 408 Q 470 432 480 452" stroke="#2FBF39" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- detail-interna: root network inside crab body -->
  <g id="detail-interna" data-label="Sacculina interna root tendrils spreading through host organs">
    <!-- root tendrils radiating from attachment point into body -->
    <path d="M 400 390 Q 380 360 355 345 Q 330 335 310 330" fill="none" stroke="#E6B800" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M 400 390 Q 400 355 400 330 Q 400 305 398 282" fill="none" stroke="#E6B800" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M 400 390 Q 420 360 445 345 Q 470 333 490 328" fill="none" stroke="#E6B800" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M 380 372 Q 360 358 340 348 Q 318 342 300 348" fill="none" stroke="#E6B800" stroke-width="1" opacity="0.4"/>
    <path d="M 420 372 Q 440 360 460 350 Q 482 344 500 350" fill="none" stroke="#E6B800" stroke-width="1" opacity="0.4"/>
    <!-- nervous system wrap around eyestalk -->
    <path d="M 398 280 Q 360 240 325 205" fill="none" stroke="#E6B800" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  </g>

  <!-- label: parasite species name -->
  <g id="label" data-label="Sacculina species label">
    <text x="56" y="130" font-family="Barlow, sans-serif" font-size="22" font-weight="700"
          font-style="italic" fill="#FBFFF6">Sacculina</text>
  </g>

  <!-- overlay: arrow pointing to externa -->
  <g id="overlay" data-label="annotation arrow pointing to parasite externa">
    <!-- arrow from label area to externa -->
    <line x1="145" y1="130" x2="340" y2="390" stroke="#8BA0D6" stroke-width="1.5" stroke-dasharray="6 4"/>
    <circle cx="340" cy="390" r="4" fill="#8BA0D6"/>
  </g>
</svg>
