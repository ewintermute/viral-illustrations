<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">

  <!-- Background: underwater ocean environment -->
  <g id="bg" data-label="Dark underwater ocean background, navy and midnight blues">
    <rect width="800" height="600" fill="#1C1E35"/>
    <rect x="0" y="0" width="800" height="500" fill="#2D3E6B" opacity="0.45"/>
    <!-- Sandy bottom -->
    <rect x="0" y="490" width="800" height="110" fill="#6B4423" opacity="0.5"/>
    <!-- Ambient light ray from above -->
    <polygon points="250,0 350,0 420,500 180,500" fill="#5B6FA8" opacity="0.04"/>
    <polygon points="480,0 540,0 580,500 440,500" fill="#5B6FA8" opacity="0.03"/>
  </g>

  <!-- Context: ocean floor elements and Sacculina larva drifting -->
  <g id="context" data-label="Ocean floor context — pebbles and Sacculina cypris larva drifting toward crab">
    <!-- Seabed stones -->
    <ellipse cx="80" cy="530" rx="28" ry="12" fill="#A0785A" opacity="0.5"/>
    <ellipse cx="180" cy="545" rx="20" ry="9" fill="#6B4423" opacity="0.45"/>
    <ellipse cx="620" cy="535" rx="25" ry="11" fill="#A0785A" opacity="0.45"/>
    <ellipse cx="720" cy="525" rx="22" ry="10" fill="#6B4423" opacity="0.5"/>
    <!-- Small Sacculina larva (cypris) drifting toward crab seam area — top right -->
    <ellipse cx="640" cy="120" rx="8" ry="5" fill="#E85542" opacity="0.9"/>
    <circle cx="638" cy="118" r="2" fill="#E8EEFF" stroke="#D4A574" stroke-width="1"/>
    <circle cx="638" cy="118" r="0.9" fill="#0D0D16"/>
    <!-- Larva movement trace -->
    <path d="M 700 80 Q 670 100 640 120" stroke="#E85542" stroke-width="1" stroke-dasharray="4 5" fill="none" opacity="0.5"/>
  </g>

  <!-- Subject: crab body from above/side showing overall anatomy -->
  <g id="subject" data-label="Host crab body — carapace with legs visible, showing infected state (broader abdomen shape)">
    <!-- Carapace -->
    <path d="M 360 240 C 290 240 245 270 235 310 C 225 350 245 390 290 410 C 330 428 370 432 400 432 C 430 432 470 428 510 410 C 555 390 575 350 565 310 C 555 270 510 240 440 240 Z" fill="#A0785A" stroke="#6B4423" stroke-width="2.5"/>
    <!-- Carapace surface lines -->
    <path d="M 400 244 Q 400 340 400 428" stroke="#6B4423" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M 310 258 Q 300 340 315 412" stroke="#6B4423" stroke-width="1" fill="none" opacity="0.35"/>
    <path d="M 490 258 Q 500 340 485 412" stroke="#6B4423" stroke-width="1" fill="none" opacity="0.35"/>
    <!-- Crab eyes — standard construction -->
    <ellipse cx="355" cy="258" rx="9" ry="7" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="355" cy="258" r="4" fill="#0D0D16"/>
    <circle cx="352.5" cy="255.5" r="1.8" fill="#FBFFF6" opacity="0.85"/>
    <ellipse cx="445" cy="258" rx="9" ry="7" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="445" cy="258" r="4" fill="#0D0D16"/>
    <circle cx="442.5" cy="255.5" r="1.8" fill="#FBFFF6" opacity="0.85"/>
    <!-- Walking legs (left side) -->
    <path d="M 270 290 Q 230 285 195 278" stroke="#6B4423" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 258 315 Q 215 318 178 320" stroke="#6B4423" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 258 345 Q 215 352 178 360" stroke="#6B4423" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 270 375 Q 230 385 200 395" stroke="#6B4423" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Walking legs (right side) -->
    <path d="M 530 290 Q 570 285 605 278" stroke="#6B4423" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 542 315 Q 585 318 622 320" stroke="#6B4423" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 542 345 Q 585 352 622 360" stroke="#6B4423" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 530 375 Q 570 385 600 395" stroke="#6B4423" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Claws (smaller — feminized) -->
    <path d="M 272 270 Q 232 250 200 242 Q 190 240 186 248 Q 182 256 190 262 Q 200 268 212 264" stroke="#6B4423" stroke-width="2.5" fill="#A0785A"/>
    <path d="M 528 270 Q 568 250 600 242 Q 610 240 614 248 Q 618 256 610 262 Q 600 268 588 264" stroke="#6B4423" stroke-width="2.5" fill="#A0785A"/>
    <!-- Broader abdomen (feminized) -->
    <path d="M 305 420 Q 340 450 400 460 Q 460 450 495 420" fill="#8B5A8A" stroke="#6B4423" stroke-width="1.5" opacity="0.75"/>
  </g>

  <!-- Detail: internal root system (interna) spreading through crab body -->
  <g id="detail-interna" data-label="Sacculina interna root-like threads spreading through crab's interior organs like ivy, pale branching network">
    <!-- Root network through body interior -->
    <path d="M 400 370 Q 360 350 320 340 Q 290 335 270 340" stroke="#E85542" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M 400 370 Q 440 350 480 340 Q 510 335 530 340" stroke="#E85542" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M 400 360 Q 380 330 360 310 Q 345 295 340 280" stroke="#E85542" stroke-width="1" fill="none" opacity="0.65"/>
    <path d="M 400 360 Q 420 330 440 310 Q 455 295 460 280" stroke="#E85542" stroke-width="1" fill="none" opacity="0.65"/>
    <path d="M 375 340 Q 355 320 345 300 Q 338 285 342 270" stroke="#E85542" stroke-width="1" fill="none" opacity="0.55"/>
    <path d="M 425 340 Q 445 320 455 300 Q 462 285 458 270" stroke="#E85542" stroke-width="1" fill="none" opacity="0.55"/>
    <!-- Root branching -->
    <path d="M 340 300 Q 320 295 305 290" stroke="#E85542" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 340 300 Q 330 285 335 275" stroke="#E85542" stroke-width="1" fill="none" opacity="0.45"/>
    <path d="M 460 300 Q 480 295 495 290" stroke="#E85542" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 460 300 Q 470 285 465 275" stroke="#E85542" stroke-width="1" fill="none" opacity="0.45"/>
    <!-- Hepatopancreas (nutrient-tapping organ) -->
    <ellipse cx="400" cy="310" rx="38" ry="25" fill="#2FBF39" stroke="#1A5C1E" stroke-width="1.5" opacity="0.65"/>
    <path d="M 380 310 Q 400 302 420 310" stroke="#1A5C1E" stroke-width="1" fill="none" opacity="0.5"/>
  </g>

  <!-- Detail: externa sac bulging through crab's abdomen -->
  <g id="detail-externa" data-label="Sacculina externa reproductive sac bulging through underside of crab abdomen — visible egg mass">
    <!-- Externa sac -->
    <ellipse cx="400" cy="462" rx="42" ry="26" fill="#E85542" stroke="#CA1E08" stroke-width="2"/>
    <!-- Eggs within sac -->
    <circle cx="380" cy="460" r="4" fill="#F19B8F" opacity="0.85"/>
    <circle cx="395" cy="455" r="3.5" fill="#F19B8F" opacity="0.8"/>
    <circle cx="410" cy="462" r="4" fill="#F19B8F" opacity="0.85"/>
    <circle cx="420" cy="456" r="3" fill="#F19B8F" opacity="0.75"/>
    <circle cx="385" cy="468" r="3.5" fill="#F19B8F" opacity="0.8"/>
    <circle cx="405" cy="470" r="3" fill="#F19B8F" opacity="0.75"/>
    <!-- Attachment point at abdomen edge -->
    <path d="M 365 447 Q 370 440 380 438" stroke="#CA1E08" stroke-width="1.5" fill="none"/>
    <path d="M 435 447 Q 430 440 420 438" stroke="#CA1E08" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Detail: male crab feminized anatomy comparison indicator -->
  <g id="detail-feminized-anatomy" data-label="Feminized male crab anatomy indicator — broader abdomen, smaller claws annotations via dashed lines">
    <!-- Dashed indicator arrow to abdomen -->
    <path d="M 160 490 Q 200 490 300 465" stroke="#8BA0D6" stroke-width="1.5" stroke-dasharray="5 4" fill="none" opacity="0.7"/>
    <circle cx="160" cy="490" r="3" fill="#8BA0D6" opacity="0.7"/>
    <!-- Small text note via overlay, kept in this group as annotation path -->
    <path d="M 148 440 Q 148 465 160 490" stroke="#8BA0D6" stroke-width="1" stroke-dasharray="3 3" fill="none" opacity="0.5"/>
  </g>

  <!-- Detail: crab performing maternal fanning behavior over egg mass -->
  <g id="detail-fanning-behavior" data-label="Infected crab fanning water over parasite egg mass with rhythmic pleopod movements — shown as water flow lines">
    <!-- Water fanning current lines near abdomen -->
    <path d="M 330 510 Q 340 540 360 555 Q 380 565 400 560" stroke="#8BA0D6" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.6"/>
    <path d="M 340 505 Q 355 535 375 548 Q 395 558 415 553" stroke="#8BA0D6" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.55"/>
    <path d="M 355 500 Q 368 530 390 545 Q 408 555 430 548" stroke="#8BA0D6" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.5"/>
    <path d="M 370 498 Q 383 526 405 540 Q 425 550 448 543" stroke="#8BA0D6" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.45"/>
    <!-- Larval release dots -->
    <circle cx="320" cy="518" r="2" fill="#E6B800" opacity="0.7"/>
    <circle cx="305" cy="535" r="2" fill="#E6B800" opacity="0.6"/>
    <circle cx="310" cy="552" r="2" fill="#E6B800" opacity="0.55"/>
    <circle cx="290" cy="545" r="2" fill="#E6B800" opacity="0.5"/>
  </g>

  <!-- Label: species name -->
  <g id="label" data-label="Species label: Sacculina sp. in italic Barlow">
    <text x="550" y="555" font-family="Barlow, sans-serif" font-size="20" font-style="italic" fill="#8BA0D6" font-weight="500">Sacculina sp.</text>
  </g>

  <!-- Overlay: injection point annotation at exoskeletal seam -->
  <g id="overlay" data-label="Injection point annotation at soft joint seam of carapace; connection line from larva to injection site">
    <!-- Injection point circle at seam -->
    <circle cx="490" cy="258" r="8" fill="none" stroke="#E85542" stroke-width="2" opacity="0.9"/>
    <!-- Arrow from larva to injection point -->
    <path d="M 636 126 Q 580 180 500 260" stroke="#E85542" stroke-width="1.5" stroke-dasharray="6 4" fill="none" opacity="0.75"/>
    <!-- Arrowhead -->
    <polygon points="500,260 493,252 508,252" fill="#E85542" opacity="0.75"/>
  </g>
</svg>
