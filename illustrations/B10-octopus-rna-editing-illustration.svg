<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- bioluminescent glow for temperature cold side -->
    <radialGradient id="cold-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8BA0D6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8BA0D6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- bg: dark deep ocean -->
  <g id="bg" data-label="dark deep ocean background">
    <rect x="0" y="0" width="800" height="600" fill="#1C1E35"/>
    <!-- cold tinted area hint -->
    <rect x="0" y="0" width="400" height="600" fill="#2D3E6B" opacity="0.25"/>
  </g>

  <!-- context: ocean depth environment -->
  <g id="context" data-label="ocean floor with rock silhouette and ambient water">
    <!-- rocky substrate -->
    <path d="M 0 540 Q 80 520 150 535 Q 220 550 300 530 Q 380 510 400 540 Q 420 510 500 530 Q 580 548 650 530 Q 720 512 800 540 L 800 600 L 0 600 Z"
          fill="#2D3E6B"/>
    <!-- cold temperature visual (left side) -->
    <ellipse cx="200" cy="300" rx="150" ry="200" fill="url(#cold-glow)"/>
    <!-- cold water particles -->
    <circle cx="120" cy="150" r="2" fill="#D1DCFF" opacity="0.3"/>
    <circle cx="180" cy="220" r="1.5" fill="#D1DCFF" opacity="0.25"/>
    <circle cx="90" cy="300" r="2" fill="#D1DCFF" opacity="0.3"/>
    <circle cx="250" cy="180" r="1.5" fill="#D1DCFF" opacity="0.2"/>
  </g>

  <!-- subject: octopus in cold water, arms curled -->
  <g id="subject" data-label="Octopus bimaculoides body and arms in cold temperature environment">
    <!-- mantle (body) -->
    <ellipse cx="400" cy="240" rx="80" ry="100" fill="#E85542" stroke="#CA1E08" stroke-width="2.5"/>
    <!-- mantle texture spots (chromatophores) -->
    <circle cx="380" cy="210" r="6" fill="#CA1E08" opacity="0.6"/>
    <circle cx="415" cy="200" r="5" fill="#CA1E08" opacity="0.5"/>
    <circle cx="430" cy="225" r="7" fill="#B8860B" opacity="0.5"/>
    <circle cx="370" cy="250" r="5" fill="#CA1E08" opacity="0.6"/>
    <circle cx="420" cy="260" r="6" fill="#B8860B" opacity="0.45"/>
    <circle cx="385" cy="270" r="4" fill="#CA1E08" opacity="0.5"/>
    <!-- eye: standard construction -->
    <ellipse cx="368" cy="222" rx="18" ry="14" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="368" cy="222" r="8" fill="#0D0D16"/>
    <circle cx="363" cy="217" r="3.5" fill="#FBFFF6" opacity="0.85"/>
    <!-- arms (8 tentacles) -->
    <g stroke="#E85542" stroke-width="6" fill="none" stroke-linecap="round">
      <!-- arm 1 -->
      <path d="M 360 330 Q 330 380 295 420 Q 268 450 240 470"/>
      <!-- arm 2 -->
      <path d="M 380 335 Q 360 390 345 440 Q 332 475 318 500"/>
      <!-- arm 3 -->
      <path d="M 400 338 Q 390 395 388 450 Q 385 490 383 520"/>
      <!-- arm 4 -->
      <path d="M 420 335 Q 420 390 430 445 Q 438 480 448 510"/>
      <!-- arm 5 -->
      <path d="M 438 330 Q 455 380 475 425 Q 492 460 510 480"/>
      <!-- arm 6 -->
      <path d="M 455 320 Q 482 365 505 400 Q 524 430 545 450"/>
      <!-- arm 7 right side -->
      <path d="M 340 318 Q 308 358 282 390 Q 260 415 240 435"/>
      <!-- arm 8 -->
      <path d="M 316 305 Q 278 335 250 360 Q 225 382 200 395"/>
    </g>
    <!-- sucker hints on arms -->
    <g fill="#CA1E08" opacity="0.5">
      <circle cx="332" cy="370" r="3.5"/>
      <circle cx="318" cy="390" r="3.5"/>
      <circle cx="304" cy="410" r="3.5"/>
      <circle cx="456" cy="360" r="3.5"/>
      <circle cx="470" cy="378" r="3.5"/>
      <circle cx="482" cy="396" r="3.5"/>
    </g>
  </g>

  <!-- detail-rna-edit: RNA strand with A-to-I edit highlighted -->
  <g id="detail-rna-edit" data-label="mRNA strand showing A-to-I editing — adenosine converted to inosine">
    <!-- RNA backbone (single strand, wavy) -->
    <path d="M 560 120 Q 580 130 600 120 Q 620 110 640 120 Q 660 130 680 120 Q 700 110 720 120 Q 740 130 760 120"
          fill="none" stroke="#5B6FA8" stroke-width="2.5" stroke-linecap="round"/>
    <!-- nucleotide bases hanging off -->
    <!-- A (adenosine) -->
    <line x1="580" y1="130" x2="580" y2="155" stroke="#5B6FA8" stroke-width="2"/>
    <circle cx="580" cy="162" r="10" fill="#8BA0D6" stroke="#5B6FA8" stroke-width="1.5"/>
    <text x="575" y="167" font-family="Barlow, sans-serif" font-size="13" font-weight="700" fill="#1C1E35">A</text>
    <!-- U -->
    <line x1="610" y1="120" x2="610" y2="145" stroke="#5B6FA8" stroke-width="2"/>
    <circle cx="610" cy="152" r="10" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1.5"/>
    <text x="605" y="157" font-family="Barlow, sans-serif" font-size="13" font-weight="700" fill="#8BA0D6">U</text>
    <!-- A → I (edit site, highlighted) -->
    <line x1="640" y1="130" x2="640" y2="155" stroke="#E6B800" stroke-width="2.5"/>
    <circle cx="640" cy="162" r="13" fill="#E6B800" stroke="#B8860B" stroke-width="2"/>
    <text x="633" y="167" font-family="Barlow, sans-serif" font-size="13" font-weight="900" fill="#1C1E35">I</text>
    <!-- edit arrow above -->
    <path d="M 628 148 Q 620 135 628 125" fill="none" stroke="#CA1E08" stroke-width="2" stroke-linecap="round"/>
    <polygon points="624,127 632,127 628,118" fill="#CA1E08"/>
    <!-- G -->
    <line x1="670" y1="120" x2="670" y2="145" stroke="#5B6FA8" stroke-width="2"/>
    <circle cx="670" cy="152" r="10" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1.5"/>
    <text x="664" y="157" font-family="Barlow, sans-serif" font-size="13" font-weight="700" fill="#8BA0D6">G</text>
    <!-- C -->
    <line x1="700" y1="130" x2="700" y2="155" stroke="#5B6FA8" stroke-width="2"/>
    <circle cx="700" cy="162" r="10" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1.5"/>
    <text x="694" y="167" font-family="Barlow, sans-serif" font-size="13" font-weight="700" fill="#8BA0D6">C</text>
    <!-- ADAR enzyme blob -->
    <ellipse cx="640" cy="80" rx="45" ry="28" fill="#Slate" fill="#3D3D52" stroke="#5B6FA8" stroke-width="2"/>
    <ellipse cx="640" cy="80" rx="35" ry="18" fill="#2D3E6B" opacity="0.7"/>
    <text x="618" y="86" font-family="Barlow, sans-serif" font-size="13" font-weight="700" fill="#8BA0D6">ADAR</text>
    <!-- ADAR binding arm -->
    <path d="M 640 108 L 640 148" stroke="#E6B800" stroke-width="2" stroke-dasharray="4 3"/>
  </g>

  <!-- label: edit count label -->
  <g id="label" data-label="RNA edit count in cold adaptation">
    <text x="58" y="80" font-family="Barlow, sans-serif" font-size="24" font-weight="900"
          fill="#FBFFF6">13,000+ RNA edits</text>
  </g>

  <!-- overlay: temperature scale indicator -->
  <g id="overlay" data-label="temperature indicator showing cold adaptation context">
    <!-- temperature label -->
    <text x="60" y="485" font-family="Barlow, sans-serif" font-size="20" font-weight="700"
          fill="#8BA0D6">13°C</text>
    <!-- thermometer line -->
    <line x1="105" y1="460" x2="105" y2="500" stroke="#8BA0D6" stroke-width="2"/>
    <!-- bulb -->
    <circle cx="105" cy="503" r="5" fill="#8BA0D6"/>
    <!-- mercury fill cold -->
    <rect x="102" y="476" width="6" height="24" rx="3" fill="#8BA0D6" opacity="0.7"/>
  </g>
</svg>
