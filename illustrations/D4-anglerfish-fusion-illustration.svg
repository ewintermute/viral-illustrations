<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="lure-bioluminescence" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8BA0D6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1C1E35" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: deep ocean void, pitch black and cold -->
  <g id="bg" data-label="Deep ocean void — pitch black, cold, no landmarks, just infinite dark water">
    <rect width="800" height="600" fill="#0D0D16"/>
    <!-- Very faint particle scatter for deep ocean feel -->
    <circle cx="120" cy="80" r="1" fill="#2D3E6B" opacity="0.4"/>
    <circle cx="240" cy="150" r="1.5" fill="#2D3E6B" opacity="0.35"/>
    <circle cx="560" cy="60" r="1" fill="#2D3E6B" opacity="0.3"/>
    <circle cx="710" cy="200" r="1.5" fill="#2D3E6B" opacity="0.4"/>
    <circle cx="80" cy="380" r="1" fill="#2D3E6B" opacity="0.3"/>
    <circle cx="680" cy="480" r="1.5" fill="#2D3E6B" opacity="0.35"/>
    <circle cx="350" cy="520" r="1" fill="#2D3E6B" opacity="0.25"/>
  </g>

  <!-- Context: lone male anglerfish drifting toward female bioluminescent lure -->
  <g id="context" data-label="Lone male anglerfish — tiny, drifting toward female's lure light from the dark void">
    <!-- Small male drifting (upper left) -->
    <!-- Male body (tiny) -->
    <ellipse cx="130" cy="160" rx="22" ry="14" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1.5"/>
    <!-- Male's large eyes for dark water detection -->
    <ellipse cx="147" cy="155" rx="8" ry="7" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="147" cy="155" r="4" fill="#0D0D16"/>
    <circle cx="145" cy="153" r="1.8" fill="#FBFFF6" opacity="0.85"/>
    <!-- Male fins (small) -->
    <path d="M 115 155 Q 105 148 100 150 Q 104 156 115 160" fill="#5B6FA8" opacity="0.7"/>
    <!-- Male tail -->
    <path d="M 108 160 Q 95 158 88 155 Q 95 162 108 164 Z" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1"/>
    <!-- Chemoreceptor nasal barbels on male -->
    <path d="M 152 160 Q 162 166 168 165" stroke="#8BA0D6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 152 158 Q 164 160 170 158" stroke="#8BA0D6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Dashed path toward female lure -->
    <path d="M 160 162 Q 260 190 340 240" stroke="#8BA0D6" stroke-width="1" stroke-dasharray="5 6" fill="none" opacity="0.4"/>
  </g>

  <!-- Subject: large female anglerfish with bioluminescent lure -->
  <g id="subject" data-label="Large female ceratioid anglerfish — main body with illicium and bioluminescent esca lure, characteristic deep-sea anglerfish form">
    <!-- Bioluminescent lure glow -->
    <circle cx="420" cy="120" r="55" fill="url(#lure-bioluminescence)"/>
    <!-- Illicium (lure stalk) -->
    <path d="M 390 220 Q 395 190 405 160 Q 412 140 420 120" stroke="#5B6FA8" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Esca (lure bulb) -->
    <circle cx="420" cy="120" r="14" fill="#D1DCFF" stroke="#8BA0D6" stroke-width="2"/>
    <circle cx="420" cy="120" r="8" fill="#FBFFF6" opacity="0.9"/>
    <!-- Lure light flickers -->
    <circle cx="414" cy="114" r="3" fill="#FBFFF6" opacity="0.7"/>
    <circle cx="426" cy="127" r="2.5" fill="#FBFFF6" opacity="0.6"/>

    <!-- Female body (large, round) -->
    <path d="M 400 360 C 300 340 250 300 255 255 C 260 210 300 190 360 195 C 395 198 430 205 460 215 C 510 230 545 265 540 310 C 535 355 490 385 440 390 Z" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2.5"/>
    <!-- Body texture (bumpy skin) -->
    <circle cx="320" cy="270" r="5" fill="#1C1E35" opacity="0.5"/>
    <circle cx="350" cy="295" r="4" fill="#1C1E35" opacity="0.45"/>
    <circle cx="380" cy="270" r="5" fill="#1C1E35" opacity="0.5"/>
    <circle cx="410" cy="285" r="4" fill="#1C1E35" opacity="0.45"/>
    <circle cx="440" cy="265" r="5" fill="#1C1E35" opacity="0.5"/>
    <circle cx="480" cy="290" r="4" fill="#1C1E35" opacity="0.45"/>
    <circle cx="310" cy="300" r="4" fill="#1C1E35" opacity="0.4"/>
    <circle cx="460" cy="320" r="4" fill="#1C1E35" opacity="0.4"/>
    <!-- Female eye — standard construction -->
    <ellipse cx="340" cy="240" rx="16" ry="13" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="340" cy="240" r="8" fill="#0D0D16"/>
    <circle cx="335" cy="235" r="3.5" fill="#FBFFF6" opacity="0.85"/>
    <!-- Teeth / jaw -->
    <path d="M 260 270 Q 258 285 263 300" stroke="#5B6FA8" stroke-width="2" fill="none"/>
    <!-- Teeth spikes -->
    <path d="M 265 272 L 258 280" stroke="#FBFFF6" stroke-width="1.5" opacity="0.6"/>
    <path d="M 268 278 L 260 286" stroke="#FBFFF6" stroke-width="1.5" opacity="0.6"/>
    <path d="M 269 285 L 261 293" stroke="#FBFFF6" stroke-width="1.5" opacity="0.6"/>
    <!-- Pectoral fin -->
    <path d="M 500 310 Q 530 295 555 285 Q 545 305 530 320 Q 516 330 503 325 Z" fill="#5B6FA8" opacity="0.7"/>
    <!-- Tail fin -->
    <path d="M 385 385 Q 365 405 345 415 Q 360 392 365 378 Z" fill="#5B6FA8" opacity="0.7"/>
    <path d="M 375 390 Q 355 415 340 430 Q 352 408 360 393 Z" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1"/>
  </g>

  <!-- Detail: male biting female; enzyme dissolution and circulatory systems merging -->
  <g id="detail-bite-fusion" data-label="Male anglerfish biting into female's side; enzyme dissolution shown at bite site with blending colors; circulatory systems beginning to merge">
    <!-- Fused male #1 (partially regressed — still has some form) -->
    <ellipse cx="480" cy="330" rx="20" ry="11" fill="#5B6FA8" stroke="#8BA0D6" stroke-width="1.5"/>
    <!-- Bite point / fusion site -->
    <ellipse cx="461" cy="330" rx="8" ry="6" fill="#CA1E08" opacity="0.7"/>
    <!-- Enzyme dissolution glow at fusion site -->
    <circle cx="461" cy="330" r="14" fill="#E85542" opacity="0.15"/>
    <!-- Merged circulation (connecting vessels) -->
    <path d="M 469 328 Q 465 320 462 315 Q 460 308 462 302" stroke="#8BA0D6" stroke-width="2" fill="none" stroke-dasharray="3 2" opacity="0.7"/>
    <path d="M 469 332 Q 465 340 462 345 Q 460 352 462 358" stroke="#8BA0D6" stroke-width="2" fill="none" stroke-dasharray="3 2" opacity="0.7"/>
  </g>

  <!-- Detail: male body regressing — eyes fading, fins shrinking, testes remaining -->
  <g id="detail-male-regression" data-label="Male body regression stages: eyes fading to nothing, fins atrophying, digestive system dissolving, only testes remaining">
    <!-- Fully fused/regressed male #2 (just a bump) -->
    <ellipse cx="510" cy="280" rx="14" ry="8" fill="#1C1E35" stroke="#5B6FA8" stroke-width="1"/>
    <!-- Vestigial eye (faded, barely visible) -->
    <ellipse cx="520" cy="276" rx="4" ry="3" fill="#2D3E6B" stroke="#3D3D52" stroke-width="1" opacity="0.5"/>
    <!-- Testes indicator (small but distinct) -->
    <circle cx="508" cy="280" r="4" fill="#E6B800" opacity="0.85"/>
    <circle cx="515" cy="282" r="3.5" fill="#E6B800" opacity="0.8"/>

    <!-- Fully regressed male #3 (almost invisible bump) -->
    <ellipse cx="420" cy="355" rx="12" ry="7" fill="#1C1E35" stroke="#3D3D52" stroke-width="1" opacity="0.7"/>
    <circle cx="416" cy="355" r="3.5" fill="#E6B800" opacity="0.8"/>
    <circle cx="423" cy="357" r="3" fill="#E6B800" opacity="0.75"/>
  </g>

  <!-- Detail: female carrying 8 fused males — labeled silhouettes along her body -->
  <g id="detail-eight-fused-males" data-label="Female carrying 8 fused males — small labeled silhouettes attached at various points along her body">
    <!-- Males 4-8 as small blobs at various positions on female body -->
    <ellipse cx="340" cy="325" rx="10" ry="6" fill="#5B6FA8" stroke="#8BA0D6" stroke-width="1" opacity="0.8"/>
    <circle cx="336" cy="325" r="2.5" fill="#E6B800" opacity="0.75"/>
    <ellipse cx="375" cy="370" rx="10" ry="6" fill="#5B6FA8" stroke="#8BA0D6" stroke-width="1" opacity="0.75"/>
    <circle cx="371" cy="370" r="2.5" fill="#E6B800" opacity="0.7"/>
    <ellipse cx="440" cy="380" rx="9" ry="5" fill="#5B6FA8" stroke="#8BA0D6" stroke-width="1" opacity="0.7"/>
    <circle cx="436" cy="380" r="2.5" fill="#E6B800" opacity="0.65"/>
    <ellipse cx="490" cy="355" rx="9" ry="5" fill="#5B6FA8" stroke="#8BA0D6" stroke-width="1" opacity="0.7"/>
    <circle cx="486" cy="355" r="2.5" fill="#E6B800" opacity="0.65"/>
    <ellipse cx="305" cy="290" rx="9" ry="5" fill="#5B6FA8" stroke="#8BA0D6" stroke-width="1" opacity="0.65"/>
    <circle cx="301" cy="290" r="2.5" fill="#E6B800" opacity="0.6"/>
  </g>

  <!-- Detail: immune system gene deletion diagram -->
  <g id="detail-immune-gene-deletion" data-label="Immune system gene deletion diagram: MHC II, antibody, killer T cell genes crossed out; innate immunity remaining intact">
    <!-- Diagram box (lower right) -->
    <rect x="590" y="390" width="190" height="185" rx="6" fill="#0D0D16" stroke="#5B6FA8" stroke-width="1.5"/>
    <!-- Gene rows (crossed out) -->
    <text x="610" y="418" font-family="Barlow, sans-serif" font-size="14" fill="#CA1E08" font-weight="600">MHC class II</text>
    <line x1="608" y1="412" x2="778" y2="412" stroke="#CA1E08" stroke-width="2" opacity="0.8"/>
    <text x="610" y="448" font-family="Barlow, sans-serif" font-size="14" fill="#CA1E08" font-weight="600">Antibodies</text>
    <line x1="608" y1="442" x2="778" y2="442" stroke="#CA1E08" stroke-width="2" opacity="0.8"/>
    <text x="610" y="478" font-family="Barlow, sans-serif" font-size="14" fill="#CA1E08" font-weight="600">T-cell genes</text>
    <line x1="608" y1="472" x2="778" y2="472" stroke="#CA1E08" stroke-width="2" opacity="0.8"/>
    <!-- Innate immunity intact -->
    <text x="610" y="510" font-family="Barlow, sans-serif" font-size="14" fill="#2FBF39" font-weight="600">Innate immunity</text>
    <text x="610" y="530" font-family="Barlow, sans-serif" font-size="14" fill="#2FBF39" font-weight="600">✓ intact</text>
    <!-- Box title -->
    <text x="685" y="402" font-family="Barlow, sans-serif" font-size="12" fill="#8BA0D6" text-anchor="middle" opacity="0.8">gene deletions</text>
  </g>

  <!-- Label: species note -->
  <g id="label" data-label="Ceratioidei label in italic Barlow">
    <text x="30" y="540" font-family="Barlow, sans-serif" font-size="20" font-style="italic" fill="#8BA0D6" font-weight="500">Ceratioidei</text>
  </g>

  <!-- Overlay: male count label, depth indicator -->
  <g id="overlay" data-label="8 fused males count label; connection arrows from immune diagram to female body">
    <!-- 8 males label -->
    <text x="310" y="418" font-family="Barlow, sans-serif" font-size="18" fill="#FBFFF6" font-weight="700">× 8</text>
    <!-- Connection from immune diagram to female -->
    <path d="M 590 450 Q 560 400 520 370" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="6 4" fill="none" opacity="0.5"/>
    <!-- Depth indicator -->
    <text x="30" y="50" font-family="Barlow, sans-serif" font-size="18" fill="#5B6FA8" font-weight="500">deep sea</text>
    <path d="M 30" y1="58" x2="120" y2="58" stroke="#5B6FA8" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
