<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">

  <!-- bg: clinical white on dark diagnostic -->
  <g id="bg" data-label="dark clinical background with gut anatomy suggestion">
    <rect x="0" y="0" width="800" height="600" fill="#1C1E35"/>
  </g>

  <!-- context: large intestine silhouette as environment -->
  <g id="context" data-label="cross-section of colon wall as environmental context">
    <!-- colon lumen outline -->
    <path d="M 80 80 Q 60 200 70 320 Q 80 440 110 520 Q 150 570 200 575 Q 600 575 650 565 Q 700 550 720 510 Q 740 440 730 320 Q 725 200 740 80 Z"
          fill="#1A5C1E" stroke="#248A28" stroke-width="2.5" opacity="0.25"/>
    <!-- mucosa lining texture -->
    <path d="M 120 100 Q 115 220 120 340 Q 125 460 150 540" fill="none" stroke="#248A28" stroke-width="1.5" opacity="0.3"/>
    <path d="M 680 100 Q 685 220 680 340 Q 675 460 650 540" fill="none" stroke="#248A28" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- subject: healthy microbial community — diverse bacteria shapes -->
  <g id="subject" data-label="healthy diverse donor microbiome community filling the gut lumen">
    <!-- Rod bacteria (bacilli) -->
    <rect x="200" y="200" width="28" height="12" rx="6" fill="#2FBF39" stroke="#1A5C1E" stroke-width="1.5" transform="rotate(-15,214,206)"/>
    <rect x="300" y="180" width="28" height="12" rx="6" fill="#6FD877" stroke="#248A28" stroke-width="1.5" transform="rotate(20,314,186)"/>
    <rect x="460" y="210" width="28" height="12" rx="6" fill="#2FBF39" stroke="#1A5C1E" stroke-width="1.5" transform="rotate(-10,474,216)"/>
    <rect x="560" y="190" width="28" height="12" rx="6" fill="#6FD877" stroke="#248A28" stroke-width="1.5" transform="rotate(30,574,196)"/>
    <rect x="240" y="280" width="28" height="12" rx="6" fill="#2FBF39" stroke="#1A5C1E" stroke-width="1.5" transform="rotate(5,254,286)"/>
    <rect x="490" y="310" width="28" height="12" rx="6" fill="#6FD877" stroke="#248A28" stroke-width="1.5" transform="rotate(-20,504,316)"/>
    <rect x="350" y="360" width="28" height="12" rx="6" fill="#2FBF39" stroke="#1A5C1E" stroke-width="1.5" transform="rotate(40,364,366)"/>
    <rect x="580" y="290" width="28" height="12" rx="6" fill="#6FD877" stroke="#248A28" stroke-width="1.5" transform="rotate(-5,594,296)"/>
    <rect x="160" y="350" width="28" height="12" rx="6" fill="#2FBF39" stroke="#1A5C1E" stroke-width="1.5" transform="rotate(15,174,356)"/>
    <rect x="430" y="390" width="28" height="12" rx="6" fill="#6FD877" stroke="#248A28" stroke-width="1.5" transform="rotate(-25,444,396)"/>
    <!-- Spiral bacteria (spirochaetes/helicobacters) -->
    <path d="M 380 240 Q 392 232 404 240 Q 416 248 428 240" fill="none" stroke="#5B6FA8" stroke-width="3" stroke-linecap="round"/>
    <path d="M 280 320 Q 292 312 304 320 Q 316 328 328 320" fill="none" stroke="#8BA0D6" stroke-width="3" stroke-linecap="round"/>
    <path d="M 510 260 Q 522 252 534 260 Q 546 268 558 260" fill="none" stroke="#5B6FA8" stroke-width="3" stroke-linecap="round"/>
    <path d="M 330 420 Q 342 412 354 420 Q 366 428 378 420" fill="none" stroke="#8BA0D6" stroke-width="3" stroke-linecap="round"/>
    <!-- Coccus (round bacteria) -->
    <circle cx="260" cy="240" r="8" fill="#E6B800" stroke="#B8860B" stroke-width="1.5"/>
    <circle cx="540" cy="230" r="8" fill="#E6B800" stroke="#B8860B" stroke-width="1.5"/>
    <circle cx="310" cy="370" r="8" fill="#E6B800" stroke="#B8860B" stroke-width="1.5"/>
    <circle cx="610" cy="350" r="8" fill="#E6B800" stroke="#B8860B" stroke-width="1.5"/>
    <circle cx="450" cy="170" r="8" fill="#E6B800" stroke="#B8860B" stroke-width="1.5"/>
    <!-- Diplococcus pairs -->
    <circle cx="195" cy="290" r="7" fill="#8BA0D6" stroke="#5B6FA8" stroke-width="1.5"/>
    <circle cx="210" cy="290" r="7" fill="#8BA0D6" stroke="#5B6FA8" stroke-width="1.5"/>
    <circle cx="615" cy="440" r="7" fill="#8BA0D6" stroke="#5B6FA8" stroke-width="1.5"/>
    <circle cx="630" cy="440" r="7" fill="#8BA0D6" stroke="#5B6FA8" stroke-width="1.5"/>
  </g>

  <!-- detail-cdiff: C. diff pathogen highlighted and suppressed -->
  <g id="detail-cdiff" data-label="C. difficile pathogen cells being outcompeted and fading">
    <!-- C. diff rods - distinctive drum-stick shape (sporulated) -->
    <rect x="148" y="420" width="34" height="14" rx="7" fill="#CA1E08" stroke="#8B1506" stroke-width="2" opacity="0.5"/>
    <!-- spore swelling at end -->
    <circle cx="182" cy="427" r="9" fill="#CA1E08" stroke="#8B1506" stroke-width="1.5" opacity="0.5"/>
    <rect x="610" y="480" width="34" height="14" rx="7" fill="#CA1E08" stroke="#8B1506" stroke-width="2" opacity="0.4"/>
    <circle cx="644" cy="487" r="9" fill="#CA1E08" stroke="#8B1506" stroke-width="1.5" opacity="0.4"/>
    <!-- suppression X marks -->
    <line x1="148" y1="420" x2="196" y2="445" stroke="#CA1E08" stroke-width="2" opacity="0.5"/>
    <line x1="196" y1="420" x2="148" y2="445" stroke="#CA1E08" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- detail-capsule: oral capsule FMT delivery -->
  <g id="detail-capsule" data-label="oral capsule FMT product (Vowst) delivery vessel">
    <!-- capsule body -->
    <rect x="630" y="100" width="112" height="45" rx="22" fill="#E85542" stroke="#CA1E08" stroke-width="2"/>
    <!-- capsule separation line -->
    <line x1="686" y1="100" x2="686" y2="145" stroke="#CA1E08" stroke-width="2"/>
    <!-- capsule left half lighter -->
    <rect x="630" y="100" width="56" height="45" rx="22" fill="#Salmon" fill-opacity="0"/>
    <!-- bacteria symbol inside capsule -->
    <circle cx="660" cy="122" r="5" fill="#6FD877" opacity="0.7"/>
    <circle cx="672" cy="118" r="5" fill="#6FD877" opacity="0.7"/>
    <circle cx="660" cy="132" r="5" fill="#2FBF39" opacity="0.7"/>
    <!-- connection arrow from capsule into gut -->
    <path d="M 686 145 Q 686 175 600 200" fill="none" stroke="#8BA0D6" stroke-width="2" stroke-dasharray="6 4"/>
    <circle cx="600" cy="200" r="4" fill="#8BA0D6"/>
  </g>

  <!-- label: cure rate -->
  <g id="label" data-label="FMT cure rate stat label">
    <text x="58" y="78" font-family="Barlow, sans-serif" font-size="32" font-weight="900"
          fill="#FBFFF6">80–95% cure</text>
  </g>

  <!-- overlay: before/after divider arrow (no extra text) -->
  <g id="overlay" data-label="annotation showing microbial restoration">
    <!-- curved arrow suggesting community restoration -->
    <path d="M 400 550 Q 400 530 400 510" fill="none" stroke="#8BA0D6" stroke-width="2" stroke-dasharray="5 4"/>
    <!-- arrowhead -->
    <polygon points="394,512 406,512 400,500" fill="#8BA0D6"/>
  </g>
</svg>
