<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">

  <!-- Background: atmospheric dark red-tinged danger aesthetic -->
  <g id="bg" data-label="Dark atmospheric background with slight deep crimson undertone — danger biology aesthetic">
    <rect width="800" height="600" fill="#1C1E35"/>
    <rect x="0" y="0" width="800" height="600" fill="#8B1506" opacity="0.08"/>
    <!-- Horizon ground -->
    <rect x="0" y="500" width="800" height="100" fill="#0D0D16" opacity="0.5"/>
    <!-- Subtle atmospheric vignette -->
    <rect x="0" y="0" width="200" height="600" fill="#0D0D16" opacity="0.15"/>
    <rect x="600" y="0" width="200" height="600" fill="#0D0D16" opacity="0.15"/>
  </g>

  <!-- Context: comparative death toll — shark, crocodile, lion with small numbers, then mosquito -->
  <g id="context" data-label="Death toll comparison row at top: shark ~10/yr, crocodile ~hundreds, lion ~200; mosquito 725,000+ dwarfing all">
    <!-- Shark silhouette (small) -->
    <path d="M 50 75 Q 65 60 82 62 Q 90 68 88 75 Q 80 78 72 75 Q 64 72 55 78 Z" fill="#5B6FA8" opacity="0.7"/>
    <path d="M 72 62 L 76 48 L 80 62" fill="#5B6FA8" opacity="0.6"/>
    <text x="68" y="98" font-family="Barlow, sans-serif" font-size="14" fill="#6B6B7C" text-anchor="middle">~10</text>

    <!-- Crocodile silhouette (small) -->
    <path d="M 155 70 Q 175 60 195 68 Q 200 72 198 77 Q 188 78 178 76 Q 168 74 158 80 Z" fill="#248A28" opacity="0.6"/>
    <text x="175" y="98" font-family="Barlow, sans-serif" font-size="14" fill="#6B6B7C" text-anchor="middle">~200</text>

    <!-- Lion silhouette (small) -->
    <circle cx="270" cy="68" r="14" fill="#A0785A" opacity="0.6"/>
    <path d="M 256 65 Q 250 56 248 62 Q 252 70 256 68" fill="#E6B800" opacity="0.5"/>
    <path d="M 262 62 Q 258 52 256 58 Q 258 66 262 65" fill="#E6B800" opacity="0.5"/>
    <text x="268" y="98" font-family="Barlow, sans-serif" font-size="14" fill="#6B6B7C" text-anchor="middle">~200</text>

    <!-- VS separator -->
    <text x="318" y="78" font-family="Barlow, sans-serif" font-size="20" fill="#5B6FA8" font-weight="700">vs.</text>

    <!-- Mosquito icon (large, prominent) -->
    <ellipse cx="390" cy="64" rx="22" ry="10" fill="#CA1E08" opacity="0.9"/>
    <!-- Wings -->
    <path d="M 382 56 Q 368 42 360 46 Q 362 56 375 60" fill="#8BA0D6" opacity="0.6"/>
    <path d="M 398 56 Q 412 42 420 46 Q 418 56 405 60" fill="#8BA0D6" opacity="0.6"/>
    <!-- Proboscis -->
    <path d="M 408 68 Q 422 72 438 78" stroke="#CA1E08" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Legs -->
    <path d="M 376 68 Q 368 76 360 82" stroke="#CA1E08" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 382 70 Q 374 80 368 88" stroke="#CA1E08" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 400 68 Q 408 76 416 82" stroke="#CA1E08" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 394 70 Q 402 80 408 88" stroke="#CA1E08" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="390" y="102" font-family="Barlow, sans-serif" font-size="18" fill="#CA1E08" text-anchor="middle" font-weight="700">725,000+</text>
  </g>

  <!-- Subject: large female Anopheles mosquito — central composition, blood-feeding pose -->
  <g id="subject" data-label="Large female Anopheles mosquito in blood-feeding pose, central focus — distinctive body raised at angle, proboscis inserted">
    <!-- Wings (large, distinctive) -->
    <path d="M 335 250 Q 275 195 235 185 Q 250 210 270 235 Q 295 258 325 265" fill="#8BA0D6" opacity="0.55" stroke="#5B6FA8" stroke-width="1"/>
    <path d="M 345 248 Q 300 190 268 178 Q 278 205 298 228 Q 318 252 338 260" fill="#8BA0D6" opacity="0.45" stroke="#5B6FA8" stroke-width="1"/>
    <path d="M 465 250 Q 525 195 565 185 Q 550 210 530 235 Q 505 258 475 265" fill="#8BA0D6" opacity="0.55" stroke="#5B6FA8" stroke-width="1"/>
    <path d="M 455 248 Q 500 190 532 178 Q 522 205 502 228 Q 482 252 462 260" fill="#8BA0D6" opacity="0.45" stroke="#5B6FA8" stroke-width="1"/>

    <!-- Body (abdomen, raised at angle) -->
    <path d="M 350 380 Q 355 310 370 275 Q 385 248 400 238 Q 415 248 430 275 Q 445 310 450 380 Q 435 395 400 400 Q 365 395 350 380 Z" fill="#2FBF39" stroke="#1A5C1E" stroke-width="2"/>
    <!-- Blood meal visible in abdomen (darker red segment) -->
    <ellipse cx="400" cy="360" rx="38" ry="22" fill="#CA1E08" opacity="0.7"/>
    <!-- Abdomen segments -->
    <path d="M 352 330 Q 400 325 448 330" stroke="#1A5C1E" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 350 355 Q 400 349 450 355" stroke="#1A5C1E" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Thorax -->
    <ellipse cx="400" cy="260" rx="36" ry="30" fill="#1A5C1E" stroke="#2FBF39" stroke-width="2"/>
    <!-- Head -->
    <circle cx="400" cy="228" r="24" fill="#1A5C1E" stroke="#2FBF39" stroke-width="2"/>
    <!-- Compound eye (left) — standard construction -->
    <ellipse cx="382" cy="222" rx="9" ry="8" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="382" cy="222" r="4.5" fill="#0D0D16"/>
    <circle cx="379.5" cy="219.5" r="2" fill="#FBFFF6" opacity="0.85"/>
    <!-- Compound eye (right) -->
    <ellipse cx="418" cy="222" rx="9" ry="8" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="418" cy="222" r="4.5" fill="#0D0D16"/>
    <circle cx="415.5" cy="219.5" r="2" fill="#FBFFF6" opacity="0.85"/>

    <!-- Proboscis (long, thin) inserted downward -->
    <path d="M 400 248 Q 402 290 404 340 Q 406 400 408 450" stroke="#2FBF39" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Blood flowing up proboscis -->
    <path d="M 407 380 Q 406 350 405 320 Q 404 290 403 268" stroke="#CA1E08" stroke-width="1" fill="none" stroke-dasharray="3 2" opacity="0.6"/>

    <!-- Antennae -->
    <path d="M 392 210 Q 375 192 362 180" stroke="#2FBF39" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 408 210 Q 425 192 438 180" stroke="#2FBF39" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Legs (6) -->
    <path d="M 368 275 Q 340 295 310 305" stroke="#1A5C1E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 364 285 Q 330 310 295 325" stroke="#1A5C1E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 360 300 Q 325 330 290 350" stroke="#1A5C1E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 432 275 Q 460 295 490 305" stroke="#1A5C1E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 436 285 Q 470 310 505 325" stroke="#1A5C1E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 440 300 Q 475 330 510 350" stroke="#1A5C1E" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Detail: 50 billion human silhouettes — half population wiped out visualization -->
  <g id="detail-historical-death-toll" data-label="108 billion human silhouettes with half fading to gray representing 50-52 billion historical deaths from mosquito-borne disease">
    <!-- Row of human silhouettes (simplified) — some solid, half faded -->
    <!-- Row 1: solid humans -->
    <rect x="30" y="430" width="8" height="20" rx="3" fill="#FBFFF6" opacity="0.7"/>
    <circle cx="34" cy="426" r="5" fill="#FBFFF6" opacity="0.7"/>
    <rect x="50" y="430" width="8" height="20" rx="3" fill="#FBFFF6" opacity="0.7"/>
    <circle cx="54" cy="426" r="5" fill="#FBFFF6" opacity="0.7"/>
    <rect x="70" y="430" width="8" height="20" rx="3" fill="#FBFFF6" opacity="0.7"/>
    <circle cx="74" cy="426" r="5" fill="#FBFFF6" opacity="0.7"/>
    <rect x="90" y="430" width="8" height="20" rx="3" fill="#FBFFF6" opacity="0.7"/>
    <circle cx="94" cy="426" r="5" fill="#FBFFF6" opacity="0.7"/>
    <rect x="110" y="430" width="8" height="20" rx="3" fill="#FBFFF6" opacity="0.7"/>
    <circle cx="114" cy="426" r="5" fill="#FBFFF6" opacity="0.7"/>
    <!-- Row 1: faded/dead humans (half) -->
    <rect x="130" y="430" width="8" height="20" rx="3" fill="#6B4423" opacity="0.6"/>
    <circle cx="134" cy="426" r="5" fill="#6B4423" opacity="0.6"/>
    <rect x="150" y="430" width="8" height="20" rx="3" fill="#6B4423" opacity="0.6"/>
    <circle cx="154" cy="426" r="5" fill="#6B4423" opacity="0.6"/>
    <rect x="170" y="430" width="8" height="20" rx="3" fill="#6B4423" opacity="0.6"/>
    <circle cx="174" cy="426" r="5" fill="#6B4423" opacity="0.6"/>
    <rect x="190" y="430" width="8" height="20" rx="3" fill="#6B4423" opacity="0.6"/>
    <circle cx="194" cy="426" r="5" fill="#6B4423" opacity="0.6"/>
    <rect x="210" y="430" width="8" height="20" rx="3" fill="#6B4423" opacity="0.6"/>
    <circle cx="214" cy="426" r="5" fill="#6B4423" opacity="0.6"/>
    <!-- More rows... abbreviated with dense dots for the huge number effect -->
    <rect x="230" y="430" width="8" height="20" rx="3" fill="#6B4423" opacity="0.55"/>
    <circle cx="234" cy="426" r="5" fill="#6B4423" opacity="0.55"/>
    <rect x="250" y="430" width="8" height="20" rx="3" fill="#6B4423" opacity="0.5"/>
    <circle cx="254" cy="426" r="5" fill="#6B4423" opacity="0.5"/>
  </g>

  <!-- Detail: historical military context — Cartagena 1741 with 84% mortality graphic -->
  <g id="detail-cartagena-1741" data-label="Cartagena 1741 British fleet approaching; 84% mortality graphic showing soldiers dying to mosquito disease vs enemy">
    <!-- Ship silhouettes -->
    <path d="M 540 490 Q 548 475 556 478 Q 564 475 572 490 Z" fill="#2D3E6B" opacity="0.7"/>
    <rect x="542" y="488" width="28" height="6" rx="2" fill="#2D3E6B" opacity="0.7"/>
    <!-- Second ship -->
    <path d="M 580" y1="495" x2="582" y2="480" stroke="#2D3E6B" stroke-width="2" opacity="0.6"/>
    <path d="M 590 495 Q 598 480 606 495 Z" fill="#2D3E6B" opacity="0.65"/>
    <rect x="578" y="493" width="30" height="5" rx="2" fill="#2D3E6B" opacity="0.65"/>
    <!-- 84% mortality bar -->
    <rect x="540" y="440" width="16" height="46" rx="2" fill="#CA1E08" opacity="0.85"/>
    <rect x="560" y="476" width="16" height="10" rx="2" fill="#2FBF39" opacity="0.7"/>
    <text x="590" y="462" font-family="Barlow, sans-serif" font-size="18" fill="#CA1E08" font-weight="700">84%</text>
    <text x="590" y="480" font-family="Barlow, sans-serif" font-size="14" fill="#6B6B7C">Cartagena 1741</text>
  </g>

  <!-- Detail: Italy 1943-44 malaria case count spike -->
  <g id="detail-italy-bioweapon" data-label="Italy 1943-44 Tiber Valley: case count jumping from 1,217 to 54,929 after Nazi deliberate mosquito release — a biological weapon">
    <!-- Spike chart -->
    <rect x="30" y="480" width="18" height="14" rx="2" fill="#5B6FA8" opacity="0.8"/>
    <rect x="52" y="458" width="18" height="36" rx="2" fill="#CA1E08" opacity="0.9"/>
    <text x="39" y="500" font-family="Barlow, sans-serif" font-size="11" fill="#6B6B7C" text-anchor="middle">1943</text>
    <text x="61" y="500" font-family="Barlow, sans-serif" font-size="11" fill="#CA1E08" text-anchor="middle">1944</text>
    <text x="52" y="456" font-family="Barlow, sans-serif" font-size="12" fill="#CA1E08" text-anchor="middle">×45</text>
  </g>

  <!-- Label: death toll per year -->
  <g id="label" data-label="Annual death toll label: 597,000 in Barlow">
    <text x="550" y="145" font-family="Barlow, sans-serif" font-size="22" fill="#CA1E08" font-weight="700">597,000 / yr</text>
  </g>

  <!-- Overlay: comparison markers and annotations -->
  <g id="overlay" data-label="Species label A. gambiae italic; 2mg weight label; child death rate annotation">
    <!-- Species label -->
    <text x="30" y="168" font-family="Barlow, sans-serif" font-size="20" font-style="italic" fill="#8BA0D6" font-weight="500">Anopheles gambiae</text>
    <!-- Weight annotation -->
    <text x="30" y="195" font-family="Barlow, sans-serif" font-size="18" fill="#6B6B7C" font-weight="400">2 mg</text>
    <!-- Child death rate emphasis -->
    <text x="550" y="170" font-family="Barlow, sans-serif" font-size="18" fill="#FBFFF6" font-weight="500">1 child / 90s</text>
    <!-- Guinness badge shape -->
    <polygon points="740,45 752,38 764,45 764,60 752,67 740,60" fill="none" stroke="#E6B800" stroke-width="2" opacity="0.7"/>
    <text x="752" y="55" font-family="Barlow, sans-serif" font-size="10" fill="#E6B800" text-anchor="middle" font-weight="700">#1</text>
  </g>
</svg>
