<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="blood-pool-glow" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#8BA0D6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1C1E35" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: dark ocean shelf scene -->
  <g id="bg" data-label="Dark ocean shelf environment, navy and midnight tones, horizon line">
    <rect width="800" height="600" fill="#1C1E35"/>
    <!-- Water gradient area -->
    <rect x="0" y="0" width="800" height="380" fill="#2D3E6B" opacity="0.6"/>
    <!-- Sandy ocean floor -->
    <rect x="0" y="380" width="800" height="220" fill="#6B4423" opacity="0.5"/>
    <rect x="0" y="400" width="800" height="200" fill="#0D0D16" opacity="0.3"/>
    <!-- Horizon line -->
    <line x1="0" y1="380" x2="800" y2="380" stroke="#5B6FA8" stroke-width="1.5" opacity="0.4"/>
    <!-- Subtle water caustics -->
    <ellipse cx="150" cy="120" rx="60" ry="15" fill="#5B6FA8" opacity="0.07"/>
    <ellipse cx="550" cy="80" rx="75" ry="18" fill="#5B6FA8" opacity="0.06"/>
    <ellipse cx="700" cy="200" rx="50" ry="12" fill="#5B6FA8" opacity="0.05"/>
  </g>

  <!-- Context: sandy bottom texture and beach/ocean edge -->
  <g id="context" data-label="Sandy ocean floor texture and distant shore line with subtle pharmaceutical vial silhouettes">
    <!-- Sandy texture dots -->
    <circle cx="120" cy="420" r="2" fill="#D4A574" opacity="0.3"/>
    <circle cx="200" cy="440" r="2.5" fill="#D4A574" opacity="0.25"/>
    <circle cx="320" cy="430" r="2" fill="#D4A574" opacity="0.3"/>
    <circle cx="450" cy="450" r="2" fill="#D4A574" opacity="0.25"/>
    <circle cx="580" cy="435" r="2.5" fill="#D4A574" opacity="0.2"/>
    <circle cx="680" cy="445" r="2" fill="#D4A574" opacity="0.3"/>
    <!-- Distant IV vial silhouettes (top of scene — visual callback) -->
    <rect x="40" y="30" width="14" height="32" rx="3" fill="#2D3E6B" opacity="0.5"/>
    <rect x="60" y="26" width="14" height="36" rx="3" fill="#2D3E6B" opacity="0.5"/>
    <rect x="80" y="28" width="14" height="34" rx="3" fill="#2D3E6B" opacity="0.45"/>
    <line x1="47" y1="22" x2="47" y2="30" stroke="#2D3E6B" stroke-width="2" opacity="0.5"/>
    <line x1="67" y1="18" x2="67" y2="26" stroke="#2D3E6B" stroke-width="2" opacity="0.5"/>
    <line x1="87" y1="20" x2="87" y2="28" stroke="#2D3E6B" stroke-width="2" opacity="0.45"/>
  </g>

  <!-- Subject: horseshoe crab viewed from above, carapace detail -->
  <g id="subject" data-label="Horseshoe crab Limulus polyphemus viewed from above, carapace with telson tail visible">
    <!-- Telson (spiked tail) -->
    <path d="M 400 510 L 400 570 L 398 575 L 402 575 L 400 570" stroke="#A0785A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 400 510 Q 401 540 400 570" stroke="#6B4423" stroke-width="2.5" fill="none"/>

    <!-- Main carapace (prosoma) — horseshoe shape -->
    <path d="M 400 210 C 320 210 250 240 230 290 C 210 340 220 390 260 420 C 300 450 350 460 400 460 C 450 460 500 450 540 420 C 580 390 590 340 570 290 C 550 240 480 210 400 210 Z" fill="#A0785A" stroke="#6B4423" stroke-width="2.5"/>
    <!-- Carapace ridge lines -->
    <path d="M 400 215 Q 400 300 400 455" stroke="#6B4423" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 320 230 Q 310 310 320 420" stroke="#6B4423" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M 480 230 Q 490 310 480 420" stroke="#6B4423" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- Opisthosomal plates -->
    <path d="M 270 390 Q 340 410 400 412 Q 460 410 530 390" stroke="#6B4423" stroke-width="1.5" fill="none" opacity="0.7"/>

    <!-- Compound eye (left) — standard construction -->
    <ellipse cx="330" cy="255" rx="10" ry="8" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="330" cy="255" r="4.5" fill="#0D0D16"/>
    <circle cx="327" cy="252" r="2" fill="#FBFFF6" opacity="0.85"/>
    <!-- Compound eye (right) -->
    <ellipse cx="470" cy="255" rx="10" ry="8" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="470" cy="255" r="4.5" fill="#0D0D16"/>
    <circle cx="467" cy="252" r="2" fill="#FBFFF6" opacity="0.85"/>
    <!-- Median eye -->
    <ellipse cx="400" cy="235" rx="6" ry="4.5" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="400" cy="235" r="2.5" fill="#0D0D16"/>
    <circle cx="398.5" cy="233.5" r="1.2" fill="#FBFFF6" opacity="0.85"/>
  </g>

  <!-- Detail: blue blood pooling from gill/sampling cut -->
  <g id="detail-blood" data-label="Blue hemocyanin blood pooling from bleeding extraction point on crab carapace">
    <!-- Blood pool glow -->
    <ellipse cx="400" cy="470" rx="80" ry="25" fill="url(#blood-pool-glow)"/>
    <!-- Blood flow path from crab edge -->
    <path d="M 360 455 Q 355 462 350 470 Q 345 478 360 480 Q 380 482 400 480 Q 430 482 445 475 Q 455 468 440 460" fill="#8BA0D6" opacity="0.7"/>
    <!-- Blood extraction point -->
    <circle cx="385" cy="450" r="6" fill="#8BA0D6" opacity="0.8"/>
    <circle cx="385" cy="450" r="3" fill="#D1DCFF"/>
    <!-- Drips -->
    <circle cx="370" cy="465" r="3.5" fill="#8BA0D6" opacity="0.6"/>
    <circle cx="395" cy="472" r="4" fill="#8BA0D6" opacity="0.65"/>
    <circle cx="418" cy="467" r="3" fill="#8BA0D6" opacity="0.55"/>
  </g>

  <!-- Detail: amebocyte cell enlarged inset showing clotting reaction -->
  <g id="detail-cell" data-label="Amebocyte cell inset in upper right showing endotoxin-triggered clotting reaction with granules releasing">
    <!-- Inset border box -->
    <rect x="560" y="40" width="200" height="160" rx="6" fill="#0D0D16" stroke="#5B6FA8" stroke-width="1.5"/>
    <!-- Cell body -->
    <ellipse cx="640" cy="110" rx="48" ry="40" fill="#2D3E6B" stroke="#8BA0D6" stroke-width="1.5"/>
    <!-- Cell membrane detail -->
    <ellipse cx="640" cy="110" rx="48" ry="40" fill="none" stroke="#5B6FA8" stroke-width="0.5" opacity="0.5"/>
    <!-- Nucleus -->
    <ellipse cx="630" cy="108" rx="16" ry="14" fill="#1A5C1E" stroke="#6FD877" stroke-width="1"/>
    <!-- Clotting granules (pre-release) -->
    <circle cx="660" cy="100" r="5" fill="#E6B800" opacity="0.85"/>
    <circle cx="652" cy="118" r="4.5" fill="#E6B800" opacity="0.8"/>
    <circle cx="668" cy="114" r="4" fill="#E6B800" opacity="0.75"/>
    <!-- Clotting reaction — granules bursting -->
    <path d="M 680 108 Q 692 104 700 98" stroke="#CA1E08" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 682 114 Q 694 112 703 110" stroke="#CA1E08" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 678 120 Q 690 120 700 122" stroke="#CA1E08" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Endotoxin particle -->
    <polygon points="700,90 706,100 718,100 708,108 712,120 700,113 688,120 692,108 682,100 694,100" fill="#CA1E08" opacity="0.7" transform="scale(0.6) translate(470,60)"/>
  </g>

  <!-- Label: price per gallon -->
  <g id="label" data-label="Price label: $60,000 / gallon in Barlow Bold">
    <text x="40" y="530" font-family="Barlow, sans-serif" font-size="22" fill="#FBFFF6" font-weight="700">$60,000 / gallon</text>
  </g>

  <!-- Overlay: inset border connection line from crab to cell detail, mortality hint -->
  <g id="overlay" data-label="Connection line from crab blood to cell inset box; crab returned to ocean with mortality implied (one crab darker/still)">
    <!-- Connection line: blood pool to inset -->
    <path d="M 450 455 Q 510 350 560 200" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="6 4" fill="none" opacity="0.6"/>
    <circle cx="450" cy="455" r="3" fill="#8BA0D6" opacity="0.6"/>
    <circle cx="560" cy="200" r="3" fill="#8BA0D6" opacity="0.6"/>
    <!-- Mortality hint: still crab silhouette on left -->
    <ellipse cx="130" cy="490" rx="40" ry="18" fill="#1C1E35" stroke="#3D3D52" stroke-width="1.5" opacity="0.6"/>
    <path d="M 130 500 L 130 530" stroke="#3D3D52" stroke-width="2" opacity="0.5"/>
  </g>
</svg>
