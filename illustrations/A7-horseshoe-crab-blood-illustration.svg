<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- bioluminescent blue blood glow -->
    <radialGradient id="blood-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8BA0D6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8BA0D6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- bg: dark ocean shelf environment -->
  <g id="bg" data-label="dark ocean floor background">
    <rect x="0" y="0" width="800" height="600" fill="#1C1E35"/>
    <!-- ocean floor -->
    <rect x="0" y="430" width="800" height="170" fill="#2D3E6B"/>
    <!-- sandy texture bands -->
    <path d="M 0 440 Q 200 435 400 442 Q 600 449 800 440" fill="none" stroke="#3D3E5B" stroke-width="2" opacity="0.4"/>
    <path d="M 0 460 Q 250 456 500 463 Q 650 467 800 458" fill="none" stroke="#3D3E5B" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- context: sandy bottom texture and horizon -->
  <g id="context" data-label="sandy ocean shelf bottom with subtle sediment">
    <!-- sand ripples -->
    <ellipse cx="150" cy="470" rx="60" ry="8" fill="none" stroke="#5B6FA8" stroke-width="1" opacity="0.3"/>
    <ellipse cx="600" cy="475" rx="50" ry="6" fill="none" stroke="#5B6FA8" stroke-width="1" opacity="0.25"/>
    <ellipse cx="700" cy="460" rx="40" ry="5" fill="none" stroke="#5B6FA8" stroke-width="1" opacity="0.2"/>
    <!-- some shell/debris on floor -->
    <ellipse cx="120" cy="455" rx="8" ry="4" fill="#3D3E5B"/>
    <ellipse cx="680" cy="452" rx="10" ry="5" fill="#3D3E5B"/>
  </g>

  <!-- subject: horseshoe crab viewed from above, carapace -->
  <g id="subject" data-label="Limulus polyphemus horseshoe crab from above, carapace and tail">
    <!-- prosoma (front dome / horseshoe shield) -->
    <path d="M 280 200 Q 220 195 190 240 Q 170 280 175 330 Q 180 370 220 390 Q 260 405 320 408 Q 360 412 400 410 Q 450 412 490 408 Q 535 403 565 385 Q 600 362 600 325 Q 605 280 590 240 Q 568 195 510 196 Q 450 192 400 188 Q 340 186 280 200 Z"
          fill="#A0785A" stroke="#6B4423" stroke-width="3" stroke-linejoin="round"/>
    <!-- carapace ridge lines -->
    <path d="M 300 210 Q 310 280 315 380" fill="none" stroke="#6B4423" stroke-width="1.5" opacity="0.6"/>
    <path d="M 500 210 Q 490 280 485 380" fill="none" stroke="#6B4423" stroke-width="1.5" opacity="0.6"/>
    <!-- median ridge -->
    <path d="M 400 188 Q 400 300 400 410" fill="none" stroke="#6B4423" stroke-width="2" opacity="0.5"/>
    <!-- lateral spines on prosoma -->
    <path d="M 190 280 L 158 265" stroke="#6B4423" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 192 315 L 155 310" stroke="#6B4423" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 605 280 L 640 265" stroke="#6B4423" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 603 315 L 642 310" stroke="#6B4423" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- compound eyes (simple bumps on prosoma) -->
    <ellipse cx="295" cy="225" rx="12" ry="8" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="295" cy="225" r="5" fill="#0D0D16"/>
    <circle cx="292" cy="222" r="2" fill="#FBFFF6" opacity="0.85"/>
    <ellipse cx="505" cy="225" rx="12" ry="8" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="505" cy="225" r="5" fill="#0D0D16"/>
    <circle cx="502" cy="222" r="2" fill="#FBFFF6" opacity="0.85"/>
    <!-- opisthosoma (abdomen / second plate) -->
    <path d="M 250 395 Q 230 410 235 440 Q 245 460 290 470 Q 345 478 400 478 Q 455 478 510 470 Q 555 460 565 440 Q 572 412 550 395 Z"
          fill="#8B6040" stroke="#6B4423" stroke-width="2.5"/>
    <!-- opisthosoma spines -->
    <path d="M 255 415 L 225 405" stroke="#6B4423" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 248 440 L 215 438" stroke="#6B4423" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 548 415 L 578 405" stroke="#6B4423" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 552 440 L 585 438" stroke="#6B4423" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- telson (tail spike) -->
    <path d="M 400 477 Q 400 510 400 560" stroke="#6B4423" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- legs (book gills) simplified -->
    <g stroke="#6B4423" stroke-width="2" fill="none" opacity="0.7">
      <path d="M 240 300 L 200 310 L 175 330"/>
      <path d="M 242 330 L 196 345 L 168 360"/>
      <path d="M 252 355 L 208 372 L 182 390"/>
      <path d="M 560 300 L 600 310 L 625 330"/>
      <path d="M 558 330 L 604 345 L 632 360"/>
      <path d="M 548 355 L 592 372 L 618 390"/>
    </g>
  </g>

  <!-- detail-blood: blue hemocyanin blood pooling from sampling site -->
  <g id="detail-blood" data-label="blue hemocyanin blood pooling from cardiac puncture sampling site">
    <!-- glow halo -->
    <ellipse cx="400" cy="310" rx="90" ry="60" fill="url(#blood-glow)"/>
    <!-- blood pool surface -->
    <path d="M 340 300 Q 360 280 400 278 Q 440 280 455 300 Q 465 320 460 340 Q 452 358 400 362 Q 348 358 340 340 Q 335 322 340 300 Z"
          fill="#5B6FA8" opacity="0.75"/>
    <!-- blood highlights -->
    <path d="M 365 298 Q 400 292 430 300" fill="none" stroke="#8BA0D6" stroke-width="2" opacity="0.6"/>
    <!-- sampling puncture point -->
    <circle cx="400" cy="305" r="5" fill="#CA1E08"/>
    <!-- blood drips flowing out -->
    <path d="M 395 305 Q 388 320 382 340 Q 376 360 378 380" fill="none" stroke="#5B6FA8" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <path d="M 405 305 Q 413 322 415 342 Q 418 362 414 382" fill="none" stroke="#8BA0D6" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <!-- blood drip drops -->
    <ellipse cx="380" cy="386" rx="5" ry="7" fill="#5B6FA8" opacity="0.7"/>
    <ellipse cx="413" cy="390" rx="4" ry="6" fill="#8BA0D6" opacity="0.65"/>
  </g>

  <!-- label: price per gallon -->
  <g id="label" data-label="cost label for processed LAL reagent">
    <text x="58" y="105" font-family="Barlow, sans-serif" font-size="32" font-weight="900"
          fill="#FBFFF6">$60,000 / gal</text>
  </g>

  <!-- overlay: small amebocyte inset box -->
  <g id="overlay" data-label="amebocyte cell inset detail with connection line">
    <!-- inset border -->
    <rect x="580" y="60" width="185" height="130" rx="4" fill="#1C1E35" stroke="#8BA0D6" stroke-width="1.5" stroke-dasharray="6 3"/>
    <!-- amebocyte cell body -->
    <ellipse cx="672" cy="120" rx="38" ry="28" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1.5"/>
    <!-- nucleus -->
    <ellipse cx="668" cy="118" rx="14" ry="10" fill="#5B6FA8" opacity="0.8"/>
    <!-- clotting granules -->
    <circle cx="650" cy="124" r="5" fill="#E6B800" opacity="0.7"/>
    <circle cx="660" cy="132" r="4" fill="#E6B800" opacity="0.6"/>
    <circle cx="685" cy="128" r="4" fill="#E6B800" opacity="0.7"/>
    <circle cx="695" cy="118" r="3" fill="#E6B800" opacity="0.5"/>
    <!-- pseudopods -->
    <path d="M 634 112 Q 620 108 614 100" fill="none" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
    <path d="M 638 130 Q 624 138 618 148" fill="none" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
    <path d="M 710 115 Q 724 109 730 102" fill="none" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
    <!-- connection line from inset to blood pool -->
    <line x1="580" y1="125" x2="460" y2="295" stroke="#8BA0D6" stroke-width="1.5" stroke-dasharray="6 4"/>
  </g>
</svg>
