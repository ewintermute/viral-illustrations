<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">

  <!-- bg: scientific deep navy -->
  <g id="bg" data-label="dark scientific background">
    <rect x="0" y="0" width="800" height="600" fill="#1C1E35"/>
    <!-- subtle grid hint -->
    <line x1="0" y1="300" x2="800" y2="300" stroke="#2D3E6B" stroke-width="0.5" opacity="0.4"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#2D3E6B" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- context: chromosome/cell context -->
