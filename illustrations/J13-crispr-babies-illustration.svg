  <!-- detail-cut: CRISPR cut site with splayed blunt ends -->
  <g id="detail-cut" data-label="CRISPR-Cas9 blunt-end cut site showing gap in helix">
    <!-- Highlight region bracket -->
    <rect x="350" y="255" width="100" height="90" rx="3" fill="none" stroke="#E6B800" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.7"/>
    <!-- Cut end A top - splay outward right -->
    <path d="M 418.81,270 L 436.81,258 L 428.81,268"
          fill="#CA1E08" stroke="#CA1E08" stroke-width="1.5"/>
    <!-- Cut end B top - splay outward left -->
    <path d="M 369.57,270 L 351.57,258 L 359.57,268"
          fill="#CA1E08" stroke="#CA1E08" stroke-width="1.5"/>
    <!-- Cut end A bot - splay outward -->
    <path d="M 369.57,330 L 351.57,342 L 359.57,332"
          fill="#CA1E08" stroke="#CA1E08" stroke-width="1.5"/>
    <!-- Cut end B bot -->
    <path d="M 430.43,330 L 448.43,342 L 440.43,332"
          fill="#CA1E08" stroke="#CA1E08" stroke-width="1.5"/>
    <!-- gap fill lines showing broken backbone -->
    <line x1="418.81" y1="270" x2="418.81" y2="274" stroke="#CA1E08" stroke-width="2.5"/>
    <line x1="369.57" y1="270" x2="369.57" y2="274" stroke="#CA1E08" stroke-width="2.5"/>
    <line x1="369.57" y1="326" x2="369.57" y2="330" stroke="#CA1E08" stroke-width="2.5"/>
    <line x1="430.43" y1="326" x2="430.43" y2="330" stroke="#CA1E08" stroke-width="2.5"/>
    <!-- delta label -->
    <text x="460" y="306" font-family="Barlow, sans-serif" font-size="18" font-weight="700"
          fill="#8BA0D6">CCR5-Δ32</text>
  </g>

  <!-- detail-cas9: Cas9 protein scissors shape -->
  <g id="detail-cas9" data-label="Cas9 nuclease protein shown as scissors/clamp at cut site">
    <!-- Cas9 body left lobe -->
    <path d="M 220 260 Q 200 275 198 300 Q 200 325 225 335 Q 255 342 275 325 Q 290 310 282 290 Q 272 268 250 260 Z"
          fill="#E85542" stroke="#CA1E08" stroke-width="2" opacity="0.85"/>
    <!-- Cas9 body right lobe -->
    <path d="M 580 260 Q 600 275 602 300 Q 600 325 575 335 Q 545 342 525 325 Q 510 310 518 290 Q 528 268 550 260 Z"
          fill="#E85542" stroke="#CA1E08" stroke-width="2" opacity="0.85"/>
    <!-- guide RNA thread going to cut site -->
    <path d="M 275 300 Q 320 300 369.57 290" fill="none" stroke="#E6B800" stroke-width="2" stroke-dasharray="5 3"/>
    <path d="M 525 300 Q 480 300 418.81 288" fill="none" stroke="#E6B800" stroke-width="2" stroke-dasharray="5 3"/>
    <!-- Cas9 hinge lines -->
    <path d="M 252 260 Q 310 240 368 270" fill="none" stroke="#CA1E08" stroke-width="1.5" opacity="0.5"/>
    <path d="M 548 260 Q 490 240 432 270" fill="none" stroke="#CA1E08" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- label: gene name -->
  <g id="label" data-label="CCR5 gene label">
    <text x="58" y="75" font-family="Barlow, sans-serif" font-size="24" font-weight="900"
          fill="#FBFFF6">CCR5</text>
  </g>

  <!-- overlay: annotation nothing extra, cut annotation handled in detail-cut -->
  <g id="overlay" data-label="annotation elements">
    <!-- cut arrow pointing to gap -->
    <line x1="130" y1="90" x2="380" y2="278" stroke="#8BA0D6" stroke-width="1.5" stroke-dasharray="6 4"/>
    <circle cx="380" cy="278" r="3.5" fill="#8BA0D6"/>
  </g>
</svg>