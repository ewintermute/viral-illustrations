<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">

  <!-- Background: clean scientific white -->
  <g id="bg" data-label="Clean light laboratory background for molecular diagram">
    <rect width="800" height="600" fill="#FBFFF6"/>
    <!-- subtle grid suggestion -->
    <line x1="0" y1="300" x2="800" y2="300" stroke="#EFEFF3" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#EFEFF3" stroke-width="1"/>
  </g>

  <!-- Context: double helix DNA strand as background element -->
  <g id="context" data-label="Double helix DNA strand providing genomic context">
    <!--
      Background helix (cx=170, hw=20, P=80) — faint context
      Rungs at widest points, strands with proper depth-crossing
    -->
    <g opacity="0.4">
      <line x1="150" y1="60"  x2="190" y2="60"  stroke="#B8EDB9" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="150" y1="100" x2="190" y2="100" stroke="#B8EDB9" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="150" y1="140" x2="190" y2="140" stroke="#B8EDB9" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="150" y1="180" x2="190" y2="180" stroke="#B8EDB9" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="150" y1="220" x2="190" y2="220" stroke="#B8EDB9" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="150" y1="260" x2="190" y2="260" stroke="#B8EDB9" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="150" y1="300" x2="190" y2="300" stroke="#B8EDB9" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="150" y1="340" x2="190" y2="340" stroke="#B8EDB9" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="150" y1="380" x2="190" y2="380" stroke="#B8EDB9" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="150" y1="420" x2="190" y2="420" stroke="#B8EDB9" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="150" y1="460" x2="190" y2="460" stroke="#B8EDB9" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="150" y1="500" x2="190" y2="500" stroke="#B8EDB9" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="150" y1="540" x2="190" y2="540" stroke="#B8EDB9" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Seg1 A-front -->
      <path d="M 170 40 Q 150 60 170 80 Q 190 100 170 120" fill="none" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
      <path d="M 170 40 Q 190 60 170 80 Q 150 100 170 120" fill="none" stroke="#D1DCFF" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Seg2 B-front -->
      <path d="M 170 120 Q 190 140 170 160 Q 150 180 170 200" fill="none" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
      <path d="M 170 120 Q 150 140 170 160 Q 190 180 170 200" fill="none" stroke="#D1DCFF" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Seg3 -->
      <path d="M 170 200 Q 150 220 170 240 Q 190 260 170 280" fill="none" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
      <path d="M 170 200 Q 190 220 170 240 Q 150 260 170 280" fill="none" stroke="#D1DCFF" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Seg4 -->
      <path d="M 170 280 Q 190 300 170 320 Q 150 340 170 360" fill="none" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
      <path d="M 170 280 Q 150 300 170 320 Q 190 340 170 360" fill="none" stroke="#D1DCFF" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Seg5 -->
      <path d="M 170 360 Q 150 380 170 400 Q 190 420 170 440" fill="none" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
      <path d="M 170 360 Q 190 380 170 400 Q 150 420 170 440" fill="none" stroke="#D1DCFF" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Seg6 -->
      <path d="M 170 440 Q 190 460 170 480 Q 150 500 170 520" fill="none" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
      <path d="M 170 440 Q 150 460 170 480 Q 190 500 170 520" fill="none" stroke="#D1DCFF" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M 170 520 Q 150 540 170 560" fill="none" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
      <path d="M 170 520 Q 190 540 170 560" fill="none" stroke="#D1DCFF" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!--
      Main helix (cx=350, hw=30, P=80) — foreground
      Rungs first, then strand segments with depth alternation
    -->
    <!-- Rungs above CCR5 region -->
    <line x1="320" y1="170" x2="380" y2="170" stroke="#8BA0D6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="320" y1="210" x2="380" y2="210" stroke="#8BA0D6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="320" y1="250" x2="380" y2="250" stroke="#8BA0D6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- CCR5 highlighted rungs -->
    <line x1="320" y1="290" x2="380" y2="290" stroke="#E6B800" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="320" y1="330" x2="380" y2="330" stroke="#E6B800" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="320" y1="370" x2="380" y2="370" stroke="#E6B800" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Rungs below CCR5 -->
    <line x1="320" y1="410" x2="380" y2="410" stroke="#8BA0D6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="320" y1="450" x2="380" y2="450" stroke="#8BA0D6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="320" y1="490" x2="380" y2="490" stroke="#8BA0D6" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Strand segments with proper crossing depth (cx=350, hw=30, P=80) -->
    <!-- Seg1 y=130..210: A-front -->
    <path d="M 350 130 Q 320 170 350 210" fill="none" stroke="#5B6FA8" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 350 130 Q 380 170 350 210" fill="none" stroke="#2D3E6B" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Seg2 y=210..290: B-front -->
    <path d="M 350 210 Q 380 250 350 290" fill="none" stroke="#2D3E6B" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 350 210 Q 320 250 350 290" fill="none" stroke="#5B6FA8" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Seg3 y=290..370 CCR5 highlighted: A-front -->
    <path d="M 350 290 Q 320 330 350 370" fill="none" stroke="#B8860B" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 350 290 Q 380 330 350 370" fill="none" stroke="#E6B800" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Seg4 y=370..450: B-front -->
    <path d="M 350 370 Q 380 410 350 450" fill="none" stroke="#2D3E6B" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 350 370 Q 320 410 350 450" fill="none" stroke="#5B6FA8" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Seg5 y=450..530: A-front -->
    <path d="M 350 450 Q 320 490 350 530" fill="none" stroke="#5B6FA8" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 350 450 Q 380 490 350 530" fill="none" stroke="#2D3E6B" stroke-width="3.5" stroke-linecap="round"/>

    <!-- CCR5 bracket -->
    <rect x="305" y="278" width="90" height="104" rx="4" fill="none" stroke="#E6B800" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.7"/>
  </g>

  <!-- Subject: Cas9 protein-guide RNA complex with scissors metaphor -->
  <g id="subject" data-label="Cas9 protein complex with guide RNA positioned at CCR5 cut site">
    <!-- Cas9 protein body - two lobe structure -->
    <path d="M 480 270 Q 530 250 580 265 Q 620 280 625 320 Q 628 358 600 378 Q 572 395 540 390 Q 508 385 488 365 Q 468 342 470 310 Q 472 285 480 270 Z" fill="#2FBF39" stroke="#1A5C1E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- lower lobe -->
    <path d="M 485 375 Q 510 395 545 400 Q 578 403 598 385 Q 615 368 612 345" fill="#1A5C1E" stroke="#248A28" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <!-- guide RNA channel -->
    <path d="M 500 300 Q 510 310 520 320 Q 532 330 545 325" stroke="#6FD877" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- RuvC and HNH nuclease domains (small shapes) -->
    <ellipse cx="560" cy="285" rx="18" ry="12" fill="#248A28" stroke="#2FBF39" stroke-width="1.5"/>
    <ellipse cx="595" cy="340" rx="15" ry="12" fill="#248A28" stroke="#2FBF39" stroke-width="1.5"/>
    <!-- guide RNA strand -->
    <path d="M 455 295 Q 468 298 480 305 Q 490 310 500 310" stroke="#E6B800" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- cut site arrows (scissors metaphor) -->
    <path d="M 500 320 L 390 330" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="none"/>
    <polyline points="396,325 390,330 396,335" fill="none" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- second cut -->
    <path d="M 498 335 L 390 342" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="396,337 390,342 396,347" fill="none" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Detail: Cas9 cut site — blunt ends diverging from helix -->
  <g id="detail-cut" data-label="Cas9 double-strand break at CCR5 locus">
    <!-- upper cut: strands end at y≈288, tips splay outward -->
    <path d="M 350 288 Q 334 292 326 290" fill="none" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 350 288 Q 366 292 374 290" fill="none" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round"/>
    <!-- lower cut: strands resume at y≈372, tips splay inward -->
    <path d="M 326 372 Q 334 370 350 372" fill="none" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 374 372 Q 366 370 350 372" fill="none" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round"/>
    <!-- gap label -->
    <line x1="338" y1="315" x2="362" y2="315" stroke="#CA1E08" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.7"/>
    <text x="350" y="332" font-family="Inter, sans-serif" font-size="11" fill="#CA1E08" text-anchor="middle" opacity="0.85">Δ32 bp</text>
  </g>

  <!-- Label -->
  <g id="label" data-label="Gene target label">
    <text x="270" y="248" font-family="Barlow, system-ui, sans-serif" font-size="15" font-weight="700" fill="#1C1E35">CCR5-Δ32</text>
    <text x="460" y="420" font-family="Barlow, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1A5C1E">Cas9</text>
  </g>

  <!-- Overlay: mosaic pattern in corner, warning emphasis -->
  <g id="overlay" data-label="Mosaic cell warning pattern and risk annotation">
    <!-- mosaic cell grid (some cells unedited) - warning that edit is incomplete -->
    <rect x="570" y="450" width="200" height="120" rx="6" fill="#E3F7E3" stroke="#8BA0D6" stroke-width="1.5" opacity="0.8"/>
    <!-- cell grid -->
    <rect x="578" y="458" width="26" height="26" rx="3" fill="#2FBF39" opacity="0.8"/>
    <rect x="608" y="458" width="26" height="26" rx="3" fill="#2FBF39" opacity="0.8"/>
    <rect x="638" y="458" width="26" height="26" rx="3" fill="#CA1E08" opacity="0.6"/>
    <rect x="668" y="458" width="26" height="26" rx="3" fill="#2FBF39" opacity="0.8"/>
    <rect x="698" y="458" width="26" height="26" rx="3" fill="#2FBF39" opacity="0.8"/>
    <rect x="578" y="488" width="26" height="26" rx="3" fill="#2FBF39" opacity="0.8"/>
    <rect x="608" y="488" width="26" height="26" rx="3" fill="#CA1E08" opacity="0.6"/>
    <rect x="638" y="488" width="26" height="26" rx="3" fill="#2FBF39" opacity="0.8"/>
    <rect x="668" y="488" width="26" height="26" rx="3" fill="#CA1E08" opacity="0.6"/>
    <rect x="698" y="488" width="26" height="26" rx="3" fill="#2FBF39" opacity="0.8"/>
    <rect x="578" y="518" width="26" height="26" rx="3" fill="#2FBF39" opacity="0.8"/>
    <rect x="608" y="518" width="26" height="26" rx="3" fill="#2FBF39" opacity="0.8"/>
    <rect x="638" y="518" width="26" height="26" rx="3" fill="#2FBF39" opacity="0.8"/>
    <rect x="668" y="518" width="26" height="26" rx="3" fill="#CA1E08" opacity="0.6"/>
    <rect x="698" y="518" width="26" height="26" rx="3" fill="#2FBF39" opacity="0.8"/>
    <text x="578" y="556" font-family="Barlow, system-ui, sans-serif" font-size="13" fill="#1C1E35" opacity="0.7">mosaic result</text>
  </g>
</svg>
