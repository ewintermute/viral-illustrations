<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">

  <!-- Background: African savanna scene -->
  <g id="bg" data-label="African savanna sky background, warm day scene">
    <rect width="800" height="600" fill="#1C1E35"/>
    <!-- sky gradient top area - warm savanna -->
    <rect x="0" y="0" width="800" height="380" fill="#2D3E6B" opacity="0.6"/>
    <!-- hot sun -->
    <circle cx="680" cy="80" r="40" fill="#E6B800" opacity="0.9"/>
    <circle cx="680" cy="80" r="55" fill="#FFFF77" opacity="0.15"/>
    <!-- heat shimmer lines -->
    <line x1="660" y1="135" x2="655" y2="160" stroke="#E6B800" stroke-width="1" opacity="0.3" stroke-linecap="round" stroke-dasharray="4 4"/>
    <line x1="680" y1="138" x2="678" y2="163" stroke="#E6B800" stroke-width="1" opacity="0.3" stroke-linecap="round" stroke-dasharray="4 4"/>
    <line x1="700" y1="135" x2="703" y2="160" stroke="#E6B800" stroke-width="1" opacity="0.3" stroke-linecap="round" stroke-dasharray="4 4"/>
    <!-- ground -->
    <rect x="0" y="380" width="800" height="220" fill="#A0785A" opacity="0.7"/>
    <rect x="0" y="400" width="800" height="200" fill="#6B4423" opacity="0.5"/>
    <!-- savanna grasses suggestion -->
    <line x1="60" y1="400" x2="55" y2="360" stroke="#E6B800" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <line x1="72" y1="400" x2="68" y2="355" stroke="#E6B800" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <line x1="84" y1="400" x2="80" y2="365" stroke="#E6B800" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <line x1="650" y1="400" x2="645" y2="362" stroke="#E6B800" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <line x1="662" y1="400" x2="658" y2="358" stroke="#E6B800" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <line x1="674" y1="400" x2="670" y2="368" stroke="#E6B800" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <line x1="720" y1="400" x2="716" y2="362" stroke="#E6B800" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <line x1="745" y1="400" x2="742" y2="355" stroke="#E6B800" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Context: distant savanna, acacia tree silhouette -->
  <g id="context" data-label="Acacia tree silhouette and distant savanna for scale context">
    <!-- acacia tree silhouette distant right -->
    <line x1="690" y1="395" x2="690" y2="280" stroke="#6B4423" stroke-width="5" stroke-linecap="round"/>
    <!-- umbrella canopy -->
    <path d="M 630 280 Q 690 248 750 280 Q 762 295 760 305 Q 720 312 690 308 Q 660 312 620 305 Q 618 295 630 280 Z" fill="#1A5C1E" opacity="0.8"/>
    <path d="M 645 290 Q 690 272 735 290" stroke="#248A28" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
    <!-- temperature annotation ambient -->
    <text x="555" y="88" font-family="Barlow, system-ui, sans-serif" font-size="18" font-weight="700" fill="#E6B800" opacity="0.9">42°C</text>
    <text x="555" y="110" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#E6B800" opacity="0.6">ambient</text>
  </g>

  <!-- Subject: termite mound cross-section -->
  <g id="subject" data-label="Macrotermes termite mound cross-section showing internal ventilation channels">
    <!-- external mound shape -->
    <path d="M 260 395 Q 270 300 285 220 Q 300 145 320 100 Q 340 65 360 52 Q 380 42 400 50 Q 418 42 438 52 Q 458 65 478 100 Q 498 145 515 220 Q 528 300 540 395 Z" fill="#A0785A" stroke="#8B6045" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- mound surface texture ridges -->
    <path d="M 290 310 Q 340 298 400 302 Q 460 306 510 300" stroke="#8B6045" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M 276 350 Q 335 338 400 342 Q 465 346 524 340" stroke="#8B6045" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M 295 260 Q 348 248 400 252 Q 452 256 505 250" stroke="#8B6045" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <!-- cross-section interior -->
    <path d="M 300 395 Q 308 305 320 230 Q 332 155 352 105 Q 368 70 400 60 Q 432 70 448 105 Q 468 155 480 230 Q 492 305 500 395 Z" fill="#D4A574" stroke="#A0785A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- interior walls of channels -->
    <path d="M 330 395 Q 336 310 345 238 Q 354 170 368 120 Q 380 82 400 72 Q 420 82 432 120 Q 446 170 455 238 Q 464 310 470 395" fill="#C4945A" stroke="#A0785A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Detail: ventilation channels with airflow arrows -->
  <g id="detail-airflow" data-label="Ventilation channels showing hot air rising through chimney and cool air descending through peripheral channels">
    <!-- central chimney channel (hot air rises) -->
    <path d="M 385 390 L 385 120 Q 390 90 400 72 Q 410 90 415 120 L 415 390" fill="#E85542" opacity="0.2"/>
    <!-- rising hot air arrows -->
    <line x1="400" y1="360" x2="400" y2="320" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="394,326 400,320 406,326" fill="none" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="400" y1="300" x2="400" y2="260" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="394,266 400,260 406,266" fill="none" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="400" y1="240" x2="400" y2="200" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="394,206 400,200 406,206" fill="none" stroke="#CA1E08" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="400" y1="180" x2="400" y2="140" stroke="#E85542" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <polyline points="395,147 400,140 405,147" fill="none" stroke="#E85542" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <!-- peripheral channels (cool air descends) -->
    <!-- left channel -->
    <path d="M 335 390 L 342 260 Q 352 180 368 140 Q 358 170 352 230 Q 345 310 342 390" fill="#8BA0D6" opacity="0.2"/>
    <line x1="343" y1="340" x2="346" y2="380" stroke="#8BA0D6" stroke-width="2" stroke-linecap="round"/>
    <polyline points="340,373 346,380 352,373" fill="none" stroke="#8BA0D6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="345" y1="280" x2="344" y2="320" stroke="#8BA0D6" stroke-width="2" stroke-linecap="round"/>
    <polyline points="338,313 344,320 350,313" fill="none" stroke="#8BA0D6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- right channel -->
    <path d="M 465 390 L 458 260 Q 448 180 432 140 Q 442 170 448 230 Q 455 310 458 390" fill="#8BA0D6" opacity="0.2"/>
    <line x1="457" y1="340" x2="454" y2="380" stroke="#8BA0D6" stroke-width="2" stroke-linecap="round"/>
    <polyline points="448,373 454,380 460,373" fill="none" stroke="#8BA0D6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="455" y1="280" x2="456" y2="320" stroke="#8BA0D6" stroke-width="2" stroke-linecap="round"/>
    <polyline points="450,313 456,320 462,313" fill="none" stroke="#8BA0D6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- fungus garden (heat source at base) -->
    <ellipse cx="400" cy="375" rx="42" ry="18" fill="#248A28" opacity="0.7" stroke="#1A5C1E" stroke-width="1.5"/>
    <!-- heat waves from garden -->
    <path d="M 380 358 Q 382 350 380 342" stroke="#E6B800" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 395 356 Q 397 348 395 340" stroke="#E6B800" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 410 358 Q 412 350 410 342" stroke="#E6B800" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
    <!-- colony chamber temperature label -->
    <text x="356" y="395" font-family="Barlow, system-ui, sans-serif" font-size="13" font-weight="700" fill="#2FBF39">31°C</text>
  </g>

  <!-- Label -->
  <g id="label" data-label="Species and building comparison label">
    <text x="52" y="480" font-family="Barlow, system-ui, sans-serif" font-size="16" font-weight="700" fill="#FBFFF6">Macrotermes</text>
    <text x="52" y="502" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#E6B800" opacity="0.8">10% energy use vs HVAC</text>
  </g>

  <!-- Overlay: Eastgate building comparison outline and height reference -->
  <g id="overlay" data-label="Height reference scale and Eastgate building comparison outline">
    <!-- height scale bar -->
    <line x1="220" y1="395" x2="220" y2="52" stroke="#FBFFF6" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.4" stroke-linecap="round"/>
    <line x1="214" y1="395" x2="226" y2="395" stroke="#FBFFF6" stroke-width="1.5" opacity="0.4"/>
    <line x1="214" y1="52" x2="226" y2="52" stroke="#FBFFF6" stroke-width="1.5" opacity="0.4"/>
    <text x="180" y="230" font-family="Barlow, system-ui, sans-serif" font-size="14" fill="#FBFFF6" opacity="0.5" transform="rotate(-90 192 230)">9 m</text>
    <!-- Eastgate building silhouette (simple outline) -->
    <rect x="590" y="200" width="130" height="200" fill="none" stroke="#8BA0D6" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
    <line x1="605" y1="200" x2="605" y2="395" stroke="#8BA0D6" stroke-width="1" opacity="0.3"/>
    <line x1="620" y1="200" x2="620" y2="395" stroke="#8BA0D6" stroke-width="1" opacity="0.3"/>
    <line x1="655" y1="200" x2="655" y2="395" stroke="#8BA0D6" stroke-width="1" opacity="0.3"/>
    <line x1="700" y1="200" x2="700" y2="395" stroke="#8BA0D6" stroke-width="1" opacity="0.3"/>
    <!-- ventilation shafts on building -->
    <line x1="612" y1="200" x2="612" y2="178" stroke="#8BA0D6" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="640" y1="200" x2="640" y2="175" stroke="#8BA0D6" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="665" y1="200" x2="665" y2="178" stroke="#8BA0D6" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="706" y1="200" x2="706" y2="175" stroke="#8BA0D6" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <text x="596" y="195" font-family="Barlow, system-ui, sans-serif" font-size="11" fill="#8BA0D6" opacity="0.7">Eastgate</text>
  </g>
</svg>
