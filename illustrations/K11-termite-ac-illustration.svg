<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#2D3E6B"/>
      <stop offset="100%" stop-color="#1C1E35"/>
    </radialGradient>
    <radialGradient id="groundGrad" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#6B4423"/>
      <stop offset="100%" stop-color="#3D2010"/>
    </radialGradient>
    <radialGradient id="heatGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E6B800" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E6B800" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- bg: savanna sky and ground split -->
  <g id="bg" data-label="African savanna background — sky and earth split">
    <rect width="800" height="600" fill="url(#skyGrad)"/>
    <rect x="0" y="480" width="800" height="120" fill="url(#groundGrad)"/>
    <!-- Horizon line -->
    <path d="M 0,480 C 200,472 400,478 600,475 C 700,473 750,476 800,478" fill="#6B4423" stroke="none"/>
    <!-- Sun / heat source -->
    <circle cx="680" cy="80" r="48" fill="#E6B800" opacity="0.25"/>
    <circle cx="680" cy="80" r="32" fill="#E6B800" opacity="0.5"/>
    <circle cx="680" cy="80" r="20" fill="#FFFF77" opacity="0.8"/>
    <!-- Sun rays -->
    <line x1="680" y1="40" x2="680" y2="28" stroke="#E6B800" stroke-width="2" opacity="0.6"/>
    <line x1="680" y1="120" x2="680" y2="132" stroke="#E6B800" stroke-width="2" opacity="0.6"/>
    <line x1="640" y1="80" x2="628" y2="80" stroke="#E6B800" stroke-width="2" opacity="0.6"/>
    <line x1="720" y1="80" x2="732" y2="80" stroke="#E6B800" stroke-width="2" opacity="0.6"/>
    <line x1="652" y1="52" x2="644" y2="44" stroke="#E6B800" stroke-width="2" opacity="0.5"/>
    <line x1="708" y1="52" x2="716" y2="44" stroke="#E6B800" stroke-width="2" opacity="0.5"/>
    <line x1="652" y1="108" x2="644" y2="116" stroke="#E6B800" stroke-width="2" opacity="0.5"/>
    <line x1="708" y1="108" x2="716" y2="116" stroke="#E6B800" stroke-width="2" opacity="0.5"/>
    <!-- Acacia tree silhouette far right -->
    <line x1="755" y1="480" x2="755" y2="370" stroke="#3D2010" stroke-width="5"/>
    <ellipse cx="755" cy="350" rx="45" ry="22" fill="#1A5C1E" opacity="0.7"/>
    <ellipse cx="735" cy="360" rx="30" ry="16" fill="#1A5C1E" opacity="0.6"/>
    <ellipse cx="775" cy="360" rx="28" ry="15" fill="#1A5C1E" opacity="0.6"/>
    <!-- Another acacia far left -->
    <line x1="48" y1="480" x2="48" y2="395" stroke="#3D2010" stroke-width="4"/>
    <ellipse cx="48" cy="378" rx="38" ry="18" fill="#1A5C1E" opacity="0.6"/>
    <ellipse cx="32" cy="386" rx="24" ry="13" fill="#1A5C1E" opacity="0.5"/>
    <ellipse cx="64" cy="386" rx="22" ry="12" fill="#1A5C1E" opacity="0.5"/>
  </g>

  <!-- context: Eastgate Centre building silhouette for scale comparison, right side -->
  <g id="context" data-label="Eastgate Centre Harare building silhouette — biomimetic comparison">
    <!-- Building outline: modern multi-storey block -->
    <rect x="555" y="260" width="180" height="220" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2"/>
    <!-- Roof ventilation chimneys on top of building -->
    <rect x="565" y="245" width="18" height="22" fill="#3D3D52" stroke="#5B6FA8" stroke-width="1.5"/>
    <rect x="592" y="240" width="18" height="27" fill="#3D3D52" stroke="#5B6FA8" stroke-width="1.5"/>
    <rect x="619" y="245" width="18" height="22" fill="#3D3D52" stroke="#5B6FA8" stroke-width="1.5"/>
    <rect x="646" y="240" width="18" height="27" fill="#3D3D52" stroke="#5B6FA8" stroke-width="1.5"/>
    <rect x="673" y="245" width="18" height="22" fill="#3D3D52" stroke="#5B6FA8" stroke-width="1.5"/>
    <rect x="700" y="240" width="18" height="27" fill="#3D3D52" stroke="#5B6FA8" stroke-width="1.5"/>
    <!-- Building windows - grid -->
    <rect x="565" y="275" width="22" height="14" fill="#8BA0D6" opacity="0.4"/>
    <rect x="595" y="275" width="22" height="14" fill="#8BA0D6" opacity="0.4"/>
    <rect x="625" y="275" width="22" height="14" fill="#8BA0D6" opacity="0.4"/>
    <rect x="655" y="275" width="22" height="14" fill="#8BA0D6" opacity="0.4"/>
    <rect x="685" y="275" width="22" height="14" fill="#8BA0D6" opacity="0.4"/>
    <rect x="565" y="300" width="22" height="14" fill="#8BA0D6" opacity="0.3"/>
    <rect x="595" y="300" width="22" height="14" fill="#8BA0D6" opacity="0.3"/>
    <rect x="625" y="300" width="22" height="14" fill="#8BA0D6" opacity="0.3"/>
    <rect x="655" y="300" width="22" height="14" fill="#8BA0D6" opacity="0.3"/>
    <rect x="685" y="300" width="22" height="14" fill="#8BA0D6" opacity="0.3"/>
    <rect x="565" y="325" width="22" height="14" fill="#8BA0D6" opacity="0.35"/>
    <rect x="595" y="325" width="22" height="14" fill="#8BA0D6" opacity="0.35"/>
    <rect x="625" y="325" width="22" height="14" fill="#8BA0D6" opacity="0.35"/>
    <rect x="655" y="325" width="22" height="14" fill="#8BA0D6" opacity="0.35"/>
    <rect x="685" y="325" width="22" height="14" fill="#8BA0D6" opacity="0.35"/>
    <rect x="565" y="350" width="22" height="14" fill="#8BA0D6" opacity="0.3"/>
    <rect x="595" y="350" width="22" height="14" fill="#8BA0D6" opacity="0.3"/>
    <rect x="625" y="350" width="22" height="14" fill="#8BA0D6" opacity="0.3"/>
    <rect x="655" y="350" width="22" height="14" fill="#8BA0D6" opacity="0.3"/>
    <rect x="685" y="350" width="22" height="14" fill="#8BA0D6" opacity="0.3"/>
    <!-- Ground floor entrance -->
    <rect x="615" y="442" width="60" height="38" fill="#1C1E35" stroke="#5B6FA8" stroke-width="1.5"/>
    <!-- Airflow arrows from building chimneys — cool air in at base, hot out at top -->
    <path d="M 574,243 C 574,225 574,210 574,195" fill="none" stroke="#8BA0D6" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 3" opacity="0.7"/>
    <polygon points="574,195 570,205 578,205" fill="#8BA0D6" opacity="0.7"/>
    <path d="M 657,238 C 657,220 657,205 657,190" fill="none" stroke="#8BA0D6" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 3" opacity="0.7"/>
    <polygon points="657,190 653,200 661,200" fill="#8BA0D6" opacity="0.7"/>
    <!-- Cool air intake arrows at bottom -->
    <path d="M 560,480 C 560,468 560,455 560,442" fill="none" stroke="#6FD877" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <polygon points="560,442 556,452 564,452" fill="#6FD877" opacity="0.6"/>
    <path d="M 730,480 C 730,468 730,455 730,442" fill="none" stroke="#6FD877" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <polygon points="730,442 726,452 734,452" fill="#6FD877" opacity="0.6"/>
  </g>

  <!-- subject: termite mound cross-section — main subject center-left -->
  <g id="subject" data-label="Macrotermes michaelseni mound exterior silhouette — primary subject">
    <!-- Mound outer shape: tall irregular tower with ridges -->
    <path d="M 220,480 C 215,450 210,420 212,390 C 214,358 218,330 222,305 C 226,278 230,255 232,230 C 234,205 234,185 232,168 C 230,150 226,138 224,128 C 222,118 222,110 226,105 C 230,100 236,102 240,108 C 244,114 246,122 248,132 C 250,142 252,155 254,170 C 256,188 256,210 255,232 C 254,258 250,282 248,308 C 246,332 245,358 246,385 C 248,415 252,445 256,475 C 260,480 250,480 240,480 Z"
          fill="#A0785A" stroke="#6B4423" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Main mound body -->
    <path d="M 180,480 C 175,455 172,430 174,405 C 176,380 182,360 185,338 C 188,315 188,295 186,275 C 184,255 180,238 180,222 C 180,205 182,192 186,182 C 190,172 196,166 202,164 C 208,162 214,165 218,172 C 222,180 224,192 224,205 C 224,218 222,232 222,248 C 222,265 225,282 228,300 C 232,318 236,338 238,358 C 241,380 242,403 242,425 C 243,450 242,468 240,480 Z"
          fill="#B8860B" stroke="#6B4423" stroke-width="2" stroke-linejoin="round"/>
    <!-- Left ridge buttress -->
    <path d="M 256,480 C 252,455 248,428 248,400 C 248,372 252,350 256,330 C 260,310 264,295 264,280 C 264,265 260,252 258,242 C 264,248 270,258 274,272 C 278,288 278,308 276,330 C 274,352 270,375 270,400 C 270,425 272,452 275,480 Z"
          fill="#A0785A" stroke="none"/>
    <!-- Right ridge buttress -->
    <path d="M 175,480 C 178,455 182,430 182,405 C 182,378 178,358 174,338 C 170,318 168,302 168,288 C 168,274 170,262 172,254 C 167,260 163,270 160,284 C 157,300 157,318 160,338 C 163,358 166,380 165,405 C 164,430 164,455 165,480 Z"
          fill="#A0785A" stroke="none"/>
    <!-- Surface texture lines on mound -->
    <path d="M 200,400 C 210,396 220,396 228,400" fill="none" stroke="#6B4423" stroke-width="1.5" opacity="0.5"/>
    <path d="M 195,370 C 208,365 222,365 232,370" fill="none" stroke="#6B4423" stroke-width="1.5" opacity="0.5"/>
    <path d="M 193,340 C 207,334 222,334 234,340" fill="none" stroke="#6B4423" stroke-width="1.5" opacity="0.5"/>
    <path d="M 196,310 C 210,304 222,303 232,308" fill="none" stroke="#6B4423" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- detail-channels: ventilation channel cross-section cut into mound -->
  <g id="detail-channels" data-label="Internal ventilation channels and colony chamber — passive air circulation">
    <!-- Cross-section cut revealing interior — using clip visually with darker fill -->
    <!-- Central chimney channel -->
    <path d="M 212,425 C 214,395 214,365 213,338 C 212,310 210,285 210,262 C 210,240 212,222 214,208 C 216,195 218,186 218,178 C 220,185 222,196 222,210 C 222,225 220,243 219,264 C 218,286 218,313 220,340 C 222,368 224,396 224,425 Z"
          fill="#2D3E6B" opacity="0.8"/>
    <!-- Colony chamber - central mass -->
    <ellipse cx="210" cy="390" rx="25" ry="18" fill="#3D2010" stroke="#6B4423" stroke-width="2"/>
    <ellipse cx="210" cy="390" rx="18" ry="12" fill="#1A0A05" stroke="none"/>
    <!-- Fungus garden dots in chamber -->
    <circle cx="204" cy="390" r="3" fill="#2FBF39" opacity="0.7"/>
    <circle cx="210" cy="386" r="3" fill="#2FBF39" opacity="0.7"/>
    <circle cx="216" cy="390" r="3" fill="#2FBF39" opacity="0.7"/>
    <circle cx="207" cy="395" r="2.5" fill="#6FD877" opacity="0.6"/>
    <circle cx="213" cy="394" r="2.5" fill="#6FD877" opacity="0.6"/>
    <!-- Peripheral return channels -->
    <path d="M 178,430 C 180,405 182,378 182,355 C 182,332 180,310 179,290" fill="none" stroke="#5B6FA8" stroke-width="2.5" stroke-dasharray="5 3" opacity="0.7"/>
    <path d="M 240,430 C 240,405 240,378 240,355 C 240,332 240,310 240,290" fill="none" stroke="#5B6FA8" stroke-width="2.5" stroke-dasharray="5 3" opacity="0.7"/>
    <!-- Hot air rising in chimney — arrows -->
    <path d="M 216,380 C 215,360 215,340 215,318" fill="none" stroke="#E6B800" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <polygon points="215,318 211,330 219,330" fill="#E6B800" opacity="0.8"/>
    <path d="M 216,318 C 215,298 215,278 215,258" fill="none" stroke="#E6B800" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <polygon points="215,258 211,270 219,270" fill="#E6B800" opacity="0.6"/>
    <!-- Cool air descending in peripheral channels -->
    <path d="M 179,290 C 179,310 179,332 179,352" fill="none" stroke="#6FD877" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <polygon points="179,352 175,340 183,340" fill="#6FD877" opacity="0.7"/>
    <path d="M 240,290 C 240,310 240,332 240,352" fill="none" stroke="#6FD877" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <polygon points="240,352 236,340 244,340" fill="#6FD877" opacity="0.7"/>
    <!-- Ground air intake -->
    <path d="M 166,475 C 170,462 172,452 172,442 C 172,432 171,424 172,415 C 173,408 176,402 179,398"
          fill="none" stroke="#6FD877" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>
    <path d="M 254,475 C 252,462 250,452 250,442 C 250,432 250,424 248,415 C 247,408 244,402 241,398"
          fill="none" stroke="#6FD877" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>
    <!-- Exhaust hot air at top of mound -->
    <path d="M 226,108 C 222,95 218,82 216,70 C 214,58 214,48 215,40"
          fill="none" stroke="#E6B800" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>
    <polygon points="215,40 211,52 219,52" fill="#E6B800" opacity="0.6"/>
  </g>

  <!-- label: 2 text elements only -->
  <g id="label" data-label="Species name and building name labels">
    <text x="210" y="540"
          text-anchor="middle"
          font-family="Barlow, sans-serif"
          font-size="20"
          font-weight="600"
          font-style="italic"
          fill="#8BA0D6">Macrotermes michaelseni</text>
    <text x="645" y="540"
          text-anchor="middle"
          font-family="Barlow, sans-serif"
          font-size="22"
          font-weight="700"
          fill="#FBFFF6">Eastgate Centre</text>
  </g>

  <!-- overlay: temperature annotation and visual connector -->
  <g id="overlay" data-label="Temperature indicators and connecting arrow between mound and building">
    <!-- Temperature range badge on mound -->
    <rect x="295" y="270" width="135" height="55" rx="6" fill="#1C1E35" stroke="#E6B800" stroke-width="2" opacity="0.95"/>
    <text x="362" y="292" text-anchor="middle" fill="#E6B800" font-family="Barlow, sans-serif" font-size="14" font-weight="700">3°C → 42°C</text>
    <text x="362" y="314" text-anchor="middle" fill="#FBFFF6" font-family="Barlow, sans-serif" font-size="13">inside: 31°C</text>
    <!-- Connector line from badge to mound -->
    <line x1="295" y1="297" x2="255" y2="320" stroke="#E6B800" stroke-width="1.5" opacity="0.7"/>
    <!-- Connector from mound to building -->
    <path d="M 280,370 C 380,380 450,380 545,360" fill="none" stroke="#8BA0D6" stroke-width="2" stroke-dasharray="8 5" opacity="0.6"/>
    <polygon points="545,360 533,354 535,366" fill="#8BA0D6" opacity="0.6"/>
    <!-- 10% energy badge on building -->
    <rect x="570" y="195" width="145" height="42" rx="6" fill="#1C1E35" stroke="#2FBF39" stroke-width="2" opacity="0.95"/>
    <text x="643" y="222" text-anchor="middle" fill="#2FBF39" font-family="Barlow, sans-serif" font-size="18" font-weight="700">10% energy</text>
  </g>
</svg>
