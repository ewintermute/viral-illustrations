<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background - Deep ocean black -->
  <rect id="background" width="800" height="600" fill="#0D0D16"/>
  
  <!-- Deeper darkness gradient effect (using opacity layers, no filter) -->
  <ellipse id="depth-shadow-1" cx="400" cy="600" rx="400" ry="200" fill="#1C1E35" opacity="0.3"/>
  <ellipse id="depth-shadow-2" cx="200" cy="400" rx="150" ry="100" fill="#2D3E6B" opacity="0.15"/>
  
  <!-- Female anglerfish - large body -->
  <ellipse id="body-main" cx="380" cy="320" rx="140" ry="100" fill="#2D3E6B" opacity="0.9"/>
  <ellipse id="body-belly" cx="390" cy="340" rx="120" ry="80" fill="#5B6FA8" opacity="0.7"/>
  <path id="body-texture-1" d="M 260 310 Q 280 330 300 310" stroke="#1C1E35" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path id="body-texture-2" d="M 270 340 Q 290 355 310 340" stroke="#1C1E35" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  
  <!-- Dorsal fin -->
  <path id="dorsal-fin" d="M 340 260 Q 320 240 310 260 Q 325 265 340 260" fill="#5B6FA8" opacity="0.6"/>
  
  <!-- Tail fin -->
  <path id="tail-fin" d="M 500 310 Q 540 290 560 300 Q 550 320 530 330 Q 515 325 500 330 Z" fill="#5B6FA8" opacity="0.7"/>
  <path id="tail-detail" d="M 520 305 Q 540 300 550 310" stroke="#2D3E6B" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Pectoral fins -->
  <ellipse id="fin-left" cx="320" cy="360" rx="40" ry="25" fill="#5B6FA8" opacity="0.5" transform="rotate(-30 320 360)"/>
  <ellipse id="fin-right" cx="420" cy="370" rx="45" ry="28" fill="#5B6FA8" opacity="0.55" transform="rotate(20 420 370)"/>
  
  <!-- Large mouth with teeth -->
  <path id="mouth-opening" d="M 240 320 Q 220 330 240 340" fill="#0D0D16" opacity="0.95"/>
  <ellipse id="mouth-cavity" cx="235" cy="330" rx="25" ry="18" fill="#1C1E35" opacity="0.9"/>
  
  <!-- Teeth -->
  <path id="tooth-1" d="M 225 320 L 220 330 L 225 325" fill="#D1DCFF" opacity="0.8"/>
  <path id="tooth-2" d="M 235 318 L 230 328 L 235 323" fill="#D1DCFF" opacity="0.85"/>
  <path id="tooth-3" d="M 245 320 L 240 330 L 245 325" fill="#D1DCFF" opacity="0.8"/>
  <path id="tooth-4" d="M 225 340 L 220 330 L 225 335" fill="#D1DCFF" opacity="0.75"/>
  <path id="tooth-5" d="M 235 342 L 230 332 L 235 337" fill="#D1DCFF" opacity="0.8"/>
  <path id="tooth-6" d="M 245 340 L 240 330 L 245 335" fill="#D1DCFF" opacity="0.75"/>
  
  <!-- Eye -->
  <ellipse id="eye" cx="300" cy="300" rx="12" ry="14" fill="#0D0D16" opacity="0.9"/>
  <ellipse id="pupil" cx="300" cy="300" rx="5" ry="7" fill="#1C1E35"/>
  <circle id="eye-highlight" cx="297" cy="296" r="3" fill="#FBFFF6" opacity="0.9"/>
  
  <!-- Illicium (fishing rod from head) -->
  <path id="illicium-rod" d="M 290 280 Q 260 200 240 140 Q 235 120 230 100" stroke="#2D3E6B" stroke-width="4" fill="none" opacity="0.8" stroke-linecap="round"/>
  <path id="illicium-highlight" d="M 292 280 Q 262 200 242 140" stroke="#5B6FA8" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Esca (bioluminescent lure) - concentric ellipses only, no filter -->
  <ellipse id="lure-glow-1" cx="230" cy="95" rx="35" ry="30" fill="#FFFF77" opacity="0.15"/>
  <ellipse id="lure-glow-2" cx="230" cy="95" rx="28" ry="24" fill="#FFFF77" opacity="0.25"/>
  <ellipse id="lure-glow-3" cx="230" cy="95" rx="20" ry="18" fill="#FFFF77" opacity="0.4"/>
  <ellipse id="lure-glow-4" cx="230" cy="95" rx="14" ry="12" fill="#FFFF77" opacity="0.6"/>
  <ellipse id="lure-body" cx="230" cy="95" rx="10" ry="9" fill="#FFFF77" opacity="0.85"/>
  <ellipse id="lure-core" cx="228" cy="93" rx="5" ry="4" fill="#FBFFF6" opacity="0.95"/>
  
  <!-- Parasitic male fused to female's flank -->
  <ellipse id="male-body" cx="460" cy="350" rx="18" ry="12" fill="#5B6FA8" opacity="0.8"/>
  <ellipse id="male-head" cx="450" cy="348" rx="8" ry="7" fill="#5B6FA8" opacity="0.85"/>
  <circle id="male-eye" cx="448" cy="347" r="2" fill="#0D0D16" opacity="0.8"/>
  <circle id="male-eye-highlight" cx="447" cy="346" r="0.8" fill="#FBFFF6" opacity="0.9"/>
  
  <!-- Fusion connection tissue -->
  <ellipse id="fusion-tissue-1" cx="455" cy="352" rx="12" ry="8" fill="#CA1E08" opacity="0.5"/>
  <ellipse id="fusion-tissue-2" cx="458" cy="355" rx="8" ry="6" fill="#E85542" opacity="0.4"/>
  <path id="blood-vessel" d="M 445 350 Q 440 355 435 360" stroke="#CA1E08" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Annotations -->
  <line id="callout-lure" x1="260" y1="100" x2="330" y2="80" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.6" stroke-linecap="round"/>
  <text id="label-lure" x="340" y="75" font-family="Barlow, sans-serif" font-size="14" fill="#D1DCFF" opacity="0.9">Bioluminescent</text>
  <text id="label-esca" x="340" y="92" font-family="Barlow, sans-serif" font-size="12" fill="#D1DCFF" opacity="0.7">esca (lure)</text>
  
  <line id="callout-male" x1="470" y1="348" x2="540" y2="320" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.6" stroke-linecap="round"/>
  <text id="label-male" x="550" y="315" font-family="Barlow, sans-serif" font-size="13" fill="#D1DCFF" opacity="0.9">Parasitic male</text>
  <text id="label-fused" x="550" y="332" font-family="Barlow, sans-serif" font-size="11" fill="#D1DCFF" opacity="0.7">fused to female</text>
  
  <text id="label-species" x="50" y="550" font-family="Barlow, sans-serif" font-size="15" fill="#D1DCFF" opacity="0.8">Deep-sea anglerfish</text>
</svg>