<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect id="background" width="800" height="600" fill="#1C1E35"/>
  
  <!-- Tropical water environment -->
  <ellipse id="water-light-1" cx="600" cy="150" rx="150" ry="80" fill="#6FD877" opacity="0.15"/>
  <ellipse id="water-light-2" cx="200" cy="500" rx="180" ry="70" fill="#5B6FA8" opacity="0.2"/>
  <ellipse id="reef-shadow" cx="100" cy="550" rx="120" ry="40" fill="#0D0D16" opacity="0.4"/>
  
  <!-- Coral/rock formations -->
  <ellipse id="coral-1" cx="680" cy="520" rx="80" ry="70" fill="#E85542" opacity="0.5"/>
  <ellipse id="coral-2" cx="720" cy="540" rx="60" ry="50" fill="#CA1E08" opacity="0.4"/>
  <path id="coral-branch-1" d="M 680 480 Q 670 450 665 420" stroke="#E85542" stroke-width="8" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path id="coral-branch-2" d="M 710 490 Q 720 460 725 430" stroke="#CA1E08" stroke-width="7" fill="none" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Target crab (being struck) -->
  <ellipse id="crab-shell" cx="520" cy="320" rx="45" ry="38" fill="#A0785A" opacity="0.8"/>
  <ellipse id="crab-body" cx="520" cy="325" rx="38" ry="32" fill="#D4A574" opacity="0.7"/>
  
  <!-- Crack in shell from impact -->
  <path id="crack-main" d="M 490 310 L 530 330" stroke="#CA1E08" stroke-width="3" opacity="0.9" stroke-linecap="round"/>
  <path id="crack-branch-1" d="M 505 315 L 495 325" stroke="#CA1E08" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  <path id="crack-branch-2" d="M 520 320 L 515 335" stroke="#CA1E08" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  
  <!-- Crab legs -->
  <path id="crab-leg-1" d="M 480 315 L 460 305 L 445 310" stroke="#A0785A" stroke-width="5" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path id="crab-leg-2" d="M 485 330 L 470 335 L 455 340" stroke="#A0785A" stroke-width="5" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path id="crab-leg-3" d="M 555 315 L 575 305 L 590 310" stroke="#A0785A" stroke-width="5" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path id="crab-leg-4" d="M 560 330 L 580 335 L 595 340" stroke="#A0785A" stroke-width="5" fill="none" opacity="0.7" stroke-linecap="round"/>
  
  <!-- Crab claws -->
  <ellipse id="crab-claw-left" cx="470" cy="295" rx="12" ry="8" fill="#D4A574" opacity="0.8"/>
  <ellipse id="crab-claw-right" cx="570" cy="295" rx="12" ry="8" fill="#D4A574" opacity="0.8"/>
  
  <!-- Eye stalks -->
  <line id="eye-stalk-1" x1="510" y1="310" x2="505" y2="295" stroke="#D4A574" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <circle id="crab-eye-1" cx="505" cy="293" r="4" fill="#0D0D16" opacity="0.8"/>
  <line id="eye-stalk-2" x1="530" y1="310" x2="535" y2="295" stroke="#D4A574" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <circle id="crab-eye-2" cx="535" cy="293" r="4" fill="#0D0D16" opacity="0.8"/>
  
  <!-- Mantis shrimp body -->
  <ellipse id="shrimp-abdomen" cx="300" cy="310" rx="60" ry="35" fill="#2FBF39" opacity="0.85"/>
  <ellipse id="shrimp-carapace" cx="340" cy="300" rx="45" ry="32" fill="#6FD877" opacity="0.8"/>
  <ellipse id="shrimp-head" cx="370" cy="295" rx="28" ry="25" fill="#2FBF39" opacity="0.9"/>
  
  <!-- Body segments -->
  <path id="segment-1" d="M 280 295 Q 285 300 290 295" stroke="#1A5C1E" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <path id="segment-2" d="M 270 300 Q 275 305 280 300" stroke="#1A5C1E" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <path id="segment-3" d="M 260 305 Q 265 310 270 305" stroke="#1A5C1E" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Eyes (compound, stalked) -->
  <ellipse id="eye-stalk-left" cx="375" cy="285" rx="8" ry="12" fill="#D1DCFF" opacity="0.7"/>
  <ellipse id="eye-stalk-right" cx="390" cy="285" rx="8" ry="12" fill="#D1DCFF" opacity="0.7"/>
  <circle id="compound-eye-left" cx="375" cy="278" r="6" fill="#5B6FA8" opacity="0.8"/>
  <circle id="compound-eye-right" cx="390" cy="278" r="6" fill="#5B6FA8" opacity="0.8"/>
  <circle id="eye-highlight-left" cx="373" cy="276" r="2" fill="#FBFFF6" opacity="0.9"/>
  <circle id="eye-highlight-right" cx="388" cy="276" r="2" fill="#FBFFF6" opacity="0.9"/>
  
  <!-- Antennae -->
  <path id="antenna-1" d="M 370 290 Q 380 270 385 250" stroke="#6FD877" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path id="antenna-2" d="M 375 290 Q 390 265 400 245" stroke="#6FD877" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Walking legs -->
  <path id="leg-1" d="M 310 325 L 300 345 L 290 355" stroke="#2FBF39" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path id="leg-2" d="M 320 330 L 315 350 L 310 360" stroke="#2FBF39" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path id="leg-3" d="M 340 330 L 340 350 L 340 365" stroke="#2FBF39" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
  
  <!-- RAPTORIAL APPENDAGE - the famous club (mid-strike) -->
  <path id="club-arm-base" d="M 365 305 L 410 310" stroke="#E85542" stroke-width="14" fill="none" opacity="0.8" stroke-linecap="round"/>
  <path id="club-forearm" d="M 410 310 L 470 315" stroke="#CA1E08" stroke-width="16" fill="none" opacity="0.85" stroke-linecap="round"/>
  
  <!-- The dactyl club (hammer) -->
  <ellipse id="club-mass" cx="490" cy="318" rx="25" ry="18" fill="#CA1E08" opacity="0.95"/>
  <ellipse id="club-highlight" cx="485" cy="315" rx="15" ry="10" fill="#E85542" opacity="0.8"/>
  <ellipse id="club-core" cx="495" cy="320" rx="12" ry="8" fill="#CRIMSON" opacity="0.9"/>
  
  <!-- Impact effect - motion lines and debris -->
  <line id="motion-1" x1="430" y1="305" x2="450" y2="303" stroke="#FFFF77" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  <line id="motion-2" x1="435" y1="312" x2="455" y2="310" stroke="#FFFF77" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <line id="motion-3" x1="440" y1="318" x2="460" y2="316" stroke="#FFFF77" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Impact burst at contact -->
  <circle id="impact-1" cx="495" cy="318" r="8" fill="#FFFF77" opacity="0.4"/>
  <circle id="impact-2" cx="495" cy="318" r="5" fill="#FBFFF6" opacity="0.5"/>
  
  <!-- Shell fragments flying -->
  <path id="fragment-1" d="M 520 310 L 535 300" stroke="#D4A574" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <path id="fragment-2" d="M 525 318 L 542 315" stroke="#A0785A" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <path id="fragment-3" d="M 518 325 L 530 335" stroke="#D4A574" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  
  <!-- Small debris particles -->
  <circle id="debris-1" cx="530" cy="305" r="2" fill="#D4A574" opacity="0.7"/>
  <circle id="debris-2" cx="538" cy="310" r="1.5" fill="#A0785A" opacity="0.6"/>
  <circle id="debris-3" cx="525" cy="330" r="2" fill="#D4A574" opacity="0.5"/>
  
  <!-- Tail fan -->
  <path id="tail-fan" d="M 250 310 Q 230 305 220 315 Q 225 325 235 330 Q 245 325 250 315 Z" fill="#6FD877" opacity="0.6"/>
  
  <!-- Annotations -->
  <line id="callout-club" x1="490" y1="280" x2="490" y2="200" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.6" stroke-linecap="round"/>
  <text id="label-club" x="420" y="185" font-family="Barlow, sans-serif" font-size="15" fill="#D1DCFF" opacity="0.9">Dactyl club</text>
  <text id="label-speed" x="420" y="205" font-family="Barlow, sans-serif" font-size="12" fill="#D1DCFF" opacity="0.7">~23 m/s strike speed</text>
  
  <line id="callout-crack" x1="510" y1="318" x2="580" y2="250" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.6" stroke-linecap="round"/>
  <text id="label-force" x="590" y="245" font-family="Barlow, sans-serif" font-size="13" fill="#D1DCFF" opacity="0.9">Impact force</text>
  <text id="label-value" x="590" y="262" font-family="Inter, sans-serif" font-size="12" fill="#FFFF77" opacity="0.8">~1500 N</text>
  
  <text id="label-species" x="50" y="550" font-family="Barlow, sans-serif" font-size="14" fill="#D1DCFF" opacity="0.85">Odontodactylus scyllarus</text>
</svg>