<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="Barlow, system-ui, sans-serif">
  <!--
    Illustration: Octopus RNA Editing (Octopus bimaculoides)
    Story: B10
    Artist: Gemini 2.5 Pro (Model Test)
    Color Palette: American Wetware Style Guide v2
  -->
  <g id="bg" data-label="background">
    <rect width="800" height="600" fill="#1C1E35" />
    <rect width="400" height="600" fill="#2D3E6B" opacity="0.5" />
  </g>
  <g id="context" data-label="context-rna-strand" fill="none" stroke="#3D3D52" stroke-width="2" stroke-opacity="0.5">
      <path d="M 650 0 C 600 150, 700 250, 650 400 S 600 550, 650 600"/>
      <path d="M 680 0 C 630 150, 730 250, 680 400 S 630 550, 680 600"/>
  </g>
  <g id="subject" data-label="subject-octopus">
    <!-- Head -->
    <path d="M 300 250 C 200 250, 150 350, 250 450 C 350 550, 450 550, 550 450 C 650 350, 600 250, 500 250 S 400 250, 300 250 Z" fill="#A0785A" />
    <!-- Tentacles -->
    <path d="M 250 440 C 150 500, 100 600, 150 600" stroke="#8B5A8A" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M 320 450 C 280 550, 300 610, 330 600" stroke="#A0785A" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M 400 460 C 400 550, 450 610, 430 590" stroke="#A0785A" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M 480 450 C 520 550, 500 610, 470 600" stroke="#A0785A" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M 550 440 C 650 500, 700 600, 650 600" stroke="#8B5A8A" stroke-width="12" fill="none" stroke-linecap="round"/>
  </g>
  <g id="detail-eyes" data-label="detail-eyes">
      <g transform="translate(320 320)">
          <ellipse cx="0" cy="0" rx="25" ry="18" fill="#E8EEFF" stroke="#D4A574" stroke-width="2"/>
          <ellipse cx="-5" cy="0" rx="12" ry="14" fill="#0D0D16" />
          <ellipse cx="-8" cy="-4" rx="5" ry="6" fill="#FBFFF6" opacity="0.85" />
      </g>
      <g transform="translate(480 320)">
          <ellipse cx="0" cy="0" rx="25" ry="18" fill="#E8EEFF" stroke="#D4A574" stroke-width="2"/>
          <ellipse cx="-5" cy="0" rx="12" ry="14" fill="#0D0D16" />
          <ellipse cx="-8" cy="-4" rx="5" ry="6" fill="#FBFFF6" opacity="0.85" />
      </g>
  </g>
  <g id="detail-rna-editing" data-label="detail-rna-editing">
    <rect x="50" y="150" width="250" height="100" rx="15" fill="#0D0D16" stroke="#8BA0D6" stroke-width="2" />
    <text x="70" y="205" font-size="24" fill="#E8EEFF" font-family="monospace">...C<tspan fill="#E85542">A</tspan>UG...</text>
    <path d="M 170 190 C 190 170, 210 170, 230 190" fill="none" stroke="#2FBF39" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="70" y="215" dy="1em" font-size="24" fill="#E8EEFF" font-family="monospace">...C<tspan fill="#6FD877">G</tspan>UG...</text>
    <text x="165" y="165" font-size="14" fill="#D1DCFF">A-to-I Editing</text>
  </g>
  <g id="label" data-label="label-text" fill="#FBFFF6" font-size="22">
    <text x="50" y="70" font-weight="bold">Real-time Genetic Rewrites</text>
    <text x="50" y="100" font-size="18" fill="#8BA0D6" font-style="italic">Octopus bimaculoides</text>
  </g>
  <g id="overlay" data-label="overlay"></g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2FBF39" />
    </marker>
  </defs>
</svg>
