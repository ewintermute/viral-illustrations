<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="Barlow, system-ui, sans-serif">
  <!--
    Illustration: Anglerfish Sexual Parasitism (Ceratioidea)
    Story: D4
    Artist: Gemini 2.5 Pro (Model Test)
    Color Palette: American Wetware Style Guide v2
  -->
  <defs>
    <radialGradient id="lureGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FBFFF6; stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D1DCFF; stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8BA0D6; stop-opacity:0.2" />
    </radialGradient>
  </defs>
  <g id="bg" data-label="background">
    <rect width="800" height="600" fill="#1C1E35" />
  </g>
  <g id="context" data-label="context-deep-sea-particles" opacity="0.3">
    <circle cx="100" cy="150" r="2" fill="#5B6FA8"/>
    <circle cx="700" cy="500" r="3" fill="#5B6FA8"/>
    <circle cx="600" cy="100" r="1" fill="#8BA0D6"/>
    <circle cx="250" cy="450" r="2" fill="#5B6FA8"/>
    <circle cx="450" cy="250" r="1" fill="#8BA0D6"/>
  </g>
  <g id="subject" data-label="subject-female-anglerfish">
    <!-- Body -->
    <path d="M 650 300 C 500 150, 250 250, 200 400 C 180 500, 400 550, 600 500 C 750 450, 750 350, 650 300 Z" fill="#2D3E6B"/>
    <!-- Lower Jaw -->
    <path d="M 630 330 C 680 350, 690 440, 640 460 C 550 480, 400 450, 410 410" fill="#243259"/>
    <!-- Teeth -->
    <path d="M 655 330 L 665 350 L 660 332 M 640 330 L 650 355 L 645 332 M 670 430 L 680 410 L 675 428" stroke="#E8EEFF" stroke-width="1.5" fill="none"/>
  </g>
  <g id="detail-fused-male" data-label="detail-fused-male">
      <path d="M 350 470 C 370 460, 380 480, 360 495 C 340 510, 330 490, 350 470 Z" fill="#5B6FA8" />
  </g>
  <g id="detail-lure" data-label="detail-lure">
      <!-- Stalk -->
      <path d="M 580 230 Q 550 150 450 150" stroke="#8BA0D6" stroke-width="3" fill="none"/>
      <!-- Lure light -->
      <circle cx="450" cy="150" r="25" fill="url(#lureGlow)" />
      <circle cx="450" cy="150" r="8" fill="#FBFFF6" />
  </g>
  <g id="detail-eye" data-label="detail-eye">
    <ellipse cx="600" cy="290" rx="15" ry="12" fill="#E8EEFF" stroke="#D4A574" stroke-width="1"/>
    <circle cx="595" cy="288" r="7" fill="#0D0D16" />
    <circle cx="593" cy="286" r="3" fill="#FBFFF6" opacity="0.85" />
  </g>
  <g id="label" data-label="label-text" fill="#FBFFF6" font-size="22">
    <text x="50" y="70" font-weight="bold">Sexual Parasitism</text>
    <text x="50" y="100" font-size="18" fill="#8BA0D6" font-style="italic">Ceratioidea suborder</text>
  </g>
  <g id="overlay" data-label="overlay"></g>
</svg>
