<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="Barlow, system-ui, sans-serif">
  <!--
    Illustration: Zombie-Ant Fungus (Ophiocordyceps unilateralis)
    Story: C1
    Artist: Gemini 2.5 Pro (Model Test)
    Color Palette: American Wetware Style Guide v2
  -->
  <g id="bg" data-label="background">
    <rect width="800" height="600" fill="#1C1E35" />
  </g>
  <g id="context" data-label="context-leaf-and-stem">
    <path d="M 350 600 C 340 400, 380 300, 400 250" stroke="#1A5C1E" stroke-width="8" fill="none" />
    <path d="M 400 250 C 550 230, 700 350, 750 500 C 600 550, 450 450, 400 250 Z" fill="#248A28" />
  </g>
  <g id="subject" data-label="subject-ant">
    <!-- Ant Body -->
    <path d="M 380 350 C 370 340, 360 340, 350 350 L 330 380 C 320 390, 320 400, 330 410 L 370 430 C 380 440, 390 440, 400 430 Z" fill="#3D3D52" />
    <!-- Ant Head -->
    <circle cx="410" cy="335" r="25" fill="#3D3D52" />
    <!-- Ant Legs -->
    <path d="M 360 370 L 320 350 M 350 380 L 300 370 M 340 390 L 290 390 M 370 410 L 350 450 M 380 400 L 370 460" stroke="#0D0D16" stroke-width="3" fill="none" />
    <!-- Ant Eye -->
    <g id="ant-eye" data-label="detail-eye">
        <ellipse cx="425" cy="330" rx="8" ry="6" fill="#E8EEFF" stroke="#D4A574" stroke-width="1"/>
        <circle cx="422" cy="328" r="3" fill="#0D0D16" />
        <circle cx="421" cy="327" r="1.5" fill="#FBFFF6" opacity="0.85" />
    </g>
    <!-- Ant Mandibles Clamped on Leaf Vein -->
    <path d="M 430 345 C 420 310, 390 300, 380 290 L 400 280 C 410 270, 440 320, 430 345 Z" fill="#3D3D52"/>
  </g>
  <g id="detail-fungus" data-label="detail-fungus-stalk">
    <path d="M 405 315 C 390 250, 430 200, 450 150 Q 455 130 445 120" stroke="#E85542" stroke-width="5" fill="none" />
    <circle cx="445" cy="120" r="8" fill="#CA1E08" />
  </g>
  <g id="label" data-label="label-text" fill="#FBFFF6" font-size="22">
    <text x="50" y="70" font-weight="bold">Zombie-Ant Fungus</text>
    <text x="50" y="100" font-size="18" font-style="italic" fill="#8BA0D6">Ophiocordyceps unilateralis</text>
  </g>
  <g id="overlay" data-label="overlay"></g>
</svg>