<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <!-- Gradients or filters can be defined here if required -->
  </defs>
  <!-- Background Layer -->
  <g id="bg" data-label="deep ocean">
    <rect width="800" height="600" fill="#1C1E35" />
  </g>
  <!-- Context Layer -->
  <g id="context" data-label="underwater elements">
    <!-- Bioluminescent signals and subtle marine elements -->
    <path d="..." fill="#5B6FA8" stroke-width="2" />
  </g>
  <!-- Subject Layer -->
  <g id="subject" data-label="female anglerfish">
    <!-- Female Anglerfish illustration (complex path-based representation) -->
    <ellipse cx="400" cy="300" rx="60" ry="80" fill="#3D3D52" stroke="#2D3E6B" stroke-width="2" />
    <!-- Multiple attached males shown as smaller ellipses -->
    <ellipse cx="450" cy="320" rx="15" ry="20" fill="#A8A8B5" />
  </g>
  <!-- Detail Fusion Layer -->
  <g id="detail-fusion" data-label="fusion points">
    <!-- Fusion sites and circulatory connections -->
    <path d="..." stroke="#E85542" stroke-width="2" stroke-dasharray="5,5" />
  </g>
  <!-- Label Layer -->
  <g id="label" data-label="fusion explanation">
    <text x="70" y="570" fill="#FBFFF6" font-family="Inter, system-ui, sans-serif" font-size="24">Permanent Fusion</text>
  </g>
  <!-- Overlay Layer -->
  <g id="overlay" data-label="circulatory connection">
    <!-- Annotated lines showing circulatory system connection -->
    <line x1="380" y1="310" x2="480" y2="310" stroke="#8BA0D6" stroke-width="1.5" />
    <!-- Connection points with text -->
    <text x="500" y="315" fill="#FBFFF6" font-family="Barlow, system-ui, sans-serif" font-size="18">Shared Bloodstream</text>
  </g>
</svg>
