<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <!-- Gradients or filters can be defined here if required -->
  </defs>
  <!-- Background Layer -->
  <g id="bg" data-label="dark forest floor">
    <rect width="800" height="600" fill="#1C1E35" />
  </g>
  <!-- Context Layer -->
  <g id="context" data-label="leaf silhouettes">
    <!-- Leaf and trail illustrations -->
    <path d="..." fill="#248A28" stroke-width="2" />
    <!-- Add more path/rect elements for context -->
  </g>
  <!-- Subject Layer -->
  <g id="subject" data-label="solitary ant">
    <!-- Ant illustration (ellipse or path-based representation) -->
    <ellipse cx="200" cy="150" rx="15" ry="20" fill="#7F5F18" stroke="#6B4423" stroke-width="2" />
    <!-- Ant mandibles locked onto leaf -->
    <path d="..." fill="#CA1E08" stroke-width="2" />
  </g>
  <!-- Detail Hyphae Layer -->
  <g id="detail-hyphae" data-label="fungal network">
    <!-- Fine network lines -->
    <path d="..." stroke="#E6B800" stroke-width="1.5" stroke-linecap="round" />
  </g>
  <!-- Detail Stalk Layer -->
  <g id="detail-stalk" data-label="fruiting body">
    <!-- Fruiting body stalk -->
    <path d="..." fill="#CA1E08" stroke-width="2" />
    <!-- Spore cloud dots -->
    <circle cx="230" cy="180" r="5" fill="#FFFF77" opacity="0.8" />
  </g>
  <!-- Label Layer -->
  <g id="label" data-label="species name">
    <text x="70" y="580" fill="#FBFFF6" font-family="Barlow, system-ui, sans-serif" font-size="22" font-style="italic">O. unilateralis</text>
  </g>
  <!-- Overlay Layer -->
  <g id="overlay" data-label="height indicator">
    <!-- Height arrow line -->
    <path d="M 50,580 L 50,550" stroke="#8BA0D6" stroke-dasharray="5,5" stroke-width="1.5" />
  </g>
</svg>
