<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <g id="bg" data-label="Background">
    <rect width="800" height="600" fill="#1C1E35" />
    <circle cx="350" cy="300" r="300" fill="#1F2A38" opacity="0.6" />
  </g>

  <g id="context" data-label="Water Cavitation">
    <!-- Strike action line -->
    <path d="M 500 100 Q 350 250 200 400" fill="none" stroke="#8BA0D6" stroke-width="3" stroke-dasharray="10 10" opacity="0.5" />
    <!-- Cavitation bubbles -->
    <circle cx="180" cy="420" r="30" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-width="2" />
    <circle cx="180" cy="420" r="40" fill="none" stroke="#8BA0D6" stroke-width="1" opacity="0.5" />
    <circle cx="210" cy="390" r="15" fill="#FFFFFF" fill-opacity="0.2" />
    <circle cx="150" cy="450" r="10" fill="#FFFFFF" fill-opacity="0.3" />
  </g>

  <g id="subject" data-label="Mantis Shrimp">
    <!-- Body segments (partial view) -->
    <path d="M 650 150 C 550 100 500 200 550 250 C 600 300 700 250 750 200 Z" fill="#D84B4B" stroke="#8A2B2B" stroke-width="3" />
    <path d="M 700 200 C 650 200 600 300 650 350 C 700 400 800 350 800 250 Z" fill="#D84B4B" stroke="#8A2B2B" stroke-width="3" />
    <!-- Coloration details -->
    <circle cx="600" cy="200" r="15" fill="#4CAF50" />
    <circle cx="680" cy="280" r="20" fill="#2196F3" />
    
    <!-- Raptorial Appendage (The arm) -->
    <path d="M 580 230 C 500 280 400 300 350 250 C 300 200 350 150 450 150 C 500 150 550 200 580 230 Z" fill="#D84B4B" stroke="#8A2B2B" stroke-width="4" />
    
    <!-- The Club (Dactyl) -->
    <path d="M 350 250 C 300 300 250 350 200 400 C 180 420 150 400 170 380 C 220 330 280 260 320 220 C 340 200 370 230 350 250 Z" fill="#EAEAEA" stroke="#9E9E9E" stroke-width="4" />
    <path d="M 200 400 C 180 420 150 400 170 380" fill="#FFC107" stroke="#FFA000" stroke-width="5" /> <!-- Impact surface highlight -->
  </g>

  <g id="detail-eyes" data-label="Complex Eyes">
    <!-- Stalk -->
    <path d="M 520 180 L 480 100" stroke="#D84B4B" stroke-width="6" />
    <!-- Eye structure -->
    <ellipse cx="480" cy="100" rx="15" ry="12" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5" transform="rotate(-30 480 100)" />
    <!-- Stomatopod midband -->
    <path d="M 470 93 L 490 107" stroke="#1C1E35" stroke-width="3" transform="rotate(-30 480 100)" />
    <!-- Pupil/specular -->
    <circle cx="480" cy="100" r="3" fill="#0D0D16" transform="rotate(-30 480 100)" />
    <circle cx="478" cy="98" r="1.5" fill="#FBFFF6" opacity="0.85" transform="rotate(-30 480 100)" />
  </g>

  <g id="detail-inset" data-label="Bouligand Helicoidal Inset">
    <rect x="550" y="380" width="200" height="180" rx="10" fill="#1C1E35" stroke="#8BA0D6" stroke-width="2" />
    <text x="650" y="405" fill="#FBFFF6" font-size="14" text-anchor="middle">Bouligand Structure</text>
    
    <!-- Helicoidal Layers -->
    <!-- Layer 1 -->
    <path d="M 580 430 L 720 430" stroke="#FF5722" stroke-width="6" />
    <!-- Layer 2 -->
    <path d="M 580 445 L 720 445" stroke="#FF9800" stroke-width="6" stroke-dasharray="10 5" />
    <!-- Layer 3 -->
    <path d="M 580 460 L 720 460" stroke="#FFC107" stroke-width="6" stroke-dasharray="5 5" />
    <!-- Layer 4 -->
    <path d="M 580 475 L 720 475" stroke="#8BC34A" stroke-width="6" stroke-dasharray="2 5" />
    <!-- Layer 5 (Vertical representation) -->
    <path d="M 580 490 L 720 490" stroke="#4CAF50" stroke-width="6" stroke-dasharray="1 3" />
    <!-- Layer 6 -->
    <path d="M 580 505 L 720 505" stroke="#00BCD4" stroke-width="6" stroke-dasharray="2 5" />
    <!-- Layer 7 -->
    <path d="M 580 520 L 720 520" stroke="#2196F3" stroke-width="6" stroke-dasharray="5 5" />
    <!-- Layer 8 -->
    <path d="M 580 535 L 720 535" stroke="#9C27B0" stroke-width="6" stroke-dasharray="10 5" />

    <!-- Crack propagation arrow -->
    <path d="M 650 420 Q 660 460 630 490 T 670 540" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="4 2" />
  </g>

  <g id="label" data-label="Text Labels">
    <text x="50" y="50" fill="#8BA0D6" font-size="24" font-weight="bold">Odontodactylus scyllarus</text>
    <text x="50" y="80" fill="#FBFFF6" font-size="18" font-style="italic">10,000g strike acceleration</text>
  </g>

  <g id="overlay" data-label="Lighting and Glows">
    <!-- Cavitation flash -->
    <circle cx="180" cy="420" r="50" fill="#FFFFFF" opacity="0.1" filter="blur(10px)" />
  </g>
</svg>