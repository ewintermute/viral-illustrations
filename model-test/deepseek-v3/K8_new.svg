<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FBFFF6"/>
    </marker>
    <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Background: deep sea -->
  <g id="bg" data-label="deep sea background">
    <rect x="0" y="0" width="800" height="600" fill="#1C1E35"/>
  </g>
  <!-- Context: water with light shafts and distant bubbles -->
  <g id="context" data-label="water context">
    <!-- Light shafts from surface -->
    <ellipse cx="400" cy="0" rx="300" ry="50" fill="#5B6FA8" opacity="0.3"/>
    <!-- Sea floor gradient -->
    <ellipse cx="400" cy="600" rx="500" ry="100" fill="#2D3E6B" opacity="0.5"/>
    <!-- Distant bubbles -->
    <circle cx="100" cy="100" r="8" fill="#8BA0D6" opacity="0.4"/>
    <circle cx="700" cy="150" r="12" fill="#8BA0D6" opacity="0.4"/>
    <circle cx="200" cy="500" r="5" fill="#8BA0D6" opacity="0.4"/>
  </g>
  <!-- Subject: mantis shrimp Odontodactylus scyllarus mid-strike -->
  <g id="subject" data-label="mantis shrimp">
    <!-- Body segments -->
    <ellipse cx="250" cy="300" rx="90" ry="35" fill="#E85542" stroke="#CA1E08" stroke-width="2"/>
    <!-- Head -->
    <ellipse cx="180" cy="300" rx="30" ry="25" fill="#E85542" stroke="#CA1E08" stroke-width="2"/>
    <!-- Eyes -->
    <g id="eye-left">
      <ellipse cx="160" cy="280" rx="10" ry="7" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
      <circle cx="160" cy="280" r="4" fill="#0D0D16"/>
      <circle cx="158" cy="278" r="2" fill="#FBFFF6" opacity="0.85"/>
    </g>
    <g id="eye-right">
      <ellipse cx="200" cy="280" rx="10" ry="7" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
      <circle cx="200" cy="280" r="4" fill="#0D0D16"/>
      <circle cx="198" cy="278" r="2" fill="#FBFFF6" opacity="0.85"/>
    </g>
    <!-- Antennae -->
    <path d="M180,270 L160,250" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>
    <path d="M180,270 L200,250" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>
    <!-- Tail fan -->
    <path d="M340,300 L380,300 L370,320 L350,320 Z" fill="#E85542" stroke="#CA1E08" stroke-width="2"/>
    <!-- Legs -->
    <path d="M270,340 L290,360" stroke="#D4A574" stroke-width="3" stroke-linecap="round"/>
    <path d="M290,340 L310,360" stroke="#D4A574" stroke-width="3" stroke-linecap="round"/>
    <path d="M310,340 L330,360" stroke="#D4A574" stroke-width="3" stroke-linecap="round"/>
    <!-- Dactyl club extended forward -->
    <path d="M250,300 L450,300" stroke="#5B6FA8" stroke-width="10" stroke-linecap="round"/>
    <!-- Club shape -->
    <ellipse cx="480" cy="300" rx="40" ry="25" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2"/>
    <!-- Herringbone pattern on impact surface -->
    <path d="M460,285 L500,285 L500,315 L460,315 Z" fill="#8BA0D6" stroke="#5B6FA8" stroke-width="1"/>
    <line x1="460" y1="295" x2="500" y2="295" stroke="#FBFFF6" stroke-width="1.5"/>
    <line x1="460" y1="305" x2="500" y2="305" stroke="#FBFFF6" stroke-width="1.5"/>
  </g>
  <!-- Shell target -->
  <g id="target" data-label="shell target">
    <!-- Spiral shell simplified -->
    <path d="M550,300 Q600,280 620,320 Q600,360 550,340 Z" fill="#D4A574" stroke="#A0785A" stroke-width="2"/>
    <!-- Shell opening -->
    <ellipse cx="560" cy="320" rx="15" ry="10" fill="#1C1E35" stroke="#A0785A" stroke-width="1"/>
    <!-- Crack lines on shell -->
    <path d="M570,310 L580,330" stroke="#6B4423" stroke-width="1.5" stroke-dasharray="4 2"/>
    <path d="M590,320 L600,310" stroke="#6B4423" stroke-width="1.5"/>
  </g>
  <!-- Cavitation bubble -->
  <g id="cavitation" data-label="cavitation bubble">
    <!-- Bubble outline -->
    <circle cx="520" cy="280" r="35" fill="#8BA0D6" opacity="0.3" stroke="#5B6FA8" stroke-width="2" filter="url(#blur1)"/>
    <!-- Inner pressure waves -->
    <circle cx="520" cy="280" r="20" fill="#8BA0D6" opacity="0.2" stroke="#5B6FA8" stroke-width="1" stroke-dasharray="5 3"/>
    <!-- Shockwave lines -->
    <line x1="520" y1="245" x2="520" y2="220" stroke="#FBFFF6" stroke-width="1.5" stroke-dasharray="3 2"/>
    <line x1="555" y1="280" x2="580" y2="280" stroke="#FBFFF6" stroke-width="1.5" stroke-dasharray="3 2"/>
  </g>
  <!-- Detail: Bouligand helicoidal fiber cross-section inset -->
  <g id="detail-club-cross-section" data-label="Bouligand cross-section">
    <!-- Inset frame -->
    <rect x="50" y="100" width="250" height="250" fill="#1C1E35" stroke="#5B6FA8" stroke-width="2" rx="5"/>
    <!-- Circular cross-section -->
    <circle cx="175" cy="225" r="80" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2"/>
    <!-- Helicoidal fiber layers: concentric arcs rotated -->
    <path d="M175,145 A80,80 0 0,1 255,225" stroke="#8BA0D6" stroke-width="2" fill="none"/>
    <path d="M255,225 A80,80 0 0,1 175,305" stroke="#8BA0D6" stroke-width="2" fill="none"/>
    <path d="M175,305 A80,80 0 0,1 95,225" stroke="#8BA0D6" stroke-width="2" fill="none"/>
    <path d="M95,225 A80,80 0 0,1 175,145" stroke="#8BA0D6" stroke-width="2" fill="none"/>
    <!-- Inner layers -->
    <path d="M175,165 A60,60 0 0,1 235,225" stroke="#8BA0D6" stroke-width="1.5" fill="none"/>
    <path d="M235,225 A60,60 0 0,1 175,285" stroke="#8BA0D6" stroke-width="1.5" fill="none"/>
    <path d="M175,285 A60,60 0 0,1 115,225" stroke="#8BA0D6" stroke-width="1.5" fill="none"/>
    <path d="M115,225 A60,60 0 0,1 175,165" stroke="#8BA0D6" stroke-width="1.5" fill="none"/>
    <!-- Crack line propagating and deflecting -->
    <path d="M175,225 L235,225 L225,235 L215,225 L205,235 L195,225 L185,235 L175,225" 
          stroke="#E85542" stroke-width="3" fill="none" stroke-linejoin="round" stroke-dasharray="none"/>
    <!-- Crack arrow -->
    <path d="M175,225 L165,215" stroke="#FBFFF6" stroke-width="2" marker-end="url(#arrowhead)"/>
    <!-- Label inside inset -->
    <text x="175" y="370" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8BA0D6">Bouligand structure</text>
    <text x="175" y="390" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8BA0D6">crack deflection</text>
  </g>
  <!-- Detail: crack propagation diagram -->
  <g id="detail-crack-propagation" data-label="crack propagation">
    <!-- Small diagram showing crack path through layers -->
    <rect x="600" y="400" width="180" height="150" fill="#1C1E35" stroke="#5B6FA8" stroke-width="2" rx="5"/>
    <!-- Layered structure -->
    <line x1="620" y1="450" x2="760" y2="450" stroke="#8BA0D6" stroke-width="2"/>
    <line x1="620" y1="470" x2="760" y2="470" stroke="#8BA0D6" stroke-width="2"/>
    <line x1="620" y1="490" x2="760" y2="490" stroke="#8BA0D6" stroke-width="2"/>
    <line x1="620" y1="510" x2="760" y2="510" stroke="#8BA0D6" stroke-width="2"/>
    <!-- Crack zigzag -->
    <path d="M620,450 L640,470 L660,450 L680,470 L700,450 L720,470 L740,450" stroke="#E85542" stroke-width="3" fill="none"/>
    <!-- Arrow indicating direction -->
    <path d="M740,450 L750,440" stroke="#FBFFF6" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="690" y="530" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8BA0D6">Crack propagation</text>
  </g>
  <!-- Label: species name -->
  <g id="label" data-label="species label">
    <text x="400" y="580" text-anchor="middle" font-family="Barlow, system-ui, sans-serif" font-size="22" fill="#8BA0D6">
      <tspan font-style="italic">Odontodactylus scyllarus</tspan> (mantis shrimp)
    </text>
  </g>
  <!-- Overlay: strike force and cavitation label -->
  <g id="overlay" data-label="overlay">
    <!-- Strike arrow -->
    <path d="M480,300 Q530,250 580,200" stroke="#FBFFF6" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <text x="530" y="180" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#FBFFF6">10,000 g strike</text>
    <!-- Cavitation label -->
    <text x="520" y="250" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#FBFFF6">cavitation bubble</text>
  </g>
</svg>