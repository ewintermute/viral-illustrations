<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- B10: Octopus RNA editing - octopus with RNA strand showing A-to-I edits -->

  <!-- bg -->
  <g id="bg" data-label="cold deep water background">
    <rect x="0" y="0" width="800" height="600" fill="#1C1E35"/>
  </g>

  <!-- context: cold water column with faint bubbles/particles -->
  <g id="context" data-label="cold water environment with particulate matter">
    <circle cx="80" cy="90" r="2" fill="#8BA0D6" opacity="0.35"/>
    <circle cx="150" cy="160" r="1.5" fill="#8BA0D6" opacity="0.35"/>
    <circle cx="710" cy="120" r="2" fill="#8BA0D6" opacity="0.35"/>
    <circle cx="760" cy="220" r="1.5" fill="#8BA0D6" opacity="0.3"/>
    <circle cx="40" cy="300" r="1.5" fill="#8BA0D6" opacity="0.3"/>
    <circle cx="780" cy="380" r="2" fill="#8BA0D6" opacity="0.3"/>
    <circle cx="90" cy="460" r="1.5" fill="#8BA0D6" opacity="0.3"/>
    <circle cx="735" cy="500" r="2" fill="#8BA0D6" opacity="0.35"/>
    <!-- thermometer indicator on side -->
    <g id="temp-indicator" data-label="cold-water temperature cue">
      <text x="40" y="130" font-family="Inter, system-ui, sans-serif"
            font-size="18" font-weight="500" fill="#8BA0D6">13°C</text>
    </g>
  </g>

  <!-- subject: octopus body and arms -->
  <g id="subject" data-label="octopus Octopus bimaculoides">
    <!-- mantle -->
    <path d="M 180 260
             Q 200 140 320 135
             Q 440 140 460 260
             Q 465 330 420 360
             Q 320 380 220 360
             Q 175 330 180 260 Z"
          fill="#E85542" stroke="#0D0D16" stroke-width="2.5"/>

    <!-- mantle highlights/spots -->
    <ellipse cx="270" cy="230" rx="22" ry="14" fill="#CA1E08" opacity="0.55"/>
    <ellipse cx="380" cy="235" rx="22" ry="14" fill="#CA1E08" opacity="0.55"/>

    <!-- eye -->
    <g id="eye" data-label="octopus eye with W-shaped pupil">
      <ellipse cx="400" cy="255" rx="22" ry="17" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
      <!-- W-shaped pupil suggestion - use horizontal rectangle -->
      <rect x="388" y="251" width="24" height="6" rx="3" fill="#0D0D16"/>
      <circle cx="393" cy="249" r="4" fill="#FBFFF6" opacity="0.85"/>
    </g>

    <!-- arms curling outward -->
    <g id="arms" data-label="eight arms with suckers">
      <path d="M 210 340 Q 150 400 120 480 Q 110 520 140 540"
            fill="none" stroke="#E85542" stroke-width="18" stroke-linecap="round"/>
      <path d="M 240 365 Q 210 460 240 540"
            fill="none" stroke="#E85542" stroke-width="16" stroke-linecap="round"/>
      <path d="M 290 375 Q 285 470 310 560"
            fill="none" stroke="#E85542" stroke-width="16" stroke-linecap="round"/>
      <path d="M 340 375 Q 360 470 380 560"
            fill="none" stroke="#E85542" stroke-width="16" stroke-linecap="round"/>
      <path d="M 400 370 Q 440 460 450 540"
            fill="none" stroke="#E85542" stroke-width="16" stroke-linecap="round"/>
      <path d="M 440 355 Q 500 420 520 500"
            fill="none" stroke="#E85542" stroke-width="16" stroke-linecap="round"/>

      <!-- sucker dots -->
      <circle cx="170" cy="420" r="3" fill="#1C1E35"/>
      <circle cx="145" cy="470" r="3" fill="#1C1E35"/>
      <circle cx="130" cy="510" r="3" fill="#1C1E35"/>
      <circle cx="235" cy="430" r="3" fill="#1C1E35"/>
      <circle cx="238" cy="490" r="3" fill="#1C1E35"/>
      <circle cx="290" cy="440" r="3" fill="#1C1E35"/>
      <circle cx="300" cy="510" r="3" fill="#1C1E35"/>
      <circle cx="355" cy="440" r="3" fill="#1C1E35"/>
      <circle cx="370" cy="510" r="3" fill="#1C1E35"/>
      <circle cx="425" cy="440" r="3" fill="#1C1E35"/>
      <circle cx="445" cy="500" r="3" fill="#1C1E35"/>
      <circle cx="490" cy="440" r="3" fill="#1C1E35"/>
      <circle cx="510" cy="480" r="3" fill="#1C1E35"/>
    </g>
  </g>

  <!-- detail-rna: RNA strand floating out, showing A-to-I edit -->
  <g id="detail-rna" data-label="messenger RNA strand showing A-to-I edits">
    <!-- mRNA backbone -->
    <path d="M 520 180 Q 600 170 680 190 Q 740 205 760 240 Q 770 280 720 300 Q 660 320 600 310"
          fill="none" stroke="#8BA0D6" stroke-width="3" stroke-linecap="round"/>

    <!-- base tick marks along backbone -->
    <g id="rna-bases" data-label="RNA nucleotide bases">
      <!-- each tick is a base; highlight A→I conversions in mustard -->
      <circle cx="540" cy="180" r="6" fill="#2D3E6B" stroke="#FBFFF6" stroke-width="1.5"/>
      <text x="540" y="184" font-family="Inter, system-ui, sans-serif"
            font-size="9" font-weight="700" fill="#FBFFF6" text-anchor="middle">U</text>

      <circle cx="575" cy="175" r="6" fill="#2D3E6B" stroke="#FBFFF6" stroke-width="1.5"/>
      <text x="575" y="179" font-family="Inter, system-ui, sans-serif"
            font-size="9" font-weight="700" fill="#FBFFF6" text-anchor="middle">C</text>

      <!-- edit site 1: A converted to I (shown as gold) -->
      <circle cx="615" cy="172" r="8" fill="#E6B800" stroke="#FBFFF6" stroke-width="1.5"/>
      <text x="615" y="176" font-family="Inter, system-ui, sans-serif"
            font-size="9" font-weight="700" fill="#1C1E35" text-anchor="middle">I</text>

      <circle cx="655" cy="182" r="6" fill="#2D3E6B" stroke="#FBFFF6" stroke-width="1.5"/>
      <text x="655" y="186" font-family="Inter, system-ui, sans-serif"
            font-size="9" font-weight="700" fill="#FBFFF6" text-anchor="middle">G</text>

      <!-- edit site 2 -->
      <circle cx="700" cy="200" r="8" fill="#E6B800" stroke="#FBFFF6" stroke-width="1.5"/>
      <text x="700" y="204" font-family="Inter, system-ui, sans-serif"
            font-size="9" font-weight="700" fill="#1C1E35" text-anchor="middle">I</text>

      <circle cx="735" cy="228" r="6" fill="#2D3E6B" stroke="#FBFFF6" stroke-width="1.5"/>
      <text x="735" y="232" font-family="Inter, system-ui, sans-serif"
            font-size="9" font-weight="700" fill="#FBFFF6" text-anchor="middle">U</text>

      <circle cx="745" cy="265" r="6" fill="#2D3E6B" stroke="#FBFFF6" stroke-width="1.5"/>
      <text x="745" y="269" font-family="Inter, system-ui, sans-serif"
            font-size="9" font-weight="700" fill="#FBFFF6" text-anchor="middle">G</text>

      <!-- edit site 3 -->
      <circle cx="720" cy="295" r="8" fill="#E6B800" stroke="#FBFFF6" stroke-width="1.5"/>
      <text x="720" y="299" font-family="Inter, system-ui, sans-serif"
            font-size="9" font-weight="700" fill="#1C1E35" text-anchor="middle">I</text>

      <circle cx="680" cy="312" r="6" fill="#2D3E6B" stroke="#FBFFF6" stroke-width="1.5"/>
      <text x="680" y="316" font-family="Inter, system-ui, sans-serif"
            font-size="9" font-weight="700" fill="#FBFFF6" text-anchor="middle">C</text>

      <circle cx="625" cy="308" r="6" fill="#2D3E6B" stroke="#FBFFF6" stroke-width="1.5"/>
      <text x="625" y="312" font-family="Inter, system-ui, sans-serif"
            font-size="9" font-weight="700" fill="#FBFFF6" text-anchor="middle">U</text>
    </g>
  </g>

  <!-- detail-adar: ADAR enzyme at an edit site -->
  <g id="detail-adar" data-label="ADAR enzyme converting adenosine to inosine">
    <!-- enzyme blob around second edit -->
    <path d="M 680 180 Q 720 170 740 200 Q 735 230 695 230 Q 665 215 680 180 Z"
          fill="#248A28" stroke="#0D0D16" stroke-width="2" opacity="0.82"/>
    <text x="710" y="208" font-family="Barlow, system-ui, sans-serif"
          font-weight="700" font-size="14" fill="#FBFFF6" text-anchor="middle">ADAR</text>
  </g>

  <!-- label -->
  <g id="label" data-label="edit count label and species">
    <text x="40" y="75" font-family="Barlow, system-ui, sans-serif"
          font-weight="800" font-size="32" fill="#FBFFF6">13,000+ edits</text>
    <text x="40" y="105" font-family="Barlow, system-ui, sans-serif"
          font-weight="500" font-size="20" fill="#8BA0D6"
          font-style="italic">Octopus bimaculoides</text>
  </g>

  <!-- overlay: arrow from octopus to RNA strand -->
  <g id="overlay" data-label="arrow from octopus head to RNA strand">
    <line x1="445" y1="230" x2="515" y2="185" stroke="#8BA0D6"
          stroke-width="1.5" stroke-dasharray="6 4" stroke-linecap="round"/>
  </g>
</svg>
