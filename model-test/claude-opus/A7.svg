<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- A7: Horseshoe crab with blue hemocyanin blood, amebocyte detail inset -->

  <!-- bg -->
  <g id="bg" data-label="dark ocean shelf background">
    <rect x="0" y="0" width="800" height="600" fill="#1C1E35"/>
    <rect x="0" y="420" width="800" height="180" fill="#2D3E6B" opacity="0.45"/>
  </g>

  <!-- context: sandy bottom and scattered grains -->
  <g id="context" data-label="sandy sea bottom texture">
    <line x1="0" y1="430" x2="800" y2="430" stroke="#5B6FA8" stroke-width="1" stroke-dasharray="3 6" opacity="0.5"/>
    <circle cx="80" cy="510" r="2" fill="#D4A574" opacity="0.5"/>
    <circle cx="150" cy="550" r="1.5" fill="#D4A574" opacity="0.5"/>
    <circle cx="240" cy="530" r="2" fill="#D4A574" opacity="0.5"/>
    <circle cx="320" cy="570" r="1.5" fill="#D4A574" opacity="0.5"/>
    <circle cx="640" cy="540" r="2" fill="#D4A574" opacity="0.5"/>
    <circle cx="720" cy="560" r="1.5" fill="#D4A574" opacity="0.5"/>
  </g>

  <!-- subject: horseshoe crab from above -->
  <g id="subject" data-label="horseshoe crab Limulus polyphemus dorsal view">
    <!-- prosoma (head shield) - classic horseshoe shape -->
    <path d="M 200 330
             Q 200 220 320 200
             Q 400 194 480 200
             Q 600 220 600 330
             Q 600 345 580 350
             L 220 350
             Q 200 345 200 330 Z"
          fill="#6B4423" stroke="#0D0D16" stroke-width="2.5"/>

    <!-- opisthosoma (abdomen) -->
    <path d="M 230 350
             L 570 350
             Q 570 420 500 435
             Q 400 445 300 435
             Q 230 420 230 350 Z"
          fill="#6B4423" stroke="#0D0D16" stroke-width="2.5"/>

    <!-- spine ridge detail on opisthosoma -->
    <g id="spines" data-label="lateral spines along abdomen">
      <path d="M 250 365 L 240 378" stroke="#0D0D16" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 250 395 L 238 408" stroke="#0D0D16" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 260 420 L 248 432" stroke="#0D0D16" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 550 365 L 560 378" stroke="#0D0D16" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 550 395 L 562 408" stroke="#0D0D16" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 540 420 L 552 432" stroke="#0D0D16" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- tail (telson) -->
    <path d="M 400 440 L 400 560" stroke="#6B4423" stroke-width="9" stroke-linecap="round"/>
    <path d="M 400 440 L 400 560" stroke="#0D0D16" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- central carapace ridge -->
    <path d="M 400 210 L 400 350" stroke="#0D0D16" stroke-width="1.5" opacity="0.6" fill="none"/>
    <!-- compound eyes on prosoma -->
    <g id="eyes" data-label="lateral compound eyes">
      <ellipse cx="310" cy="260" rx="10" ry="8" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
      <circle cx="310" cy="260" r="4" fill="#0D0D16"/>
      <circle cx="307.5" cy="258" r="2" fill="#FBFFF6" opacity="0.85"/>
      <ellipse cx="490" cy="260" rx="10" ry="8" fill="#E8EEFF" stroke="#D4A574" stroke-width="1.5"/>
      <circle cx="490" cy="260" r="4" fill="#0D0D16"/>
      <circle cx="487.5" cy="258" r="2" fill="#FBFFF6" opacity="0.85"/>
    </g>
  </g>

  <!-- detail-blood: blue blood pooling from sampling puncture -->
  <g id="detail-blood" data-label="blue hemocyanin blood pooling from sampling site">
    <!-- sampling puncture highlight -->
    <circle cx="400" cy="280" r="5" fill="#CA1E08" stroke="#0D0D16" stroke-width="1"/>
    <!-- blood trickle/pool -->
    <path d="M 400 285
             Q 405 310 395 335
             Q 385 360 400 385
             Q 415 405 395 425
             Q 375 450 410 470
             Q 440 485 435 510"
          fill="none" stroke="#5B6FA8" stroke-width="5" stroke-linecap="round"/>
    <!-- pool on floor -->
    <ellipse cx="440" cy="520" rx="55" ry="14" fill="#5B6FA8" opacity="0.85"/>
    <ellipse cx="440" cy="518" rx="35" ry="8" fill="#8BA0D6" opacity="0.7"/>
    <!-- droplets -->
    <circle cx="390" cy="400" r="3.5" fill="#5B6FA8"/>
    <circle cx="420" cy="450" r="3" fill="#5B6FA8"/>
    <circle cx="470" cy="490" r="2.5" fill="#8BA0D6"/>
  </g>

  <!-- detail-cell: amebocyte enlarged inset upper right -->
  <g id="detail-cell" data-label="amebocyte cell inset showing clotting response">
    <!-- inset box -->
    <rect x="625" y="80" width="155" height="155" rx="6"
          fill="#2D3E6B" stroke="#8BA0D6" stroke-width="1.5"
          stroke-dasharray="6 4"/>
    <!-- amebocyte cell body -->
    <path d="M 702 120
             Q 740 125 745 160
             Q 748 195 710 200
             Q 675 205 665 175
             Q 660 140 702 120 Z"
          fill="#8BA0D6" stroke="#FBFFF6" stroke-width="2"/>
    <!-- nucleus -->
    <ellipse cx="705" cy="160" rx="14" ry="12" fill="#2D3E6B" stroke="#FBFFF6" stroke-width="1.5"/>
    <!-- granules -->
    <circle cx="685" cy="145" r="2.5" fill="#E6B800"/>
    <circle cx="728" cy="150" r="2.5" fill="#E6B800"/>
    <circle cx="690" cy="180" r="2.5" fill="#E6B800"/>
    <circle cx="725" cy="185" r="2.5" fill="#E6B800"/>
    <circle cx="705" cy="190" r="2.5" fill="#E6B800"/>
    <!-- endotoxin triggers (small red marks) -->
    <circle cx="670" cy="130" r="3" fill="#CA1E08"/>
    <circle cx="745" cy="195" r="3" fill="#CA1E08"/>
  </g>

  <!-- label -->
  <g id="label" data-label="price label">
    <text x="40" y="75" font-family="Barlow, system-ui, sans-serif"
          font-weight="800" font-size="34" fill="#FBFFF6">$60,000 / gallon</text>
    <text x="40" y="105" font-family="Barlow, system-ui, sans-serif"
          font-weight="500" font-size="20" fill="#8BA0D6"
          font-style="italic">Limulus polyphemus</text>
  </g>

  <!-- overlay: connection line from crab puncture to cell inset -->
  <g id="overlay" data-label="connector line from crab sampling site to amebocyte inset">
    <line x1="410" y1="278" x2="625" y2="160" stroke="#8BA0D6"
          stroke-width="1.5" stroke-dasharray="6 4" stroke-linecap="round"/>
  </g>
</svg>
