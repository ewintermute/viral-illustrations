<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AWW Viral Illustrations — Critter Animations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background:#1C1E35; color:#FBFFF6; font-family:'Inter',system-ui,sans-serif; padding-bottom:80px; }

    header {
      padding:40px 48px 28px; border-bottom:1px solid #3D3D52;
      display:flex; align-items:baseline; gap:24px; flex-wrap:wrap;
    }
    header h1 { font-family:'Barlow',sans-serif; font-weight:900; font-size:clamp(22px,3.5vw,38px); }
    header nav { display:flex; gap:20px; }
    header nav a { font-size:13px; color:#8BA0D6; text-decoration:none; }
    header nav a:hover { color:#D1DCFF; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(400px,1fr));
      gap:1px; background:#3D3D52; margin-top:1px;
    }
    .card { background:#1C1E35; display:flex; flex-direction:column; }

    .stage {
      background:#0D0D16; aspect-ratio:4/3;
      position:relative; overflow:hidden; cursor:pointer;
    }
    .stage svg { width:100%; height:100%; display:block; position:absolute; inset:0; }

    /* Script caption overlay */
    .caption-bar {
      position:absolute; bottom:0; left:0; right:0;
      background:rgba(13,13,22,0.82);
      padding:10px 16px;
      font-family:'Inter',sans-serif; font-size:13px; line-height:1.55;
      color:#FBFFF6; min-height:52px;
      display:flex; align-items:center;
      opacity:0; transition:opacity 0.3s;
      pointer-events:none;
    }
    .stage.playing .caption-bar { opacity:1; }

    /* Play overlay */
    .play-cover {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(13,13,22,0.5); transition:opacity 0.2s;
    }
    .stage.playing .play-cover { opacity:0; pointer-events:none; }
    .play-ring {
      width:60px; height:60px; border-radius:50%;
      background:rgba(255,255,255,0.08);
      border:2px solid rgba(255,255,255,0.25);
      display:flex; align-items:center; justify-content:center;
      font-size:22px; padding-left:4px; color:#FBFFF6;
    }

    /* Progress bar */
    .progress-bar {
      position:absolute; bottom:0; left:0; right:0; height:2px;
      background:#3D3D52; display:none;
    }
    .stage.playing .progress-bar { display:block; }
    .progress-fill { height:100%; background:#8BA0D6; width:0%; transition:width 0.25s linear; }

    /* Replay button */
    .replay-btn {
      display:none; position:absolute; top:10px; right:12px;
      font-family:'Barlow',sans-serif; font-size:11px; font-weight:700;
      letter-spacing:0.1em; text-transform:uppercase;
      color:#8BA0D6; cursor:pointer; background:none; border:none;
      padding:4px 8px;
    }
    .stage.done .replay-btn { display:block; }

    .card-meta { padding:14px 20px 18px; border-top:1px solid #3D3D52; }
    .card-id    { font-family:'Barlow',sans-serif; font-weight:700; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:#2FBF39; margin-bottom:4px; }
    .card-title { font-family:'Barlow',sans-serif; font-weight:700; font-size:15px; color:#FBFFF6; margin-bottom:6px; }
    .card-hook  { font-size:12px; color:#A8A8B5; line-height:1.6; }
    .duration   { display:inline-block; font-size:10px; background:#3D3D52; color:#A8A8B5; padding:2px 7px; margin-top:8px; }
  </style>
</head>

// ─── Animation engine ─────────────────────────────────────────────────────
function fadeIn(el, delay, dur) {
  el.style.opacity = '0';
  el.style.transition = `opacity ${dur}s ease ${delay}s`;
  requestAnimationFrame(() => requestAnimationFrame(() => { el.style.opacity = '1'; }));
}

function buildCard(def) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="stage" id="stage-${def.id}">
      <div class="caption-bar" id="cap-${def.id}"></div>
      <div class="progress-bar"><div class="progress-fill" id="prog-${def.id}"></div></div>
      <div class="play-cover" id="cover-${def.id}"><div class="play-ring">▶</div></div>
      <button class="replay-btn" id="replay-${def.id}">↺ Replay</button>
    </div>
    <div class="card-meta">
      <div class="card-id">${def.id}</div>
      <div class="card-title">${def.title}</div>
      <div class="card-hook">${def.hook}</div>
      <div class="duration">${def.duration}s</div>
    </div>`;
  document.getElementById('grid').appendChild(card);

  const stage   = document.getElementById(`stage-${def.id}`);
  const cap     = document.getElementById(`cap-${def.id}`);
  const prog    = document.getElementById(`prog-${def.id}`);
  const cover   = document.getElementById(`cover-${def.id}`);
  const replay  = document.getElementById(`replay-${def.id}`);

  let svgEl = null;
  let timers = [];

  function loadSVG(cb) {
    fetch(def.file).then(r => r.text()).then(txt => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(txt, 'image/svg+xml');
      const svg = doc.documentElement;
      svg.setAttribute('width', '100%');
      svg.setAttribute('height', '100%');
      // Hide all non-bg groups
      svg.querySelectorAll('g[id]').forEach(g => {
        if (g.id !== 'bg') { g.style.opacity = '0'; g.style.transition = 'opacity 0.8s ease'; }
      });
      // Insert before caption
      stage.insertBefore(svg, cap);
      svgEl = svg;
      if (cb) cb();
    });
  }

  function clearTimers() { timers.forEach(clearTimeout); timers = []; }

  function playAnimation() {
    stage.classList.remove('done');
    stage.classList.add('playing');
    cap.textContent = '';

    // Progress bar
    prog.style.transition = `width ${def.duration}s linear`;
    prog.style.width = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => { prog.style.width = '100%'; }));

    // Schedule beats
    def.beats.forEach((beat, i) => {
      const t = timers.push(setTimeout(() => {
        // Update caption
        cap.textContent = beat.caption;
        // Reveal groups
        if (beat.show && svgEl) {
          beat.show.forEach(id => {
            const g = svgEl.querySelector(`#${id}`);
            if (g) { g.style.opacity = '1'; }
          });
        }
      }, beat.t * 1000));
    });

    // End
    timers.push(setTimeout(() => {
      stage.classList.remove('playing');
      stage.classList.add('done');
      cap.textContent = '';
    }, def.duration * 1000));
  }

  function reset() {
    clearTimers();
    stage.classList.remove('playing', 'done');
    prog.style.transition = 'none'; prog.style.width = '0%';
    cap.textContent = '';
    if (svgEl) { stage.removeChild(svgEl); svgEl = null; }
    loadSVG(() => {});
  }

  // Load on page ready
  loadSVG(() => {});

  // Play on click
  cover.addEventListener('click', () => {
    if (!svgEl) return;
    playAnimation();
  });

  replay.addEventListener('click', () => { reset(); setTimeout(playAnimation, 100); });
}
