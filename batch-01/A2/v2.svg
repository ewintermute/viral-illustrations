  <circle cx="400" cy="280" r="93" fill="none" stroke="#5B6FA8" stroke-width="0.9" opacity="0.5"/>
  <circle cx="400" cy="280" r="90" fill="none" stroke="#A0785A" stroke-width="1" opacity="0.6"/>
  <circle cx="400" cy="280" r="87" fill="none" stroke="#5B6FA8" stroke-width="0.8" opacity="0.5"/>
  <circle cx="400" cy="280" r="84" fill="none" stroke="#A0785A" stroke-width="0.9" opacity="0.6"/>
  <circle cx="400" cy="280" r="81" fill="none" stroke="#5B6FA8" stroke-width="0.8" opacity="0.5"/>
  <circle cx="400" cy="280" r="78" fill="none" stroke="#A0785A" stroke-width="0.9" opacity="0.6"/>
  <circle cx="400" cy="280" r="75" fill="none" stroke="#5B6FA8" stroke-width="0.8" opacity="0.5"/>
  <circle cx="400" cy="280" r="72" fill="none" stroke="#A0785A" stroke-width="0.8" opacity="0.6"/>
  <circle cx="400" cy="280" r="69" fill="none" stroke="#5B6FA8" stroke-width="0.7" opacity="0.5"/>
  <circle cx="400" cy="280" r="66" fill="none" stroke="#A0785A" stroke-width="0.8" opacity="0.6"/>
  <circle cx="400" cy="280" r="63" fill="none" stroke="#5B6FA8" stroke-width="0.7" opacity="0.5"/>
  <circle cx="400" cy="280" r="60" fill="none" stroke="#A0785A" stroke-width="0.8" opacity="0.6"/>
  <circle cx="400" cy="280" r="57" fill="none" stroke="#5B6FA8" stroke-width="0.7" opacity="0.5"/>
  <circle cx="400" cy="280" r="54" fill="none" stroke="#A0785A" stroke-width="0.7" opacity="0.6"/>
  <circle cx="400" cy="280" r="51" fill="none" stroke="#5B6FA8" stroke-width="0.7" opacity="0.5"/>
  <circle cx="400" cy="280" r="48" fill="none" stroke="#A0785A" stroke-width="0.7" opacity="0.6"/>
  <circle cx="400" cy="280" r="45" fill="none" stroke="#5B6FA8" stroke-width="0.6" opacity="0.5"/>
  <circle cx="400" cy="280" r="42" fill="none" stroke="#A0785A" stroke-width="0.7" opacity="0.6"/>
  <circle cx="400" cy="280" r="39" fill="none" stroke="#5B6FA8" stroke-width="0.6" opacity="0.5"/>
  <circle cx="400" cy="280" r="36" fill="none" stroke="#A0785A" stroke-width="0.6" opacity="0.6"/>
  <circle cx="400" cy="280" r="33" fill="none" stroke="#5B6FA8" stroke-width="0.6" opacity="0.5"/>
  <circle cx="400" cy="280" r="30" fill="none" stroke="#A0785A" stroke-width="0.6" opacity="0.6"/>
  <circle cx="400" cy="280" r="27" fill="none" stroke="#5B6FA8" stroke-width="0.5" opacity="0.5"/>
  <circle cx="400" cy="280" r="24" fill="none" stroke="#A0785A" stroke-width="0.6" opacity="0.6"/>
  <circle cx="400" cy="280" r="21" fill="none" stroke="#5B6FA8" stroke-width="0.5" opacity="0.5"/>
  <circle cx="400" cy="280" r="18" fill="none" stroke="#A0785A" stroke-width="0.5" opacity="0.6"/>
  <circle cx="400" cy="280" r="15" fill="none" stroke="#5B6FA8" stroke-width="0.5" opacity="0.5"/>
  <circle cx="400" cy="280" r="12" fill="none" stroke="#A0785A" stroke-width="0.5" opacity="0.6"/>
  <circle cx="400" cy="280" r="9" fill="none" stroke="#5B6FA8" stroke-width="0.4" opacity="0.5"/>
  <circle cx="400" cy="280" r="6" fill="none" stroke="#A0785A" stroke-width="0.4" opacity="0.6"/>
  
  <!-- Heartwood center -->
  <circle cx="400" cy="280" r="4" fill="#A0785A" opacity="0.8"/>
  
  <!-- Resin pockets - irregular dark spots -->
  <ellipse cx="320" cy="240" rx="18" ry="12" fill="#CA1E08" opacity="0.4" transform="rotate(-25 320 240)"/>
  <ellipse cx="460" cy="310" rx="22" ry="14" fill="#CA1E08" opacity="0.35" transform="rotate(40 460 310)"/>
  <ellipse cx="385" cy="380" rx="16" ry="11" fill="#CA1E08" opacity="0.38" transform="rotate(-15 385 380)"/>
  <ellipse cx="510" cy="235" rx="20" ry="13" fill="#CA1E08" opacity="0.36" transform="rotate(55 510 235)"/>
  
  <!-- Small resin spots -->
  <ellipse cx="290" cy="310" rx="10" ry="7" fill="#CA1E08" opacity="0.3"/>
  <ellipse cx="490" cy="380" rx="11" ry="8" fill="#CA1E08" opacity="0.32"/>
  
  <!-- Annotation lines with labels -->
  <!-- Total ring count annotation -->
  <line x1="400" y1="280" x2="615" y2="280" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <text x="625" y="275" fill="#D1DCFF" font-size="20" font-weight="600" class="label">4,857 rings</text>
  <text x="625" y="295" fill="#D1DCFF" font-size="14" opacity="0.8" class="label">~1 ring per year</text>
  
  <!-- Birth year annotation -->
  <line x1="400" y1="283" x2="400" y2="60" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <circle cx="400" cy="280" r="4" fill="#FFFF77" opacity="0.6"/>
  <text x="400" y="45" fill="#FFFF77" font-size="18" font-weight="600" text-anchor="middle" class="label">2832 BCE</text>
  <text x="400" y="65" fill="#D1DCFF" font-size="13" opacity="0.8" text-anchor="middle" class="label">germination year</text>
  
  <!-- Resin pocket annotation -->
  <line x1="320" y1="240" x2="220" y2="180" stroke="#5B6FA8" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="210" y="175" fill="#E85542" font-size="15" opacity="0.9" text-anchor="end" class="label">resin pockets</text>
  
  <!-- Dense ring detail annotation -->
  <line x1="430" y1="280" x2="530" y2="420" stroke="#5B6FA8" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="540" y="420" fill="#D1DCFF" font-size="14" opacity="0.85" class="label">impossibly dense</text>
  <text x="540" y="437" fill="#D1DCFF" font-size="14" opacity="0.85" class="label">growth rings</text>
