  <circle cx="400" cy="280" r="215" fill="#D4A574" opacity="0.3"/>
  
  <!-- Annual rings - from outer to inner, progressively denser -->
  <!-- Outer rings (younger, slightly wider spacing) -->
  <circle cx="400" cy="280" r="210" fill="none" stroke="#A0785A" stroke-width="2.5" opacity="0.6"/>
  <circle cx="400" cy="280" r="205" fill="none" stroke="#5B6FA8" stroke-width="1.8" opacity="0.5"/>
  <circle cx="400" cy="280" r="200" fill="none" stroke="#A0785A" stroke-width="2.2" opacity="0.6"/>
  <circle cx="400" cy="280" r="195" fill="none" stroke="#5B6FA8" stroke-width="1.8" opacity="0.5"/>
  <circle cx="400" cy="280" r="190" fill="none" stroke="#A0785A" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="280" r="185" fill="none" stroke="#5B6FA8" stroke-width="1.6" opacity="0.5"/>
  <circle cx="400" cy="280" r="180" fill="none" stroke="#A0785A" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="280" r="175" fill="none" stroke="#5B6FA8" stroke-width="1.5" opacity="0.5"/>
  <circle cx="400" cy="280" r="170" fill="none" stroke="#A0785A" stroke-width="1.8" opacity="0.6"/>
  <circle cx="400" cy="280" r="165" fill="none" stroke="#5B6FA8" stroke-width="1.4" opacity="0.5"/>
  
  <!-- Middle rings (tighter) -->
  <circle cx="400" cy="280" r="160" fill="none" stroke="#A0785A" stroke-width="1.6" opacity="0.6"/>
  <circle cx="400" cy="280" r="156" fill="none" stroke="#5B6FA8" stroke-width="1.3" opacity="0.5"/>
  <circle cx="400" cy="280" r="152" fill="none" stroke="#A0785A" stroke-width="1.5" opacity="0.6"/>
  <circle cx="400" cy="280" r="148" fill="none" stroke="#5B6FA8" stroke-width="1.2" opacity="0.5"/>
  <circle cx="400" cy="280" r="144" fill="none" stroke="#A0785A" stroke-width="1.4" opacity="0.6"/>
  <circle cx="400" cy="280" r="140" fill="none" stroke="#5B6FA8" stroke-width="1.2" opacity="0.5"/>
  <circle cx="400" cy="280" r="136" fill="none" stroke="#A0785A" stroke-width="1.3" opacity="0.6"/>
  <circle cx="400" cy="280" r="132" fill="none" stroke="#5B6FA8" stroke-width="1.1" opacity="0.5"/>
  <circle cx="400" cy="280" r="128" fill="none" stroke="#A0785A" stroke-width="1.3" opacity="0.6"/>
  <circle cx="400" cy="280" r="124" fill="none" stroke="#5B6FA8" stroke-width="1.1" opacity="0.5"/>
  <circle cx="400" cy="280" r="120" fill="none" stroke="#A0785A" stroke-width="1.2" opacity="0.6"/>
  <circle cx="400" cy="280" r="116" fill="none" stroke="#5B6FA8" stroke-width="1" opacity="0.5"/>
  <circle cx="400" cy="280" r="112" fill="none" stroke="#A0785A" stroke-width="1.2" opacity="0.6"/>
  <circle cx="400" cy="280" r="108" fill="none" stroke="#5B6FA8" stroke-width="1" opacity="0.5"/>
  <circle cx="400" cy="280" r="104" fill="none" stroke="#A0785A" stroke-width="1.1" opacity="0.6"/>
  <circle cx="400" cy="280" r="100" fill="none" stroke="#5B6FA8" stroke-width="0.9" opacity="0.5"/>
  
  <!-- Inner rings (extremely dense - almost touching) -->
