<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&amp;display=swap');
      text { font-family: 'Barlow', sans-serif; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D16"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#D1DCFF" font-size="24" font-weight="600">Anopheles gambiae</text>
  <text x="400" y="65" text-anchor="middle" fill="#5B6FA8" font-size="14" font-style="italic">Female, resting posture</text>
  
  <!-- Mosquito body - angled characteristic posture -->
  <g id="mosquito-portrait">
    <!-- Abdomen - segmented, angled upward -->
    <ellipse cx="450" cy="320" rx="65" ry="22" fill="#2D3E6B" transform="rotate(-35 450 320)"/>
    <ellipse cx="470" cy="290" rx="60" ry="20" fill="#5B6FA8" transform="rotate(-35 470 290)"/>
    <ellipse cx="488" cy="265" rx="52" ry="18" fill="#2D3E6B" transform="rotate(-35 488 265)"/>
    <ellipse cx="502" cy="242" rx="44" ry="16" fill="#5B6FA8" transform="rotate(-35 502 242)"/>
    <ellipse cx="514" cy="222" rx="36" ry="14" fill="#2D3E6B" transform="rotate(-35 514 222)"/>
    
    <!-- Abdomen segments detail lines -->
    <path d="M 420 310 Q 455 295 485 275" stroke="#1A5C1E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 428 315 Q 463 300 493 280" stroke="#1A5C1E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    
    <!-- Thorax -->
    <ellipse cx="530" cy="200" rx="28" ry="24" fill="#2D3E6B"/>
    <circle cx="530" cy="198" r="18" fill="#5B6FA8"/>
    
    <!-- Head -->
    <circle cx="560" cy="185" r="16" fill="#2D3E6B"/>
    <circle cx="565" cy="178" r="8" fill="#CA1E08" opacity="0.8"/>
    <circle cx="565" cy="192" r="8" fill="#CA1E08" opacity="0.8"/>
    
    <!-- Compound eyes detail -->
    <circle cx="565" cy="178" r="7" fill="none" stroke="#E85542" stroke-width="1"/>
    <circle cx="565" cy="192" r="7" fill="none" stroke="#E85542" stroke-width="1"/>
    
    <!-- Proboscis - long and prominent -->
    <path d="M 575 185 L 680 185" stroke="#A0785A" stroke-width="3" stroke-linecap="round"/>
    <path d="M 575 185 L 680 185" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Maxillary palps -->
    <path d="M 570 182 L 640 175" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
    <path d="M 570 188 L 640 195" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Wings - scaled pattern, characteristic Anopheles shape -->
    <!-- Left wing -->
    <g id="left-wing">
      <path d="M 530 195 Q 480 120 420 140 Q 380 150 360 180 Q 350 200 365 215 Q 390 230 450 220 Q 500 210 530 205 Z" 
            fill="#D1DCFF" opacity="0.4" stroke="#FBFFF6" stroke-width="1.5"/>
      <!-- Wing veins -->
      <path d="M 530 195 L 420 145" stroke="#5B6FA8" stroke-width="1" stroke-linecap="round"/>
      <path d="M 530 195 L 380 170" stroke="#5B6FA8" stroke-width="1" stroke-linecap="round"/>
      <path d="M 530 195 L 370 195" stroke="#5B6FA8" stroke-width="1" stroke-linecap="round"/>
      <path d="M 530 200 L 400 215" stroke="#5B6FA8" stroke-width="1" stroke-linecap="round"/>
      <!-- Wing scales (dots) -->
      <circle cx="420" cy="150" r="2" fill="#FBFFF6"/>
      <circle cx="440" cy="155" r="2" fill="#FBFFF6"/>
      <circle cx="460" cy="160" r="2" fill="#FBFFF6"/>
      <circle cx="480" cy="165" r="2" fill="#FBFFF6"/>
      <circle cx="390" cy="175" r="2" fill="#FBFFF6"/>
      <circle cx="410" cy="180" r="2" fill="#FBFFF6"/>
      <circle cx="430" cy="185" r="2" fill="#FBFFF6"/>
      <circle cx="380" cy="200" r="2" fill="#FBFFF6"/>
      <circle cx="400" cy="205" r="2" fill="#FBFFF6"/>
    </g>
    
    <!-- Right wing (partially visible) -->
    <g id="right-wing">
      <path d="M 530 200 Q 560 160 600 165 Q 630 170 645 185 Q 655 200 645 210 Q 620 220 580 215 Q 545 210 530 205 Z" 
            fill="#D1DCFF" opacity="0.25" stroke="#FBFFF6" stroke-width="1"/>
      <path d="M 530 200 L 600 170" stroke="#5B6FA8" stroke-width="1" stroke-linecap="round"/>
      <path d="M 530 200 L 640 190" stroke="#5B6FA8" stroke-width="1" stroke-linecap="round"/>
      <circle cx="590" cy="175" r="2" fill="#FBFFF6"/>
      <circle cx="610" cy="180" r="2" fill="#FBFFF6"/>
    </g>
    
    <!-- Legs - six legs, hind legs characteristically raised -->
    <!-- Front legs -->
    <path d="M 545 195 L 570 160 L 590 140" stroke="#5B6FA8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 545 197 L 560 170 L 575 155" stroke="#5B6FA8" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Middle legs -->
    <path d="M 520 205 L 500 240 L 485 270" stroke="#5B6FA8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 525 208 L 510 235 L 500 260" stroke="#5B6FA8" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Hind legs - raised high (characteristic posture) -->
    <path d="M 505 225 L 470 180 L 450 150 L 440 130" stroke="#2D3E6B" stroke-width="3" stroke-linecap="round"/>
    <path d="M 505 225 L 470 180 L 450 150 L 440 130" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
    
    <path d="M 510 230 L 485 195 L 475 170 L 470 155" stroke="#2D3E6B" stroke-width="3" stroke-linecap="round"/>
    <path d="M 510 230 L 485 195 L 475 170 L 470 155" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Leg joints -->
    <circle cx="590" cy="140" r="3" fill="#2D3E6B"/>
    <circle cx="575" cy="155" r="3" fill="#2D3E6B"/>
    <circle cx="485" cy="270" r="3" fill="#2D3E6B"/>
    <circle cx="440" cy="130" r="3" fill="#2D3E6B"/>
    <circle cx="470" cy="155" r="3" fill="#2D3E6B"/>
  </g>
  
  <!-- Annotations -->
  <g id="annotations" opacity="0.9">
    <line x1="680" y1="185" x2="720" y2="160" stroke="#FFFF77" stroke-width="1" stroke-linecap="round"/>
    <text x="725" y="155" fill="#FFFF77" font-size="12">Proboscis</text>
    <text x="725" y="168" fill="#D1DCFF" font-size="10">Female, piercing-sucking</text>
    
    <line x1="565" y1="178" x2="600" y2="130" stroke="#FFFF77" stroke-width="1" stroke-linecap="round"/>
    <text x="605" y="125" fill="#FFFF77" font-size="12">Compound eyes</text>
    
    <line x1="440" y1="130" x2="380" y2="90" stroke="#FFFF77" stroke-width="1" stroke-linecap="round"/>
    <text x="280" y="85" fill="#FFFF77" font-size="12">Raised hind legs</text>
    <text x="280" y="98" fill="#D1DCFF" font-size="10">Characteristic resting posture</text>
    
    <line x1="420" y1="150" x2="320" y2="180" stroke="#FFFF77" stroke-width="1" stroke-linecap="round"/>
    <text x="160" y="180" fill="#FFFF77" font-size="12">Wing scales</text>
    <text x="160" y="193" fill="#D1DCFF" font-size="10">Species identification marker</text>
  </g>
  
  <!-- Bottom caption -->
  <text x="400" y="550" text-anchor="middle" fill="#5B6FA8" font-size="13">
    Only female mosquitoes feed on blood — required for egg development
  </text>
  <text x="400" y="570" text-anchor="middle" fill="#D1DCFF" font-size="11">
    Anopheles posture: body angled away from surface, hind legs raised
  </text>
</svg>