<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&amp;family=Inter:wght@400;600&amp;display=swap');
      text { font-family: 'Barlow', sans-serif; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D16"/>
  
  <!-- Tidal flat water -->
  <ellipse id="water-pool" cx="400" cy="480" rx="320" ry="80" fill="#2D3E6B"/>
  <ellipse cx="400" cy="480" rx="280" ry="60" fill="#5B6FA8" opacity="0.4"/>
  
  <!-- Sand/sediment -->
  <ellipse cx="200" cy="520" rx="140" ry="35" fill="#A0785A"/>
  <ellipse cx="600" cy="510" rx="120" ry="30" fill="#A0785A"/>
  <ellipse cx="400" cy="540" rx="180" ry="40" fill="#D4A574"/>
  
  <!-- Horseshoe crab - main body -->
  <g id="horseshoe-crab">
    <!-- Tail (telson) -->
    <line x1="400" y1="380" x2="400" y2="520" stroke="#A0785A" stroke-width="8" stroke-linecap="round"/>
    <line x1="400" y1="380" x2="400" y2="520" stroke="#D4A574" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Opisthosoma (middle section) -->
    <ellipse cx="400" cy="320" rx="85" ry="70" fill="#A0785A"/>
    <ellipse cx="400" cy="320" rx="80" ry="65" fill="#D4A574"/>
    
    <!-- Book gills hint at edge -->
    <g id="book-gills">
      <line x1="340" y1="340" x2="320" y2="355" stroke="#A0785A" stroke-width="3" stroke-linecap="round"/>
      <line x1="345" y1="350" x2="325" y2="365" stroke="#A0785A" stroke-width="3" stroke-linecap="round"/>
      <line x1="350" y1="360" x2="330" y2="375" stroke="#A0785A" stroke-width="3" stroke-linecap="round"/>
      
      <line x1="460" y1="340" x2="480" y2="355" stroke="#A0785A" stroke-width="3" stroke-linecap="round"/>
      <line x1="455" y1="350" x2="475" y2="365" stroke="#A0785A" stroke-width="3" stroke-linecap="round"/>
      <line x1="450" y1="360" x2="470" y2="375" stroke="#A0785A" stroke-width="3" stroke-linecap="round"/>
    </g>
    
    <!-- Prosoma (carapace - main dome) -->
    <path d="M 400 180 Q 300 180 270 240 Q 260 280 270 320 Q 290 360 320 370 L 480 370 Q 510 360 530 320 Q 540 280 530 240 Q 500 180 400 180 Z" 
          fill="#A0785A"/>
    <path d="M 400 185 Q 305 185 277 240 Q 267 280 277 318 Q 295 355 322 365 L 478 365 Q 505 355 523 318 Q 533 280 523 240 Q 495 185 400 185 Z" 
          fill="#D4A574"/>
    
    <!-- Carapace texture lines -->
    <path d="M 400 190 Q 380 200 365 220" stroke="#A0785A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 400 190 Q 420 200 435 220" stroke="#A0785A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 320 260 Q 340 270 360 280" stroke="#A0785A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 480 260 Q 460 270 440 280" stroke="#A0785A" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Compound eyes -->
    <circle cx="360" cy="230" r="12" fill="#2D3E6B"/>
    <circle cx="440" cy="230" r="12" fill="#2D3E6B"/>
    <circle cx="360" cy="230" r="8" fill="#5B6FA8"/>
    <circle cx="440" cy="230" r="8" fill="#5B6FA8"/>
    
    <!-- Central eye ridge -->
    <ellipse cx="400" cy="215" rx="15" ry="8" fill="#A0785A"/>
    <circle cx="395" cy="215" r="3" fill="#2D3E6B"/>
    <circle cx="405" cy="215" r="3" fill="#2D3E6B"/>
  </g>
  
  <!-- Blue blood droplet/stream -->
  <g id="blue-blood">
    <ellipse cx="430" cy="290" rx="8" ry="12" fill="#5B6FA8"/>
    <ellipse cx="435" cy="310" rx="6" ry="9" fill="#5B6FA8"/>
    <circle cx="438" cy="325" r="5" fill="#5B6FA8"/>
    <circle cx="440" cy="338" r="4" fill="#D1DCFF"/>
  </g>
  
  <!-- Title and info -->
  <text x="400" y="50" text-anchor="middle" fill="#FBFFF6" font-size="32" font-weight="700">Limulus polyphemus</text>
  <text x="400" y="80" text-anchor="middle" fill="#D1DCFF" font-size="18" font-weight="400" font-style="italic">450 million years old</text>
  
  <!-- Blue blood callout -->
  <line x1="445" y1="320" x2="520" y2="280" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  <text x="530" y="275" fill="#5B6FA8" font-size="16" font-weight="600">copper-based</text>
  <text x="530" y="295" fill="#D1DCFF" font-size="16" font-weight="600">blue blood</text>
</svg>
