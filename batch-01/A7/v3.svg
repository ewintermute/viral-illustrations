<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&amp;family=Inter:wght@400;600&amp;display=swap');
      text { font-family: 'Barlow', sans-serif; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D16"/>
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#FBFFF6" font-size="32" font-weight="700">Guardian of Medicine</text>
  <text x="400" y="80" text-anchor="middle" fill="#2FBF39" font-size="18" font-weight="400">FDA standard since 1977</text>
  
  <!-- Central crab (simplified, iconic) -->
  <g id="guardian-crab">
    <!-- Tail -->
    <line x1="200" y1="380" x2="200" y2="480" stroke="#D4A574" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Body -->
    <ellipse cx="200" cy="340" rx="45" ry="35" fill="#D4A574"/>
    
    <!-- Carapace -->
    <path d="M 200 280 Q 150 280 130 320 Q 125 340 135 360 L 265 360 Q 275 340 270 320 Q 250 280 200 280 Z" 
          fill="#D4A574"/>
    <path d="M 200 285 Q 155 285 137 320 Q 132 340 140 355 L 260 355 Q 268 340 265 320 Q 248 285 200 285 Z" 
          fill="#A0785A" opacity="0.3"/>
    
    <!-- Eyes -->
    <circle cx="180" cy="310" r="8" fill="#2D3E6B"/>
    <circle cx="220" cy="310" r="8" fill="#2D3E6B"/>
  </g>
  
  <!-- Medical vial -->
  <g id="vial">
    <!-- Vial body -->
    <rect x="320" y="320" width="50" height="100" rx="5" fill="none" stroke="#D1DCFF" stroke-width="3"/>
    <rect x="322" y="350" width="46" height="67" fill="#5B6FA8" opacity="0.6"/>
    
    <!-- Cap -->
    <rect x="315" y="310" width="60" height="15" rx="3" fill="#5B6FA8"/>
    <circle cx="345" cy="317" r="3" fill="#D1DCFF"/>
    
    <!-- Label -->
    <rect x="325" y="365" width="40" height="30" fill="#FBFFF6"/>
    <text x="345" y="380" text-anchor="middle" fill="#0D0D16" font-size="10" font-weight="600">LAL</text>
    <text x="345" y="390" text-anchor="middle" fill="#E85542" font-size="8" font-weight="400">TEST</text>
  </g>
  
  <!-- Syringe -->
  <g id="syringe">
    <!-- Barrel -->
    <rect x="410" y="340" width="35" height="70" rx="3" fill="none" stroke="#D1DCFF" stroke-width="3"/>
    <rect x="412" y="380" width="31" height="28" fill="#5B6FA8" opacity="0.4"/>
    
    <!-- Plunger -->
    <rect x="420" y="325" width="15" height="20" fill="#5B6FA8"/>
    <line x1="427.5" y1="325" x2="427.5" y2="345" stroke="#D1DCFF" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Needle -->
    <rect x="425.5" y="410" width="3" height="35" fill="#D1DCFF"/>
    <polygon points="425.5,445 427,450 428.5,445" fill="#D1DCFF"/>
  </g>
  
  <!-- Connecting lines to crab -->
  <line x1="265" y1="340" x2="320" y2="365" stroke="#2FBF39" stroke-width="2" stroke-linecap="round" stroke-dasharray="5,5"/>
  <line x1="265" y1="350" x2="410" y2="375" stroke="#2FBF39" stroke-width="2" stroke-linecap="round" stroke-dasharray="5,5"/>
  
  <!-- Label above vial/syringe -->
  <text x="385" y="290" text-anchor="middle" fill="#FBFFF6" font-size="16" font-weight="700">every vaccine</text>
  <text x="385" y="308" text-anchor="middle" fill="#2FBF39" font-size="16" font-weight="700">tested</text>
  
  <!-- Clotting reaction diagram -->
  <g id="clotting-diagram">
    <rect x="480" y="140" width="280" height="280" fill="#2D3E6B" opacity="0.3" rx="5"/>
    
    <!-- Title -->
    <text x="620" y="170" text-anchor="middle" fill="#FBFFF6" font-size="18" font-weight="700">The LAL Reaction</text>
    
    <!-- Bacterial endotoxin -->
    <g id="endotoxin">
      <circle cx="550" cy="220" r="15" fill="#E85542"/>
      <circle cx="560" cy="215" r="4" fill="#CA1E08"/>
      <circle cx="545" cy="225" r="4" fill="#CA1E08"/>
      <text x="550" y="260" text-anchor="middle" fill="#E85542" font-size="12" font-weight="600">endotoxin</text>
    </g>
    
    <!-- Arrow -->
    <line x1="580" y1="220" x2="620" y2="220" stroke="#FFFF77" stroke-width="3" stroke-linecap="round"/>
    <polygon points="620,220 615,216 615,224" fill="#FFFF77"/>
    
    <!-- Amebocyte -->
    <g id="amebocyte">
      <ellipse cx="660" cy="220" rx="20" ry="18" fill="#5B6FA8"/>
      <circle cx="655" cy="218" r="4" fill="#D1DCFF"/>
      <circle cx="665" cy="222" r="3" fill="#D1DCFF"/>
      <text x="660" y="255" text-anchor="middle" fill="#5B6FA8" font-size="12" font-weight="600">amebocyte</text>
    </g>
    
    <!-- Arrow down -->
    <line x1="660" y1="245" x2="660" y2="280" stroke="#FFFF77" stroke-width="3" stroke-linecap="round"/>
    <polygon points="660,280 656,275 664,275" fill="#FFFF77"/>
    
    <!-- Clot explosion -->
    <g id="clot">
      <circle cx="660" cy="320" r="25" fill="none" stroke="#2FBF39" stroke-width="3"/>
      <circle cx="660" cy="320" r="18" fill="none" stroke="#2FBF39" stroke-width="2"/>
      <line x1="660" y1="295" x2="660" y2="280" stroke="#2FBF39" stroke-width="2" stroke-linecap="round"/>
      <line x1="685" y1="320" x2="700" y2="320" stroke="#2FBF39" stroke-width="2" stroke-linecap="round"/>
      <line x1="635" y1="320" x2="620" y2="320" stroke="#2FBF39" stroke-width="2" stroke-linecap="round"/>
      <line x1="660" y1="345" x2="660" y2="360" stroke="#2FBF39" stroke-width="2" stroke-linecap="round"/>
      <line x1="678" y1="303" x2="690" y2="291" stroke="#2FBF39" stroke-width="2" stroke-linecap="round"/>
      <line x1="642" y1="303" x2="630" y2="291" stroke="#2FBF39" stroke-width="2" stroke-linecap="round"/>
      <line x1="678" y1="337" x2="690" y2="349" stroke="#2FBF39" stroke-width="2" stroke-linecap="round"/>
      <line x1="642" y1="337" x2="630" y2="349" stroke="#2FBF39" stroke-width="2" stroke-linecap="round"/>
      
      <text x="660" y="390" text-anchor="middle" fill="#2FBF39" font-size="12" font-weight="700">CLOT</text>
      <text x="660" y="405" text-anchor="middle" fill="#FFFF77" font-size="10" font-weight="400">explosive reaction</text>
    </g>
  </g>
  
  <!-- Bottom stats -->
  <g id="stats">
    <text x="200" y="540" text-anchor="middle" fill="#D1DCFF" font-size="14" font-weight="400">all injectable drugs</text>
    <text x="200" y="560" text-anchor="middle" fill="#2FBF39" font-size="14" font-weight="600">+ medical devices</text>
  </g>
</svg>
