<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&amp;family=Inter:wght@400;600&amp;display=swap');
      text { font-family: 'Barlow', sans-serif; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D16"/>
  
  <!-- Clinical table surface -->
  <rect x="50" y="400" width="700" height="180" fill="#2D3E6B"/>
  <rect x="50" y="400" width="700" height="20" fill="#5B6FA8"/>
  
  <!-- Bleeding rack structure -->
  <g id="rack">
    <!-- Rack base -->
    <rect x="150" y="420" width="200" height="12" fill="#5B6FA8"/>
    <!-- Vertical supports -->
    <rect x="155" y="280" width="8" height="140" fill="#5B6FA8"/>
    <rect x="337" y="280" width="8" height="140" fill="#5B6FA8"/>
    <!-- Top bar -->
    <rect x="150" y="280" width="200" height="12" fill="#5B6FA8"/>
    
    <!-- Restraint bands -->
    <rect x="180" y="320" width="140" height="8" fill="#2D3E6B"/>
    <rect x="180" y="370" width="140" height="8" fill="#2D3E6B"/>
  </g>
  
  <!-- Horseshoe crab in rack (tilted) -->
  <g id="restrained-crab">
    <!-- Tail extending down -->
    <line x1="250" y1="380" x2="250" y2="470" stroke="#A0785A" stroke-width="7" stroke-linecap="round"/>
    <line x1="250" y1="380" x2="250" y2="470" stroke="#D4A574" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Body sections -->
    <ellipse cx="250" cy="350" rx="50" ry="40" fill="#A0785A"/>
    <ellipse cx="250" cy="350" rx="47" ry="37" fill="#D4A574"/>
    
    <!-- Carapace -->
    <ellipse cx="250" cy="310" rx="65" ry="55" fill="#A0785A"/>
    <ellipse cx="250" cy="310" rx="62" ry="52" fill="#D4A574"/>
    
    <!-- Eyes -->
    <circle cx="235" cy="300" r="6" fill="#2D3E6B"/>
    <circle cx="265" cy="300" r="6" fill="#2D3E6B"/>
  </g>
  
  <!-- Needle and cardiac sinus puncture -->
  <g id="needle">
    <!-- Needle shaft -->
    <rect x="248" y="240" width="4" height="60" fill="#D1DCFF"/>
    <polygon points="248,240 250,235 252,240" fill="#D1DCFF"/>
    
    <!-- Needle hub -->
    <rect x="245" y="240" width="10" height="15" fill="#5B6FA8"/>
    
    <!-- Tubing -->
    <path d="M 250 240 Q 220 220 190 220 Q 160 220 140 240 L 120 300" 
          stroke="#D1DCFF" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Blue blood flowing -->
  <g id="blood-flow">
    <!-- In tube -->
    <path d="M 250 290 Q 220 270 190 270 Q 160 270 140 285 L 125 320" 
          stroke="#5B6FA8" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Dripping into vessel -->
    <ellipse cx="115" cy="340" rx="4" ry="8" fill="#5B6FA8"/>
    <ellipse cx="115" cy="355" rx="3" ry="6" fill="#5B6FA8"/>
    <circle cx="115" cy="365" r="3" fill="#D1DCFF"/>
  </g>
  
  <!-- Collection vessel -->
  <g id="collection-vessel">
    <!-- Glass beaker -->
    <rect x="80" y="370" width="70" height="90" fill="none" stroke="#D1DCFF" stroke-width="3"/>
    <rect x="80" y="370" width="70" height="12" fill="#D1DCFF" opacity="0.3"/>
    
    <!-- Blue blood collected -->
    <rect x="83" y="400" width="64" height="57" fill="#5B6FA8"/>
    <rect x="83" y="400" width="64" height="15" fill="#D1DCFF" opacity="0.4"/>
    
    <!-- Measurement marks -->
    <line x1="80" y1="420" x2="75" y2="420" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="80" y1="440" x2="75" y2="440" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#FBFFF6" font-size="32" font-weight="700">The Bleeding Procedure</text>
  <text x="400" y="80" text-anchor="middle" fill="#E85542" font-size="18" font-weight="600">500,000–600,000 crabs/year</text>
  
  <!-- Labels -->
  <g id="labels">
    <!-- Price callout -->
    <line x1="115" y1="430" x2="200" y2="480" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <text x="210" y="485" fill="#E6B800" font-size="22" font-weight="700">$60,000</text>
    <text x="210" y="505" fill="#FFFF77" font-size="16" font-weight="400">per gallon</text>
    
    <!-- Volume extracted -->
    <line x1="250" y1="330" x2="400" y2="300" stroke="#E85542" stroke-width="2" stroke-linecap="round"/>
    <text x="410" y="295" fill="#E85542" font-size="18" font-weight="700">30% blood volume</text>
    <text x="410" y="315" fill="#D1DCFF" font-size="16" font-weight="400">extracted</text>
    
    <!-- Cardiac sinus -->
    <line x1="250" y1="270" x2="320" y2="200" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
    <text x="330" y="200" fill="#D1DCFF" font-size="16" font-weight="400">cardiac sinus</text>
    <text x="330" y="220" fill="#5B6FA8" font-size="14" font-weight="400">puncture site</text>
  </g>
  
  <!-- Industrial-biological contrast note -->
  <text x="500" y="450" fill="#A0785A" font-size="14" font-weight="400" font-style="italic">ancient organism,</text>
  <text x="500" y="470" fill="#5B6FA8" font-size="14" font-weight="400" font-style="italic">industrial process</text>
</svg>
