<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&amp;family=Inter:wght@400;600&amp;display=swap');
      text { font-family: 'Barlow', sans-serif; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D16"/>
  
  <!-- ABOVE GROUND SECTION (Top Half) -->
  
  <!-- Forest floor -->
  <rect x="0" y="0" width="800" height="300" fill="#2D3E6B"/>
  
  <!-- Tree trunks -->
  <rect x="50" y="80" width="60" height="220" fill="#A0785A" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>
  <rect x="200" y="50" width="70" height="250" fill="#A0785A" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>
  <rect x="380" y="90" width="55" height="210" fill="#A0785A" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>
  <rect x="550" y="60" width="65" height="240" fill="#A0785A" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>
  <rect x="700" y="100" width="50" height="200" fill="#A0785A" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Tree details - bark texture -->
  <line x1="80" y1="100" x2="80" y2="280" stroke="#D4A574" stroke-width="1" stroke-linecap="round"/>
  <line x1="235" y1="70" x2="235" y2="280" stroke="#D4A574" stroke-width="1" stroke-linecap="round"/>
  <line x1="407" y1="110" x2="407" y2="280" stroke="#D4A574" stroke-width="1" stroke-linecap="round"/>
  <line x1="582" y1="80" x2="582" y2="280" stroke="#D4A574" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Fallen logs -->
  <ellipse cx="320" cy="270" rx="90" ry="18" fill="#A0785A" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="620" cy="260" rx="70" ry="15" fill="#A0785A" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Ground line separator -->
  <line x1="0" y1="300" x2="800" y2="300" stroke="#FBFFF6" stroke-width="3" stroke-linecap="round"/>
  
  <!-- UNDERGROUND SECTION (Bottom Half) -->
  
  <!-- Soil background -->
  <rect x="0" y="300" width="800" height="300" fill="#0D0D16"/>
  
  <!-- Tree roots descending -->
  <path d="M 80 300 Q 70 330, 60 360 Q 55 390, 50 420" stroke="#D4A574" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 80 300 Q 90 325, 95 355 Q 98 385, 100 410" stroke="#D4A574" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <path d="M 235 300 Q 220 335, 210 370 Q 205 405, 200 440" stroke="#D4A574" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 235 300 Q 245 330, 250 365 Q 253 400, 255 430" stroke="#D4A574" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 235 300 Q 260 320, 275 350 Q 285 380, 290 410" stroke="#D4A574" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <path d="M 407 300 Q 395 340, 385 380 Q 380 420, 375 460" stroke="#D4A574" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 407 300 Q 420 330, 430 370 Q 435 410, 440 450" stroke="#D4A574" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <path d="M 582 300 Q 570 335, 560 375 Q 555 415, 550 450" stroke="#D4A574" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 582 300 Q 595 325, 605 360 Q 610 395, 615 430" stroke="#D4A574" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 582 300 Q 620 330, 640 370 Q 655 410, 665 445" stroke="#D4A574" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <path d="M 725 300 Q 715 335, 710 375 Q 708 415, 705 450" stroke="#D4A574" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 725 300 Q 740 330, 750 370 Q 755 410, 760 445" stroke="#D4A574" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Vast mycelial network - white/cream threads -->
  <path d="M 50 420 Q 150 430, 200 440 Q 300 445, 375 460" stroke="#FBFFF6" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 100 410 Q 180 420, 255 430 Q 340 435, 440 450" stroke="#FBFFF6" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 200 440 Q 280 455, 385 480 Q 480 490, 550 450" stroke="#FBFFF6" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 255 430 Q 320 440, 430 470 Q 520 485, 615 430" stroke="#FBFFF6" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 290 410 Q 360 425, 440 450 Q 530 465, 665 445" stroke="#FBFFF6" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 375 460 Q 450 475, 550 490 Q 630 495, 705 450" stroke="#FBFFF6" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 440 450 Q 500 465, 615 480 Q 690 485, 760 445" stroke="#FBFFF6" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Additional fine mycelial threads creating web -->
  <path d="M 60 360 Q 120 370, 210 370" stroke="#FBFFF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 95 355 Q 160 365, 250 365" stroke="#FBFFF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 210 370 Q 290 380, 385 380" stroke="#FBFFF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 250 365 Q 330 375, 430 370" stroke="#FBFFF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 385 380 Q 470 390, 560 375" stroke="#FBFFF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 430 370 Q 510 380, 605 360" stroke="#FBFFF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 560 375 Q 630 385, 710 375" stroke="#FBFFF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 605 360 Q 680 370, 750 370" stroke="#FBFFF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Vertical connections -->
  <path d="M 150 340 Q 155 380, 160 420" stroke="#FBFFF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 280 350 Q 285 390, 290 430" stroke="#FBFFF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 450 360 Q 455 400, 460 440" stroke="#FBFFF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 620 340 Q 625 380, 630 420" stroke="#FBFFF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Black rhizomorphs - thick dark strands -->
  <path d="M 50 420 Q 100 450, 200 470 Q 300 485, 440 500 Q 580 510, 705 450" stroke="#0D0D16" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 100 410 Q 180 445, 290 465 Q 420 485, 550 495 Q 650 500, 760 445" stroke="#0D0D16" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M 60 360 Q 150 390, 275 415 Q 385 430, 550 440 Q 665 445, 750 370" stroke="#0D0D16" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Rhizomorph outlines for visibility -->
  <path d="M 50 420 Q 100 450, 200 470 Q 300 485, 440 500 Q 580 510, 705 450" stroke="#2D3E6B" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 100 410 Q 180 445, 290 465 Q 420 485, 550 495 Q 650 500, 760 445" stroke="#2D3E6B" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Dense network in center -->
  <circle cx="400" cy="450" r="3" fill="#FBFFF6"/>
  <circle cx="350" cy="420" r="2" fill="#FBFFF6"/>
  <circle cx="450" cy="435" r="2" fill="#FBFFF6"/>
  <circle cx="380" cy="480" r="2" fill="#FBFFF6"/>
  <circle cx="420" cy="470" r="2" fill="#FBFFF6"/>
  
  <!-- More mycelial web detail -->
  <path d="M 50 510 Q 200 520, 400 530 Q 600 535, 750 520" stroke="#FBFFF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 100 540 Q 250 550, 400 555 Q 550 558, 700 545" stroke="#FBFFF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 150 560 Q 300 568, 400 570 Q 500 568, 650 560" stroke="#FBFFF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Labels -->
  <text x="400" y="40" fill="#FBFFF6" font-size="22" font-weight="700" text-anchor="middle">ABOVE GROUND</text>
  <text x="400" y="65" fill="#D1DCFF" font-size="14" text-anchor="middle">Autumn fruiting bodies (brief appearance)</text>
  
  <text x="400" y="330" fill="#FBFFF6" font-size="22" font-weight="700" text-anchor="middle">UNDERGROUND</text>
  <text x="400" y="355" fill="#D1DCFF" font-size="14" text-anchor="middle">The true organism: 2,385 acres of mycelium</text>
  
  <!-- Legend -->
  <line x1="30" y1="520" x2="70" y2="520" stroke="#FBFFF6" stroke-width="2" stroke-linecap="round"/>
  <text x="80" y="525" fill="#D1DCFF" font-size="12">Mycelial network</text>
  
  <line x1="30" y1="545" x2="70" y2="545" stroke="#2D3E6B" stroke-width="8" stroke-linecap="round"/>
  <text x="80" y="550" fill="#D1DCFF" font-size="12">Black rhizomorphs</text>
</svg>
