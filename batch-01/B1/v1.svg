<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&amp;family=Inter:wght@400;600&amp;display=swap');
      text { font-family: 'Barlow', sans-serif; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D16"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#FBFFF6" font-size="24" font-weight="600">Cellular Defection</text>
  <text x="400" y="65" text-anchor="middle" fill="#D1DCFF" font-size="14">The moment cooperation breaks</text>
  
  <!-- Dividing line -->
  <line x1="400" y1="100" x2="400" y2="560" stroke="#2D3E6B" stroke-width="2"/>
  
  <!-- LEFT SIDE: Cooperative cells -->
  <text x="200" y="110" text-anchor="middle" fill="#2FBF39" font-size="16" font-weight="600">COOPERATIVE</text>
  
  <!-- Row 1 -->
  <circle cx="120" cy="180" r="28" fill="none" stroke="#248A28" stroke-width="3" stroke-linecap="round"/>
  <circle cx="120" cy="180" r="20" fill="#1A5C1E"/>
  <circle cx="200" cy="180" r="28" fill="none" stroke="#248A28" stroke-width="3" stroke-linecap="round"/>
  <circle cx="200" cy="180" r="20" fill="#1A5C1E"/>
  <circle cx="280" cy="180" r="28" fill="none" stroke="#248A28" stroke-width="3" stroke-linecap="round"/>
  <circle cx="280" cy="180" r="20" fill="#1A5C1E"/>
  
  <!-- Row 2 -->
  <circle cx="120" cy="260" r="28" fill="none" stroke="#248A28" stroke-width="3" stroke-linecap="round"/>
  <circle cx="120" cy="260" r="20" fill="#1A5C1E"/>
  <circle cx="200" cy="260" r="28" fill="none" stroke="#248A28" stroke-width="3" stroke-linecap="round"/>
  <circle cx="200" cy="260" r="20" fill="#1A5C1E"/>
  <circle cx="280" cy="260" r="28" fill="none" stroke="#248A28" stroke-width="3" stroke-linecap="round"/>
  <circle cx="280" cy="260" r="20" fill="#1A5C1E"/>
  
  <!-- Row 3 -->
  <circle cx="120" cy="340" r="28" fill="none" stroke="#248A28" stroke-width="3" stroke-linecap="round"/>
  <circle cx="120" cy="340" r="20" fill="#1A5C1E"/>
  <circle cx="200" cy="340" r="28" fill="none" stroke="#248A28" stroke-width="3" stroke-linecap="round"/>
  <circle cx="200" cy="340" r="20" fill="#1A5C1E"/>
  <circle cx="280" cy="340" r="28" fill="none" stroke="#248A28" stroke-width="3" stroke-linecap="round"/>
  <circle cx="280" cy="340" r="20" fill="#1A5C1E"/>
  
  <!-- Row 4 -->
  <circle cx="120" cy="420" r="28" fill="none" stroke="#248A28" stroke-width="3" stroke-linecap="round"/>
  <circle cx="120" cy="420" r="20" fill="#1A5C1E"/>
  <circle cx="200" cy="420" r="28" fill="none" stroke="#248A28" stroke-width="3" stroke-linecap="round"/>
  <circle cx="200" cy="420" r="20" fill="#1A5C1E"/>
  <circle cx="280" cy="420" r="28" fill="none" stroke="#248A28" stroke-width="3" stroke-linecap="round"/>
  <circle cx="280" cy="420" r="20" fill="#1A5C1E"/>
  
  <!-- Signaling lines (horizontal) -->
  <line x1="148" y1="180" x2="172" y2="180" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  <line x1="228" y1="180" x2="252" y2="180" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  <line x1="148" y1="260" x2="172" y2="260" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  <line x1="228" y1="260" x2="252" y2="260" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  <line x1="148" y1="340" x2="172" y2="340" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  <line x1="228" y1="340" x2="252" y2="340" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  <line x1="148" y1="420" x2="172" y2="420" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  <line x1="228" y1="420" x2="252" y2="420" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Signaling lines (vertical) -->
  <line x1="120" y1="208" x2="120" y2="232" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="208" x2="200" y2="232" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  <line x1="280" y1="208" x2="280" y2="232" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="288" x2="120" y2="312" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="288" x2="200" y2="312" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  <line x1="280" y1="288" x2="280" y2="312" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="368" x2="120" y2="392" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="368" x2="200" y2="392" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  <line x1="280" y1="368" x2="280" y2="392" stroke="#6FD877" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Directional arrows (all facing same way) -->
  <polygon points="120,175 123,180 120,185" fill="#2FBF39"/>
  <polygon points="200,175 203,180 200,185" fill="#2FBF39"/>
  <polygon points="280,175 283,180 280,185" fill="#2FBF39"/>
  <polygon points="120,255 123,260 120,265" fill="#2FBF39"/>
  <polygon points="200,255 203,260 200,265" fill="#2FBF39"/>
  <polygon points="280,255 283,260 280,265" fill="#2FBF39"/>
  <polygon points="120,335 123,340 120,345" fill="#2FBF39"/>
  <polygon points="200,335 203,340 200,345" fill="#2FBF39"/>
  <polygon points="280,335 283,340 280,345" fill="#2FBF39"/>
  <polygon points="120,415 123,420 120,425" fill="#2FBF39"/>
  <polygon points="200,415 203,420 200,425" fill="#2FBF39"/>
  <polygon points="280,415 283,420 280,425" fill="#2FBF39"/>
  
  <!-- RIGHT SIDE: Defector cells -->
  <text x="600" y="110" text-anchor="middle" fill="#E85542" font-size="16" font-weight="600">DEFECTOR</text>
  
  <!-- Normal cells (irregular placement) -->
  <circle cx="480" cy="190" r="22" fill="none" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="480" cy="190" r="16" fill="#2D3E6B"/>
  
  <circle cx="560" cy="210" r="22" fill="none" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="560" cy="210" r="16" fill="#2D3E6B"/>
  
  <circle cx="640" cy="180" r="22" fill="none" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="640" cy="180" r="16" fill="#2D3E6B"/>
  
  <circle cx="720" cy="200" r="22" fill="none" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="720" cy="200" r="16" fill="#2D3E6B"/>
  
  <!-- Defector cell (LARGE, consuming resources) -->
  <circle cx="580" cy="350" r="70" fill="none" stroke="#CA1E08" stroke-width="5" stroke-linecap="round"/>
  <circle cx="580" cy="350" r="60" fill="#E85542" opacity="0.3"/>
  <circle cx="580" cy="350" r="45" fill="#CA1E08"/>
  
  <!-- Irregular protrusions from defector -->
  <circle cx="520" cy="310" r="18" fill="#E85542"/>
  <circle cx="640" cy="320" r="22" fill="#E85542"/>
  <circle cx="550" cy="430" r="20" fill="#E85542"/>
  <circle cx="630" cy="410" r="16" fill="#E85542"/>
  
  <!-- Broken/severed signaling lines -->
  <line x1="480" y1="212" x2="490" y2="240" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,4"/>
  <line x1="560" y1="232" x2="565" y2="280" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,4"/>
  <line x1="640" y1="202" x2="610" y2="280" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,4"/>
  
  <!-- Chaotic directional markers (all different directions) -->
  <polygon points="520,305 525,310 520,315" fill="#E85542"/>
  <polygon points="640,325 635,320 630,325" fill="#E85542"/>
  <polygon points="545,430 550,435 555,430" fill="#E85542"/>
  <polygon points="635,410 630,405 625,410" fill="#E85542"/>
  
  <!-- Resource consumption indicators (nutrients flowing to defector) -->
  <line x1="480" y1="190" x2="520" y2="310" stroke="#FFFF77" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="560" y1="210" x2="560" y2="290" stroke="#FFFF77" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="640" y1="180" x2="620" y2="300" stroke="#FFFF77" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="720" y1="200" x2="640" y2="320" stroke="#FFFF77" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Labels -->
  <text x="200" y="500" text-anchor="middle" fill="#6FD877" font-size="13">Uniform · Connected · Regulated</text>
  <text x="600" y="500" text-anchor="middle" fill="#E85542" font-size="13">Irregular · Isolated · Uncontrolled</text>
</svg>