<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&amp;family=Inter:wght@400;600&amp;display=swap');
      text { font-family: 'Barlow', sans-serif; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D16"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#FBFFF6" font-size="24" font-weight="600">The Atavism</text>
  <text x="400" y="65" text-anchor="middle" fill="#D1DCFF" font-size="14">A cancer cell remembers its unicellular past</text>
  
  <!-- Timeline arrow -->
  <line x1="100" y1="520" x2="700" y2="520" stroke="#5B6FA8" stroke-width="3" stroke-linecap="round"/>
  <polygon points="700,520 690,515 690,525" fill="#5B6FA8"/>
  
  <!-- Timeline labels -->
  <text x="120" y="550" text-anchor="start" fill="#D1DCFF" font-size="12">3.5 billion years ago</text>
  <text x="400" y="550" text-anchor="middle" fill="#D1DCFF" font-size="12">800 million years ago</text>
  <text x="680" y="550" text-anchor="end" fill="#D1DCFF" font-size="12">Today</text>
  
  <!-- Stage 1: Ancient unicellular (left) -->
  <text x="150" y="110" text-anchor="middle" fill="#6FD877" font-size="13" font-weight="600">UNICELLULAR</text>
  
  <!-- Amoeba-like cell -->
  <ellipse cx="150" cy="200" rx="45" ry="50" fill="#248A28" stroke="#2FBF39" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="140" cy="180" rx="15" ry="18" fill="#1A5C1E"/>
  <circle cx="155" cy="210" r="8" fill="#6FD877" opacity="0.5"/>
  <circle cx="145" cy="220" r="6" fill="#6FD877" opacity="0.5"/>
  
  <!-- Flagella -->
  <path d="M 190,210 Q 220,200 240,220 Q 250,240 260,250" fill="none" stroke="#2FBF39" stroke-width="2" stroke-linecap="round"/>
  <path d="M 185,240 Q 210,260 230,280" fill="none" stroke="#2FBF39" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Pseudopodia -->
  <path d="M 110,180 Q 90,170 80,160" fill="none" stroke="#2FBF39" stroke-width="3" stroke-linecap="round"/>
  <path d="M 120,240 Q 100,260 90,280" fill="none" stroke="#2FBF39" stroke-width="3" stroke-linecap="round"/>
  
  <text x="150" y="300" text-anchor="middle" fill="#6FD877" font-size="11">Independent · Motile · Self-sufficient</text>
  
  <!-- Stage 2: Multicellular tissue (center-right) -->
  <text x="550" y="110" text-anchor="middle" fill="#5B6FA8" font-size="13" font-weight="600">MULTICELLULAR</text>
  
  <!-- Organized tissue grid -->
  <circle cx="480" cy="180" r="24" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="540" cy="180" r="24" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="600" cy="180" r="24" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="660" cy="180" r="24" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  
  <circle cx="480" cy="240" r="24" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="540" cy="240" r="24" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="600" cy="240" r="24" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="660" cy="240" r="24" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Tight junctions -->
  <line x1="504" y1="180" x2="516" y2="180" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="564" y1="180" x2="576" y2="180" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="624" y1="180" x2="636" y2="180" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="504" y1="240" x2="516" y2="240" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="564" y1="240" x2="576" y2="240" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="624" y1="240" x2="636" y2="240" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
  
  <line x1="480" y1="204" x2="480" y2="216" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="540" y1="204" x2="540" y2="216" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="600" y1="204" x2="600" y2="216" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="660" y1="204" x2="660" y2="216" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round"/>
  
  <text x="570" y="300" text-anchor="middle" fill="#5B6FA8" font-size="11">Cooperative · Specialized · Integrated</text>
  
  <!-- Stage 3: THE REVERSAL - Cancer cell transforming back -->
  <text x="400" y="355" text-anchor="middle" fill="#E85542" font-size="14" font-weight="600">REVERSION ↺</text>
  
  <!-- The transforming cell (hybrid form) -->
  <ellipse cx="400" cy="420" rx="40" ry="45" fill="#CA1E08" stroke="#E85542" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Nucleus -->
  <ellipse cx="395" cy="410" rx="12" ry="15" fill="#E85542"/>
  
  <!-- Emerging pseudopodia (atavistic traits) -->
  <path d="M 360,410 Q 330,405 310,395" fill="none" stroke="#E85542" stroke-width="3" stroke-linecap="round"/>
  <path d="M 365,450 Q 340,465 320,480" fill="none" stroke="#E85542" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Emerging flagella -->
  <path d="M 440,425 Q 470,420 490,430 Q 500,445 510,460" fill="none" stroke="#E85542" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Broken connections to tissue -->
  <line x1="360" y1="380" x2="340" y2="360" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="440" y1="390" x2="460" y2="370" stroke="#D1DCFF" stroke-width="2" stroke-linecap="round" stroke-dasharray="3,3" opacity="0.4"/>
  
  <!-- Surrounding tissue (faded) -->
  <circle cx="330" cy="350" r="18" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1" opacity="0.5"/>
  <circle cx="380" cy="340" r="18" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1" opacity="0.5"/>
  <circle cx="420" cy="340" r="18" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1" opacity="0.5"/>
  <circle cx="470" cy="360" r="18" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="1" opacity="0.5"/>
  
  <!-- Evolutionary reversal arrow -->
  <path d="M 250,380 Q 300,360 350,375" fill="none" stroke="#FFFF77" stroke-width="3" stroke-linecap="round"/>
  <polygon points="250,380 258,377 256,385" fill="#FFFF77"/>
  
  <text x="280" y="340" text-anchor="middle" fill="#FFFF77" font-size="11" font-weight="600">Evolutionary</text>
  <text x="280" y="355" text-anchor="middle" fill="#FFFF77" font-size="11" font-weight="600">throwback</text>
  
  <!-- Bottom annotation -->
  <text x="400" y="490" text-anchor="middle" fill="#E85542" font-size="12" style="font-style: italic;">Breaking the social contract, reverting to ancient independence</text>
</svg>