<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&amp;family=Inter:wght@400;600&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D16"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#FBFFF6" font-size="24" font-weight="600">The Inevitability of Cancer</text>
  <text x="400" y="65" text-anchor="middle" fill="#D1DCFF" font-size="14">Somatic mutation accumulation over lifespan</text>
  
  <!-- Axes -->
  <line x1="100" y1="500" x2="100" y2="120" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="500" x2="720" y2="500" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Y-axis label -->
  <text x="40" y="300" text-anchor="middle" fill="#D1DCFF" font-size="13" font-weight="600" transform="rotate(-90 40 300)">Mutation Load</text>
  
  <!-- X-axis label -->
  <text x="410" y="540" text-anchor="middle" fill="#D1DCFF" font-size="13" font-weight="600">Age / Cell Divisions</text>
  
  <!-- Y-axis tick labels -->
  <text x="90" y="500" text-anchor="end" fill="#D1DCFF" font-size="11">0</text>
  <text x="90" y="410" text-anchor="end" fill="#D1DCFF" font-size="11">10</text>
  <text x="90" y="320" text-anchor="end" fill="#D1DCFF" font-size="11">20</text>
  <text x="90" y="230" text-anchor="end" fill="#D1DCFF" font-size="11">30</text>
  <text x="90" y="140" text-anchor="end" fill="#D1DCFF" font-size="11">40</text>
  
  <!-- X-axis tick labels -->
  <text x="100" y="520" text-anchor="middle" fill="#D1DCFF" font-size="11">0</text>
  <text x="255" y="520" text-anchor="middle" fill="#D1DCFF" font-size="11">20</text>
  <text x="410" y="520" text-anchor="middle" fill="#D1DCFF" font-size="11">40</text>
  <text x="565" y="520" text-anchor="middle" fill="#D1DCFF" font-size="11">60</text>
  <text x="720" y="520" text-anchor="middle" fill="#D1DCFF" font-size="11">80 years</text>
  
  <!-- Cancer threshold line -->
  <line x1="100" y1="230" x2="720" y2="230" stroke="#E85542" stroke-width="2" stroke-linecap="round" stroke-dasharray="8,4"/>
  <text x="730" y="235" text-anchor="start" fill="#E85542" font-size="12" font-weight="600">Cancer threshold</text>
  
  <!-- Normal accumulation trajectory (multiple lineages diverging) -->
  
  <!-- Lineage 1 (stays below threshold) -->
  <path d="M 100,500 L 150,480 L 200,455 L 250,430 L 300,405 L 350,380 L 400,360 L 450,345 L 500,335 L 550,328 L 600,323 L 650,320 L 700,318" 
        fill="none" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="700" cy="318" r="4" fill="#5B6FA8"/>
  
  <!-- Lineage 2 (stays below threshold) -->
  <path d="M 100,500 L 150,482 L 200,460 L 250,438 L 300,415 L 350,392 L 400,372 L 450,356 L 500,343 L 550,333 L 600,326 L 650,322 L 700,320" 
        fill="none" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="700" cy="320" r="4" fill="#5B6FA8"/>
  
  <!-- Lineage 3 (stays below threshold) -->
  <path d="M 100,500 L 150,478 L 200,450 L 250,425 L 300,400 L 350,378 L 400,360 L 450,348 L 500,340 L 550,335 L 600,332 L 650,330 L 700,329" 
        fill="none" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="700" cy="329" r="4" fill="#5B6FA8"/>
  
  <!-- Lineage 4 (crosses threshold - THE CANCER LINEAGE) -->
  <path d="M 100,500 L 150,476 L 200,445 L 250,410 L 300,375 L 350,340 L 400,305 L 450,270" 
        fill="none" stroke="#2FBF39" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Transition to cancer (acceleration after threshold) -->
  <path d="M 450,270 L 500,235 L 550,195 L 600,150 L 650,130 L 700,120" 
        fill="none" stroke="#CA1E08" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Cancer breakout point marker -->
  <circle cx="450" cy="270" r="8" fill="#E85542" stroke="#FFFF77" stroke-width="2"/>
  
  <!-- Annotation for cancer breakout -->
  <line x1="450" y1="270" x2="480" y2="200" stroke="#FFFF77" stroke-width="1" stroke-linecap="round"/>
  <text x="490" y="195" text-anchor="start" fill="#FFFF77" font-size="11" font-weight="600">Critical defection</text>
  <text x="490" y="208" text-anchor="start" fill="#FFFF77" font-size="10">Threshold crossed</text>
  
  <!-- Epigenetic acceleration annotation -->
  <line x1="550" y1="195" x2="580" y2="150" stroke="#E6B800" stroke-width="1" stroke-linecap="round"/>
  <text x="590" y="145" text-anchor="start" fill="#E6B800" font-size="11" font-weight="600">100× acceleration</text>
  <text x="590" y="158" text-anchor="start" fill="#E6B800" font-size="10">Epigenetic silencing</text>
  
  <!-- Cell division branches (conceptual tree in corner) -->
  <g transform="translate(120, 140)">
    <!-- Generation 0 -->
    <circle cx="0" cy="0" r="3" fill="#6FD877"/>
    
    <!-- Generation 1 -->
    <line x1="0" y1="0" x2="-10" y2="15" stroke="#6FD877" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="10" y2="15" stroke="#6FD877" stroke-width="1" stroke-linecap="round"/>
    <circle cx="-10" cy="15" r="2" fill="#6FD877"/>
    <circle cx="10" cy="15" r="2" fill="#6FD877"/>
    
    <!-- Generation 2 -->
    <line x1="-10" y1="15" x2="-18" y2="28" stroke="#6FD877" stroke-width="1" stroke-linecap="round"/>
    <line x1="-10" y1="15" x2="-2" y2="28" stroke="#6FD877" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="15" x2="2" y2="28" stroke="#5B6FA8" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="15" x2="18" y2="28" stroke="#5B6FA8" stroke-width="1" stroke-linecap="round"/>
    <circle cx="-18" cy="28" r="2" fill="#6FD877"/>
    <circle cx="-2" cy="28" r="2" fill="#6FD877"/>
    <circle cx="2" cy="28" r="2" fill="#5B6FA8"/>
    <circle cx="18" cy="28" r="2" fill="#5B6FA8"/>
    
    <!-- Generation 3 (cancer branch emerges) -->
    <line x1="-18" y1="28" x2="-24" y2="40" stroke="#6FD877" stroke-width="1" stroke-linecap="round"/>
    <line x1="-18" y1="28" x2="-12" y2="40" stroke="#6FD877" stroke-width="1" stroke-linecap="round"/>
    <line x1="-2" y1="28" x2="-8" y2="40" stroke="#5B6FA8" stroke-width="1" stroke-linecap="round"/>
    <line x1="-2" y1="28" x2="4" y2="40" stroke="#E85542" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2" y1="28" x2="-4" y2="40" stroke="#5B6FA8" stroke-width="1" stroke-linecap="round"/>
    <line x1="2" y1="28" x2="8" y2="40" stroke="#5B6FA8" stroke-width="1" stroke-linecap="round"/>
    <line x1="18" y1="28" x2="12" y2="40" stroke="#5B6FA8" stroke-width="1" stroke-linecap="round"/>
    <line x1="18" y1="28" x2="24" y2="40" stroke="#5B6FA8" stroke-width="1" stroke-linecap="round"/>
    
    <circle cx="-24" cy="40" r="1.5" fill="#6FD877"/>
    <circle cx="-12" cy="40" r="1.5" fill="#6FD877"/>
    <circle cx="-8" cy="40" r="1.5" fill="#5B6FA8"/>
    <circle cx="4" cy="40" r="2.5" fill="#CA1E08"/>
    <circle cx="-4" cy="40" r="1.5" fill="#5B6FA8"/>
    <circle cx="8" cy="40" r="1.5" fill="#5B6FA8"/>
    <circle cx="12" cy="40" r="1.5" fill="#5B6FA8"/>
    <circle cx="24" cy="40" r="1.5" fill="#5B6FA8"/>
    
    <text x="0" y="60" text-anchor="middle" fill="#D1DCFF" font-size="9">Cell lineage tree</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(560, 380)">
    <text x="0" y="0" fill="#FBFFF6" font-size="12" font-weight="600">Legend</text>
    
    <line x1="0" y1="15" x2="30" y2="15" stroke="#2FBF39" stroke-width="2" stroke-linecap="round"/>
    <text x="38" y="19" fill="#D1DCFF" font-size="10">Normal accumulation</text>
    
    <line x1="0" y1="32" x2="30" y2="32" stroke="#CA1E08" stroke-width="3" stroke-linecap="round"/>
    <text x="38" y="36" fill="#D1DCFF" font-size="10">Cancer lineage</text>
    
    <line x1="0" y1="49" x2="30" y2="49" stroke="#E85542" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,3"/>
    <text x="38" y="53" fill="#D1DCFF" font-size="10">Threshold</text>
  </g>
  
  <!-- Bottom insight -->
  <text x="400" y="575" text-anchor="middle" fill="#E6B800" font-size="11" style="font-style: italic;">Intercellular competition makes cancer evolutionarily inevitable over long lifespans</text>
</svg>