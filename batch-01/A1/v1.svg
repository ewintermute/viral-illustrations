<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&amp;family=Inter:wght@400;600&amp;display=swap');
      text { font-family: 'Barlow', sans-serif; }
      .value-text { font-family: 'Inter', sans-serif; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D16"/>
  
  <!-- Mediterranean environment - water layers -->
  <ellipse cx="400" cy="500" rx="380" ry="80" fill="#2D3E6B" opacity="0.3"/>
  <ellipse cx="400" cy="520" rx="340" ry="60" fill="#5B6FA8" opacity="0.2"/>
  
  <!-- Adult Medusa (left side) -->
  <g id="adult-medusa">
    <!-- Bell outer layer -->
    <ellipse cx="200" cy="200" rx="80" ry="90" fill="#D1DCFF" opacity="0.4"/>
    <ellipse cx="200" cy="200" rx="70" ry="80" fill="#5B6FA8" opacity="0.5"/>
    <ellipse cx="200" cy="200" rx="60" ry="70" fill="#D1DCFF" opacity="0.3"/>
    
    <!-- Bell dome detail -->
    <path d="M 140 200 Q 200 140 260 200" fill="#FBFFF6" opacity="0.2"/>
    
    <!-- Tentacles -->
    <path d="M 150 260 Q 140 320 145 380" stroke="#D1DCFF" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 170 270 Q 160 330 158 390" stroke="#5B6FA8" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 190 275 Q 185 340 180 400" stroke="#D1DCFF" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M 210 275 Q 215 340 220 400" stroke="#5B6FA8" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M 230 270 Q 240 330 242 390" stroke="#D1DCFF" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 250 260 Q 260 320 255 380" stroke="#5B6FA8" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
    
    <!-- Manubrium -->
    <ellipse cx="200" cy="240" rx="12" ry="30" fill="#E85542" opacity="0.7"/>
  </g>
  
  <!-- Transformation arrows -->
  <g id="transformation-arrows">
    <path d="M 290 200 L 360 200" stroke="#FFFF77" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
    <path d="M 360 200 L 345 190" stroke="#FFFF77" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
    <path d="M 360 200 L 345 210" stroke="#FFFF77" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
    
    <path d="M 510 280 L 440 240" stroke="#FFFF77" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
    <path d="M 440 240 L 450 250" stroke="#FFFF77" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
    <path d="M 440 240 L 448 232" stroke="#FFFF77" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
  </g>
  
  <!-- Transition state (center) -->
  <g id="collapsing-medusa">
    <ellipse cx="400" cy="240" rx="45" ry="50" fill="#D1DCFF" opacity="0.5"/>
    <ellipse cx="400" cy="240" rx="35" ry="40" fill="#5B6FA8" opacity="0.6"/>
    <ellipse cx="400" cy="240" rx="25" ry="30" fill="#E85542" opacity="0.4"/>
    
    <!-- Short collapsing tentacles -->
    <path d="M 380 280 Q 375 310 378 330" stroke="#D1DCFF" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M 400 285 Q 400 315 398 335" stroke="#5B6FA8" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M 420 280 Q 425 310 422 330" stroke="#D1DCFF" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  </g>
  
  <!-- Polyp (right side) - attached to substrate -->
  <g id="polyp-form">
    <!-- Substrate/rock -->
    <ellipse cx="580" cy="380" rx="70" ry="25" fill="#A0785A" opacity="0.7"/>
    <ellipse cx="580" cy="380" rx="60" ry="20" fill="#D4A574" opacity="0.5"/>
    
    <!-- Polyp stalk -->
    <rect x="570" y="320" width="20" height="60" fill="#D1DCFF" opacity="0.6" rx="3"/>
    <rect x="573" y="325" width="14" height="55" fill="#5B6FA8" opacity="0.5" rx="2"/>
    
    <!-- Polyp head/hydranth -->
    <ellipse cx="580" cy="310" rx="22" ry="18" fill="#D1DCFF" opacity="0.6"/>
    <ellipse cx="580" cy="310" rx="16" ry="13" fill="#5B6FA8" opacity="0.5"/>
    
    <!-- Tentacles (polyp) - short and stubby -->
    <path d="M 560 305 Q 545 295 538 290" stroke="#2FBF39" stroke-width="2.5" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M 565 300 Q 552 288 548 280" stroke="#2FBF39" stroke-width="2.5" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M 580 298 Q 580 282 580 275" stroke="#2FBF39" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M 595 300 Q 608 288 612 280" stroke="#2FBF39" stroke-width="2.5" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M 600 305 Q 615 295 622 290" stroke="#2FBF39" stroke-width="2.5" fill="none" opacity="0.7" stroke-linecap="round"/>
    
    <!-- Mouth opening -->
    <ellipse cx="580" cy="308" rx="6" ry="4" fill="#E85542" opacity="0.6"/>
  </g>
  
  <!-- Labels -->
  <text x="200" y="440" fill="#FBFFF6" font-size="16" text-anchor="middle" font-weight="600">Adult Medusa</text>
  <text x="200" y="460" fill="#D1DCFF" font-size="13" text-anchor="middle" opacity="0.8">Sexual stage</text>
  
  <text x="400" y="380" fill="#FFFF77" font-size="14" text-anchor="middle" font-weight="600">Transdifferentiation</text>
  <text x="400" y="398" fill="#FFFF77" font-size="11" text-anchor="middle" opacity="0.8">24-72 hours</text>
  
  <text x="580" y="440" fill="#FBFFF6" font-size="16" text-anchor="middle" font-weight="600">Polyp</text>
  <text x="580" y="460" fill="#2FBF39" font-size="13" text-anchor="middle" opacity="0.8">Juvenile stage</text>
  
  <!-- Title -->
  <text x="400" y="50" fill="#FBFFF6" font-size="24" text-anchor="middle" font-weight="600">Turritopsis dohrnii</text>
  <text x="400" y="75" fill="#D1DCFF" font-size="16" text-anchor="middle" opacity="0.9">The Immortal Jellyfish Life Cycle</text>
  
  <!-- Annotation line -->
  <line x1="330" y1="120" x2="380" y2="220" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.6"/>
  <text x="320" y="115" fill="#D1DCFF" font-size="12" text-anchor="end">Stress triggers</text>
  <text x="320" y="130" fill="#D1DCFF" font-size="12" text-anchor="end">reversal</text>
</svg>