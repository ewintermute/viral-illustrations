<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&amp;family=Inter:wght@400;600&amp;display=swap');
      text { font-family: 'Barlow', sans-serif; }
      .value-text { font-family: 'Inter', sans-serif; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D16"/>
  
  <!-- Deep ocean particles -->
  <circle cx="120" cy="80" r="2" fill="#5B6FA8" opacity="0.4"/>
  <circle cx="680" cy="140" r="1.5" fill="#5B6FA8" opacity="0.3"/>
  <circle cx="90" cy="450" r="2" fill="#D1DCFF" opacity="0.3"/>
  <circle cx="720" cy="380" r="1.5" fill="#D1DCFF" opacity="0.4"/>
  <circle cx="250" cy="520" r="1" fill="#5B6FA8" opacity="0.3"/>
  <circle cx="600" cy="90" r="1" fill="#5B6FA8" opacity="0.4"/>
  
  <!-- Bioluminescent glow - concentric ellipses -->
  <ellipse cx="400" cy="250" rx="180" ry="200" fill="#D1DCFF" opacity="0.08"/>
  <ellipse cx="400" cy="250" rx="150" ry="170" fill="#D1DCFF" opacity="0.1"/>
  <ellipse cx="400" cy="250" rx="120" ry="140" fill="#5B6FA8" opacity="0.12"/>
  <ellipse cx="400" cy="250" rx="90" ry="110" fill="#D1DCFF" opacity="0.15"/>
  
  <!-- Main bell - layered translucent shapes -->
  <ellipse cx="400" cy="230" rx="110" ry="130" fill="#D1DCFF" opacity="0.3"/>
  <ellipse cx="400" cy="230" rx="100" ry="120" fill="#5B6FA8" opacity="0.4"/>
  <ellipse cx="400" cy="230" rx="90" ry="110" fill="#D1DCFF" opacity="0.35"/>
  <ellipse cx="400" cy="230" rx="80" ry="100" fill="#5B6FA8" opacity="0.45"/>
  <ellipse cx="400" cy="230" rx="70" ry="90" fill="#D1DCFF" opacity="0.4"/>
  
  <!-- Bell apex highlight -->
  <ellipse cx="400" cy="140" rx="50" ry="30" fill="#FBFFF6" opacity="0.2"/>
  <ellipse cx="390" cy="130" rx="30" ry="20" fill="#FBFFF6" opacity="0.25"/>
  
  <!-- Internal structures - mesoglea patterns -->
  <path d="M 340 180 Q 400 190 460 180" stroke="#5B6FA8" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M 350 210 Q 400 220 450 210" stroke="#5B6FA8" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M 360 240 Q 400 250 440 240" stroke="#5B6FA8" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Radial canals -->
  <line x1="400" y1="150" x2="400" y2="280" stroke="#D1DCFF" stroke-width="1.5" opacity="0.25"/>
  <line x1="400" y1="180" x2="350" y2="260" stroke="#D1DCFF" stroke-width="1.5" opacity="0.25"/>
  <line x1="400" y1="180" x2="450" y2="260" stroke="#D1DCFF" stroke-width="1.5" opacity="0.25"/>
  <line x1="400" y1="190" x2="330" y2="280" stroke="#D1DCFF" stroke-width="1.5" opacity="0.2"/>
  <line x1="400" y1="190" x2="470" y2="280" stroke="#D1DCFF" stroke-width="1.5" opacity="0.2"/>
  
  <!-- Manubrium (mouth/stomach) -->
  <ellipse cx="400" cy="310" rx="18" ry="45" fill="#E85542" opacity="0.7"/>
  <ellipse cx="400" cy="310" rx="12" ry="38" fill="#CA1E08" opacity="0.5"/>
  
  <!-- Oral arms -->
  <path d="M 390 345 Q 380 365 385 380" stroke="#E85542" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M 410 345 Q 420 365 415 380" stroke="#E85542" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Tentacles - long and flowing -->
  <path d="M 320 320 Q 280 400 290 520" stroke="#D1DCFF" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M 340 330 Q 310 420 305 540" stroke="#5B6FA8" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M 360 340 Q 345 440 340 560" stroke="#D1DCFF" stroke-width="5" fill="none" opacity="0.75" stroke-linecap="round"/>
  <path d="M 380 345 Q 370 460 365 580" stroke="#5B6FA8" stroke-width="5" fill="none" opacity="0.75" stroke-linecap="round"/>
  
  <path d="M 420" cy="345 Q 430 460 435 580" stroke="#5B6FA8" stroke-width="5" fill="none" opacity="0.75" stroke-linecap="round"/>
  <path d="M 440 340 Q 455 440 460 560" stroke="#D1DCFF" stroke-width="5" fill="none" opacity="0.75" stroke-linecap="round"/>
  <path d="M 460 330 Q 490 420 495 540" stroke="#5B6FA8" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M 480 320 Q 520 400 510 520" stroke="#D1DCFF" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
  
  <!-- Additional fine tentacles -->
  <path d="M 330 325 Q 300 430 295 530" stroke="#D1DCFF" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 350 335 Q 325 445 320 550" stroke="#5B6FA8" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 450 335 Q 475 445 480 550" stroke="#5B6FA8" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 470 325 Q 500 430 505 530" stroke="#D1DCFF" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  
  <!-- Nematocyst clusters on tentacles -->
  <ellipse cx="290" cy="460" rx="4" ry="8" fill="#FFFF77" opacity="0.6"/>
  <ellipse cx="305" cy="490" rx="4" ry="8" fill="#FFFF77" opacity="0.6"/>
  <ellipse cx="340" cy="500" rx="4" ry="8" fill="#FFFF77" opacity="0.6"/>
  <ellipse cx="365" cy="520" rx="4" ry="8" fill="#FFFF77" opacity="0.6"/>
  <ellipse cx="435" cy="520" rx="4" ry="8" fill="#FFFF77" opacity="0.6"/>
  <ellipse cx="460" cy="500" rx="4" ry="8" fill="#FFFF77" opacity="0.6"/>
  <ellipse cx="495" cy="490" rx="4" ry="8" fill="#FFFF77" opacity="0.6"/>
  <ellipse cx="510" cy="460" rx="4" ry="8" fill="#FFFF77" opacity="0.6"/>
  
  <!-- Annotations -->
  <line x1="520" y1="230" x2="600" y2="200" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.6"/>
  <text x="610" y="200" fill="#D1DCFF" font-size="13" opacity="0.9">Translucent bell</text>
  <text x="610" y="216" fill="#D1DCFF" font-size="11" opacity="0.8">~4.5mm diameter</text>
  
  <line x1="485" y1="480" x2="580" y2="500" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.6"/>
  <text x="590" y="505" fill="#D1DCFF" font-size="13" opacity="0.9">Tentacles with</text>
  <text x="590" y="521" fill="#D1DCFF" font-size="13" opacity="0.9">nematocysts</text>
  
  <line x1="400" y1="310" x2="320" y2="350" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.6"/>
  <text x="310" y="355" fill="#E85542" font-size="13" opacity="0.9" text-anchor="end">Manubrium</text>
  
  <!-- Title -->
  <text x="400" y="50" fill="#FBFFF6" font-size="28" text-anchor="middle" font-weight="600">Turritopsis dohrnii</text>
  <text x="400" y="75" fill="#D1DCFF" font-size="14" text-anchor="middle" opacity="0.9" font-style="italic">The Immortal Jellyfish</text>
</svg>