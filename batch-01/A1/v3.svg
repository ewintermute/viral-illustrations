<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&amp;family=Inter:wght@400;600&amp;display=swap');
      text { font-family: 'Barlow', sans-serif; }
      .value-text { font-family: 'Inter', sans-serif; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#1C1E35"/>
  
  <!-- Title -->
  <text x="400" y="40" fill="#FBFFF6" font-size="26" text-anchor="middle" font-weight="600">Biological Immortality Mechanism</text>
  <text x="400" y="65" fill="#D1DCFF" font-size="15" text-anchor="middle" opacity="0.9" font-style="italic">Turritopsis dohrnii</text>
  
  <!-- Main medusa (left side) -->
  <g id="main-medusa">
    <!-- Bell -->
    <ellipse cx="200" cy="250" rx="85" ry="100" fill="#D1DCFF" opacity="0.4"/>
    <ellipse cx="200" cy="250" rx="75" ry="90" fill="#5B6FA8" opacity="0.5"/>
    <ellipse cx="200" cy="250" rx="65" ry="80" fill="#D1DCFF" opacity="0.35"/>
    
    <!-- Bell highlight -->
    <ellipse cx="195" cy="185" rx="35" ry="25" fill="#FBFFF6" opacity="0.2"/>
    
    <!-- Tentacles (simplified) -->
    <path d="M 150 330 Q 140 400 145 450" stroke="#D1DCFF" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 175 340 Q 168 410 165 460" stroke="#5B6FA8" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 200 345 Q 200 420 198 470" stroke="#D1DCFF" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M 225 340 Q 232 410 235 460" stroke="#5B6FA8" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 250 330 Q 260 400 255 450" stroke="#D1DCFF" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
    
    <!-- Manubrium -->
    <ellipse cx="200" cy="300" rx="14" ry="35" fill="#E85542" opacity="0.7"/>
  </g>
  
  <!-- Annotation line to inset -->
  <line x1="270" y1="260" x2="340" y2="240" stroke="#5B6FA8" stroke-width="2" stroke-dasharray="8,5" opacity="0.6"/>
  <path d="M 340 240 L 345 235 M 340 240 L 345 245" stroke="#5B6FA8" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Cellular inset diagram -->
  <g id="cellular-inset">
    <!-- Inset background -->
    <rect x="350" y="110" width="420" height="280" fill="#0D0D16" opacity="0.8" rx="8"/>
    <rect x="350" y="110" width="420" height="280" fill="none" stroke="#5B6FA8" stroke-width="2" opacity="0.5" rx="8"/>
    
    <!-- Title for inset -->
    <text x="560" y="140" fill="#FFFF77" font-size="16" text-anchor="middle" font-weight="600">Transdifferentiation Process</text>
    
    <!-- Cell 1 - Differentiated adult cell -->
    <g id="differentiated-cell">
      <circle cx="420" cy="220" r="35" fill="#5B6FA8" opacity="0.6"/>
      <circle cx="420" cy="220" r="28" fill="#D1DCFF" opacity="0.5"/>
      
      <!-- Nucleus (closed chromatin) -->
      <circle cx="420" cy="220" r="15" fill="#2D3E6B" opacity="0.8"/>
      <circle cx="420" cy="220" r="10" fill="#1C1E35" opacity="0.6"/>
      
      <!-- DNA locked symbol -->
      <rect x="415" y="215" width="10" height="12" fill="none" stroke="#E85542" stroke-width="1.5" opacity="0.7"/>
      <circle cx="420" cy="221" r="2" fill="#E85542" opacity="0.7"/>
      
      <text x="420" y="275" fill="#D1DCFF" font-size="12" text-anchor="middle" font-weight="600">Adult Cell</text>
      <text x="420" y="290" fill="#D1DCFF" font-size="10" text-anchor="middle" opacity="0.8">Differentiated</text>
    </g>
    
    <!-- Arrow 1 -->
    <path d="M 465 220 L 515 220" stroke="#2FBF39" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
    <path d="M 515 220 L 505 215 M 515 220 L 505 225" stroke="#2FBF39" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
    <text x="490" y="210" fill="#2FBF39" font-size="10" text-anchor="middle" opacity="0.9">Stress</text>
    
    <!-- Cell 2 - Unlocking/reprogramming -->
    <g id="unlocking-cell">
      <circle cx="560" cy="220" r="35" fill="#FFFF77" opacity="0.3"/>
      <circle cx="560" cy="220" r="28" fill="#E6B800" opacity="0.4"/>
      
      <!-- Nucleus (opening chromatin) -->
      <circle cx="560" cy="220" r="15" fill="#2FBF39" opacity="0.5"/>
      <circle cx="560" cy="220" r="10" fill="#248A28" opacity="0.4"/>
      
      <!-- Unlocking symbol -->
      <rect x="555" y="215" width="10" height="12" fill="none" stroke="#FFFF77" stroke-width="1.5" opacity="0.8"/>
      <path d="M 555 218 L 552 218" stroke="#FFFF77" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>
      <circle cx="560" cy="221" r="2" fill="#FFFF77" opacity="0.8"/>
      
      <text x="560" y="275" fill="#FFFF77" font-size="12" text-anchor="middle" font-weight="600">Reprogramming</text>
      <text x="560" y="290" fill="#FFFF77" font-size="10" text-anchor="middle" opacity="0.8">Identity reset</text>
    </g>
    
    <!-- Arrow 2 -->
    <path d="M 605 220 L 655 220" stroke="#2FBF39" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
    <path d="M 655 220 L 645 215 M 655 220 L 645 225" stroke="#2FBF39" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
    
    <!-- Cell 3 - Pluripotent cell -->
    <g id="pluripotent-cell">
      <circle cx="700" cy="220" r="35" fill="#6FD877" opacity="0.5"/>
      <circle cx="700" cy="220" r="28" fill="#2FBF39" opacity="0.6"/>
      
      <!-- Nucleus (open chromatin) -->
      <circle cx="700" cy="220" r="15" fill="#248A28" opacity="0.7"/>
      <circle cx="700" cy="220" r="10" fill="#1A5C1E" opacity="0.5"/>
      
      <!-- Open/activated symbol -->
      <circle cx="700" cy="220" r="6" fill="none" stroke="#FBFFF6" stroke-width="1.5" opacity="0.8"/>
      <circle cx="700" cy="220" r="3" fill="#FBFFF6" opacity="0.8"/>
      
      <text x="700" y="275" fill="#2FBF39" font-size="12" text-anchor="middle" font-weight="600">Stem-like Cell</text>
      <text x="700" y="290" fill="#2FBF39" font-size="10" text-anchor="middle" opacity="0.8">Pluripotent</text>
    </g>
    
    <!-- Molecular factors labels -->
    <g id="molecular-labels">
      <!-- Telomerase -->
      <rect x="370" y="320" width="110" height="50" fill="#2D3E6B" opacity="0.6" rx="4"/>
      <text x="425" y="338" fill="#FFFF77" font-size="11" text-anchor="middle" font-weight="600">Telomerase ↑</text>
      <text x="425" y="353" fill="#D1DCFF" font-size="9" text-anchor="middle" opacity="0.8">Prevents aging</text>
      <text x="425" y="365" fill="#D1DCFF" font-size="9" text-anchor="middle" opacity="0.8">of DNA ends</text>
      
      <!-- Yamanaka factors -->
      <rect x="490" y="320" width="120" height="50" fill="#2D3E6B" opacity="0.6" rx="4"/>
      <text x="550" y="338" fill="#2FBF39" font-size="11" text-anchor="middle" font-weight="600">Yamanaka-like ↑</text>
      <text x="550" y="353" fill="#D1DCFF" font-size="9" text-anchor="middle" opacity="0.8">Oct4, Sox2, Klf4</text>
      <text x="550" y="365" fill="#D1DCFF" font-size="9" text-anchor="middle" opacity="0.8">Reset identity</text>
      
      <!-- DNA repair -->
      <rect x="620" y="320" width="130" height="50" fill="#2D3E6B" opacity="0.6" rx="4"/>
      <text x="685" y="338" fill="#E85542" font-size="11" text-anchor="middle" font-weight="600">DNA Repair Genes ↑</text>
      <text x="685" y="353" fill="#D1DCFF" font-size="9" text-anchor="middle" opacity="0.8">Fix accumulated</text>
      <text x="685" y="365" fill="#D1DCFF" font-size="9" text-anchor="middle" opacity="0.8">damage</text>
    </g>
  </g>
  
  <!-- Bottom annotations -->
  <text x="200" y="520" fill="#D1DCFF" font-size="13" text-anchor="middle" opacity="0.9">When stressed or injured, adult cells</text>
  <text x="200" y="540" fill="#D1DCFF" font-size="13" text-anchor="middle" opacity="0.9">reverse to stem-like state</text>
  
  <text x="560" y="430" fill="#FBFFF6" font-size="12" text-anchor="middle" font-weight="600">Timeline: 24-72 hours</text>
  
  <!-- Key insight box -->
  <rect x="50" y="460" width="300" height="70" fill="#0D0D16" opacity="0.7" rx="6"/>
  <rect x="50" y="460" width="300" height="70" fill="none" stroke="#2FBF39" stroke-width="2" opacity="0.6" rx="6"/>
  <text x="200" y="485" fill="#2FBF39" font-size="13" text-anchor="middle" font-weight="600">Only known animal with</text>
  <text x="200" y="505" fill="#2FBF39" font-size="13" text-anchor="middle" font-weight="600">biological immortality</text>
  <text x="200" y="522" fill="#D1DCFF" font-size="10" text-anchor="middle" opacity="0.8">Can repeat cycle indefinitely</text>
</svg>