  <text x="30" y="525" class="label-bold" font-size="13">10 billion virions/day</text>
  <text x="30" y="545" class="stat" font-size="11">Each genetically distinct</text>
  <text x="30" y="560" class="stat" font-size="11">Diversity in 1 patient =</text>
  <text x="30" y="575" class="stat" font-size="11">annual global flu diversity</text>
  
  <rect x="560" y="500" width="220" height="85" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round" rx="5"/>
  <text x="570" y="525" class="label-bold" font-size="13">Why combination therapy?</text>
  <text x="570" y="545" class="stat" font-size="11">Resistance to single drug</text>
