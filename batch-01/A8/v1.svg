<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" id="hiv-virion-portrait">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&amp;family=Inter:wght@400;500&amp;display=swap');
      text { font-family: 'Barlow', sans-serif; }
      .label { font-family: 'Inter', sans-serif; font-size: 14px; fill: #D1DCFF; }
      .label-bold { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 500; fill: #FBFFF6; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D16"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" class="label-bold" font-size="24">HIV Virion Structure</text>
  
  <!-- Main virion circle (lipid bilayer envelope) -->
  <circle cx="400" cy="320" r="180" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="3" stroke-linecap="round"/>
  <circle cx="400" cy="320" r="170" fill="#E85542" stroke="#CA1E08" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Glycoprotein spikes (gp120/gp41) around envelope -->
  <g id="glycoprotein-spikes">
    <!-- Top -->
    <circle cx="400" cy="140" r="12" fill="#FFFF77" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="400" y1="152" x2="400" y2="165" stroke="#A0785A" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Top-right -->
    <circle cx="500" cy="180" r="12" fill="#FFFF77" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="493" y1="188" x2="485" y2="200" stroke="#A0785A" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Right -->
    <circle cx="560" cy="260" r="12" fill="#FFFF77" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="548" y1="260" x2="535" y2="260" stroke="#A0785A" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Right-bottom -->
    <circle cx="540" cy="380" r="12" fill="#FFFF77" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="532" y1="374" x2="520" y2="365" stroke="#A0785A" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Bottom -->
    <circle cx="450" cy="480" r="12" fill="#FFFF77" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="450" y1="468" x2="450" y2="455" stroke="#A0785A" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Bottom-left -->
    <circle cx="300" cy="450" r="12" fill="#FFFF77" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="308" y1="443" x2="320" y2="432" stroke="#A0785A" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Left -->
    <circle cx="240" cy="320" r="12" fill="#FFFF77" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="252" y1="320" x2="265" y2="320" stroke="#A0785A" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Left-top -->
    <circle cx="270" cy="200" r="12" fill="#FFFF77" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="278" y1="207" x2="290" y2="218" stroke="#A0785A" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Additional spikes -->
    <circle cx="350" cy="155" r="12" fill="#FFFF77" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="355" y1="165" x2="362" y2="178" stroke="#A0785A" stroke-width="4" stroke-linecap="round"/>
    
    <circle cx="520" cy="220" r="12" fill="#FFFF77" stroke="#E6B800" stroke-width="2" stroke-linecap="round"/>
    <line x1="510" y1="225" x2="498" y2="235" stroke="#A0785A" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Conical capsid (interior) -->
  <path d="M 400 200 L 450 380 L 350 380 Z" fill="#1A5C1E" stroke="#2FBF39" stroke-width="3" stroke-linecap="round"/>
  
  <!-- RNA strands inside capsid -->
  <path d="M 390 230 Q 395 250 388 270 Q 382 290 390 310 Q 398 330 392 350" 
        stroke="#6FD877" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 410 230 Q 405 250 412 270 Q 418 290 410 310 Q 402 330 408 350" 
        stroke="#6FD877" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Matrix protein layer (between envelope and capsid) -->
  <circle cx="400" cy="320" r="165" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-dasharray="8,4" stroke-linecap="round"/>
  
  <!-- Annotations with leader lines -->
  <!-- gp120/gp41 -->
  <line x1="400" y1="140" x2="320" y2="80" stroke="#5B6FA8" stroke-width="1.5" stroke-linecap="round"/>
  <text x="315" y="75" text-anchor="end" class="label">gp120/gp41</text>
  <text x="315" y="90" text-anchor="end" class="label" font-size="11">(envelope spikes)</text>
  
  <!-- Lipid bilayer -->
  <line x1="570" y1="300" x2="650" y2="260" stroke="#5B6FA8" stroke-width="1.5" stroke-linecap="round"/>
  <text x="655" y="260" class="label">Lipid bilayer</text>
  <text x="655" y="275" class="label" font-size="11">(host-derived)</text>
  
  <!-- Matrix -->
  <line x1="330" y1="240" x2="230" y2="180" stroke="#5B6FA8" stroke-width="1.5" stroke-linecap="round"/>
  <text x="225" y="175" text-anchor="end" class="label">Matrix (p17)</text>
  
  <!-- Capsid -->
  <line x1="430" y1="280" x2="520" y2="280" stroke="#5B6FA8" stroke-width="1.5" stroke-linecap="round"/>
  <text x="525" y="280" class="label">Conical capsid</text>
  <text x="525" y="295" class="label" font-size="11">(p24 protein)</text>
  
  <!-- RNA -->
  <line x1="400" y1="340" x2="400" y2="420" stroke="#5B6FA8" stroke-width="1.5" stroke-linecap="round"/>
  <text x="400" y="435" text-anchor="middle" class="label">Viral RNA genome</text>
  <text x="400" y="450" text-anchor="middle" class="label" font-size="11">(2 copies + RT, IN, PR)</text>
  
  <!-- Size reference -->
  <text x="400" y="570" text-anchor="middle" class="label" font-size="12">~120 nm diameter</text>
</svg>