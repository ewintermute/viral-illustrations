<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" id="hiv-mutation-engine">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&amp;family=Inter:wght@400;500&amp;display=swap');
      text { font-family: 'Barlow', sans-serif; }
      .label { font-family: 'Inter', sans-serif; font-size: 14px; fill: #D1DCFF; }
      .label-bold { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 500; fill: #FBFFF6; }
      .stat { font-family: 'Inter', sans-serif; font-size: 13px; fill: #FFFF77; }
      .mutation { fill: #E85542; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D16"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="label-bold" font-size="24">HIV Mutation Engine</text>
  <text x="400" y="55" text-anchor="middle" class="label" font-size="13">Sources of genetic diversity</text>
  
  <!-- Left side: Reverse Transcriptase -->
  <g id="reverse-transcriptase-section">
    <text x="200" y="95" text-anchor="middle" class="label-bold" font-size="18">Reverse Transcriptase (RT)</text>
    
    <!-- RT enzyme (abstract shape) -->
    <ellipse cx="200" cy="180" rx="70" ry="45" fill="#5B6FA8" stroke="#D1DCFF" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="185" cy="175" rx="15" ry="12" fill="#2D3E6B"/>
    <ellipse cx="215" cy="175" rx="15" ry="12" fill="#2D3E6B"/>
    <path d="M 200 195 Q 195 200 200 205 Q 205 200 200 195" fill="#2D3E6B"/>
    
    <!-- RNA template (entering) -->
    <text x="200" y="250" text-anchor="middle" class="label" font-size="12">RNA template</text>
    <path d="M 130 270 Q 135 280 140 270 Q 145 280 150 270 Q 155 280 160 270 Q 165 280 170 270 Q 175 280 180 270 Q 185 280 190 270 Q 195 280 200 270" 
          stroke="#6FD877" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- DNA being synthesized (exiting) -->
    <text x="200" y="305" text-anchor="middle" class="label" font-size="12">DNA copy (with errors)</text>
    <path d="M 130 325 L 270 325" stroke="#2FBF39" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Mutation marks (red dots) -->
    <circle cx="155" cy="325" r="5" class="mutation"/>
    <circle cx="205" cy="325" r="5" class="mutation"/>
    <circle cx="245" cy="325" r="5" class="mutation"/>
    
    <!-- Error markers with asterisks -->
    <text x="155" y="315" text-anchor="middle" fill="#E85542" font-size="18">*</text>
    <text x="205" y="315" text-anchor="middle" fill="#E85542" font-size="18">*</text>
    <text x="245" y="315" text-anchor="middle" fill="#E85542" font-size="18">*</text>
    
    <!-- Stats box for RT -->
    <rect x="70" y="370" width="260" height="110" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round" rx="5"/>
    <text x="200" y="395" text-anchor="middle" class="label-bold" font-size="14">RT Error Rate</text>
    <text x="80" y="420" class="stat" font-size="12">~0.34 mutations per</text>
    <text x="80" y="437" class="stat" font-size="12">replication cycle</text>
    <text x="80" y="457" class="stat" font-size="11">No proofreading ability</text>
    <text x="80" y="472" class="stat" font-size="11">Contributes ~2% of total</text>
  </g>
  
  <!-- Right side: APOBEC3 -->
  <g id="apobec3-section">
    <text x="600" y="95" text-anchor="middle" class="label-bold" font-size="18">APOBEC3 Enzymes</text>
    
    <!-- APOBEC3 enzyme (different shape) -->
    <rect x="550" y="140" width="100" height="60" rx="15" fill="#CA1E08" stroke="#E85542" stroke-width="3" stroke-linecap="round"/>
    <circle cx="575" cy="160" r="8" fill="#FBFFF6"/>
    <circle cx="625" cy="160" r="8" fill="#FBFFF6"/>
    <path d="M 570 180 Q 600 190 630 180" stroke="#FBFFF6" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- DNA strand being edited -->
    <text x="600" y="235" text-anchor="middle" class="label" font-size="12">Viral DNA</text>
    <path d="M 530 255 L 670 255" stroke="#2FBF39" stroke-width="5" stroke-linecap="round"/>
    
    <!-- C→U deamination marks -->
    <circle cx="555" cy="255" r="5" class="mutation"/>
    <circle cx="580" cy="255" r="5" class="mutation"/>
    <circle cx="605" cy="255" r="5" class="mutation"/>
    <circle cx="630" cy="255" r="5" class="mutation"/>
    <circle cx="655" cy="255" r="5" class="mutation"/>
    
    <text x="555" y="245" text-anchor="middle" fill="#E85542" font-size="18">*</text>
    <text x="580" y="245" text-anchor="middle" fill="#E85542" font-size="18">*</text>
    <text x="605" y="245" text-anchor="middle" fill="#E85542" font-size="18">*</text>
    <text x="630" y="245" text-anchor="middle" fill="#E85542" font-size="18">*</text>
    <text x="655" y="245" text-anchor="middle" fill="#E85542" font-size="18">*</text>
    
    <text x="600" y="290" text-anchor="middle" class="label" font-size="11">C → U deamination</text>
    
    <!-- Stats box for APOBEC3 -->
    <rect x="470" y="320" width="260" height="160" fill="#2D3E6B" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round" rx="5"/>
    <text x="600" y="345" text-anchor="middle" class="label-bold" font-size="14">Host Immune Defense</text>
    <text x="480" y="370" class="stat" font-size="12">APOBEC3G/3F enzymes</text>
    <text x="480" y="387" class="stat" font-size="12">edit viral DNA during</text>
    <text x="480" y="404" class="stat" font-size="12">reverse transcription</text>
    <text x="480" y="427" class="stat" font-size="11">Contributes ~98% of</text>
    <text x="480" y="442" class="stat" font-size="11">total mutations!</text>
    <text x="480" y="462" class="stat" font-size="10">HIV Vif protein tries to</text>
    <text x="480" y="475" class="stat" font-size="10">degrade APOBEC3 (arms race)</text>
  </g>
  
  <!-- Bottom: Combined effect visualization -->
  <g id="combined-effect">
    <line x1="200" y1="490" x2="600" y2="490" stroke="#5B6FA8" stroke-width="2" stroke-linecap="round"/>
    <text x="400" y="510" text-anchor="middle" class="label-bold" font-size="15">Combined Effect</text>
    
    <!-- DNA strand with many mutations -->
    <path d="M 100 540 L 700 540" stroke="#2FBF39" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Many mutation markers -->
    <circle cx="140" cy="540" r="5" class="mutation"/>
    <circle cx="180" cy="540" r="5" class="mutation"/>
    <circle cx="210" cy="540" r="5" class="mutation"/>
    <circle cx="250" cy="540" r="5" class="mutation"/>
    <circle cx="290" cy="540" r="5" class="mutation"/>
    <circle cx="320" cy="540" r="5" class="mutation"/>
    <circle cx="360" cy="540" r="5" class="mutation"/>
    <circle cx="400" cy="540" r="5" class="mutation"/>
    <circle cx="440" cy="540" r="5" class="mutation"/>
    <circle cx="470" cy="540" r="5" class="mutation"/>
    <circle cx="510" cy="540" r="5" class="mutation"/>
    <circle cx="550" cy="540" r="5" class="mutation"/>
    <circle cx="590" cy="540" r="5" class="mutation"/>
    <circle cx="630" cy="540" r="5" class="mutation"/>
    <circle cx="660" cy="540" r="5" class="mutation"/>
    
    <text x="400" y="575" text-anchor="middle" class="stat" font-size="13">Billions of variants per day → Quasispecies cloud</text>
  </g>
  
  <!-- Legend -->
  <circle cx="50" cy="95" r="5" class="mutation"/>
  <text x="60" y="100" class="label" font-size="11">= Mutation site</text>
</svg>