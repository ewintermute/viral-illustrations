  <ellipse id="ambient-glow-deep" cx="330" cy="295" rx="400" ry="300" fill="#2D3E6B" opacity="0.04"/>

  <!-- Marine snow: 30 particles across full canvas, feedback #4 -->
  <g id="marine-snow">
    <circle cx="35" cy="28" r="0.8" fill="#D1DCFF" opacity="0.08"/>
    <circle cx="120" cy="65" r="1.2" fill="#D1DCFF" opacity="0.15"/>
    <circle cx="680" cy="130" r="0.9" fill="#D1DCFF" opacity="0.12"/>
    <circle cx="45" cy="180" r="1.5" fill="#D1DCFF" opacity="0.07"/>
    <circle cx="750" cy="95" r="0.6" fill="#D1DCFF" opacity="0.18"/>
    <circle cx="520" cy="42" r="1.0" fill="#D1DCFF" opacity="0.1"/>
    <circle cx="200" cy="320" r="1.3" fill="#D1DCFF" opacity="0.06"/>
    <circle cx="610" cy="55" r="0.7" fill="#D1DCFF" opacity="0.14"/>
    <circle cx="90" cy="420" r="1.1" fill="#D1DCFF" opacity="0.09"/>
    <circle cx="720" cy="280" r="0.8" fill="#D1DCFF" opacity="0.13"/>
    <circle cx="340" cy="555" r="1.0" fill="#D1DCFF" opacity="0.11"/>
    <circle cx="160" cy="530" r="0.7" fill="#D1DCFF" opacity="0.16"/>
    <circle cx="580" cy="510" r="1.4" fill="#D1DCFF" opacity="0.05"/>
    <circle cx="440" cy="570" r="0.5" fill="#D1DCFF" opacity="0.19"/>
    <circle cx="770" cy="450" r="0.9" fill="#D1DCFF" opacity="0.08"/>
    <circle cx="25" cy="550" r="1.0" fill="#D1DCFF" opacity="0.12"/>
    <circle cx="650" cy="380" r="0.6" fill="#D1DCFF" opacity="0.15"/>
    <circle cx="300" cy="15" r="0.8" fill="#D1DCFF" opacity="0.1"/>
    <circle cx="480" cy="585" r="1.2" fill="#D1DCFF" opacity="0.07"/>
    <circle cx="140" cy="260" r="2.0" fill="#D1DCFF" opacity="0.05"/>
    <circle cx="710" cy="540" r="0.7" fill="#D1DCFF" opacity="0.14"/>
    <circle cx="55" cy="90" r="1.0" fill="#D1DCFF" opacity="0.17"/>
    <circle cx="390" cy="590" r="0.6" fill="#D1DCFF" opacity="0.11"/>
    <circle cx="560" cy="190" r="1.5" fill="#D1DCFF" opacity="0.06"/>
