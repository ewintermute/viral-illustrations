  <!-- Esca lure: 12 concentric ellipses + bulb body, feedback #3 -->
  <!-- Centered at (345, 45), massively expanded glow radius -->
  <g id="esca-lure">
    <ellipse cx="345" cy="45" rx="110" ry="100" fill="#FFFF77" opacity="0.03"/>
    <ellipse cx="345" cy="45" rx="95" ry="86" fill="#FFFF77" opacity="0.05"/>
    <ellipse cx="345" cy="45" rx="80" ry="72" fill="#FFFF77" opacity="0.07"/>
    <ellipse cx="345" cy="45" rx="65" ry="58" fill="#FFFF77" opacity="0.1"/>
    <ellipse cx="345" cy="45" rx="50" ry="45" fill="#2FBF39" opacity="0.14"/>
    <ellipse cx="345" cy="45" rx="38" ry="34" fill="#2FBF39" opacity="0.2"/>
    <ellipse cx="345" cy="45" rx="28" ry="25" fill="#6FD877" opacity="0.28"/>
    <ellipse cx="345" cy="45" rx="20" ry="18" fill="#6FD877" opacity="0.4"/>
    <ellipse cx="345" cy="45" rx="14" ry="12" fill="#FFFF77" opacity="0.55"/>
    <ellipse cx="345" cy="45" rx="9" ry="8" fill="#FFFF77" opacity="0.75"/>
    <ellipse cx="345" cy="45" rx="5" ry="4.5" fill="#FBFFF6" opacity="0.9"/>
    <ellipse cx="345" cy="45" rx="2.5" ry="2.2" fill="#FBFFF6" opacity="1.0"/>
    <!-- Esca organ bulb -->
    <ellipse id="esca-bulb" cx="345" cy="48" rx="8" ry="10" fill="#2D3E6B" opacity="0.45"/>
  </g>

  <!-- Illicium stalk: tapered filled shape with S-curve, feedback #5 -->
  <!-- 2px wide at base (head), 4px wide near esca -->
  <path id="illicium-stalk" d="
    M 310 197
    Q 275 155, 280 115
    Q 285 80, 310 55
    Q 330 38, 343 35
    L 347 39
    Q 334 42, 314 60
    Q 290 85, 285 118
    Q 280 158, 312 197
    Z
  " fill="#5B6FA8" opacity="0.65"/>
  <ellipse id="illicium-base" cx="311" cy="198" rx="9" ry="5" fill="#2D3E6B" opacity="0.75"/>

  <!-- Female anglerfish: 20% larger body, shifted up ~25px left ~15px, feedback #1 #6 -->
  <g id="female-anglerfish">
    <!-- Main body -->
    <path id="female-body" d="
      M 135 280
      Q 115 220, 175 185
      Q 220 162, 280 170
      Q 315 175, 328 188
      Q 365 165, 410 170
      Q 478 180, 530 215
      Q 575 250, 590 310
      Q 598 355, 575 395
      Q 548 438, 500 458
      Q 445 478, 370 478
      Q 290 475, 230 450
      Q 170 415, 145 370
      Q 125 335, 135 280 Z
    " fill="#2D3E6B" opacity="0.85"/>

    <!-- Inner body highlight for volume -->
    <path id="female-body-highlight" d="
      M 185 245
      Q 220 210, 290 200
      Q 365 195, 440 212
      Q 500 232, 535 270
      Q 558 300, 548 340
      Q 528 375, 465 390
      Q 385 405, 300 392
      Q 230 375, 200 335
      Q 178 300, 185 245 Z
    " fill="#5B6FA8" opacity="0.22"/>

    <!-- Dorsal spines -->
    <g id="female-spines" stroke="#5B6FA8" stroke-linecap="round" fill="none" opacity="0.55">
      <line x1="220" y1="185" x2="208" y2="145" stroke-width="2.8"/>
      <line x1="255" y1="174" x2="245" y2="132" stroke-width="2.5"/>
      <line x1="290" y1="170" x2="283" y2="126" stroke-width="2.8"/>
      <line x1="390" y1="170" x2="387" y2="128" stroke-width="2.5"/>
      <line x1="425" y1="176" x2="428" y2="134" stroke-width="2.8"/>
      <line x1="458" y1="190" x2="465" y2="148" stroke-width="2.5"/>
      <line x1="490" y1="208" x2="502" y2="168" stroke-width="2.2"/>
      <line x1="520" y1="232" x2="536" y2="195" stroke-width="2.0"/>
    </g>

    <!-- Mouth with teeth -->
    <g id="female-mouth">
      <path id="female-jaw" d="
        M 135 290
        Q 122 315, 128 335
        Q 134 355, 152 365
        Q 170 375, 195 368
        Q 215 360, 228 342
        L 228 305
        Q 215 280, 186 277
        Q 155 273, 135 290 Z
      " fill="#0D0D16" opacity="0.95"/>

      <path id="mouth-flesh" d="
        M 152 300
        Q 147 318, 152 335
        Q 162 348, 178 350
        Q 195 348, 205 335
        Q 210 318, 205 300
        Q 195 288, 178 286
        Q 162 288, 152 300 Z
      " fill="#CA1E08" opacity="0.35"/>

      <g id="upper-teeth" fill="#D1DCFF" opacity="0.85">
        <polygon points="143,292 149,312 138,310"/>
        <polygon points="158,283 161,305 152,300"/>
        <polygon points="174,279 175,303 167,297"/>
        <polygon points="190,281 189,305 182,298"/>
        <polygon points="206,288 203,310 198,303"/>
      </g>

      <g id="lower-teeth" fill="#D1DCFF" opacity="0.8">
        <polygon points="140,338 148,320 152,336"/>
        <polygon points="158,350 163,328 168,347"/>
        <polygon points="175,354 178,330 182,352"/>
        <polygon points="192,352 192,330 197,349"/>
      </g>

      <polygon id="fang-main" points="170,280 174,318 165,312" fill="#FBFFF6" opacity="0.7"/>
    </g>

    <!-- Eye -->
    <g id="female-eye">
      <ellipse cx="238" cy="248" rx="28" ry="26" fill="#0D0D16" opacity="0.8"/>
      <ellipse cx="238" cy="248" rx="21" ry="20" fill="#1C1E35" opacity="0.9"/>
      <ellipse cx="238" cy="248" rx="15" ry="14" fill="#5B6FA8" opacity="0.5"/>
      <ellipse cx="236" cy="246" rx="9" ry="9" fill="#1C1E35"/>
      <ellipse cx="232" cy="241" rx="3.5" ry="3" fill="#FBFFF6" opacity="0.85"/>
    </g>

    <!-- Pectoral fin -->
    <path id="female-pectoral-fin" d="
      M 495 355
      Q 540 368, 575 400
      Q 595 425, 582 442
      Q 565 435, 540 412
      Q 515 390, 495 372 Z
    " fill="#2D3E6B" opacity="0.6" stroke="#5B6FA8" stroke-width="1" stroke-linecap="round" stroke-opacity="0.3"/>

    <!-- Caudal fin -->
    <path id="female-caudal-fin" d="
      M 575 310
      Q 615 285, 655 250
      Q 672 235, 678 244
      Q 670 275, 648 310
      Q 636 335, 648 360
      Q 665 392, 678 410
      Q 672 420, 655 405
      Q 615 370, 580 350 Z
    " fill="#2D3E6B" opacity="0.6" stroke="#5B6FA8" stroke-width="1" stroke-linecap="round" stroke-opacity="0.25"/>

    <!-- Ventral fin -->
    <path id="female-ventral-fin" d="
      M 350 475
      Q 365 495, 360 515
      Q 355 510, 345 498
      Q 335 510, 330 515
      Q 325 495, 340 475 Z
    " fill="#2D3E6B" opacity="0.45" stroke="#5B6FA8" stroke-width="0.8" stroke-linecap="round" stroke-opacity="0.2"/>
  </g>

  <!-- Fused males: deeply absorbed, feedback #2 -->
  <!-- Male 1: translucent blending layers + faint testes vestige -->
  <g id="fused-male-1">
    <ellipse id="fusion-blend-1c" cx="410" cy="452" rx="22" ry="14" fill="#2D3E6B" opacity="0.2"/>
    <ellipse id="fusion-blend-1b" cx="410" cy="455" rx="18" ry="11" fill="#2D3E6B" opacity="0.28"/>
    <ellipse id="fusion-blend-1a" cx="411" cy="458" rx="13" ry="8" fill="#2D3E6B" opacity="0.35"/>
    <ellipse id="male-1-vestige" cx="412" cy="462" rx="8" ry="6" fill="#2D3E6B" opacity="0.5"/>
    <path id="male-1-vasculature" d="M 412 456 Q 408 442, 400 425" fill="none" stroke="#E85542" stroke-width="0.8" stroke-dasharray="3,4" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- Male 2: even smaller, more absorbed -->
  <g id="fused-male-2">
    <ellipse id="fusion-blend-2c" cx="505" cy="412" rx="16" ry="10" fill="#2D3E6B" opacity="0.15"/>
    <ellipse id="fusion-blend-2b" cx="505" cy="415" rx="12" ry="8" fill="#2D3E6B" opacity="0.22"/>
    <ellipse id="fusion-blend-2a" cx="506" cy="418" rx="8" ry="6" fill="#2D3E6B" opacity="0.32"/>
    <ellipse id="male-2-vestige" cx="507" cy="422" rx="6" ry="4.5" fill="#2D3E6B" opacity="0.45"/>
    <path id="male-2-vasculature" d="M 506 417 Q 502 406, 496 395" fill="none" stroke="#E85542" stroke-width="0.6" stroke-dasharray="3,4" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- Annotations: dashed callout lines -->
  <g id="annotation-esca">
    <line x1="365" y1="50" x2="460" y2="78" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="8,5" stroke-linecap="round" opacity="0.6"/>
    <text x="465" y="76" font-family="Barlow, sans-serif" font-size="12" fill="#D1DCFF" opacity="0.7" font-weight="500">esca (lure)</text>
  </g>

  <g id="annotation-illicium">
    <line x1="295" y1="120" x2="215" y2="108" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="8,5" stroke-linecap="round" opacity="0.6"/>
    <text x="130" y="104" font-family="Barlow, sans-serif" font-size="12" fill="#D1DCFF" opacity="0.7" font-weight="500">illicium</text>
  </g>

  <g id="annotation-fused-male">
    <line x1="412" y1="468" x2="465" y2="525" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="8,5" stroke-linecap="round" opacity="0.6"/>
    <text x="470" y="530" font-family="Barlow, sans-serif" font-size="12" fill="#D1DCFF" opacity="0.7" font-weight="500">fused male ♂ (vestigial)</text>
  </g>

  <g id="annotation-gonadal">
    <line x1="507" y1="428" x2="570" y2="480" stroke="#5B6FA8" stroke-width="1.5" stroke-dasharray="8,5" stroke-linecap="round" opacity="0.6"/>
    <text x="575" y="484" font-family="Barlow, sans-serif" font-size="11" fill="#D1DCFF" opacity="0.6" font-weight="500">gonadal tissue</text>
  </g>

  <!-- Title -->
  <text id="title-label" x="30" y="580" font-family="Barlow, sans-serif" font-size="14" fill="#5B6FA8" opacity="0.4" font-weight="600" letter-spacing="2">D4: ANGLERFISH FUSION</text>
</svg>
